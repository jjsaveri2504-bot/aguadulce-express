<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aguadulce Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { 'ae-azul': '#00BCD4', 'ae-grafito': '#2D3436' } } } }
    </script>
    <style>
        body { font-family: 'Open Sans', sans-serif; background: #fdfdfd; }
        .font-ae { font-family: 'Montserrat', sans-serif; font-weight: 900; }
        .btn-ae { background: #00BCD4; color: white; border-radius: 20px; font-weight: 700; transition: 0.3s; }
        .card-rest { border-radius: 30px; overflow: hidden; transition: 0.3s; border: 1px solid #eee; }
        .card-rest:hover { transform: translateY(-5px); border-color: #00BCD4; }
    </style>
</head>
<body class="pb-40">

    <script>
        const API_URL = "
https://script.google.com/macros/s/AKfycbyhs2qXe1KEAIee-hdBcysIgyVlXEb8Se547PzxeQ2YDJqoR40hDLt51Plag5l7Wbja/exec
"; // REEMPLAZA CON TU URL OFICIAL
        const COSTO_ENVIO = 3.50;
    </script>

    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md px-6 py-5 border-b-2 border-ae-azul flex items-center shadow-sm text-ae-grafito uppercase italic">
        <button id="btn-back" onclick="mostrarRestaurantes()" class="hidden mr-4"><i class="fas fa-arrow-left"></i></button>
        <h1 id="header-titulo" class="font-ae text-xl flex-1 text-center">AGUADULCE <span class="text-ae-azul">EXPRESS</span></h1>
    </header>

    <main id="main-container" class="p-6 max-w-xl mx-auto space-y-6"></main>

    <div id="cart-bar" class="fixed bottom-6 left-6 right-6 bg-ae-grafito text-white p-6 rounded-[35px] flex justify-between items-center shadow-2xl hidden z-50 border-t-4 border-ae-azul">
        <div><p class="text-[9px] font-bold text-ae-azul uppercase italic">Total Final</p><p class="font-ae text-3xl italic">$<span id="cart-total">0</span></p></div>
        <button onclick="document.getElementById('modal-checkout').classList.remove('hidden')" class="btn-ae px-10 py-4 uppercase text-xs tracking-widest shadow-lg">PEDIR YA</button>
    </div>

    <div id="modal-checkout" class="fixed inset-0 z-[100] hidden bg-ae-grafito/90 backdrop-blur-sm flex items-end justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[40px] p-8 shadow-2xl">
            <h3 class="font-ae text-2xl mb-4 uppercase italic text-ae-grafito text-center">DATOS DE ENTREGA</h3>
            <div class="space-y-4">
                <input type="text" id="nombre-cliente" placeholder="Nombre completo" class="w-full p-4 bg-gray-100 rounded-2xl border-none outline-ae-azul">
                <input type="tel" id="tel-cliente" placeholder="WhatsApp (Sin espacios)" class="w-full p-4 bg-gray-100 rounded-2xl border-none outline-ae-azul">
                <input type="text" id="dir-cliente" placeholder="Dirección exacta" class="w-full p-4 bg-gray-100 rounded-2xl border-none outline-ae-azul">
                <textarea id="obs-cliente" placeholder="Observaciones (Ej: Sin cebolla)" class="w-full p-4 bg-gray-100 rounded-2xl border-none outline-ae-azul" rows="2"></textarea>
            </div>
            <button onclick="enviarPedido()" class="w-full mt-6 btn-ae py-5 uppercase text-sm shadow-xl">CONFIRMAR PEDIDO</button>
            <button onclick="document.getElementById('modal-checkout').classList.add('hidden')" class="w-full mt-2 text-gray-400 font-bold uppercase text-[10px] w-full text-center py-2">Cancelar</button>
        </div>
    </div>

    <script>
        let menuGeneral = []; let listaRestaurantes = [];
        let restauranteActual = null; let carrito = [];

        async function cargarDatos() {
            const [resMenu, resRest] = await Promise.all([
                fetch(`${API_URL}?sheet=MENU_GENERAL`),
                fetch(`${API_URL}?sheet=RESTAURANTES`)
            ]);
            menuGeneral = await resMenu.json();
            listaRestaurantes = await resRest.json();
            mostrarRestaurantes();
        }

        function mostrarRestaurantes() {
            restauranteActual = null; carrito = []; actualizarBarra();
            document.getElementById('btn-back').classList.add('hidden');
            document.getElementById('header-titulo').innerHTML = 'AGUADULCE <span class="text-ae-azul">EXPRESS</span>';
            
            document.getElementById('main-container').innerHTML = listaRestaurantes.map(r => `
                <div onclick="verMenu('${r.ID_RESTAURANTE}')" class="card-rest bg-white cursor-pointer relative">
                    <img src="${r.FOTO}" class="w-full h-48 object-cover">
                    <div class="p-6">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="text-xl font-ae text-ae-grafito uppercase italic leading-none">${r.NOMBRE_RESTAURANTE}</h3>
                                <p class="text-ae-azul text-[10px] font-bold uppercase mt-2">${r.DIRECCION}</p>
                            </div>
                            <span class="px-3 py-1 rounded-full text-[9px] font-black uppercase ${r.ESTADO === 'Abierto' ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}">
                                ${r.ESTADO}
                            </span>
                        </div>
                    </div>
                    ${r.ESTADO !== 'Abierto' ? '<div class="absolute inset-0 bg-white/60 flex items-center justify-center font-ae text-ae-grafito italic">CERRADO TEMPORALMENTE</div>' : ''}
                </div>`).join('');
        }

        function verMenu(id) {
            restauranteActual = listaRestaurantes.find(r => String(r.ID_RESTAURANTE) === String(id));
            if(restauranteActual.ESTADO !== 'Abierto') return alert("Este restaurante está cerrado en este momento.");

            const platos = menuGeneral.filter(p => String(p.ID_RESTAURANTE) === String(id));
            document.getElementById('header-titulo').innerText = restauranteActual.NOMBRE_RESTAURANTE;
            document.getElementById('btn-back').classList.remove('hidden');
            
            document.getElementById('main-container').innerHTML = platos.map(p => `
                <div class="bg-white rounded-[30px] p-4 flex gap-4 items-center shadow-sm border border-gray-50">
                    <img src="${p.FOTO}" class="w-24 h-24 rounded-2xl object-cover shadow-sm">
                    <div class="flex-1">
                        <h3 class="font-ae text-[11px] text-ae-grafito uppercase">${p.PLATO}</h3>
                        <p class="text-[9px] text-gray-400 line-clamp-1 mt-1">${p.DESCRIPCION}</p>
                        <div class="flex justify-between items-center mt-3">
                            <span class="font-ae text-ae-azul text-xl italic">$${parseFloat(p.PRECIO).toFixed(2)}</span>
                            <button onclick="agregar('${p.PLATO}', ${p.PRECIO})" class="w-10 h-10 btn-ae flex items-center justify-center shadow-lg"><i class="fas fa-plus text-xs"></i></button>
                        </div>
                    </div>
                </div>`).join('');
        }

        function agregar(n, p) { carrito.push({nombre: n, precio: p}); actualizarBarra(); }
        
        function actualizarBarra() {
            const total = carrito.reduce((s, p) => s + p.precio, 0) + (carrito.length > 0 ? COSTO_ENVIO : 0);
            if(carrito.length > 0) {
                document.getElementById('cart-bar').classList.remove('hidden');
                document.getElementById('cart-total').innerText = total.toFixed(2);
            } else { document.getElementById('cart-bar').classList.add('hidden'); }
        }

        async function enviarPedido() {
            const n = document.getElementById('nombre-cliente').value;
            const t = document.getElementById('tel-cliente').value;
            const d = document.getElementById('dir-cliente').value;
            const o = document.getElementById('obs-cliente').value;
            if(!n || !t || !d) return alert("Por favor completa los datos de entrega");

            const items = carrito.reduce((acc, p) => { acc[p.nombre] = (acc[p.nombre] || 0) + 1; return acc; }, {});
            let pedStr = ""; for (const [name, qty] of Object.entries(items)) { pedStr += `${qty}x ${name}, `; }
            const totalF = (carrito.reduce((s, p) => s + p.precio, 0) + COSTO_ENVIO).toFixed(2);

            await fetch(API_URL, { 
                method: 'POST', mode: 'no-cors', 
                body: JSON.stringify({
                    cliente: n, telefono: t, direccion: d, observaciones: o,
                    restaurante: restauranteActual.NOMBRE_RESTAURANTE, pedido: pedStr.slice(0, -2), total: totalF
                }) 
            });

            const msg = `*NUEVO PEDIDO AGUADULCE EXPRESS*\n\n*Cliente:* ${n}\n*WhatsApp:* ${t}\n*Dirección:* ${d}\n*Obs:* ${o || '-'}\n\n*Local:* ${restauranteActual.NOMBRE_RESTAURANTE}\n*Pedido:* ${pedStr.slice(0, -2)}\n\n*TOTAL:* $${totalF}`;
            window.open(`https://wa.me/${restauranteActual.TELEFONO}?text=${encodeURIComponent(msg)}`, '_blank');
            location.reload();
        }

        cargarDatos();
    </script>
</body>
</html>
