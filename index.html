<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express - Gourmet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: ui-sans-serif, system-ui; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .cat-bubble { flex: 0 0 85px; display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; }
        .cat-img-wrapper { width: 65px; height: 65px; border-radius: 50%; background: #fff; padding: 2px; border: 2px solid transparent; overflow: hidden; transition: 0.3s; }
        .cat-img-wrapper img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .cat-bubble.active .cat-img-wrapper { border-color: #06b6d4; transform: scale(1.1); box-shadow: 0 0 15px rgba(6, 182, 212, 0.4); }
        .cat-bubble span { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; text-align: center; }
        .opt-btn { padding: 12px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.03); font-size: 11px; font-weight: 700; text-transform: uppercase; color: #cbd5e1; cursor: pointer; text-align: center; }
        .opt-btn.selected { background: rgba(6, 182, 212, 0.2); border-color: #06b6d4; color: #22d3ee; }
        .modal-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .sticky-cats { position: sticky; top: 72px; z-index: 45; background: #020617; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="pb-32">

    <header class="glass sticky top-0 z-50 px-6 py-5 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <button id="btn-back" onclick="irAHome()" class="hidden p-2 bg-white/10 rounded-xl text-white">←</button>
            <h1 id="header-txt" class="font-black italic text-xl uppercase tracking-tighter text-cyan-400">AGUADULCE <span class="text-white">EXPRESS</span></h1>
        </div>
        <img src="https://i.postimg.cc/C1tDpH9b/LOGO-fondo-blanco.png" class="w-10 h-10 rounded-full border border-white/10">
    </header>

    <div id="cat-nav" class="flex gap-4 p-6 overflow-x-auto hide-scroll bg-[#020617]"></div>

    <main id="app-content" class="p-4 max-w-xl mx-auto"></main>

    <div id="modal-detalle" class="fixed inset-0 z-[60] bg-slate-950 hidden overflow-y-auto modal-up">
        <div class="max-w-xl mx-auto pb-40">
            <div id="det-img-cont" class="h-80 w-full relative"></div>
            <div class="p-8 -mt-10 relative bg-slate-950 rounded-t-[3rem] space-y-6">
                <div class="flex justify-between items-start">
                    <div>
                        <h2 id="det-titulo" class="text-3xl font-black italic uppercase text-white leading-tight"></h2>
                        <p id="det-desc" class="text-gray-400 text-sm italic mt-2"></p>
                    </div>
                    <span id="det-precio-base" class="text-cyan-400 text-2xl font-bold font-mono"></span>
                </div>

                <div id="cont-unica" class="space-y-3 hidden">
                    <p class="text-[10px] font-black text-cyan-500 uppercase tracking-widest">Selecciona una opción:</p>
                    <div id="grid-unica" class="grid grid-cols-2 gap-2"></div>
                </div>

                <div id="cont-multi" class="space-y-3 hidden">
                    <p class="text-[10px] font-black text-gray-500 uppercase tracking-widest">Ingredientes adicionales:</p>
                    <div id="grid-multi" class="grid grid-cols-2 gap-2"></div>
                </div>

                <div id="cont-sugestivo" class="space-y-4 pt-4 border-t border-white/10 hidden">
                    <p class="text-[10px] font-black text-amber-500 uppercase tracking-widest">✨ ¡Completa tu pedido!</p>
                    <div id="grid-sugerencias" class="flex gap-4 overflow-x-auto hide-scroll pb-2"></div>
                </div>

                <div class="flex items-center gap-4 pt-6">
                    <div class="flex items-center bg-white/10 rounded-2xl p-2 gap-4">
                        <button onclick="cambiarCant(-1)" class="w-10 h-10 rounded-xl bg-white/5 text-xl font-bold">-</button>
                        <span id="det-cant" class="font-bold text-xl w-6 text-center">1</span>
                        <button onclick="cambiarCant(1)" class="w-10 h-10 rounded-xl bg-white/5 text-xl font-bold">+</button>
                    </div>
                    <button id="btn-add-carrito-final" class="flex-1 bg-cyan-600 h-16 rounded-2xl font-black uppercase text-white flex justify-between items-center px-6 shadow-lg active:scale-95 transition">
                        <span>Añadir</span>
                        <span id="det-precio-final">0.00€</span>
                    </button>
                </div>
                
                <button onclick="cerrarDetalle()" class="w-full py-4 text-gray-500 font-bold uppercase text-[10px]">Volver a la carta</button>
            </div>
        </div>
    </div>

    <div id="basket-bar" class="fixed bottom-6 left-6 right-6 z-40 hidden modal-up">
        <div class="bg-cyan-600 rounded-[2.5rem] p-3 flex items-center justify-between shadow-2xl">
            <button onclick="vaciarCarrito()" class="p-4 bg-black/20 rounded-full text-white">🗑️</button>
            <div class="text-center" onclick="abrirCheckout()">
                <p id="basket-total" class="text-2xl font-black text-white font-mono">0.00 €</p>
                <p class="text-[8px] uppercase font-bold text-cyan-100">Ver Cesta - Envío incl.</p>
            </div>
            <button onclick="abrirCheckout()" class="bg-slate-950 text-white px-8 py-4 rounded-full text-xs font-black uppercase">Pagar</button>
        </div>
    </div>

    <div id="modal-checkout" class="fixed inset-0 z-[70] bg-slate-950 hidden overflow-y-auto p-6 modal-up">
        <div class="max-w-md mx-auto space-y-6 pb-20">
             <h2 class="text-3xl font-black italic text-white uppercase pt-10">Tu <span class="text-cyan-400">Pedido</span></h2>
             <div id="checkout-list" class="space-y-2"></div>
             <div id="checkout-final-total" class="p-5 bg-cyan-600 rounded-3xl text-center text-white font-black text-2xl mb-4"></div>
             <div class="space-y-4">
                <input type="text" id="o-name" placeholder="Nombre completo" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-white">
                <input type="tel" id="o-phone" placeholder="Teléfono" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-white">
                <input type="text" id="o-addr" placeholder="Dirección exacta" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-white">
             </div>
             <button onclick="confirmarYEnviar()" class="w-full bg-cyan-600 p-7 rounded-3xl font-black uppercase text-white shadow-xl mt-6">Confirmar en WhatsApp</button>
             <button onclick="cerrarCheckout()" class="w-full py-2 text-gray-500 font-bold uppercase text-[10px]">Seguir comprando</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbz6v3d0YYIDAg5H3OY0ey6lWIGINVcR2iR26nGrut6xy68TY4fZmUxinUFu9R3jS4sK/exec";
        const COSTO_ENVIO = 3.50;
        let dataCache = null, carrito = [], restActivo = null, pAct = null, sUnica = null, sMulti = [], cantAct = 1;
        let idRestCarrito = null;

        async function init() {
            try {
                const res = await fetch(API_URL);
                dataCache = await res.json();
                renderCats();
                renderHome();
            } catch (e) { console.error(e); }
        }

        function renderCats(esMenu = false) {
            const nav = document.getElementById('cat-nav');
            nav.innerHTML = "";
            if (!esMenu) {
                const cats = [...new Set(dataCache.restaurantes.map(r => r.CATEGORIA))].filter(Boolean);
                nav.innerHTML = createBubble("TODOS", "Todos", null);
                cats.forEach(c => nav.innerHTML += createBubble(c, c, null));
            } else {
                const platos = dataCache.menus.filter(m => String(m.ID_RESTAURANTE) === String(restActivo.ID_RESTAURANTE));
                const catsMenu = [...new Set(platos.map(p => p.CATEGORIA))].filter(Boolean);
                catsMenu.forEach(c => nav.innerHTML += createBubble(c, c, null, true));
            }
        }

        function createBubble(id, name, img, esMenu = false) {
            const iconData = dataCache.iconos.find(i => i.CATEGORIA.toUpperCase() === id.toUpperCase());
            const imgSrc = iconData ? iconData.FOTO : "https://i.postimg.cc/mD44w655/all-food.jpg";
            const action = esMenu ? `filtrarMenu('${id}', this)` : `filtrarRest('${id}', this)`;
            return `<div onclick="${action}" class="cat-bubble ${id==='TODOS'?'active':''}">
                <div class="cat-img-wrapper"><img src="${imgSrc}"></div><span>${name}</span></div>`;
        }

        function renderHome(f = null) {
            document.getElementById('btn-back').classList.add('hidden');
            document.getElementById('header-txt').innerHTML = 'AGUADULCE <span class="text-white">EXPRESS</span>';
            const content = document.getElementById('app-content');
            content.className = "p-4 grid grid-cols-2 gap-5"; 
            const filt = (f && f !== 'TODOS') ? dataCache.restaurantes.filter(r => r.CATEGORIA === f) : dataCache.restaurantes;
            content.innerHTML = filt.map(r => `
                <div onclick="verMenu('${r.ID_RESTAURANTE}')" class="bg-white/5 rounded-[2rem] overflow-hidden border border-white/10 active:scale-95 transition">
                    <img src="${r.FOTO}" class="w-full h-32 object-cover">
                    <div class="p-4 text-center text-[10px] font-black uppercase text-white">${r.NOMBRE}</div>
                </div>`).join('');
            renderCats(false);
        }

        function verMenu(id) {
            restActivo = dataCache.restaurantes.find(r => String(r.ID_RESTAURANTE) === String(id));
            document.getElementById('btn-back').classList.remove('hidden');
            document.getElementById('header-txt').innerText = restActivo.NOMBRE;
            renderCats(true);
            filtrarMenu('TODOS');
        }

        function filtrarMenu(cat, el = null) {
            if(el) {
                document.querySelectorAll('.cat-bubble').forEach(b => b.classList.remove('active'));
                el.classList.add('active');
            }
            const content = document.getElementById('app-content');
            content.className = "p-4 flex flex-col gap-4";
            const platos = dataCache.menus.filter(m => String(m.ID_RESTAURANTE) === String(restActivo.ID_RESTAURANTE));
            const filt = (cat && cat !== 'TODOS') ? platos.filter(p => p.CATEGORIA === cat) : platos;
            
            content.innerHTML = filt.map(p => `
                <div onclick='abrirDetalle(${JSON.stringify(p)})' class="bg-white/5 p-4 rounded-[2rem] flex items-center gap-5 border border-white/10 active:scale-95 transition">
                    <img src="${p.FOTO}" class="w-20 h-20 rounded-2xl object-cover">
                    <div class="flex-1 font-black uppercase">
                        <p class="text-[11px] text-white mb-1">${p.PLATO}</p>
                        <p class="text-cyan-400 text-lg font-mono">${parseFloat(p.PRECIO).toFixed(2)}€</p>
                    </div>
                </div>`).join('');
        }

        function abrirDetalle(p) {
            if (idRestCarrito && String(idRestCarrito) !== String(p.ID_RESTAURANTE)) {
                if (!confirm("¿Vaciar cesta para pedir en otro restaurante?")) return;
                vaciarCarrito();
            }
            pAct = p; sUnica = null; sMulti = []; cantAct = 1;
            document.getElementById('det-titulo').innerText = p.PLATO;
            document.getElementById('det-desc').innerText = p.DESCRIPCION || "";
            document.getElementById('det-precio-base').innerText = parseFloat(p.PRECIO).toFixed(2) + "€";
            document.getElementById('det-img-cont').innerHTML = `<img src="${p.FOTO}" class="w-full h-full object-cover">`;
            document.getElementById('det-cant').innerText = "1";

            // Lógica de opciones (Única y Múltiple) igual a tu v24 pero con los nombres que pediste
            renderOpciones('grid-unica', p.SELECCION_UNICA, true);
            renderOpciones('grid-multi', p.EXTRAS, false);

            // LOGICA SUGESTIVA: Si no hay obligatorios, sugerir bebidas
            const sugerencias = dataCache.menus.filter(m => String(m.ID_RESTAURANTE) === String(p.ID_RESTAURANTE) && m.CATEGORIA.toLowerCase().includes('bebida'));
            const contSug = document.getElementById('cont-sugestivo');
            if(!p.SELECCION_UNICA && sugerencias.length > 0) {
                contSug.classList.remove('hidden');
                document.getElementById('grid-sugerencias').innerHTML = sugerencias.slice(0,4).map(s => `
                    <div class="flex-none w-32 bg-white/5 p-2 rounded-xl text-center">
                        <img src="${s.FOTO}" class="w-full h-20 object-cover rounded-lg mb-2">
                        <p class="text-[8px] font-bold uppercase truncate">${s.PLATO}</p>
                        <p class="text-cyan-400 text-[10px] font-mono">${s.PRECIO}€</p>
                    </div>`).join('');
            } else { contSug.classList.add('hidden'); }

            updatePrecio();
            document.getElementById('modal-detalle').classList.remove('hidden');
        }

        function renderOpciones(gridId, data, esUnica) {
            const grid = document.getElementById(gridId);
            const cont = grid.parentElement;
            grid.innerHTML = "";
            if(data) {
                cont.classList.remove('hidden');
                data.split(',').forEach(o => {
                    const [n, pr] = o.split(':');
                    const btn = document.createElement('div');
                    btn.className = "opt-btn";
                    btn.innerText = n.trim() + (parseFloat(pr)>0 ? ` (+${pr}€)` : "");
                    btn.onclick = () => {
                        if(esUnica) {
                            grid.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
                            sUnica = { n: n.trim(), p: parseFloat(pr || 0) };
                        } else {
                            const idx = sMulti.findIndex(x => x.n === n.trim());
                            idx > -1 ? sMulti.splice(idx,1) : sMulti.push({ n: n.trim(), p: parseFloat(pr || 0) });
                        }
                        btn.classList.toggle('selected');
                        updatePrecio();
                    };
                    grid.appendChild(btn);
                });
            } else { cont.classList.add('hidden'); }
        }

        function cambiarCant(val) {
            cantAct = Math.max(1, cantAct + val);
            document.getElementById('det-cant').innerText = cantAct;
            updatePrecio();
        }

        function updatePrecio() {
            let base = parseFloat(pAct.PRECIO) + (sUnica ? sUnica.p : 0) + sMulti.reduce((a, b) => a + b.p, 0);
            document.getElementById('det-precio-final').innerText = (base * cantAct).toFixed(2) + "€";
        }

        document.getElementById('btn-add-carrito-final').onclick = () => {
            if(pAct.SELECCION_UNICA && !sUnica) return alert("Selecciona una opción");
            if (carrito.length === 0) idRestCarrito = pAct.ID_RESTAURANTE;
            
            let desc = pAct.PLATO + (sUnica ? ` [${sUnica.n}]` : "");
            if(sMulti.length) desc += ` + ${sMulti.map(x=>x.n).join(', ')}`;
            
            carrito.push({
                n: desc,
                cant: cantAct,
                p: (parseFloat(pAct.PRECIO) + (sUnica ? sUnica.p : 0) + sMulti.reduce((a, b) => a + b.p, 0)) * cantAct
            });
            cerrarDetalle(); updateBarra();
        };

        function updateBarra() {
            const t = carrito.reduce((a, b) => a + b.p, 0) + (carrito.length > 0 ? COSTO_ENVIO : 0);
            document.getElementById('basket-total').innerText = t.toFixed(2) + " €";
            document.getElementById('basket-bar').classList.toggle('hidden', carrito.length === 0);
        }

        function abrirCheckout() {
            const list = document.getElementById('checkout-list');
            list.innerHTML = carrito.map(i => `
                <div class="flex justify-between bg-white/5 p-4 rounded-2xl text-[10px] uppercase font-bold text-white items-center">
                    <span>${i.cant}x ${i.n}</span>
                    <span class="text-cyan-400">${i.p.toFixed(2)}€</span>
                </div>`).join('');
            const totalFinal = (carrito.reduce((a, b) => a + b.p, 0) + COSTO_ENVIO).toFixed(2);
            document.getElementById('checkout-final-total').innerText = "TOTAL: " + totalFinal + "€";
            document.getElementById('modal-checkout').classList.remove('hidden');
        }

        async function confirmarYEnviar() {
            const n = document.getElementById('o-name').value, t = document.getElementById('o-phone').value, a = document.getElementById('o-addr').value;
            if(!n || !t || !a) return alert("Rellena tus datos de entrega");

            const totalFinal = (carrito.reduce((a, b) => a + b.p, 0) + COSTO_ENVIO).toFixed(2);
            const detalleStr = carrito.map(i => `${i.cant}x ${i.n}`).join(', ');

            // GUARDAR EN EXCEL (TU MISMA LOGICA)
            fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    id_restaurante: restActivo.ID_RESTAURANTE, 
                    cliente: n, 
                    direccion: a,
                    detalle: detalleStr, 
                    total: totalFinal,
                    whatsapp_rest: restActivo.TELEFONO 
                })
            });

            // WHATSAPP
            let msg = `*🛍️ PEDIDO AGUADULCE: ${restActivo.NOMBRE}*\n*Cliente:* ${n}\n*Dir:* ${a}\n\n*Pedido:*\n`;
            carrito.forEach(i => msg += `• ${i.cant}x ${i.n} - ${i.p.toFixed(2)}€\n`);
            msg += `\n*Envío:* ${COSTO_ENVIO.toFixed(2)}€\n*TOTAL:* ${totalFinal}€`;
            window.open(`https://wa.me/${restActivo.TELEFONO}?text=${encodeURIComponent(msg)}`);
        }

        function filtrarRest(c, el) {
            document.querySelectorAll('.cat-bubble').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            renderHome(c);
        }
        function irAHome() { renderHome(); }
        function cerrarDetalle() { document.getElementById('modal-detalle').classList.add('hidden'); }
        function cerrarCheckout() { document.getElementById('modal-checkout').classList.add('hidden'); }
        function vaciarCarrito() { carrito = []; idRestCarrito = null; updateBarra(); cerrarCheckout(); }

        init();
    </script>
</body>
</html>
