<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express</title>
    
    <meta name="theme-color" content="#020617">
    <link rel="manifest" href="data:application/manifest+json;base64,ewogICJuYW1lIjogIkFndWFkdWxjZSBFeHByZXNzIiwKICAic2hvcnRfbmFtZSI6ICJBZ3VhZHVsY2UiLAogICJpY29ucyI6IFt7ICJzcmMiOiAiaHR0cHM6Ly9pLnBvc3RpbWcuY2MvQzF0RHBIOWIvTE9HTy1mb25kby1ibGFuY28ucG5nIiwgInNpemVzIjogIjUxMng1MTIiLCAidHlwZSI6ICJpbWFnZS9wbmciIH1dLAogICJzdGFydF91cmwiOiAiLiIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiIzAyMDYxNyIKfQ==">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: ui-sans-serif, system-ui; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .category-pill { transition: 0.3s; border: 1px solid rgba(255,255,255,0.1); }
        .category-pill.active { background: #06b6d4; border-color: #06b6d4; color: white; transform: scale(1.05); }
        .extra-chip { transition: 0.2s; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.03); }
        .extra-chip.selected { background: rgba(6, 182, 212, 0.2); border-color: #06b6d4; color: #22d3ee; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-up { animation: slideUp 0.3s ease-out; }
    </style>
</head>
<body class="pb-32 selection:bg-cyan-500/30">

    <header class="glass sticky top-0 z-40 px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <button id="btn-back" onclick="irAHome()" class="hidden p-2 bg-white/5 rounded-full"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg></button>
            <h1 id="header-txt" class="font-black italic text-lg uppercase tracking-tighter text-cyan-400">AGUADULCE <span class="text-white">EXPRESS</span></h1>
        </div>
    </header>

    <div id="cat-scroll" class="sticky top-[68px] z-30 bg-[#020617]/95 backdrop-blur-md py-4 overflow-x-auto hide-scroll flex gap-3 px-6 border-b border-white/5">
        </div>

    <main id="main-container" class="p-4 max-w-xl mx-auto min-h-screen">
        <div id="rest-grid" class="grid grid-cols-2 gap-4 mt-2">
            </div>
    </main>

    <div id="modal-detalle" class="fixed inset-0 z-[60] bg-slate-950 hidden overflow-y-auto animate-up">
        <div class="max-w-xl mx-auto pb-32">
            <div class="relative h-[40vh]">
                <button onclick="cerrarDetalle()" class="absolute top-6 left-6 z-10 bg-black/40 p-3 rounded-full border border-white/10 text-white">✕</button>
                <div id="det-img-cont" class="w-full h-full"></div>
            </div>
            
            <div class="p-8 -mt-10 relative bg-slate-950 rounded-t-[3rem] space-y-6">
                <div class="flex justify-between items-start gap-4">
                    <h2 id="det-titulo" class="text-2xl font-black italic uppercase tracking-tighter text-white"></h2>
                    <span id="det-precio-base" class="text-cyan-400 text-xl font-bold"></span>
                </div>
                <p id="det-desc" class="text-gray-400 text-sm leading-relaxed"></p>

                <div id="extras-container" class="space-y-4 pt-4 border-t border-white/5">
                    <p class="text-[10px] font-black text-gray-500 uppercase tracking-widest italic">Añade extras al gusto</p>
                    <div id="extras-grid" class="flex flex-wrap gap-2"></div>
                </div>

                <div id="sugeridos-container" class="pt-6 border-t border-white/5">
                    <p class="text-[10px] font-black text-cyan-500 uppercase tracking-widest italic mb-4">¿Te falta algo?</p>
                    <div id="sugeridos-scroll" class="flex gap-4 overflow-x-auto hide-scroll pb-2"></div>
                </div>

                <button id="btn-add-det" class="w-full bg-cyan-600 p-6 rounded-[2.2rem] font-black uppercase text-sm flex justify-between items-center text-white active:scale-95 transition">
                    <span>Añadir a la cesta</span>
                    <span id="det-precio-final" class="bg-black/20 px-4 py-1 rounded-xl">0.00€</span>
                </button>
            </div>
        </div>
    </div>

    <div id="basket-bar" class="fixed bottom-8 left-6 right-6 z-40 hidden animate-up">
        <div class="bg-cyan-600 rounded-[2.5rem] p-4 flex items-center justify-between shadow-2xl border border-white/10">
            <button onclick="vaciarCarrito()" class="p-3.5 bg-black/20 rounded-2xl text-white">🗑️</button>
            <div class="flex-1 px-5 flex items-center justify-between cursor-pointer" onclick="abrirCheckout()">
                <div class="flex flex-col">
                    <span id="basket-total" class="text-xl font-black text-white">0.00 €</span>
                    <span class="text-[9px] uppercase font-black text-white/60 tracking-widest">Confirmar Pedido</span>
                </div>
                <div class="bg-white/20 p-3 rounded-2xl text-white">→</div>
            </div>
        </div>
    </div>

    <div id="modal-checkout" class="fixed inset-0 z-[70] bg-slate-950 hidden overflow-y-auto p-6 animate-up">
        <div class="max-w-md mx-auto space-y-8">
            <div class="flex justify-between items-center pt-4">
                <h2 class="text-3xl font-black italic uppercase text-white">RESU<span class="text-cyan-500">MEN</span></h2>
                <button onclick="cerrarCheckout()" class="text-white">✕</button>
            </div>
            <div id="checkout-list" class="space-y-3"></div>
            <div class="space-y-4">
                <input type="text" id="order-name" placeholder="Tu Nombre" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-white">
                <input type="text" id="order-addr" placeholder="Dirección de entrega" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-white">
            </div>
            <button onclick="enviarWhatsApp()" class="w-full bg-cyan-600 p-6 rounded-3xl font-black text-white uppercase">Pedir por WhatsApp</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxEBihvxk1icSDalXL2WdIroijpP4r7Oa7UC0fAQhGnNZkL3jMMZNEPlXWPaFc3-iFe/exec"; // <--- TU URL /exec AQUÍ
        const WHATSAPP_NUM = "34600000000"; 

        let dataCache = null;
        let carrito = [];
        let restActivo = null;
        let platoActual = null;
        let extrasSeleccionados = [];

        async function init() {
            try {
                const res = await fetch(API_URL);
                dataCache = await res.json();
                renderHome();
                renderCategorias();
            } catch (e) { alert("Error cargando datos"); }
        }

        // Renderiza iconos de categorías
        function renderCategorias() {
            const cats = [...new Set(dataCache.restaurantes.map(r => r.CATEGORIA))].filter(Boolean);
            const scroll = document.getElementById('cat-scroll');
            scroll.innerHTML = `<button onclick="renderHome()" class="category-pill active px-5 py-2.5 rounded-full text-xs font-bold whitespace-nowrap">🔥 Todos</button>`;
            
            const iconos = { "Hamburguesas":"🍔", "Pizzas":"🍕", "Sushi":"🍣", "Postres":"🍦", "Bebidas":"🥤", "Tacos":"🌮" };
            
            cats.forEach(c => {
                const icon = iconos[c] || "🍽️";
                scroll.innerHTML += `<button onclick="filtrarRest('${c}')" class="category-pill px-5 py-2.5 rounded-full text-xs font-bold whitespace-nowrap text-gray-400">${icon} ${c}</button>`;
            });
        }

        function renderHome(filtro = null) {
            document.getElementById('cat-scroll').classList.remove('hidden');
            document.getElementById('btn-back').classList.add('hidden');
            const grid = document.getElementById('rest-grid');
            grid.innerHTML = "";
            
            const filtrados = filtro ? dataCache.restaurantes.filter(r => r.CATEGORIA === filtro) : dataCache.restaurantes;
            
            filtrados.forEach(r => {
                grid.innerHTML += `
                    <div onclick="verMenu('${r.ID_RESTAURANTE}')" class="bg-white/5 rounded-[2rem] overflow-hidden border border-white/5 active:scale-95 transition shadow-xl">
                        <img src="${r.FOTO}" class="w-full h-32 object-cover">
                        <div class="p-4 text-center">
                            <p class="text-[10px] font-black uppercase tracking-tighter text-white truncate">${r.NOMBRE}</p>
                            <p class="text-[8px] text-cyan-500 font-bold uppercase mt-1 tracking-widest">${r.CATEGORIA}</p>
                        </div>
                    </div>`;
            });
        }

        function filtrarRest(cat) {
            document.querySelectorAll('.category-pill').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');
            renderHome(cat);
        }

        function verMenu(id) {
            restActivo = dataCache.restaurantes.find(r => r.ID_RESTAURANTE == id);
            document.getElementById('cat-scroll').classList.add('hidden');
            document.getElementById('btn-back').classList.remove('hidden');
            document.getElementById('header-txt').innerText = restActivo.NOMBRE;
            
            const grid = document.getElementById('rest-grid');
            grid.classList.remove('grid-cols-2');
            grid.classList.add('grid-cols-1');
            grid.innerHTML = "";
            
            dataCache.menus.filter(m => m.ID_RESTAURANTE == id).forEach(p => {
                grid.innerHTML += `
                    <div onclick='abrirDetalle(${JSON.stringify(p)})' class="bg-white/5 p-4 rounded-[1.5rem] flex items-center gap-4 active:scale-95 transition">
                        <img src="${p.FOTO}" class="w-16 h-16 rounded-2xl object-cover">
                        <div class="flex-1">
                            <p class="font-bold text-sm text-white">${p.PLATO}</p>
                            <p class="text-cyan-400 font-bold text-sm">${parseFloat(p.PRECIO).toFixed(2)}€</p>
                        </div>
                        <div class="text-white/20">⊕</div>
                    </div>`;
            });
        }

        function abrirDetalle(p) {
            platoActual = p;
            extrasSeleccionados = [];
            document.getElementById('det-titulo').innerText = p.PLATO;
            document.getElementById('det-precio-base').innerText = parseFloat(p.PRECIO).toFixed(2) + "€";
            document.getElementById('det-img-cont').innerHTML = `<img src="${p.FOTO}" class="w-full h-full object-cover">`;
            document.getElementById('det-desc').innerText = p.DESCRIPCION || "Sin descripción disponible.";
            
            renderExtras(p.EXTRAS);
            renderSugeridos();
            actualizarPrecioDetalle();
            
            document.getElementById('modal-detalle').classList.remove('hidden');
        }

        function renderExtras(extraStr) {
            const grid = document.getElementById('extras-grid');
            grid.innerHTML = "";
            if (!extraStr) return;

            const partes = extraStr.split(',');
            partes.forEach(ex => {
                const [nom, pre] = ex.split(':');
                if(!nom) return;
                const precio = parseFloat(pre?.replace(',', '.') || 0);
                grid.innerHTML += `
                    <button onclick="toggleExtra('${nom.trim()}', ${precio})" class="extra-chip px-4 py-2 rounded-full text-[10px] font-bold uppercase">
                        + ${nom.trim()} (${precio.toFixed(2)}€)
                    </button>`;
            });
        }

        function toggleExtra(nombre, precio) {
            const idx = extrasSeleccionados.findIndex(e => e.n === nombre);
            if (idx > -1) extrasSeleccionados.splice(idx, 1);
            else extrasSeleccionados.push({n: nombre, p: precio});
            
            // UI Toggle
            event.currentTarget.classList.toggle('selected');
            actualizarPrecioDetalle();
        }

        function actualizarPrecioDetalle() {
            const extrasTotal = extrasSeleccionados.reduce((s, i) => s + i.p, 0);
            const total = parseFloat(platoActual.PRECIO) + extrasTotal;
            document.getElementById('det-precio-final').innerText = total.toFixed(2) + "€";
        }

        function renderSugeridos() {
            const scroll = document.getElementById('sugeridos-scroll');
            scroll.innerHTML = "";
            // Buscamos bebidas o postres del mismo restaurante
            const sugs = dataCache.menus.filter(m => m.ID_RESTAURANTE == restActivo.ID_RESTAURANTE && m.PLATO != platoActual.PLATO).slice(0, 4);
            sugs.forEach(s => {
                scroll.innerHTML += `
                    <div onclick='abrirDetalle(${JSON.stringify(s)})' class="min-w-[120px] bg-white/5 p-3 rounded-2xl text-center">
                        <img src="${s.FOTO}" class="w-16 h-16 object-cover rounded-xl mx-auto mb-2">
                        <p class="text-[9px] font-black uppercase text-white truncate">${s.PLATO}</p>
                        <p class="text-cyan-500 text-[10px] font-bold">${parseFloat(s.PRECIO).toFixed(2)}€</p>
                    </div>`;
            });
        }

        function addAlCarrito() {
            const extrasTxt = extrasSeleccionados.map(e => e.n).join(', ');
            const finalP = parseFloat(platoActual.PRECIO) + extrasSeleccionados.reduce((s, i) => s + i.p, 0);
            carrito.push({
                n: extrasTxt ? `${platoActual.PLATO} (${extrasTxt})` : platoActual.PLATO,
                p: finalP
            });
            cerrarDetalle();
            actualizarBarra();
        }

        document.getElementById('btn-add-det').onclick = addAlCarrito;

        function actualizarBarra() {
            const bar = document.getElementById('basket-bar');
            if (carrito.length > 0) {
                const total = carrito.reduce((s, i) => s + i.p, 0);
                document.getElementById('basket-total').innerText = total.toFixed(2) + " €";
                bar.classList.remove('hidden');
            } else { bar.classList.add('hidden'); }
        }

        function irAHome() { 
            const grid = document.getElementById('rest-grid');
            grid.classList.add('grid-cols-2');
            grid.classList.remove('grid-cols-1');
            renderHome(); 
        }
        function cerrarDetalle() { document.getElementById('modal-detalle').classList.add('hidden'); }
        function vaciarCarrito() { carrito = []; actualizarBarra(); }
        function abrirCheckout() { document.getElementById('modal-checkout').classList.remove('hidden'); }
        function cerrarCheckout() { document.getElementById('modal-checkout').classList.add('hidden'); }

        init();
    </script>
</body>
</html>
