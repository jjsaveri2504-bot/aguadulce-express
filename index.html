<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express | Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary: #06b6d4; --bg: #050505; --card: #121212; }
        body { background: var(--bg); color: #e2e8f0; font-family: 'Inter', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* Carga optimizada de imágenes */
        img { content-visibility: auto; }
        .hide-scroll::-webkit-scrollbar { display: none; }

        /* Estilo Stories para Bebidas */
        .story-circle { flex: 0 0 75px; text-align: center; cursor: pointer; }
        .story-img { width: 65px; height: 65px; border-radius: 50%; border: 2px solid #333; padding: 2px; transition: 0.3s; object-fit: cover; }
        .story-circle.selected .story-img { border-color: var(--primary); transform: scale(1.05); box-shadow: 0 0 10px rgba(6,182,212,0.3); }
        .story-name { font-size: 9px; font-weight: 600; text-transform: uppercase; margin-top: 5px; color: #94a3b8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Extras Elegantes */
        .extra-item { background: #1a1a1a; border: 1px solid #262626; border-radius: 14px; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .extra-item.active { border-color: var(--primary); background: rgba(6,182,212,0.05); }
        .check-custom { width: 20px; height: 20px; border-radius: 6px; border: 2px solid #444; display: flex; align-items: center; justify-content: center; }
        .extra-item.active .check-custom { background: var(--primary); border-color: var(--primary); }

        /* Modal Animado */
        .modal-up { animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="pb-24">

    <header class="sticky top-0 z-50 bg-black/80 backdrop-blur-lg px-6 py-4 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-3">
            <button id="btn-back" onclick="irAHome()" class="hidden text-white bg-white/10 p-2 rounded-lg">←</button>
            <h1 id="brand" class="font-black italic text-lg tracking-tighter uppercase">AGUADULCE <span class="text-cyan-500">EXPRESS</span></h1>
        </div>
        <img src="https://i.postimg.cc/C1tDpH9b/LOGO-fondo-blanco.png" class="w-9 h-9 rounded-full">
    </header>

    <div id="cat-nav" class="flex gap-5 p-6 overflow-x-auto hide-scroll"></div>

    <main id="app-content" class="px-5 grid grid-cols-2 gap-4"></main>

    <div id="modal-detalle" class="fixed inset-0 z-[60] bg-black hidden overflow-y-auto modal-up">
        <div class="max-w-xl mx-auto min-h-screen pb-32">
            <div id="det-img-cont" class="h-72 w-full relative">
                <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent"></div>
            </div>
            
            <div class="p-6 -mt-10 relative z-20 bg-black rounded-t-[2.5rem] space-y-8">
                <div class="flex justify-between items-start">
                    <div>
                        <h2 id="det-titulo" class="text-2xl font-black uppercase italic text-white tracking-tight"></h2>
                        <p id="det-desc" class="text-gray-500 text-sm mt-1 italic"></p>
                    </div>
                    <span id="det-precio-base" class="text-cyan-400 font-black text-xl font-mono"></span>
                </div>

                <div id="cont-extras" class="space-y-3 hidden">
                    <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Personaliza tu plato</p>
                    <div id="list-extras" class="space-y-2"></div>
                </div>

                <div id="cont-bebidas" class="space-y-4 pt-4 border-t border-white/5">
                    <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest italic">Acompaña tu pedido</p>
                    <div id="grid-bebidas" class="flex gap-4 overflow-x-auto hide-scroll py-2"></div>
                </div>

                <div class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-black via-black to-transparent">
                    <div class="max-w-xl mx-auto flex items-center gap-4">
                        <div class="flex items-center bg-white/5 border border-white/10 rounded-2xl p-1">
                            <button onclick="cambiarCant(-1)" class="w-12 h-12 text-white text-xl font-bold">-</button>
                            <span id="det-cant" class="text-white font-black text-lg w-6 text-center">1</span>
                            <button onclick="cambiarCant(1)" class="w-12 h-12 text-white text-xl font-bold">+</button>
                        </div>
                        <button id="btn-add-final" class="flex-1 bg-cyan-600 h-14 rounded-2xl font-black uppercase text-white flex justify-between items-center px-6 shadow-lg shadow-cyan-900/20">
                            <span>AÑADIR</span>
                            <span id="det-precio-final" class="bg-black/20 px-3 py-1 rounded-lg font-mono"></span>
                        </button>
                    </div>
                </div>
                <button onclick="cerrarDetalle()" class="w-full py-4 text-gray-700 text-[10px] font-bold uppercase tracking-widest">Volver</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbz6v3d0YYIDAg5H3OY0ey6lWIGINVcR2iR26nGrut6xy68TY4fZmUxinUFu9R3jS4sK/exec";
        let dataCache = null, carrito = [], restAct = null, pAct = null, sExtras = [], sBebidas = [], cantAct = 1;

        // INICIO OPTIMIZADO (CACHE)
        async function init() {
            const cached = localStorage.getItem('aguadulce_data');
            if(cached) {
                dataCache = JSON.parse(cached);
                renderHome();
                renderCats();
            }
            // Actualiza en segundo plano para la próxima vez
            try {
                const res = await fetch(API_URL);
                const newData = await res.json();
                localStorage.setItem('aguadulce_data', JSON.stringify(newData));
                if(!dataCache) { dataCache = newData; renderHome(); renderCats(); }
            } catch(e) { console.log("Offline mode"); }
        }

        function renderCats(esMenu = false) {
            const nav = document.getElementById('cat-nav');
            nav.innerHTML = "";
            const cats = esMenu ? [...new Set(dataCache.menus.filter(m => String(m.ID_RESTAURANTE) === String(restAct.ID_RESTAURANTE)).map(p => p.CATEGORIA))] : [...new Set(dataCache.restaurantes.map(r => r.CATEGORIA))];
            
            nav.innerHTML += `<div onclick="${esMenu?'filtrarMenu':'filtrarRest'}('TODOS', this)" class="cat-bubble active"><div class="cat-img-wrapper"><img src="https://i.postimg.cc/mD44w655/all-food.jpg"></div><span>Todos</span></div>`;
            cats.forEach(c => {
                const icon = dataCache.iconos?.find(i => i.CATEGORIA === c)?.FOTO || "https://i.postimg.cc/mD44w655/all-food.jpg";
                nav.innerHTML += `<div onclick="${esMenu?'filtrarMenu':'filtrarRest'}('${c}', this)" class="cat-bubble"><div class="cat-img-wrapper"><img src="${icon}"></div><span>${c}</span></div>`;
            });
        }

        function renderHome() {
            restAct = null;
            document.getElementById('btn-back').classList.add('hidden');
            document.getElementById('brand').innerHTML = 'AGUADULCE <span class="text-cyan-500">EXPRESS</span>';
            const content = document.getElementById('app-content');
            content.className = "px-5 grid grid-cols-2 gap-4";
            content.innerHTML = dataCache.restaurantes.map(r => `
                <div onclick="verMenu('${r.ID_RESTAURANTE}')" class="bg-white/5 rounded-3xl overflow-hidden border border-white/5 active:scale-95 transition-all">
                    <img src="${r.FOTO}" class="w-full h-32 object-cover">
                    <div class="p-3 text-[10px] font-black uppercase text-center text-gray-300">${r.NOMBRE}</div>
                </div>`).join('');
        }

        function verMenu(id) {
            restAct = dataCache.restaurantes.find(r => String(r.ID_RESTAURANTE) === String(id));
            document.getElementById('btn-back').classList.remove('hidden');
            document.getElementById('brand').innerText = restAct.NOMBRE;
            renderCats(true);
            filtrarMenu('TODOS');
        }

        function filtrarMenu(cat, el) {
            if(el) { document.querySelectorAll('.cat-bubble').forEach(b => b.classList.remove('active')); el.classList.add('active'); }
            const content = document.getElementById('app-content');
            content.className = "px-5 flex flex-col gap-3";
            const platos = dataCache.menus.filter(m => String(m.ID_RESTAURANTE) === String(restAct.ID_RESTAURANTE));
            const filt = cat === 'TODOS' ? platos : platos.filter(p => p.CATEGORIA === cat);
            
            content.innerHTML = filt.map(p => `
                <div onclick='abrirDetalle(${JSON.stringify(p)})' class="bg-white/5 p-3 rounded-[2rem] flex items-center gap-4 border border-white/5 active:scale-95 transition-all">
                    <img src="${p.FOTO}" class="w-20 h-20 rounded-2xl object-cover shadow-lg">
                    <div class="flex-1">
                        <p class="text-[12px] font-black uppercase text-white">${p.PLATO}</p>
                        <p class="text-cyan-400 font-bold font-mono text-lg">${parseFloat(p.PRECIO).toFixed(2)}€</p>
                    </div>
                </div>`).join('');
        }

        function abrirDetalle(p) {
            pAct = p; sExtras = []; sBebidas = []; cantAct = 1;
            document.getElementById('det-titulo').innerText = p.PLATO;
            document.getElementById('det-desc').innerText = p.DESCRIPCION || "";
            document.getElementById('det-precio-base').innerText = parseFloat(p.PRECIO).toFixed(2) + "€";
            document.getElementById('det-img-cont').innerHTML = `<img src="${p.FOTO}" class="w-full h-full object-cover">`;
            document.getElementById('det-cant').innerText = "1";

            // EXTRAS (CROISSANT / OTROS)
            const listExt = document.getElementById('list-extras');
            listExt.innerHTML = "";
            if(p.EXTRAS) {
                document.getElementById('cont-extras').classList.remove('hidden');
                p.EXTRAS.split(',').forEach(ex => {
                    const [n, pr] = ex.split(':');
                    const div = document.createElement('div');
                    div.className = "extra-item";
                    div.innerHTML = `<div><p class="text-[11px] font-black uppercase">${n}</p><p class="text-cyan-500 text-[10px] font-mono">+${parseFloat(pr).toFixed(2)}€</p></div><div class="check-custom"></div>`;
                    div.onclick = () => {
                        div.classList.toggle('active');
                        const idx = sExtras.findIndex(x => x.n === n);
                        idx > -1 ? sExtras.splice(idx,1) : sExtras.push({n:n, p:parseFloat(pr)});
                        updatePrecio();
                    };
                    listExt.appendChild(div);
                });
            } else { document.getElementById('cont-extras').classList.add('hidden'); }

            // BEBIDAS (ESTILO STORIES)
            const bebidas = dataCache.menus.filter(m => String(m.CATEGORIA).toLowerCase().includes('bebida') && String(m.ID_RESTAURANTE) === String(p.ID_RESTAURANTE));
            const gridBeb = document.getElementById('grid-bebidas');
            gridBeb.innerHTML = bebidas.map(b => `
                <div class="story-circle" onclick='toggleBebida(${JSON.stringify(b)}, this)'>
                    <img src="${b.FOTO}" class="story-img">
                    <p class="story-name">${b.PLATO}</p>
                </div>`).join('');

            updatePrecio();
            document.getElementById('modal-detalle').classList.remove('hidden');
        }

        function toggleBebida(b, el) {
            el.classList.toggle('selected');
            const idx = sBebidas.findIndex(x => x.n === b.PLATO);
            idx > -1 ? sBebidas.splice(idx,1) : sBebidas.push({n:b.PLATO, p:parseFloat(b.PRECIO)});
            updatePrecio();
        }

        function cambiarCant(v) { cantAct = Math.max(1, cantAct+v); document.getElementById('det-cant').innerText = cantAct; updatePrecio(); }

        function updatePrecio() {
            let extraT = sExtras.reduce((a,b)=> a+b.p, 0);
            let bebT = sBebidas.reduce((a,b)=> a+b.p, 0);
            document.getElementById('det-precio-final').innerText = ((parseFloat(pAct.PRECIO) + extraT + bebT) * cantAct).toFixed(2) + "€";
        }

        function cerrarDetalle() { document.getElementById('modal-detalle').classList.add('hidden'); }
        function irAHome() { renderHome(); }

        init();
    </script>

    <style>
        .cat-bubble { flex: 0 0 70px; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
        .cat-img-wrapper { width: 60px; height: 60px; border-radius: 20px; background: #111; padding: 2px; border: 1px solid #222; }
        .cat-img-wrapper img { width: 100%; height: 100%; object-fit: cover; border-radius: 18px; }
        .cat-bubble.active span { color: var(--primary); }
        .cat-bubble span { font-size: 9px; font-weight: 800; text-transform: uppercase; color: #555; }
        .cat-bubble.active .cat-img-wrapper { border-color: var(--primary); background: rgba(6,182,212,0.1); }
    </style>
</body>
</html>
