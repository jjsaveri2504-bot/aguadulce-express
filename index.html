<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express | Pro Netflix Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    colors: { 'ae-main': '#00BCD4', 'ae-dark': '#070B14', 'ae-card': '#161B28', 'ae-bg': '#070B14' }
                } 
            } 
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #070B14; color: #F8FAFC; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(7, 11, 20, 0.85); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        /* Carrusel estilo Netflix */
        .hide-scroll::-webkit-scrollbar { display: none; }
        .carrusel-row { display: flex; overflow-x: auto; gap: 16px; padding: 4px 0 20px 0; scroll-snap-type: x mandatory; }
        .card-rest { 
            flex: 0 0 160px; /* Tamaño más pequeño y compacto */
            scroll-snap-align: start;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-rest:active { transform: scale(0.95); }
        
        .img-container { position: relative; width: 100%; height: 220px; border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        
        /* Modal Animation */
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .anim-up { animation: slideUp 0.3s ease-out; }
    </style>
</head>
<body class="pb-32">

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyO3k6Jo-XgrF8VhSjOfiO2tzFTnKJr-akZyqKoCQzW9ylRNe-UAjN8kgr52jVr3m5C/exec"; 
        const COSTO_ENVIO = 3.50;
        
        let carrito = JSON.parse(localStorage.getItem('ae_cart_final')) || [];
        let dataCache = JSON.parse(localStorage.getItem('ae_cache_final')) || null;
        let restauranteActual = null;
        let productoSeleccionado = null;

        const SUGERENCIAS = [
            { nombre: "Papas Fritas Pro", precio: 2.50, foto: "https://images.unsplash.com/photo-1573080496219-bb080dd4f877?w=400" },
            { nombre: "Soda Gigante", precio: 1.50, foto: "https://images.unsplash.com/photo-1622483767028-3f66f32aef97?w=400" }
        ];

        // PERSISTENCIA DE PERFIL
        function guardarPerfil() {
            const perfil = {
                nombre: document.getElementById('c-nombre').value,
                telefono: document.getElementById('c-tel').value,
                direccion: document.getElementById('c-dir').value
            };
            localStorage.setItem('ae_perfil_user', JSON.stringify(perfil));
        }

        function cargarPerfil() {
            const perfil = JSON.parse(localStorage.getItem('ae_perfil_user'));
            if (perfil) {
                if(document.getElementById('c-nombre')) document.getElementById('c-nombre').value = perfil.nombre || "";
                if(document.getElementById('c-tel')) document.getElementById('c-tel').value = perfil.telefono || "";
                if(document.getElementById('c-dir')) document.getElementById('c-dir').value = perfil.direccion || "";
            }
        }
    </script>

    <header class="sticky top-0 z-[80] glass px-6 py-5 flex items-center justify-between">
        <button id="btn-back" onclick="location.reload()" class="hidden w-10 h-10 bg-white/5 rounded-xl flex items-center justify-center">
            <i class="fas fa-chevron-left text-white"></i>
        </button>
        <h1 id="header-titulo" class="font-extrabold text-xl tracking-tighter text-white uppercase italic">
            AGUADULCE <span class="text-ae-main font-black">EXPRESS</span>
        </h1>
        <div class="w-10"></div>
    </header>

    <main id="main-container" class="p-6 max-w-xl mx-auto space-y-8"></main>

    <div id="modal-producto" class="fixed inset-0 z-[200] hidden bg-black/80 backdrop-blur-md flex items-end justify-center">
        <div class="bg-ae-card w-full max-w-md rounded-t-[45px] anim-up overflow-hidden border-t border-white/10">
            <div class="relative h-72">
                <img id="p-foto" src="" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-ae-card via-transparent to-transparent"></div>
                <button onclick="cerrarProducto()" class="absolute top-6 right-6 w-10 h-10 bg-black/40 text-white rounded-full flex items-center justify-center backdrop-blur-md">
                    <i class="fas fa-times text-xs"></i>
                </button>
            </div>
            <div class="p-8">
                <h3 id="p-nombre" class="text-2xl font-black text-white uppercase italic tracking-tight"></h3>
                <p id="p-desc" class="text-gray-400 mt-4 text-xs leading-relaxed"></p>
                <div class="flex items-center justify-between mt-10">
                    <span id="p-precio" class="text-3xl font-black text-ae-main italic"></span>
                    <button onclick="confirmarAgregar()" class="bg-ae-main text-ae-dark px-10 py-4 rounded-2xl font-black italic uppercase text-xs">Añadir</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-upsell" class="fixed inset-0 z-[210] hidden bg-ae-dark/95 flex items-center justify-center p-8">
        <div class="w-full max-w-xs text-center">
            <h3 class="text-white text-xl font-black mb-6 uppercase italic tracking-tighter">¿Deseas hacerlo combo?</h3>
            <div id="lista-sugerencias" class="space-y-4"></div>
            <button onclick="cerrarSugerencia()" class="mt-8 text-gray-500 font-bold text-[10px] uppercase tracking-[0.2em]">No, solo el producto</button>
        </div>
    </div>

    <div id="basket-bar" onclick="abrirCheckout()" class="fixed bottom-6 left-6 right-6 h-16 bg-ae-main rounded-2xl flex justify-between items-center px-6 shadow-2xl hidden z-[90] active:scale-95 transition cursor-pointer">
        <div class="flex items-center gap-3 text-ae-dark">
            <i class="fas fa-shopping-bag"></i>
            <span id="basket-count" class="font-black text-sm">0</span>
        </div>
        <span class="text-ae-dark font-black uppercase italic text-xs tracking-tighter">Confirmar Pedido</span>
        <span class="text-ae-dark font-black text-lg italic">$<span id="basket-total">0</span></span>
    </div>

    <div id="modal-checkout" class="fixed inset-0 z-[150] hidden bg-ae-dark/98 flex items-end justify-center">
        <div class="bg-ae-card w-full max-w-md rounded-t-[40px] p-8 anim-up max-h-[90vh] overflow-y-auto">
            <h3 class="text-lg font-black text-white text-center mb-6 uppercase italic">Tus Datos de Envío</h3>
            <div id="checkout-items" class="space-y-2 mb-6 border-b border-white/5 pb-6"></div>
            <div class="space-y-4">
                <input type="text" id="c-nombre" oninput="guardarPerfil()" placeholder="Tu Nombre" class="w-full p-4 bg-white/5 rounded-xl border border-white/5 text-white placeholder-gray-500 font-bold">
                <input type="tel" id="c-tel" oninput="guardarPerfil()" placeholder="WhatsApp" class="w-full p-4 bg-white/5 rounded-xl border border-white/5 text-white placeholder-gray-500 font-bold">
                <input type="text" id="c-dir" oninput="guardarPerfil()" placeholder="Dirección de entrega" class="w-full p-4 bg-white/5 rounded-xl border border-white/5 text-white placeholder-gray-500 font-bold">
            </div>
            <button onclick="finalizarCompra()" class="w-full mt-6 bg-ae-main text-ae-dark py-5 rounded-2xl font-black italic uppercase text-xs tracking-widest">PEDIR POR WHATSAPP</button>
            <button onclick="cerrarCheckout()" class="w-full mt-4 text-gray-500 font-bold text-[10px] uppercase">Atrás</button>
        </div>
    </div>

    <script>
        async function iniciar() {
            actualizarCestaBar();
            if(dataCache) renderNetflixLayout();
            try {
                const res = await fetch(`${API_URL}?v=${Date.now()}`);
                dataCache = await res.json();
                localStorage.setItem('ae_cache_final', JSON.stringify(dataCache));
                if (!restauranteActual) renderNetflixLayout();
            } catch (e) { console.log("Offline"); }
        }

        function renderNetflixLayout() {
            document.getElementById('btn-back').classList.add('hidden');
            const container = document.getElementById('main-container');
            container.innerHTML = "";

            // Agrupar por CATEGORIA
            const categorias = [...new Set(dataCache.restaurantes.map(r => r.CATEGORIA))];

            categorias.forEach(cat => {
                const fila = dataCache.restaurantes.filter(r => r.CATEGORIA === cat);
                const section = document.createElement('div');
                section.innerHTML = `
                    <h2 class="text-xs font-black text-ae-main uppercase tracking-[0.3em] mb-4 italic">${cat}</h2>
                    <div class="carrusel-row hide-scroll">
                        ${fila.map(r => `
                            <div onclick="verMenu('${r.ID_RESTAURANTE}')" class="card-rest">
                                <div class="img-container shadow-lg">
                                    <img src="${r.FOTO}" class="w-full h-full object-cover">
                                    <div class="absolute inset-0 bg-gradient-to-t from-ae-dark via-transparent to-transparent"></div>
                                    <div class="absolute bottom-3 left-3 right-3 text-[10px] font-black uppercase text-white leading-tight italic">
                                        ${r.NOMBRE_RESTAURANTE}
                                    </div>
                                </div>
                            </div>`).join('')}
                    </div>
                `;
                container.appendChild(section);
            });
        }

        function verMenu(id) {
            restauranteActual = dataCache.restaurantes.find(r => String(r.ID_RESTAURANTE) === String(id));
            const platos = dataCache.menus.filter(p => String(p.ID_RESTAURANTE) === String(id));
            document.getElementById('header-titulo').innerText = restauranteActual.NOMBRE_RESTAURANTE;
            document.getElementById('btn-back').classList.remove('hidden');

            document.getElementById('main-container').innerHTML = `
                <div class="grid grid-cols-1 gap-4 animate-fade-in">
                    ${platos.map(p => `
                        <div onclick="abrirProducto('${p.PLATO}', '${p.PRECIO}', '${p.FOTO_PLATO}', '${p.DESCRIPCION || ''}')" class="bg-ae-card p-4 rounded-[28px] flex gap-4 items-center border border-white/5">
                            <img src="${p.FOTO_PLATO}" class="w-20 h-20 rounded-2xl object-cover bg-ae-dark" onerror="this.src='https://placehold.co/200?text=Plato'">
                            <div class="flex-1">
                                <h3 class="font-black text-white uppercase italic text-[10px] leading-tight">${p.PLATO}</h3>
                                <p class="text-[9px] text-gray-500 mt-1 line-clamp-2">${p.DESCRIPCION || ''}</p>
                                <span class="block mt-2 font-black text-ae-main text-base italic">$${parseFloat(p.PRECIO).toFixed(2)}</span>
                            </div>
                        </div>`).join('')}
                </div>`;
        }

        function abrirProducto(nombre, precio, foto, desc) {
            productoSeleccionado = { nombre, precio: parseFloat(precio), foto };
            document.getElementById('p-nombre').innerText = nombre;
            document.getElementById('p-precio').innerText = `$${parseFloat(precio).toFixed(2)}`;
            document.getElementById('p-foto').src = foto;
            document.getElementById('p-desc').innerText = desc || "Preparado al momento con ingredientes frescos.";
            document.getElementById('modal-producto').classList.remove('hidden');
        }

        function cerrarProducto() { document.getElementById('modal-producto').classList.add('hidden'); }

        function confirmarAgregar() {
            carrito.push(productoSeleccionado);
            localStorage.setItem('ae_cart_final', JSON.stringify(carrito));
            actualizarCestaBar();
            cerrarProducto();
            if(productoSeleccionado.nombre.toLowerCase().includes('hambur')) lanzarSugerencias();
        }

        function lanzarSugerencias() {
            document.getElementById('modal-upsell').classList.remove('hidden');
            document.getElementById('lista-sugerencias').innerHTML = SUGERENCIAS.map(s => `
                <div onclick="addSugerencia('${s.nombre}', ${s.precio})" class="bg-white/5 p-3 rounded-2xl flex items-center gap-4 border border-white/5">
                    <img src="${s.foto}" class="w-12 h-12 rounded-xl object-cover">
                    <div class="text-left flex-1">
                        <p class="text-white font-black text-[9px] uppercase italic">${s.nombre}</p>
                        <p class="text-ae-main font-bold text-xs">+$${s.precio.toFixed(2)}</p>
                    </div>
                    <i class="fas fa-plus text-ae-main text-xs"></i>
                </div>`).join('');
        }

        function addSugerencia(n, p) {
            carrito.push({ nombre: n, precio: p });
            localStorage.setItem('ae_cart_final', JSON.stringify(carrito));
            actualizarCestaBar();
            cerrarSugerencia();
        }

        function cerrarSugerencia() { document.getElementById('modal-upsell').classList.add('hidden'); }

        function actualizarCestaBar() {
            const bar = document.getElementById('basket-bar');
            if(carrito.length > 0) {
                const total = carrito.reduce((s, i) => s + i.precio, 0) + COSTO_ENVIO;
                document.getElementById('basket-count').innerText = carrito.length;
                document.getElementById('basket-total').innerText = total.toFixed(2);
                bar.classList.remove('hidden');
            } else { bar.classList.add('hidden'); }
        }

        function abrirCheckout() {
            document.getElementById('modal-checkout').classList.remove('hidden');
            cargarPerfil();
            document.getElementById('checkout-items').innerHTML = carrito.map((i, idx) => `
                <div class="flex justify-between items-center text-[9px] font-black uppercase italic text-gray-400">
                    <span>${i.nombre}</span>
                    <span>$${i.precio.toFixed(2)}</span>
                </div>`).join('');
        }

        function cerrarCheckout() { document.getElementById('modal-checkout').classList.add('hidden'); }

        function finalizarCompra() {
            const n = document.getElementById('c-nombre').value;
            const t = document.getElementById('c-tel').value;
            const d = document.getElementById('c-dir').value;
            if(!n || !t || !d) return alert("Completa tus datos de envío");

            const detalle = carrito.map(i => i.nombre).join(', ');
            const totalF = (carrito.reduce((s, i) => s + i.precio, 0) + COSTO_ENVIO).toFixed(2);

            fetch(API_URL, {
                method: 'POST', mode: 'no-cors',
                body: JSON.stringify({ restaurante: restauranteActual.NOMBRE_RESTAURANTE, cliente: n, telefono: t, direccion: d, pedido: detalle, total: totalF })
            });

            const msg = `*NUEVO PEDIDO*\n\n*Cliente:* ${n}\n*WhatsApp:* ${t}\n*Dirección:* ${d}\n*Pedido:* ${detalle}\n*TOTAL:* $${totalF}`;
            window.location.href = `https://wa.me/${restauranteActual.TELEFONO}?text=${encodeURIComponent(msg)}`;
            localStorage.removeItem('ae_cart_final');
        }

        iniciar();
    </script>
</body>
</html>
