<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aguadulce Express | Calidad Local</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'ae-azul': '#00BCD4', // Azul Cian/Turquesa oficial
                        'ae-grafito': '#2D3436', // Gris Grafito sólido
                    },
                    fontFamily: {
                        'montserrat': ['Montserrat', 'sans-serif'],
                        'opensans': ['Open Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Open Sans', sans-serif; background-color: #fdfdfd; color: #2D3436; }
        .titulo-ae { font-family: 'Montserrat', sans-serif; font-weight: 900; letter-spacing: -0.05em; }
        .glass-header { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-bottom: 2px solid #00BCD4; }
        .rest-card { transition: all 0.4s ease; border: 1px solid #f1f1f1; border-radius: 30px; overflow: hidden; }
        .rest-card:hover { transform: translateY(-5px); border-color: #00BCD4; box-shadow: 0 15px 30px rgba(0,188,212,0.15); }
        .btn-principal { background-color: #00BCD4; color: white; transition: all 0.3s; font-family: 'Montserrat', sans-serif; font-weight: 700; border-radius: 18px; }
        .btn-principal:active { transform: scale(0.95); background-color: #00ACC1; }
        .premium-overlay { background: linear-gradient(180deg, rgba(0,0,0,0) 40%, rgba(45,52,54,0.95) 100%); }
    </style>
</head>
<body class="pb-36">

    <script>
        // Asegúrate de que esta URL sea la correcta de tu implementación actual
        const API_URL = "https://script.google.com/macros/s/AKfycbzED0RJ90vtBNDXT15TRT6iDqpX7REjN5XiQ2IL8yDElatGRwELgZDwq6HbSDpNoAZuFQ/exec";
    </script>

    <header class="glass-header sticky top-0 z-50 px-6 py-5 flex items-center justify-between">
        <button id="btn-back" onclick="mostrarSelectorRestaurantes()" class="hidden w-10 h-10 flex items-center justify-center rounded-xl bg-gray-50 text-ae-grafito shadow-sm">
            <i class="fas fa-arrow-left"></i>
        </button>
        <div class="flex-1 text-center">
            <h1 id="header-titulo" class="titulo-ae text-2xl text-ae-grafito italic uppercase">
                AGUADULCE <span class="text-ae-azul">EXPRESS</span>
            </h1>
        </div>
        <div class="w-10 flex justify-end">
            <div class="w-3 h-3 rounded-full bg-ae-azul animate-pulse shadow-[0_0_10px_#00BCD4]"></div>
        </div>
    </header>

    <main id="main-container" class="p-6 grid grid-cols-1 gap-8 max-w-2xl mx-auto">
        <div class="flex flex-col items-center justify-center py-24 text-center">
            <div class="w-12 h-12 border-4 border-ae-azul border-t-transparent rounded-full animate-spin mb-4"></div>
            <p class="titulo-ae text-xs uppercase tracking-widest text-ae-grafito">Conectando con lo local...</p>
        </div>
    </main>

    <div id="cart-bar" class="fixed bottom-8 left-6 right-6 bg-ae-grafito text-white p-5 rounded-[28px] flex justify-between items-center shadow-2xl hidden z-50 animate-bounce-short">
        <div class="flex flex-col ml-2">
            <span class="text-[10px] uppercase font-bold text-ae-azul tracking-wider">Tu pedido local</span>
            <p class="font-900 text-2xl titulo-ae tracking-tighter">$<span id="cart-total">0</span></p>
        </div>
        <button onclick="enviarPedidoProfesional()" class="btn-principal px-8 py-4 text-xs uppercase tracking-widest shadow-lg shadow-ae-azul/30">
            Confirmar Pedido <i class="fab fa-whatsapp ml-2"></i>
        </button>
    </div>

    <script>
        let todosLosRestaurantes = [];
        let todoElMenu = [];
        let restauranteSeleccionado = null;
        let carrito = [];

        async function cargarDatos() {
            try {
                const [resRest, resMenu] = await Promise.all([
                    fetch(`${API_URL}?sheet=RESTAURANTES`),
                    fetch(`${API_URL}?sheet=MENU_GENERAL`)
                ]);
                todosLosRestaurantes = await resRest.json();
                todoElMenu = await resMenu.json();
                mostrarSelectorRestaurantes();
            } catch (error) {
                document.getElementById('main-container').innerHTML = `
                    <div class="text-center py-20 px-10">
                        <i class="fas fa-wifi text-ae-azul text-4xl mb-4"></i>
                        <p class="titulo-ae text-ae-grafito">¡Ups! Algo falló</p>
                        <p class="text-sm text-gray-500 mt-2 italic">Revisa tu conexión o el script. Somos tu flota local y queremos atenderte pronto.</p>
                    </div>`;
            }
        }

        function mostrarSelectorRestaurantes() {
            restauranteSeleccionado = null; carrito = []; actualizarBarraCarrito();
            document.getElementById('btn-back').classList.add('hidden');
            document.getElementById('header-titulo').innerHTML = 'AGUADULCE <span class="text-ae-azul">EXPRESS</span>';
            
            const container = document.getElementById('main-container');
            container.innerHTML = `<div class="mb-2">
                <h2 class="titulo-ae text-3xl text-ae-grafito leading-none uppercase italic">Impulsando<br><span class="text-ae-azul text-4xl">lo nuestro</span></h2>
                <p class="text-gray-500 text-xs mt-2 font-semibold">Calidad local en tu puerta</p>
            </div>` + 
            todosLosRestaurantes.map(r => `
                <div onclick="abrirRestaurante('${r.ID}')" class="rest-card relative bg-white cursor-pointer active:scale-95 transition-all">
                    <div class="h-60 relative">
                        <img src="${r.Foto || r.FOTO}" class="w-full h-full object-cover">
                        <div class="premium-overlay absolute inset-0"></div>
                        <div class="absolute bottom-6 left-6 right-6">
                            <span class="bg-ae-azul text-white text-[9px] font-black px-3 py-1 rounded-full uppercase tracking-widest shadow-md">Premium Local</span>
                            <h3 class="text-2xl titulo-ae text-white uppercase italic mt-2">${r.NOMBRE || r.Nombre}</h3>
                            <p class="text-gray-300 text-[10px] mt-1 font-medium"><i class="fas fa-map-marker-alt text-ae-azul mr-1"></i> ${r.DIRECCION || 'Aguadulce'}</p>
                        </div>
                    </div>
                </div>`).join('');
        }

        function abrirRestaurante(id) {
            restauranteSeleccionado = todosLosRestaurantes.find(r => r.ID == id || r.Id == id);
            const platos = todoElMenu.filter(p => p.ID_RESTAURANTE == id || p.Id_Restaurante == id);
            document.getElementById('header-titulo').innerText = restauranteSeleccionado.NOMBRE || restauranteSeleccionado.Nombre;
            document.getElementById('btn-back').classList.remove('hidden');
            renderizarProductos(platos);
        }

        function renderizarProductos(platos) {
            const container = document.getElementById('main-container');
            container.innerHTML = platos.map(p => `
                <div class="bg-white rounded-[25px] p-4 flex gap-5 border border-gray-100 shadow-sm items-center">
                    <img src="${p.Foto || p.FOTO}" class="w-24 h-24 rounded-2xl object-cover shadow-inner border border-gray-50">
                    <div class="flex-1 flex flex-col justify-between h-24 py-1">
                        <div>
                            <h3 class="titulo-ae text-[11px] text-ae-grafito uppercase tracking-tight">${p.Nombre}</h3>
                            <p class="text-[9px] text-gray-400 mt-1 line-clamp-2 font-medium italic leading-relaxed">${p.Descripcion || 'Hecho con pasión local.'}</p>
                        </div>
                        <div class="flex justify-between items-end">
                            <span class="titulo-ae text-ae-azul text-xl italic leading-none">$${p.Precio}</span>
                            <button onclick="agregarAlCarrito('${p.Nombre}', ${p.Precio})" class="w-10 h-10 btn-principal flex items-center justify-center shadow-md">
                                <i class="fas fa-plus text-[10px]"></i>
                            </button>
                        </div>
                    </div>
                </div>`).join('');
        }

        function agregarAlCarrito(nombre, precio) {
            carrito.push({nombre, precio});
            actualizarBarraCarrito();
        }

        function actualizarBarraCarrito() {
            const bar = document.getElementById('cart-bar');
            const total = carrito.reduce((sum, p) => sum + p.precio, 0);
            if(carrito.length > 0) {
                bar.classList.remove('hidden');
                document.getElementById('cart-total').innerText = total.toFixed(2);
            } else { bar.classList.add('hidden'); }
        }

        function enviarPedidoProfesional() {
            const items = carrito.reduce((acc, p) => { acc[p.nombre] = (acc[p.nombre] || 0) + 1; return acc; }, {});
            let detalles = ""; for (const [nombre, cant] of Object.entries(items)) { detalles += `${cant}x ${nombre}, `; }
            const total = document.getElementById('cart-total').innerText;
            
            const msj = `*¡NUEVO PEDIDO AGUADULCE EXPRESS!*\n\n📍 *Negocio:* ${restauranteSeleccionado.NOMBRE || restauranteSeleccionado.Nombre}\n📝 *Pedido:* ${detalles.slice(0, -2)}\n💰 *TOTAL: $${total}*\n\n_Tu pedido ya está en manos de nuestra flota local._`;
            
            window.open(`https://wa.me/${restauranteSeleccionado.TELEFONO || restauranteSeleccionado.Telefono}?text=${encodeURIComponent(msj)}`, '_blank');
        }

        cargarDatos();
    </script>
</body>
</html>
