<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .cat-bubble { flex: 0 0 80px; text-align: center; cursor: pointer; }
        .cat-img { width: 60px; height: 60px; border-radius: 50%; background: white; margin: 0 auto 5px; padding: 10px; border: 2px solid transparent; }
        .active .cat-img { border-color: #06b6d4; transform: scale(1.1); }
        .subcat-pill { padding: 8px 15px; border-radius: 20px; background: #1e293b; font-size: 11px; white-space: nowrap; }
        .subcat-pill.active { background: #06b6d4; }
        .extra-btn { padding: 10px; border-radius: 12px; background: #1e293b; border: 1px solid #334155; font-size: 11px; }
        .extra-btn.selected { border-color: #06b6d4; color: #06b6d4; background: rgba(6,182,212,0.1); }
        .hidden { display: none; }
    </style>
</head>
<body class="pb-32">

    <header class="glass sticky top-0 z-50 p-5 flex justify-between items-center">
        <button id="btn-back" onclick="irAHome()" class="hidden bg-white/10 p-2 rounded-xl">←</button>
        <h1 id="header-txt" class="font-black text-cyan-400 italic">AGUADULCE EXPRESS</h1>
        <div class="w-10 h-10 bg-cyan-400 rounded-full"></div>
    </header>

    <div id="cat-nav" class="flex gap-4 p-5 overflow-x-auto"></div>
    <div id="subcat-nav" class="flex gap-2 px-5 py-2 overflow-x-auto hidden"></div>

    <main id="app-content" class="p-4 grid grid-cols-2 gap-4"></main>

    <div id="modal-detalle" class="fixed inset-0 z-[60] bg-slate-950 hidden overflow-y-auto p-5">
        <button onclick="cerrarDetalle()" class="bg-white/10 p-3 rounded-full mb-5">✕ Cerrar</button>
        <div id="det-img-cont" class="w-full h-48 rounded-3xl overflow-hidden mb-5"></div>
        <h2 id="det-titulo" class="text-2xl font-bold mb-2"></h2>
        <p id="det-precio-base" class="text-cyan-400 text-xl font-bold mb-4"></p>
        
        <div id="section-ingredientes" class="mb-6 hidden">
            <p class="text-xs font-bold text-gray-500 uppercase mb-3">Elige ingredientes:</p>
            <div id="ing-grid" class="flex flex-wrap gap-2"></div>
        </div>

        <button id="btn-add-det" onclick="addAlCarrito()" class="w-full bg-cyan-600 p-5 rounded-2xl font-bold flex justify-between">
            <span>Añadir Pedido</span>
            <span id="det-precio-final">0.00€</span>
        </button>
    </div>

    <div id="basket-bar" class="fixed bottom-5 left-5 right-5 bg-cyan-600 p-4 rounded-3xl hidden flex justify-between items-center shadow-2xl">
        <span id="basket-total" class="font-bold text-xl">0.00 €</span>
        <button onclick="abrirCheckout()" class="bg-black text-white px-6 py-2 rounded-full font-bold">Pagar</button>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbynerMMUPjKyyH_IiBma050-tULdQzpUqKUZ8ZRV5xu1QUUz49lBLdES7NhglZvl3A2/exec"; // <--- PEGA TU URL AQUÍ

        let dataCache = null, carrito = [], restActivo = null, platoActual = null, extrasSel = [];

        async function init() {
            const res = await fetch(API_URL);
            dataCache = await res.json();
            renderHome();
            renderCategorias();
        }

        function renderCategorias() {
            const cats = [...new Set(dataCache.restaurantes.map(r => r.CATEGORIA))].filter(Boolean);
            const nav = document.getElementById('cat-nav');
            nav.innerHTML = `<div onclick="renderHome()" class="cat-bubble active"><div class="cat-img">🏠</div><span>Todos</span></div>`;
            cats.forEach(c => {
                nav.innerHTML += `<div onclick="renderHome('${c}')" class="cat-bubble"><div class="cat-img">🍽️</div><span>${c}</span></div>`;
            });
        }

        function renderHome(f = null) {
            document.getElementById('btn-back').classList.add('hidden');
            document.getElementById('subcat-nav').classList.add('hidden');
            const content = document.getElementById('app-content');
            content.className = "p-4 grid grid-cols-2 gap-4";
            content.innerHTML = "";
            const filt = f ? dataCache.restaurantes.filter(r => r.CATEGORIA === f) : dataCache.restaurantes;
            filt.forEach(r => {
                content.innerHTML += `<div onclick="verMenu('${r.ID_RESTAURANTE}')" class="bg-white/5 rounded-3xl overflow-hidden border border-white/5">
                    <img src="${r.FOTO}" class="w-full h-32 object-cover">
                    <p class="p-3 text-center text-xs font-bold uppercase">${r.NOMBRE}</p>
                </div>`;
            });
        }

        function verMenu(id, subF = null) {
            restActivo = dataCache.restaurantes.find(r => String(r.ID_RESTAURANTE) === String(id));
            const platos = dataCache.menus.filter(m => String(m.ID_RESTAURANTE) === String(id));
            document.getElementById('btn-back').classList.remove('hidden');
            const content = document.getElementById('app-content');
            content.className = "p-4 grid grid-cols-1 gap-3";
            content.innerHTML = "";

            const subNav = document.getElementById('subcat-nav');
            const subCats = [...new Set(platos.map(p => p.CATEGORIA))].filter(Boolean);
            if(subCats.length > 0) {
                subNav.classList.remove('hidden');
                subNav.innerHTML = `<button onclick="verMenu('${id}')" class="subcat-pill ${!subF?'active':''}">Todo</button>`;
                subCats.forEach(sc => subNav.innerHTML += `<button onclick="verMenu('${id}','${sc}')" class="subcat-pill ${subF===sc?'active':''}">${sc}</button>`);
            }

            const filt = subF ? platos.filter(p => p.CATEGORIA === subF) : platos;
            filt.forEach(p => {
                content.innerHTML += `<div onclick='abrirDetalle(${JSON.stringify(p)})' class="bg-white/5 p-4 rounded-2xl flex items-center gap-4">
                    <img src="${p.FOTO}" class="w-16 h-16 rounded-xl object-cover">
                    <div><p class="font-bold text-sm">${p.PLATO}</p><p class="text-cyan-400 font-bold">${p.PRECIO}€</p></div>
                </div>`;
            });
        }

        function abrirDetalle(p) {
            platoActual = p; extrasSel = [];
            document.getElementById('det-titulo').innerText = p.PLATO;
            document.getElementById('det-precio-base').innerText = p.PRECIO + "€";
            document.getElementById('det-img-cont').innerHTML = `<img src="${p.FOTO}" class="w-full h-full object-cover">`;
            
            const ingGrid = document.getElementById('ing-grid');
            ingGrid.innerHTML = "";
            if(p.EXTRAS && p.EXTRAS.trim() !== "") {
                document.getElementById('section-ingredientes').classList.remove('hidden');
                p.EXTRAS.split(',').forEach(ex => {
                    const [n, pr] = ex.split(':');
                    const btn = document.createElement('button');
                    btn.className = "extra-btn";
                    btn.innerText = n + (pr > 0 ? ` (+${pr}€)` : '');
                    btn.onclick = () => {
                        btn.classList.toggle('selected');
                        const idx = extrasSel.findIndex(e => e.n === n);
                        if(idx > -1) extrasSel.splice(idx,1); else extrasSel.push({n:n, p:parseFloat(pr||0)});
                        actualizarPrecio();
                    };
                    ingGrid.appendChild(btn);
                });
            } else {
                document.getElementById('section-ingredientes').classList.add('hidden');
            }
            actualizarPrecio();
            document.getElementById('modal-detalle').classList.remove('hidden');
        }

        function actualizarPrecio() {
            const total = parseFloat(platoActual.PRECIO) + extrasSel.reduce((s,e)=>s+e.p, 0);
            document.getElementById('det-precio-final').innerText = total.toFixed(2) + "€";
        }

        function addAlCarrito() {
            const detalle = extrasSel.length > 0 ? `${platoActual.PLATO} (${extrasSel.map(e=>e.n).join(',')})` : platoActual.PLATO;
            const total = parseFloat(platoActual.PRECIO) + extrasSel.reduce((s,e)=>s+e.p, 0);
            carrito.push({ n: detalle, p: total });
            cerrarDetalle();
            actualizarBarra();
        }

        function actualizarBarra() {
            const t = carrito.reduce((s,i)=>s+i.p, 0);
            document.getElementById('basket-total').innerText = t.toFixed(2) + " €";
            document.getElementById('basket-bar').classList.toggle('hidden', carrito.length === 0);
        }

        function irAHome() { renderHome(); }
        function cerrarDetalle() { document.getElementById('modal-detalle').classList.add('hidden'); }
        init();
    </script>
</body>
</html>
