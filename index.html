<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express | Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    colors: { 'ae-main': '#00BCD4', 'ae-accent': '#84CC16', 'ae-bg': '#F8FAFC', 'ae-card': '#FFFFFF', 'ae-text': '#1E293B', 'ae-sub': '#64748B' }
                } 
            } 
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; color: #1E293B; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        
        /* HEADER PREMIUM CON LOGO Y DEGRADADO */
        .premium-header { 
            background: linear-gradient(135deg, rgba(0, 188, 212, 0.12) 0%, #FFFFFF 50%, rgba(132, 204, 22, 0.12) 100%);
            border-bottom: 2px solid #00BCD4; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.06); 
        }

        .hide-scroll::-webkit-scrollbar { display: none; }
        
        /* TARJETAS DE RESTAURANTE SIMÉTRICAS */
        .carrusel-row { display: flex; overflow-x: auto; gap: 14px; padding: 5px 0 25px 0; scroll-snap-type: x mandatory; }
        .card-rest { flex: 0 0 165px; width: 165px; height: 235px; scroll-snap-align: start; border-radius: 28px; overflow: hidden; background: #ffffff; display: flex; flex-direction: column; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 6px 15px -3px rgba(0,0,0,0.04); transition: 0.3s; position: relative; }
        .card-rest:active { transform: scale(0.95); }
        
        .img-wrapper { width: 100%; height: 165px; overflow: hidden; background: #f1f5f9; }
        .img-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        
        .info-wrapper { padding: 12px; height: 70px; display: flex; align-items: center; justify-content: center; text-align: center; }
        .rest-name { font-size: 10px; font-weight: 800; text-transform: uppercase; color: #1E293B; line-height: 1.2; font-style: italic; }
        
        /* CATEGORÍAS ESTILO NETFLIX */
        .cat-line { height: 1px; flex: 1; background: linear-gradient(to right, #00BCD4, transparent); }
        
        /* PLATO CARD */
        .plato-card { background: white; border-radius: 28px; border: 1px solid rgba(0,0,0,0.04); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); }
        
        .anim-up { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .sug-selected { border: 2px solid #00BCD4 !important; background-color: rgba(0, 188, 212, 0.05) !important; transform: scale(0.95); }
        .badge-cerrado { position: absolute; top: 10px; left: 10px; background: #EF4444; color: white; padding: 4px 10px; border-radius: 10px; font-size: 7px; font-weight: 900; z-index: 10; }
    </style>
</head>
<body class="pb-32">

    <script>
        // CONFIGURACIÓN - REEMPLAZA CON TU URL
        const API_URL = "https://script.google.com/macros/s/AKfycbz7dEsBEM51h8ZBhIsBkjmfY3yIyE0pcvLFQCulMB7XZscTT7vu_8ASNiKPVxsiIgWB/exec"; 
        const COSTO_ENVIO = 3.50;
        const FECHA_LANZAMIENTO = new Date("April 1, 2026 00:00:00").getTime();

        let carrito = [];
        let dataCache = null;
        let restauranteActual = null;
        let productoSeleccionado = null;
        let sugerenciasElegidas = [];

        function formatEuro(m) { 
            return `${parseFloat(m).toFixed(2).replace('.', ',')} €`; 
        }

        function iniciarContador() {
            setInterval(function() {
                const ahora = new Date().getTime();
                const dist = FECHA_LANZAMIENTO - ahora;
                if (dist < 0) { 
                    document.getElementById("countdown-container").classList.add('hidden'); 
                    return; 
                }
                const d = Math.floor(dist / (1000 * 60 * 60 * 24));
                const h = Math.floor((dist % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((dist % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((dist % (1000 * 60)) / 1000);
                document.getElementById("timer").innerHTML = `${d}d ${h}h ${m}m ${s}s`;
            }, 1000);
        }

        function checkHorario(hStr, manual) {
            if (manual === "CERRADO") return { ok: false, msg: "CERRADO" };
            if (!hStr) return { ok: true, msg: "" };
            const hoy = new Date();
            const actual = hoy.getHours() * 100 + hoy.getMinutes();
            const bloques = hStr.split(',');
            for (let b of bloques) {
                const partes = b.trim().split('-');
                if(partes.length < 2) continue;
                const i = parseInt(partes[0].replace(':',''));
                const f = parseInt(partes[1].replace(':',''));
                if (actual >= i && actual <= f) return { ok: true, msg: "" };
            }
            return { ok: false, msg: "PRONTO" };
        }
    </script>

    <header class="premium-header sticky top-0 z-[80] px-6 py-5">
        <div class="flex flex-col items-center">
            <div class="flex items-center gap-3 relative w-full justify-center">
                <button id="btn-back" onclick="location.reload()" class="hidden absolute left-0 text-ae-text w-10 h-10 flex items-center justify-center border border-gray-100 bg-white rounded-xl shadow-sm"><i class="fas fa-chevron-left text-sm"></i></button>
                
                <div class="w-10 h-10 bg-ae-main rounded-xl flex items-center justify-center shadow-lg shadow-ae-main/20">
                    <i class="fas fa-shipping-fast text-white text-lg"></i>
                </div>
                
                <h1 id="header-titulo" class="font-extrabold text-xl text-ae-text uppercase italic tracking-tighter">AGUADULCE <span class="text-ae-main font-black">EXPRESS</span></h1>
            </div>
            
            <div id="countdown-container" class="mt-3 bg-white/50 backdrop-blur-sm px-4 py-1 rounded-full border border-ae-main/20 shadow-sm">
                <span id="timer" class="text-[9px] font-black text-ae-main font-mono tracking-widest uppercase">CARGANDO...</span>
            </div>
        </div>
    </header>

    <main id="main-container" class="p-6 max-w-xl mx-auto space-y-10">
        <div class="flex flex-col items-center justify-center py-20 text-ae-sub">
            <i class="fas fa-spinner fa-spin text-3xl mb-4 text-ae-main"></i>
            <p class="font-bold text-[10px] uppercase tracking-widest">Cargando la mejor comida...</p>
        </div>
    </main>

    <div id="modal-producto" class="fixed inset-0 z-[200] hidden bg-ae-text/40 backdrop-blur-md flex items-end justify-center">
        <div class="bg-white w-full max-w-md rounded-t-[45px] anim-up overflow-hidden shadow-2xl">
            <div class="relative h-64">
                <img id="p-foto" src="" class="w-full h-full object-cover">
                <button onclick="cerrarProducto()" class="absolute top-6 right-6 w-10 h-10 bg-white/90 rounded-full flex items-center justify-center shadow-lg text-ae-text"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-8">
                <h3 id="p-nombre" class="text-2xl font-black text-ae-text uppercase italic tracking-tighter"></h3>
                <p id="p-desc" class="text-ae-sub mt-2 text-[10px] leading-relaxed"></p>
                
                <div class="mt-8">
                    <p id="label-extras" class="text-[9px] font-black text-ae-main uppercase tracking-[0.2em] mb-4 italic"></p>
                    <div id="p-sugerencias-lista" class="flex gap-4 overflow-x-auto hide-scroll pb-2"></div>
                </div>

                <div class="flex items-center justify-between mt-10 pt-6 border-t border-gray-100">
                    <span id="p-precio" class="text-3xl font-black text-ae-text italic tracking-tighter"></span>
                    <button onclick="confirmarAgregar()" class="bg-ae-main text-white px-10 py-4 rounded-2xl font-black italic uppercase text-xs shadow-lg shadow-ae-main/20 active:scale-95 transition-all">Añadir</button>
                </div>
            </div>
        </div>
    </div>

    <div id="basket-bar" onclick="abrirCheckout()" class="fixed bottom-6 left-6 right-6 h-16 bg-ae-main rounded-2xl flex justify-between items-center px-6 shadow-2xl hidden z-[90] active:scale-95 transition cursor-pointer">
        <div class="flex items-center gap-3 text-white font-black"><i class="fas fa-shopping-bag"></i><span id="basket-count" class="text-sm">0</span></div>
        <span class="text-white font-black uppercase italic text-[10px] tracking-widest">Ver Pedido</span>
        <span id="basket-total" class="text-white font-black text-lg italic"></span>
    </div>

    <div id="modal-checkout" class="fixed inset-0 z-[150] hidden bg-ae-text/30 backdrop-blur-sm flex items-end justify-center">
        <div class="bg-white w-full max-w-md p-8 rounded-t-[40px] anim-up max-h-[90vh] overflow-y-auto shadow-2xl">
            <div class="w-12 h-1 bg-gray-200 rounded-full mx-auto mb-8"></div>
            <h3 class="text-xl font-black text-ae-text text-center mb-6 uppercase italic tracking-tighter">Finalizar Pedido</h3>
            <div id="checkout-items" class="space-y-3 mb-8 border-b border-gray-100 pb-6"></div>
            <div class="space-y-4">
                <input type="text" id="c-nombre" oninput="guardarPerfil()" placeholder="Tu nombre" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 text-ae-text font-bold text-sm outline-none">
                <input type="tel" id="c-tel" oninput="guardarPerfil()" placeholder="WhatsApp" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 text-ae-text font-bold text-sm outline-none">
                <input type="text" id="c-dir" oninput="guardarPerfil()" placeholder="Dirección exacta" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 text-ae-text font-bold text-sm outline-none">
            </div>
            <button id="btn-finalizar" onclick="finalizarCompra()" class="w-full mt-8 bg-ae-main text-white py-5 rounded-2xl font-black italic uppercase text-xs shadow-xl active:scale-95 transition-all">CONFIRMAR COMPRA</button>
            <button onclick="cerrarCheckout()" class="w-full mt-4 text-ae-sub font-bold text-[10px] uppercase text-center block w-full">Seguir comprando</button>
        </div>
    </div>

    <script>
        async function iniciar() {
            iniciarContador();
            const cache = localStorage.getItem('ae_cache_v11');
            if(cache) {
                dataCache = JSON.parse(cache);
                renderLayout();
            }
            try {
                const res = await fetch(`${API_URL}?v=${Date.now()}`);
                const data = await res.json();
                dataCache = data;
                localStorage.setItem('ae_cache_v11', JSON.stringify(data));
                renderLayout();
            } catch (e) { console.error("Error cargando datos:", e); }
            actualizarCestaBar();
        }

        function renderLayout() {
            document.getElementById('btn-back').classList.add('hidden');
            const container = document.getElementById('main-container');
            container.innerHTML = "";
            const cats = [...new Set(dataCache.restaurantes.map(r => r.CATEGORIA))];
            
            cats.forEach(c => {
                if(!c) return;
                const fila = dataCache.restaurantes.filter(r => r.CATEGORIA === c);
                container.innerHTML += `
                    <div>
                        <div class="flex items-center gap-4 mb-4">
                            <h2 class="text-[10px] font-black text-ae-sub uppercase tracking-[0.3em] italic flex-none">${c}</h2>
                            <div class="cat-line"></div>
                        </div>
                        <div class="carrusel-row hide-scroll">
                            ${fila.map(r => {
                                const st = checkHorario(r.HORARIO, r.ESTADO_MANUAL);
                                return `
                                <div onclick="${st.ok ? `verMenu('${r.ID_RESTAURANTE}')` : ''}" class="card-rest ${!st.ok ? 'cerrado' : ''}">
                                    <div class="img-wrapper">
                                        ${!st.ok ? `<div class="badge-cerrado">${st.msg}</div>` : ''}
                                        <img src="${r.FOTO}">
                                    </div>
                                    <div class="info-wrapper">
                                        <p class="rest-name">${r.NOMBRE_RESTAURANTE}</p>
                                    </div>
                                </div>`;
                            }).join('')}
                        </div>
                    </div>`;
            });
        }

        function verMenu(id) {
            restauranteActual = dataCache.restaurantes.find(r => String(r.ID_RESTAURANTE) === String(id));
            const platos = dataCache.menus.filter(p => String(p.ID_RESTAURANTE) === String(id));
            document.getElementById('header-titulo').innerText = restauranteActual.NOMBRE_RESTAURANTE;
            document.getElementById('btn-back').classList.remove('hidden');
            document.getElementById('main-container').innerHTML = `<div class="grid grid-cols-1 gap-5 anim-up">${platos.map(p => `
                <div onclick="abrirProducto('${p.ID_PLATO}')" class="plato-card p-4 flex gap-5 items-center active:scale-95 transition-all">
                    <img src="${p.FOTO_PLATO}" class="w-24 h-24 rounded-[24px] object-cover shadow-sm">
                    <div class="flex-1">
                        <h3 class="font-black text-ae-text uppercase italic text-[12px] leading-tight">${p.PLATO}</h3>
                        <span class="block mt-3 font-black text-ae-main text-xl italic tracking-tighter">${formatEuro(p.PRECIO)}</span>
                    </div>
                </div>`).join('')}</div>`;
        }

        function abrirProducto(idPlato) {
            const p = dataCache.menus.find(item => String(item.ID_PLATO) === String(idPlato));
            productoSeleccionado = { nombre: p.PLATO, precio: parseFloat(p.PRECIO) };
            sugerenciasElegidas = [];
            
            document.getElementById('p-nombre').innerText = p.PLATO;
            document.getElementById('p-precio').innerText = formatEuro(p.PRECIO);
            document.getElementById('p-foto').src = p.FOTO_PLATO;
            document.getElementById('p-desc').innerText = p.DESCRIPCION || "Preparado al momento con ingredientes frescos.";
            
            const listaS = document.getElementById('p-sugerencias-lista');
            listaS.innerHTML = "";

            if(p.EXTRAS && p.EXTRAS.trim() !== "") {
                document.getElementById('label-extras').innerText = "Personaliza tu pedido";
                p.EXTRAS.split(',').forEach(ex => {
                    const [n, pr] = ex.trim().split(':');
                    listaS.innerHTML += `
                        <div onclick="toggleExtra(this, '${n}', ${pr})" class="flex-none w-28 p-3 rounded-2xl border border-gray-100 bg-white text-center transition shadow-sm active:scale-95">
                            <p class="text-[8px] font-black text-ae-text uppercase italic mb-1">${n}</p>
                            <p class="text-ae-main font-bold text-[9px]">+${formatEuro(pr)}</p>
                        </div>`;
                });
            } else {
                document.getElementById('label-extras').innerText = "¿Te apetece algo más?";
                const sugerencias = dataCache.menus.filter(item => 
                    item.CATEGORIA_PLATO === "Bebidas" || item.CATEGORIA_PLATO === "Acompañantes"
                ).slice(0, 6);

                sugerencias.forEach(g => {
                    listaS.innerHTML += `
                        <div onclick="toggleExtra(this, '${g.PLATO}', ${g.PRECIO})" class="flex-none w-28 p-3 rounded-2xl border border-gray-100 bg-white text-center transition shadow-sm active:scale-95">
                            <img src="${g.FOTO_PLATO}" class="w-10 h-10 rounded-xl mx-auto mb-2 object-cover">
                            <p class="text-[8px] font-black text-ae-text uppercase truncate italic">${g.PLATO}</p>
                            <p class="text-ae-main font-bold text-[9px]">+${formatEuro(g.PRECIO)}</p>
                        </div>`;
                });
            }
            document.getElementById('modal-producto').classList.remove('hidden');
        }

        function toggleExtra(el, n, p) {
            const i = sugerenciasElegidas.findIndex(s => s.nombre === n);
            if(i > -1) { 
                sugerenciasElegidas.splice(i, 1); 
                el.classList.remove('sug-selected'); 
            } else { 
                sugerenciasElegidas.push({ nombre: n, precio: parseFloat(p) }); 
                el.classList.add('sug-selected'); 
            }
        }

        function confirmarAgregar() {
            carrito.push(productoSeleccionado);
            sugerenciasElegidas.forEach(s => carrito.push(s));
            actualizarCestaBar();
            cerrarProducto();
        }

        function actualizarCestaBar() {
            const b = document.getElementById('basket-bar');
            if(carrito.length > 0) {
                const sub = carrito.reduce((s, i) => s + i.precio, 0);
                const total = sub + COSTO_ENVIO;
                document.getElementById('basket-count').innerText = carrito.length;
                document.getElementById('basket-total').innerText = formatEuro(total);
                b.classList.remove('hidden');
            } else { b.classList.add('hidden'); }
        }

        function abrirCheckout() {
            document.getElementById('modal-checkout').classList.remove('hidden');
            cargarPerfil();
            const btn = document.getElementById('btn-finalizar');
            const sub = carrito.reduce((s, i) => s + i.precio, 0);
            const total = sub + COSTO_ENVIO;
            
            if (new Date().getTime() < FECHA_LANZAMIENTO) {
                btn.innerText = "PRÓXIMAMENTE 01 ABRIL"; btn.classList.add('bg-ae-accent');
            } else {
                btn.innerText = `CONFIRMAR (${formatEuro(total)})`;
            }
            
            document.getElementById('checkout-items').innerHTML = carrito.map(i => `
                <div class="flex justify-between text-[10px] font-bold uppercase text-ae-sub">
                    <span>${i.nombre}</span><span>${formatEuro(i.precio)}</span>
                </div>`).join('') + `
                <div class="pt-3 mt-3 border-t border-gray-100 flex justify-between text-ae-main font-black">
                    <span>COSTO DE ENVÍO</span><span>${formatEuro(COSTO_ENVIO)}</span>
                </div>`;
        }

        function finalizarCompra() {
            if (new Date().getTime() < FECHA_LANZAMIENTO) { alert("¡Apertura el 01 de Abril!"); return; }
            const n = document.getElementById('c-nombre').value;
            const t = document.getElementById('c-tel').value;
            const d = document.getElementById('c-dir').value;
            if(!n || !t || !d) return alert("Por favor, rellena tus datos.");
            
            const total = carrito.reduce((s, i) => s + i.precio, 0) + COSTO_ENVIO;
            const listaProd = carrito.map(i => i.nombre).join(', ');
            
            // EL SECRETO: Enviar los datos correctos para tu tabla VENTAS
            const msg = `*PEDIDO AGUADULCE EXPRESS*\n\n*Cliente:* ${n}\n*WhatsApp:* ${t}\n*Dirección:* ${d}\n\n*PRODUCTOS:* ${listaProd}\n\n*TOTAL CON ENVÍO:* ${formatEuro(total)}`;
            
            window.location.href = `https://wa.me/${restauranteActual.TELEFONO}?text=${encodeURIComponent(msg)}`;
            carrito = [];
            actualizarCestaBar();
            cerrarCheckout();
        }

        function guardarPerfil() { 
            const p = { n: document.getElementById('c-nombre').value, t: document.getElementById('c-tel').value, d: document.getElementById('c-dir').value }; 
            localStorage.setItem('ae_perfil', JSON.stringify(p)); 
        }
        function cargarPerfil() { 
            const p = JSON.parse(localStorage.getItem('ae_perfil')); 
            if (p) { 
                document.getElementById('c-nombre').value = p.n || ""; 
                document.getElementById('c-tel').value = p.t || ""; 
                document.getElementById('c-dir').value = p.d || ""; 
            } 
        }
        function cerrarCheckout() { document.getElementById('modal-checkout').classList.add('hidden'); }
        function cerrarProducto() { document.getElementById('modal-producto').classList.add('hidden'); }

        iniciar();
    </script>
</body>
</html>
