<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aguadulce Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .category-pill.active { background-color: #ef4444; color: white; border-color: #ef4444; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-gray-50 font-sans pb-24">

    <script>
        // TU NUEVA URL DE IMPLEMENTACIÓN
        const API_URL = "https://script.google.com/macros/s/AKfycbzED0RJ90vtBNDXT15TRT6iDqpX7REjN5XiQ2IL8yDElatGRwELgZDwq6HbSDpNoAZuFQ/exec";
    </script>

    <header class="bg-white shadow-sm sticky top-0 z-50 p-4 flex items-center justify-between">
        <button id="btn-back" onclick="mostrarSelectorRestaurantes()" class="hidden text-gray-600 p-2"><i class="fas fa-arrow-left text-xl"></i></button>
        <h1 id="header-titulo" class="text-xl font-black text-gray-800 flex-1 text-center italic uppercase">Aguadulce Express</h1>
        <div class="w-10"></div>
    </header>

    <div id="categorias-container" class="flex overflow-x-auto p-4 gap-2 sticky top-[60px] bg-gray-50 z-40 no-scrollbar hidden border-b border-gray-100"></div>

    <main id="main-container" class="p-4 grid grid-cols-1 gap-4">
        <div class="text-center py-20 text-gray-400">
            <i class="fas fa-circle-notch fa-spin text-3xl mb-4"></i>
            <p class="font-bold uppercase text-xs tracking-widest">Sincronizando menú profesional...</p>
        </div>
    </main>

    <div id="cart-bar" class="fixed bottom-6 left-4 right-4 bg-gray-900 text-white p-4 rounded-2xl flex justify-between items-center shadow-2xl hidden z-50">
        <div>
            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Tu Pedido</p>
            <p class="font-black text-xl leading-none">$<span id="cart-total">0</span></p>
        </div>
        <button onclick="enviarPedidoProfesional()" class="bg-green-500 text-white px-6 py-3 rounded-xl font-black flex items-center gap-2 active:scale-95 transition-transform shadow-lg shadow-green-900/20">
            <i class="fab fa-whatsapp text-xl"></i> CONFIRMAR
        </button>
    </div>

    <script>
        let todosLosRestaurantes = [];
        let todoElMenu = [];
        let restauranteSeleccionado = null;
        let carrito = [];

        async function cargarDatos() {
            try {
                const [resRest, resMenu] = await Promise.all([
                    fetch(`${API_URL}?sheet=RESTAURANTES`),
                    fetch(`${API_URL}?sheet=MENU_GENERAL`)
                ]);
                todosLosRestaurantes = await resRest.json();
                todoElMenu = await resMenu.json();
                mostrarSelectorRestaurantes();
            } catch (error) {
                document.getElementById('main-container').innerHTML = `
                <div class="text-center py-20 px-6">
                    <i class="fas fa-exclamation-circle text-red-500 text-4xl mb-4"></i>
                    <p class="text-gray-800 font-bold">Error de conexión</p>
                    <p class="text-gray-500 text-xs mt-2">Asegúrate de que las pestañas RESTAURANTES y MENU_GENERAL existan en tu Excel.</p>
                </div>`;
            }
        }

        function mostrarSelectorRestaurantes() {
            restauranteSeleccionado = null;
            carrito = [];
            actualizarBarraCarrito();
            document.getElementById('btn-back').classList.add('hidden');
            document.getElementById('header-titulo').innerText = "Aguadulce Express";
            document.getElementById('categorias-container').classList.add('hidden');
            
            const container = document.getElementById('main-container');
            container.innerHTML = todosLosRestaurantes.map(r => {
                const estaAbierto = r.ESTADO === "ACTIVO" || r.ESTADO === "SI";
                return `
                    <div onclick="${estaAbierto ? `abrirRestaurante('${r.ID}')` : ''}" 
                         class="bg-white rounded-3xl shadow-sm overflow-hidden border border-gray-100 transition-all animate-fade ${estaAbierto ? 'active:scale-95 cursor-pointer' : 'opacity-50 grayscale cursor-not-allowed'}">
                        <div class="relative">
                            <img src="${r.FOTO || 'https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=500'}" class="w-full h-44 object-cover">
                            ${!estaAbierto ? '<div class="absolute inset-0 bg-black/50 flex items-center justify-center text-white font-black text-xl uppercase tracking-tighter">Cerrado por el dueño</div>' : ''}
                        </div>
                        <div class="p-5 flex justify-between items-center">
                            <div>
                                <h3 class="font-black text-lg text-gray-800 uppercase tracking-tighter">${r.NOMBRE}</h3>
                                <p class="text-[10px] text-gray-400 font-bold italic">${r.DIRECCION || 'Aguadulce'}</p>
                            </div>
                            <span class="text-[9px] font-black uppercase px-2 py-1 rounded-md ${estaAbierto ? 'text-green-600 bg-green-50' : 'text-red-600 bg-red-50'}">
                                ${estaAbierto ? '● Abierto' : '● Cerrado'}
                            </span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function abrirRestaurante(id) {
            restauranteSeleccionado = todosLosRestaurantes.find(r => r.ID == id);
            const platos = todoElMenu.filter(p => p.ID_RESTAURANTE == id);
            
            document.getElementById('header-titulo').innerText = restauranteSeleccionado.NOMBRE;
            document.getElementById('btn-back').classList.remove('hidden');
            
            renderizarCategorias(platos);
            renderizarProductos(platos, 'Todos');
        }

        function renderizarCategorias(platos) {
            const container = document.getElementById('categorias-container');
            container.classList.remove('hidden');
            const cats = ["Todos", ...new Set(platos.map(p => p.Categoria))].filter(c => c);
            
            container.innerHTML = cats.map(c => `
                <button onclick="filtrarPorCategoria('${c}')" class="category-pill px-5 py-2 rounded-xl bg-white border border-gray-200 text-[10px] font-black uppercase whitespace-nowrap shadow-sm">
                    ${c}
                </button>
            `).join('');
        }

        function filtrarPorCategoria(cat) {
            const platos = todoElMenu.filter(p => p.ID_RESTAURANTE == restauranteSeleccionado.ID);
            renderizarProductos(platos, cat);
        }

        function renderizarProductos(platos, cat) {
            document.querySelectorAll('.category-pill').forEach(b => b.classList.toggle('active', b.innerText === cat));
            const container = document.getElementById('main-container');
            const filtrados = cat === 'Todos' ? platos : platos.filter(p => p.Categoria === cat);
            
            if (filtrados.length === 0) {
                container.innerHTML = `<p class="text-center py-10 text-gray-400 text-xs font-bold uppercase">Sin productos disponibles</p>`;
                return;
            }

            container.innerHTML = filtrados.map(p => `
                <div class="bg-white rounded-2xl shadow-sm flex border border-gray-100 p-3 gap-4 items-center animate-fade">
                    <img src="${p.Foto || 'https://via.placeholder.com/150'}" class="w-20 h-20 rounded-2xl object-cover shadow-sm">
                    <div class="flex-1 flex flex-col justify-between py-1">
                        <div>
                            <h3 class="font-black text-gray-800 text-[11px] uppercase leading-tight">${p.Nombre}</h3>
                            <p class="text-[9px] text-gray-400 mt-1 line-clamp-2 leading-tight font-medium">${p.Descripcion || ''}</p>
                        </div>
                        <div class="flex justify-between items-center mt-2">
                            <span class="font-black text-red-600 text-lg leading-none italic">$${p.Precio}</span>
                            <button onclick="agregar('${p.Nombre}', ${p.Precio})" class="bg-gray-900 text-white w-9 h-9 rounded-xl flex items-center justify-center active:bg-red-500 shadow-lg transition-colors">
                                <i class="fas fa-plus text-xs"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function agregar(nombre, precio) {
            carrito.push({nombre, precio});
            actualizarBarraCarrito();
        }

        function actualizarBarraCarrito() {
            const bar = document.getElementById('cart-bar');
            const total = carrito.reduce((sum, p) => sum + p.precio, 0);
            if(carrito.length > 0) {
                bar.classList.remove('hidden');
                document.getElementById('cart-total').innerText = total.toFixed(2);
            } else {
                bar.classList.add('hidden');
            }
        }

        async function enviarPedidoProfesional() {
            const items = carrito.reduce((acc, p) => { acc[p.nombre] = (acc[p.nombre] || 0) + 1; return acc; }, {});
            let detalles = "";
            for (const [nombre, cant] of Object.entries(items)) { detalles += `${cant}x ${nombre}, `; }

            const datosPedido = {
                id_restaurante: restauranteSeleccionado.ID,
                restaurante_nombre: restauranteSeleccionado.NOMBRE,
                detalles_pedido: detalles.slice(0, -2),
                total: document.getElementById('cart-total').innerText,
                cliente_nombre: "Cliente Web"
            };

            try {
                // Registro silencioso en Excel
                fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(datosPedido) });
                
                // Mensaje profesional de WhatsApp
                const mensaje = `*NUEVO PEDIDO AGUADULCE EXPRESS*\n\n📍 *Local:* ${restauranteSeleccionado.NOMBRE}\n📝 *Pedido:* ${datosPedido.detalles_pedido}\n💰 *TOTAL: $${datosPedido.total}*\n\n_Revisa tu panel para gestionar el pedido._`;
                
                window.open(`https://wa.me/${restauranteSeleccionado.TELEFONO}?text=${encodeURIComponent(mensaje)}`, '_blank');
                
                alert("¡Pedido enviado! Ya aparece en el panel del restaurante.");
                carrito = [];
                mostrarSelectorRestaurantes();
            } catch (e) { alert("Error al conectar."); }
        }

        cargarDatos();
    </script>
</body>
</html>
