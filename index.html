<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    colors: { 'ae-main': '#00BCD4', 'ae-dark': '#0F172A', 'ae-bg': '#F8FAFC' },
                    animation: { 'slide-up': 'slideUp 0.3s ease-out', 'fade-in': 'fadeIn 0.4s ease-in' }
                } 
            } 
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .product-img { width: 100%; height: 250px; object-fit: cover; border-radius: 0 0 40px 40px; }
        .basket-float { 
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; height: 70px; background: #0F172A; 
            border-radius: 25px; display: flex; align-items: center; 
            justify-content: space-between; padding: 0 25px; color: white; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.3); z-index: 90; transition: all 0.4s ease;
        }
    </style>
</head>
<body class="pb-32">

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyO3k6Jo-XgrF8VhSjOfiO2tzFTnKJr-akZyqKoCQzW9ylRNe-UAjN8kgr52jVr3m5C/exec"; 
        const COSTO_ENVIO = 3.50;
        
        // Cargar carrito desde memoria del teléfono al iniciar
        let carrito = JSON.parse(localStorage.getItem('ae_cart_v2')) || [];
        let dataCache = JSON.parse(localStorage.getItem('ae_cache_v2')) || null;
        let restauranteActual = null;
        let productoSeleccionado = null;

        const SUGERENCIAS = [
            { nombre: "Papas Fritas Pro", precio: 2.50, foto: "https://images.unsplash.com/photo-1573080496219-bb080dd4f877?w=300" },
            { nombre: "Bebida Grande", precio: 1.50, foto: "https://images.unsplash.com/photo-1622483767028-3f66f32aef97?w=300" }
        ];
    </script>

    <header class="sticky top-0 z-[80] bg-white/90 backdrop-blur-md border-b border-gray-100 px-6 py-5 flex items-center justify-between">
        <button id="btn-back" onclick="location.reload()" class="hidden w-10 h-10 bg-gray-50 rounded-xl flex items-center justify-center">
            <i class="fas fa-chevron-left"></i>
        </button>
        <h1 id="header-titulo" class="font-extrabold text-xl tracking-tighter text-ae-dark uppercase italic">
            AGUADULCE <span class="text-ae-main font-black">EXPRESS</span>
        </h1>
        <div class="w-10"></div>
    </header>

    <main id="main-container" class="p-5 max-w-xl mx-auto space-y-6"></main>

    <div id="modal-producto" class="fixed inset-0 z-[200] hidden bg-black/50 backdrop-blur-sm flex items-end justify-center">
        <div class="bg-white w-full max-w-md rounded-t-[40px] animate-slide-up overflow-hidden">
            <div class="relative">
                <img id="p-foto" src="" class="product-img">
                <button onclick="cerrarProducto()" class="absolute top-6 right-6 w-10 h-10 bg-black/20 backdrop-blur-md text-white rounded-full flex items-center justify-center">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="p-8">
                <h3 id="p-nombre" class="text-2xl font-extrabold text-ae-dark uppercase italic"></h3>
                <p id="p-desc" class="text-gray-500 mt-2 text-sm leading-relaxed"></p>
                <div class="flex items-center justify-between mt-8">
                    <span id="p-precio" class="text-3xl font-black text-ae-main italic"></span>
                    <button onclick="confirmarAgregar()" class="bg-ae-main text-ae-dark px-8 py-4 rounded-2xl font-black italic shadow-lg shadow-ae-main/30 uppercase text-xs">Añadir a la cesta</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-upsell" class="fixed inset-0 z-[210] hidden bg-ae-dark/95 backdrop-blur-md flex items-center justify-center p-8">
        <div class="w-full max-w-xs text-center">
            <h4 class="text-ae-main font-black italic text-xs uppercase mb-2">¡Completa tu pedido!</h4>
            <h3 class="text-white text-2xl font-extrabold mb-8 uppercase italic">¿Añadimos acompañante?</h3>
            <div id="lista-sugerencias" class="space-y-4"></div>
            <button onclick="cerrarSugerencia()" class="mt-8 text-gray-500 font-bold text-xs uppercase tracking-widest">No, por ahora no</button>
        </div>
    </div>

    <div id="basket-bar" onclick="abrirCheckout()" class="basket-float hidden animate-fade-in">
        <div class="flex items-center gap-3">
            <div class="relative">
                <i class="fas fa-shopping-cart text-xl"></i>
                <span id="basket-count" class="absolute -top-2 -right-2 bg-ae-main text-ae-dark text-[10px] font-black w-5 h-5 rounded-full flex items-center justify-center border-2 border-ae-dark">0</span>
            </div>
            <span class="font-bold text-sm">Mi Cesta</span>
        </div>
        <div class="flex items-center gap-4">
            <span class="font-black text-xl italic">$<span id="basket-total">0</span></span>
            <i class="fas fa-chevron-right text-ae-main"></i>
        </div>
    </div>

    <div id="modal-checkout" class="fixed inset-0 z-[150] hidden bg-ae-dark/90 flex items-end justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[40px] p-8 animate-slide-up max-h-[90vh] overflow-y-auto">
            <h3 class="text-2xl font-black text-center mb-6 italic uppercase tracking-tighter">Tu Pedido</h3>
            <div id="checkout-items" class="space-y-3 mb-6 border-b pb-6"></div>
            <div class="space-y-4">
                <input type="text" id="c-nombre" placeholder="Nombre" class="w-full p-4 bg-gray-50 rounded-2xl border-none font-bold">
                <input type="tel" id="c-tel" placeholder="WhatsApp" class="w-full p-4 bg-gray-50 rounded-2xl border-none font-bold">
                <input type="text" id="c-dir" placeholder="Dirección de entrega" class="w-full p-4 bg-gray-50 rounded-2xl border-none font-bold">
            </div>
            <button onclick="finalizarCompra()" class="w-full mt-6 bg-ae-main text-ae-dark py-5 rounded-2xl font-black italic uppercase shadow-xl shadow-ae-main/30">ENVIAR PEDIDO</button>
            <button onclick="cerrarCheckout()" class="w-full mt-4 text-gray-400 font-bold text-[10px] uppercase">Seguir comprando</button>
        </div>
    </div>

    <script>
        async function iniciar() {
            actualizarCestaBar();
            if(dataCache) renderRestaurantes();
            try {
                const res = await fetch(`${API_URL}?v=${Date.now()}`);
                dataCache = await res.json();
                localStorage.setItem('ae_cache_v2', JSON.stringify(dataCache));
                if (!restauranteActual) renderRestaurantes();
            } catch (e) { console.log("Cargando..."); }
        }

        function renderRestaurantes() {
            document.getElementById('btn-back').classList.add('hidden');
            document.getElementById('main-container').innerHTML = dataCache.restaurantes.map(r => `
                <div onclick="verMenu('${r.ID_RESTAURANTE}')" class="relative h-60 rounded-[40px] overflow-hidden shadow-2xl mb-6 active:scale-95 transition-all">
                    <img src="${r.FOTO}" class="absolute inset-0 w-full h-full object-cover">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div>
                    <div class="absolute bottom-8 left-8">
                        <h3 class="text-2xl font-black text-white uppercase italic">${r.NOMBRE_RESTAURANTE}</h3>
                        <p class="text-ae-main text-[10px] font-bold mt-1 uppercase tracking-widest">${r.DIRECCION}</p>
                    </div>
                </div>`).join('');
        }

        function verMenu(id) {
            restauranteActual = dataCache.restaurantes.find(r => String(r.ID_RESTAURANTE) === String(id));
            const platos = dataCache.menus.filter(p => String(p.ID_RESTAURANTE) === String(id));
            document.getElementById('header-titulo').innerText = restauranteActual.NOMBRE_RESTAURANTE;
            document.getElementById('btn-back').classList.remove('hidden');

            document.getElementById('main-container').innerHTML = platos.map(p => `
                <div onclick="abrirProducto('${p.PLATO}', '${p.PRECIO}', '${p.FOTO}', '${p.DESCRIPCION || ''}')" class="bg-white p-4 rounded-[35px] flex gap-4 items-center shadow-sm border border-gray-50 mb-4 active:bg-gray-50 transition-colors">
                    <img src="${p.FOTO}" class="w-24 h-24 rounded-[25px] object-cover">
                    <div class="flex-1">
                        <h3 class="font-black text-ae-dark uppercase italic text-xs leading-tight">${p.PLATO}</h3>
                        <p class="text-[9px] text-gray-400 mt-1 line-clamp-2">${p.DESCRIPCION || ''}</p>
                        <span class="block mt-2 font-black text-ae-main text-lg italic">$${parseFloat(p.PRECIO).toFixed(2)}</span>
                    </div>
                    <div class="w-8 h-8 bg-ae-bg rounded-full flex items-center justify-center"><i class="fas fa-chevron-right text-[10px] text-ae-main"></i></div>
                </div>`).join('');
        }

        function abrirProducto(nombre, precio, foto, desc) {
            productoSeleccionado = { nombre, precio: parseFloat(precio), foto };
            document.getElementById('p-nombre').innerText = nombre;
            document.getElementById('p-precio').innerText = `$${parseFloat(precio).toFixed(2)}`;
            document.getElementById('p-foto').src = foto;
            document.getElementById('p-desc').innerText = desc || "Sin descripción disponible.";
            document.getElementById('modal-producto').classList.remove('hidden');
        }

        function cerrarProducto() { document.getElementById('modal-producto').classList.add('hidden'); }

        function confirmarAgregar() {
            carrito.push(productoSeleccionado);
            localStorage.setItem('ae_cart_v2', JSON.stringify(carrito));
            actualizarCestaBar();
            cerrarProducto();

            // Lanzar sugerencias si es una hamburguesa
            if(productoSeleccionado.nombre.toLowerCase().includes('hambur')) {
                lanzarSugerencias();
            }
        }

        function lanzarSugerencias() {
            document.getElementById('modal-upsell').classList.remove('hidden');
            document.getElementById('lista-sugerencias').innerHTML = SUGERENCIAS.map(s => `
                <div onclick="addSugerencia('${s.nombre}', ${s.precio})" class="bg-white/10 p-4 rounded-3xl flex items-center gap-4 active:scale-95 transition">
                    <img src="${s.foto}" class="w-14 h-14 rounded-2xl object-cover">
                    <div class="text-left flex-1">
                        <p class="text-white font-black text-[10px] uppercase italic">${s.nombre}</p>
                        <p class="text-ae-main font-bold">+$${s.precio.toFixed(2)}</p>
                    </div>
                </div>`).join('');
        }

        function addSugerencia(n, p) {
            carrito.push({ nombre: n, precio: p });
            localStorage.setItem('ae_cart_v2', JSON.stringify(carrito));
            actualizarCestaBar();
            cerrarSugerencia();
        }

        function cerrarSugerencia() { document.getElementById('modal-upsell').classList.add('hidden'); }

        function actualizarCestaBar() {
            const bar = document.getElementById('basket-bar');
            if(carrito.length > 0) {
                const total = carrito.reduce((s, i) => s + i.precio, 0) + COSTO_ENVIO;
                document.getElementById('basket-count').innerText = carrito.length;
                document.getElementById('basket-total').innerText = total.toFixed(2);
                bar.classList.remove('hidden');
            } else { bar.classList.add('hidden'); }
        }

        function abrirCheckout() {
            document.getElementById('modal-checkout').classList.remove('hidden');
            document.getElementById('checkout-items').innerHTML = carrito.map((i, index) => `
                <div class="flex justify-between items-center text-[10px] font-black uppercase italic">
                    <span class="text-ae-dark">${i.nombre}</span>
                    <div class="flex items-center gap-4">
                        <span>$${i.precio.toFixed(2)}</span>
                        <button onclick="eliminarDelCarrito(${index})" class="text-red-500"><i class="fas fa-trash"></i></button>
                    </div>
                </div>`).join('');
        }

        function eliminarDelCarrito(index) {
            carrito.splice(index, 1);
            localStorage.setItem('ae_cart_v2', JSON.stringify(carrito));
            actualizarCestaBar();
            if(carrito.length === 0) cerrarCheckout(); else abrirCheckout();
        }

        function cerrarCheckout() { document.getElementById('modal-checkout').classList.add('hidden'); }

        function finalizarCompra() {
            const n = document.getElementById('c-nombre').value;
            const t = document.getElementById('c-tel').value;
            const d = document.getElementById('c-dir').value;
            if(!n || !t || !d) return alert("Completa tus datos");

            const detalle = carrito.map(i => i.nombre).join(', ');
            const totalF = (carrito.reduce((s, i) => s + i.precio, 0) + COSTO_ENVIO).toFixed(2);

            fetch(API_URL, {
                method: 'POST', mode: 'no-cors',
                body: JSON.stringify({ restaurante: restauranteActual.NOMBRE_RESTAURANTE, cliente: n, telefono: t, direccion: d, pedido: detalle, total: totalF })
            });

            const msg = `*ORDEN PRO*\n*Cliente:* ${n}\n*Pedido:* ${detalle}\n*TOTAL:* $${totalF}`;
            window.location.href = `https://wa.me/${restauranteActual.TELEFONO}?text=${encodeURIComponent(msg)}`;
            
            // Limpiar todo después de comprar
            localStorage.removeItem('ae_cart_v2');
        }

        iniciar();
    </script>
</body>
</html>
