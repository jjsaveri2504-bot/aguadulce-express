<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express | Premium Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: ui-sans-serif, system-ui; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        
        /* Burbujas de Categorías */
        .cat-bubble { flex: 0 0 85px; display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; }
        .cat-img-wrapper { width: 65px; height: 65px; border-radius: 50%; background: #fff; padding: 2px; border: 2px solid transparent; overflow: hidden; transition: 0.3s; }
        .cat-img-wrapper img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .cat-bubble.active .cat-img-wrapper { border-color: #06b6d4; transform: scale(1.1); box-shadow: 0 0 15px rgba(6, 182, 212, 0.4); }
        .cat-bubble span { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; text-align: center; }

        /* Estilos de Lista para Opciones (Uber/Glovo Style) */
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .list-item:last-child { border-bottom: none; }
        
        .radio-custom { width: 22px; height: 22px; border: 2px solid #334155; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .selected .radio-custom { border-color: #06b6d4; background: #06b6d4; }
        .selected .radio-custom::after { content: ''; width: 8px; height: 8px; background: white; border-radius: 50%; }
        
        .check-custom { width: 22px; height: 22px; border: 2px solid #334155; border-radius: 6px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .selected .check-custom { border-color: #06b6d4; background: #06b6d4; }
        .selected .check-custom::after { content: '✓'; color: white; font-size: 12px; font-weight: bold; }

        .modal-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="pb-32">
 
    <header class="glass sticky top-0 z-50 px-6 py-5 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <button id="btn-back" onclick="irAHome()" class="hidden p-2 bg-white/10 rounded-xl text-white">←</button>
            <h1 id="header-txt" class="font-black italic text-xl uppercase tracking-tighter text-cyan-400">AGUADULCE <span class="text-white">EXPRESS</span></h1>
        </div>
        <img src="https://i.postimg.cc/C1tDpH9b/LOGO-fondo-blanco.png" class="w-10 h-10 rounded-full border border-white/10">
    </header>
 
    <div id="cat-nav" class="flex gap-4 p-6 overflow-x-auto hide-scroll bg-[#020617]"></div>
    <main id="app-content" class="p-4 max-w-xl mx-auto grid grid-cols-2 gap-5"></main>
 
    <div id="modal-detalle" class="fixed inset-0 z-[60] bg-slate-950 hidden overflow-y-auto modal-up">
        <div class="max-w-xl mx-auto min-h-screen pb-40 flex flex-col">
            <div id="det-img-cont" class="h-72 w-full relative shrink-0">
                <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-transparent"></div>
            </div>
            
            <div class="p-8 flex-1 bg-slate-950 rounded-t-[3rem] -mt-10 relative space-y-6">
                <div class="flex justify-between items-start gap-4">
                    <div>
                        <h2 id="det-titulo" class="text-3xl font-black italic uppercase text-white leading-tight tracking-tighter"></h2>
                        <p id="det-desc" class="text-gray-500 text-sm mt-2 italic font-medium"></p>
                    </div>
                    <span id="det-precio-base" class="text-cyan-400 text-2xl font-black font-mono mt-1"></span>
                </div>

                <div id="cont-unica" class="pt-4 hidden border-t border-white/5">
                    <div class="flex justify-between items-end mb-3">
                        <p class="text-[11px] font-black text-white uppercase tracking-[0.2em]">Elige una opción</p>
                        <span class="text-[9px] bg-slate-800 text-slate-400 px-2.5 py-1 rounded-full font-bold">Obligatorio</span>
                    </div>
                    <div id="grid-unica" class="bg-white/5 rounded-3xl px-6 py-2 border border-white/5"></div>
                </div>

                <div id="cont-multi" class="pt-4 hidden border-t border-white/5">
                    <p class="text-[11px] font-black text-white uppercase tracking-[0.2em] mb-3">¿Añadir algo más?</p>
                    <div id="grid-multi" class="bg-white/5 rounded-3xl px-6 py-2 border border-white/5"></div>
                </div>

                <div class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-slate-950 via-slate-950 to-transparent z-50">
                    <div class="max-w-xl mx-auto flex items-center gap-4">
                        <div class="flex items-center bg-white/5 border border-white/10 rounded-full p-1 gap-1">
                            <button onclick="cambiarCant(-1)" class="w-12 h-12 text-white text-3xl font-medium border border-white/5 rounded-full">-</button>
                            <span id="det-cant" class="text-white font-black text-2xl w-8 text-center">1</span>
                            <button onclick="cambiarCant(1)" class="w-12 h-12 text-white text-3xl font-medium border border-white/5 rounded-full">+</button>
                        </div>
                        <button id="btn-add-carrito" class="flex-1 bg-cyan-600 h-16 rounded-3xl font-black uppercase text-white flex justify-between items-center px-8 shadow-2xl active:scale-95 transition-transform">
                           <span class="text-sm tracking-widest">Añadir</span>
                           <span id="det-precio-final" class="bg-black/20 px-4 py-1.5 rounded-xl font-mono">0.00€</span>
                        </button>
                    </div>
                </div>
                
                <button onclick="cerrarDetalle()" class="w-full py-8 text-gray-700 font-bold uppercase text-[10px] tracking-widest">Volver</button>
            </div>
        </div>
    </div>
 
    <div id="basket-bar" class="fixed bottom-6 left-6 right-6 z-40 hidden modal-up">
        <div class="bg-cyan-600 rounded-3xl p-2 flex items-center justify-between shadow-2xl border border-white/10">
            <button onclick="vaciarCarrito()" class="w-12 h-12 flex items-center justify-center bg-black/20 rounded-2xl text-white">🗑️</button>
            <div class="text-center" onclick="abrirCheckout()">
                <p id="basket-total" class="text-xl font-black text-white font-mono leading-none">0.00 €</p>
                <p class="text-[7px] uppercase font-bold text-cyan-100 tracking-tighter mt-1">+3.50€ Envío Incl.</p>
            </div>
            <button onclick="abrirCheckout()" class="bg-slate-950 text-white px-6 h-12 rounded-2xl text-[10px] font-black uppercase tracking-widest">Ver Pedido</button>
        </div>
    </div>
 
    <div id="modal-checkout" class="fixed inset-0 z-[70] bg-slate-950 hidden overflow-y-auto p-6 modal-up">
        <div class="max-w-md mx-auto space-y-6 pb-20 pt-10">
            <h2 class="text-3xl font-black italic text-white uppercase tracking-tighter">TU <span class="text-cyan-400">PEDIDO</span></h2>
            <div id="checkout-list" class="space-y-2"></div>
            <div class="p-4 bg-cyan-900/30 rounded-2xl border border-cyan-500/30 flex justify-between text-cyan-400 font-bold text-xs uppercase tracking-wider">
                <span>Gastos de Envío</span><span>3.50 €</span>
            </div>
            <div class="space-y-4 pt-4">
                <input type="text" id="o-name" placeholder="Nombre completo" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-white focus:outline-none focus:border-cyan-500">
                <input type="tel" id="o-phone" placeholder="Teléfono" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-white focus:outline-none focus:border-cyan-500">
                <input type="text" id="o-addr" placeholder="Dirección exacta" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-white focus:outline-none focus:border-cyan-500">
                
                <div class="p-4 bg-white/5 rounded-2xl border border-dashed border-cyan-500/40 text-center">
                    <p class="text-[10px] font-black text-cyan-400 uppercase tracking-widest mb-1">💳 Pago</p>
                    <p class="text-[11px] text-gray-300 font-bold uppercase">Efectivo o Tarjeta con TPV</p>
                </div>

                <div class="flex items-start gap-3 p-4 bg-white/5 rounded-2xl border border-white/10">
                    <input type="checkbox" id="o-terms" class="mt-1 w-5 h-5 accent-cyan-500">
                    <label for="o-terms" class="text-[10px] text-gray-400 uppercase font-bold leading-tight cursor-pointer">Acepto las condiciones de uso y privacidad.</label>
                </div>
            </div>
            <button onclick="confirmarYEnviar()" class="w-full bg-cyan-600 p-7 rounded-[2rem] font-black uppercase text-white shadow-xl active:scale-95 transition-transform">Confirmar WhatsApp</button>
            <button onclick="cerrarCheckout()" class="w-full py-2 text-gray-500 font-bold uppercase text-[10px]">Volver al menú</button>
        </div>
    </div>
 
    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbz6v3d0YYIDAg5H3OY0ey6lWIGINVcR2iR26nGrut6xy68TY4fZmUxinUFu9R3jS4sK/exec";
        const COSTO_ENVIO = 3.50;
        let dataCache = null, carrito = [], restActivo = null, pAct = null, sUnica = null, sMulti = [], cantAct = 1;
        let idRestCarrito = null;
 
        async function init() {
            try {
                const res = await fetch(API_URL);
                dataCache = await res.json();
                renderCats(dataCache.restaurantes, false); // Carga inicial: Categorías de Restaurantes
                renderHome();
            } catch (e) { console.error(e); }
        }
 
        // Lógica Dual de Categorías: Home vs. Menú
        function renderCats(datos, esMenu = false) {
            const nav = document.getElementById('cat-nav');
            nav.innerHTML = ""; // Limpiamos la barra
            
            const cats = [...new Set(datos.map(item => item.CATEGORIA))].filter(Boolean);
            
            // Botón "TODOS" inteligente
            nav.innerHTML = createBubble("TODOS", esMenu ? "Carta" : "Todos", true, esMenu);

            cats.forEach(c => {
                nav.innerHTML += createBubble(c, c, false, esMenu);
            });
        }
 
        function createBubble(id, name, active, esMenu = false) {
            const iconData = dataCache.iconos.find(i => i.CATEGORIA.toUpperCase() === id.toUpperCase());
            const img = iconData ? iconData.FOTO : "https://i.postimg.cc/mD44w655/all-food.jpg";
            // Lógica de click dual: filtrar Restaurantes o filtrar Platos
            const action = esMenu ? `filtrarMenu('${id}', this)` : `filtrarRest('${id}', this)`;
            return `<div onclick="${action}" class="cat-bubble ${active?'active':''}">
                <div class="cat-img-wrapper"><img src="${img}"></div><span>${name}</span></div>`;
        }
 
        function renderHome(f = null) {
            restActivo = null; // Reseteamos restaurante activo
            document.getElementById('btn-back').classList.add('hidden');
            document.getElementById('header-txt').innerHTML = 'AGUADULCE <span class="text-white">EXPRESS</span>';
            const content = document.getElementById('app-content');
            content.className = "p-4 grid grid-cols-2 gap-5"; content.innerHTML = "";
            const filt = (f && f !== 'TODOS') ? dataCache.restaurantes.filter(r => r.CATEGORIA === f) : dataCache.restaurantes;
            
            filt.forEach(r => {
                // Nuevo diseño de Banner Premium con texto superpuesto
                content.innerHTML += `
                    <div onclick="verMenu('${r.ID_RESTAURANTE}')" 
                         class="rounded-[2rem] overflow-hidden border border-white/10 shadow-lg active:scale-95 transition relative h-40 group"
                         style="background-image: url('${r.FOTO}'); background-size: cover; background-position: center;">
                        
                        <div class="absolute inset-0 bg-black/40 group-hover:bg-black/20 transition-all"></div>
                        
                        <div class="absolute inset-0 flex items-center justify-center p-4">
                            <h2 class="text-lg font-black italic uppercase text-white text-center leading-tight tracking-tighter drop-shadow-lg">
                                ${r.NOMBRE}
                            </h2>
                        </div>
                    </div>`;
            });
            renderCats(dataCache.restaurantes, false); // Asegurar categorías de home al volver
        }
 
        function verMenu(id) {
            restActivo = dataCache.restaurantes.find(r => String(r.ID_RESTAURANTE) === String(id));
            const platos = dataCache.menus.filter(m => String(m.ID_RESTAURANTE) === String(id));
            
            // CAMBIO CLAVE: Al entrar, cargamos categorías de PLATOS de ESTE restaurante
            renderCats(platos, true); 

            document.getElementById('btn-back').classList.remove('hidden');
            document.getElementById('header-txt').innerText = restActivo.NOMBRE;
            const content = document.getElementById('app-content');
            content.className = "p-4 flex flex-col gap-4"; content.innerHTML = "";
            renderPlatos(platos); // Dibujar platos
        }

        function renderPlatos(platos) {
            const content = document.getElementById('app-content');
            content.innerHTML = "";
            platos.forEach(p => {
                content.innerHTML += `<div onclick='abrirDetalle(${JSON.stringify(p)})' class="bg-white/5 p-4 rounded-[2rem] flex items-center gap-5 border border-white/10 active:scale-95 transition-all shadow-md">
                    <img src="${p.FOTO}" class="w-20 h-20 rounded-2xl object-cover shadow-lg">
                    <div class="flex-1 font-black uppercase">
                        <p class="text-[11px] text-white mb-1 leading-tight">${p.PLATO}</p>
                        <p class="text-cyan-400 text-lg font-mono">${parseFloat(p.PRECIO).toFixed(2)}€</p>
                    </div></div>`;
            });
        }
 
        function abrirDetalle(p) {
            if (idRestCarrito && String(idRestCarrito) !== String(p.ID_RESTAURANTE)) {
                if (!confirm("¿Vaciar cesta para pedir en otro restaurante?")) return;
                vaciarCarrito();
            }
            pAct = p; sUnica = null; sMulti = []; cantAct = 1;
            document.getElementById('det-titulo').innerText = p.PLATO;
            document.getElementById('det-desc').innerText = p.DESCRIPCION || "";
            document.getElementById('det-precio-base').innerText = parseFloat(p.PRECIO).toFixed(2) + "€";
            document.getElementById('det-img-cont').innerHTML = `<img src="${p.FOTO}" class="w-full h-full object-cover shadow-2xl">`;
            document.getElementById('det-cant').innerText = "1";

            // Selección Única (Estilo Lista)
            const gU = document.getElementById('grid-unica'); gU.innerHTML = "";
            if(p.SELECCION_UNICA) {
                document.getElementById('cont-unica').classList.remove('hidden');
                p.SELECCION_UNICA.split(',').forEach(o => {
                    const [n, pr] = o.split(':');
                    const row = document.createElement('div'); btn.className = "list-item opt-row";
                    row.innerHTML = `
                        <div class="text-[12px] font-bold text-slate-200 uppercase">${n.trim()} <span class="text-cyan-500 font-mono ml-2">${parseFloat(pr)>0 ? `(+${pr}€)` : ""}</span></div>
                        <div class="radio-custom"></div>`;
                    row.onclick = () => {
                        gU.querySelectorAll('.opt-row').forEach(b => b.classList.remove('selected'));
                        row.classList.add('selected');
                        sUnica = { n: n.trim(), p: parseFloat(pr || 0) }; updatePrecio();
                    };
                    gU.appendChild(row);
                });
            } else { document.getElementById('cont-unica').classList.add('hidden'); }
 
            // Extras Múltiples (Estilo Lista)
            const gM = document.getElementById('grid-multi'); gM.innerHTML = "";
            if(p.EXTRAS) {
                document.getElementById('cont-multi').classList.remove('hidden');
                p.EXTRAS.split(',').forEach(o => {
                    const [n, pr] = o.split(':');
                    const row = document.createElement('div'); btn.className = "list-item opt-row";
                    row.innerHTML = `
                        <div class="text-[12px] font-bold text-slate-200 uppercase">${n.trim()} <span class="text-cyan-500 font-mono ml-2">+${parseFloat(pr).toFixed(2)}€</span></div>
                        <div class="check-custom"></div>`;
                    row.onclick = () => {
                        row.classList.toggle('selected');
                        const idx = sMulti.findIndex(x => x.n === n.trim());
                        if(idx > -1) sMulti.splice(idx, 1); else sMulti.push({ n: n.trim(), p: parseFloat(pr || 0) });
                        updatePrecio();
                    };
                    gM.appendChild(row);
                });
            } else { document.getElementById('cont-multi').classList.add('hidden'); }
            
            updatePrecio();
            document.getElementById('modal-detalle').classList.remove('hidden');
            document.body.style.overflow = "hidden"; // Bloquear scroll de fondo
        }
 
        function cambiarCant(v) { cantAct = Math.max(1, cantAct + v); document.getElementById('det-cant').innerText = cantAct; updatePrecio(); }

        function updatePrecio() {
            let base = parseFloat(pAct.PRECIO) + (sUnica ? sUnica.p : 0) + sMulti.reduce((a, b) => a + b.p, 0);
            let total = base * cantAct;
            document.getElementById('det-precio-final').innerText = total.toFixed(2) + "€";
        }
 
        document.getElementById('btn-add-carrito').onclick = () => {
            if(document.getElementById('cont-unica').offsetParent !== null && !sUnica) return alert("Por favor, selecciona una opción obligatoria");
            if (carrito.length === 0) idRestCarrito = pAct.ID_RESTAURANTE;
            
            let nombre = pAct.PLATO + (sUnica ? ` [${sUnica.n}]` : "");
            if(sMulti.length) nombre += ` (Extras: ${sMulti.map(x=>x.n).join(', ')})`;
            
            // v24 Lógica: guardamos precio total e items para ticket
            let precioTotalItem = (parseFloat(pAct.PRECIO) + (sUnica ? sUnica.p : 0) + sMulti.reduce((a, b) => a + b.p, 0)) * cantAct;
            carrito.push({ n: nombre, p: precioTotalItem, cant: cantAct });
            
            cerrarDetalle(); updateBarra();
        };
 
        function updateBarra() {
            const t = carrito.reduce((a, b) => a + b.p, 0) + (carrito.length > 0 ? COSTO_ENVIO : 0);
            document.getElementById('basket-total').innerText = t.toFixed(2) + " €";
            document.getElementById('basket-bar').classList.toggle('hidden', carrito.length === 0);
        }
 
        function vaciarCarrito() { carrito = []; idRestCarrito = null; updateBarra(); cerrarCheckout(); }
 
        async function confirmarYEnviar() {
            const n = document.getElementById('o-name').value, t = document.getElementById('o-phone').value, a = document.getElementById('o-addr').value;
            if(!n || !t || !a || !document.getElementById('o-terms').checked) return alert("Faltan datos o aceptar términos");
 
            const totalFinal = (carrito.reduce((a, b) => a + b.p, 0) + COSTO_ENVIO).toFixed(2);
            // v24 Formato de detalle: incluye cantidad
            const detalleStr = carrito.map(i => `${i.cant}x ${i.n}`).join(', ');
 
            try {
                fetch(API_URL, {
                    method: 'POST', mode: 'no-cors',
                    body: JSON.stringify({
                        id_restaurante: restActivo.ID_RESTAURANTE, cliente: n, direccion: a, detalle: detalleStr, total: totalFinal, whatsapp_rest: restActivo.TELEFONO 
                    })
                });
            } catch (e) { console.error("Error Guardado:", e); }
 
            let msg = `*🛍️ NUEVO PEDIDO: ${restActivo.NOMBRE}*\n*Cliente:* ${n}\n*Dir:* ${a}\n\n*Productos:*\n`;
            carrito.forEach(i => msg += `• ${i.cant}x ${i.n} - ${i.p.toFixed(2)}€\n`);
            msg += `\n*Envío:* ${COSTO_ENVIO.toFixed(2)}€\n*TOTAL:* ${totalFinal}€\n\n*Pago:* Efectivo/Tarjeta TPV`;
            window.open(`https://wa.me/${restActivo.TELEFONO}?text=${encodeURIComponent(msg)}`);
        }
 
        // Funciones de Filtrado Dual v24 Corregidas
        function filtrarRest(c, el) { 
            document.querySelectorAll('.cat-bubble').forEach(b => b.classList.remove('active')); 
            el.classList.add('active'); 
            renderHome(c); 
        }

        function filtrarMenu(cat, el) {
            document.querySelectorAll('.cat-bubble').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            const platos = dataCache.menus.filter(m => String(m.ID_RESTAURANTE) === String(restActivo.ID_RESTAURANTE));
            const filt = cat === 'TODOS' ? platos : platos.filter(p => p.CATEGORIA === cat);
            renderPlatos(filt);
        }

        function irAHome() { renderHome(); }
        function cerrarDetalle() { 
            document.getElementById('modal-detalle').classList.add('hidden'); 
            document.body.style.overflow = "auto"; // Restaurar scroll
        }
        function cerrarCheckout() { document.getElementById('modal-checkout').classList.add('hidden'); }
        function abrirCheckout() {
            const list = document.getElementById('checkout-list'); list.innerHTML = "";
            // v24 Lógica de ticket: incluye cantidad
            carrito.forEach(i => list.innerHTML += `<div class="flex justify-between bg-white/5 p-4 rounded-xl text-[10px] uppercase font-bold text-white border border-white/5 shadow-sm"><span>${i.cant}x ${i.n}</span><span>${i.p.toFixed(2)}€</span></div>`);
            document.getElementById('modal-checkout').classList.remove('hidden');
        }
        init();
    </script>
</body>
</html>
