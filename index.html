<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express - Luxury Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary: #06b6d4;
            --bg-dark: #020617;
            --card-bg: rgba(255, 255, 255, 0.03);
        }
        body { background: var(--bg-dark); color: #f8fafc; font-family: ui-sans-serif, system-ui; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        
        /* Burbujas de Categorías */
        .cat-bubble { flex: 0 0 85px; display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; }
        .cat-img-wrapper { width: 65px; height: 65px; border-radius: 50%; background: #fff; padding: 2px; border: 2px solid transparent; overflow: hidden; transition: 0.3s; }
        .cat-img-wrapper img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .cat-bubble.active .cat-img-wrapper { border-color: var(--primary); transform: scale(1.1); box-shadow: 0 0 15px rgba(6, 182, 212, 0.4); }
        .cat-bubble span { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; text-align: center; }

        /* Botones de Opciones (Pizzas/Kebab) */
        .opt-btn { padding: 12px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); background: var(--card-bg); font-size: 11px; font-weight: 700; text-transform: uppercase; color: #cbd5e1; cursor: pointer; text-align: center; }
        .opt-btn.selected { background: rgba(6, 182, 212, 0.2); border-color: var(--primary); color: #22d3ee; }

        /* Tarjetas de Bebidas (Sugestivas) */
        .drink-card { flex: 0 0 120px; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05); border-radius: 18px; padding: 10px; text-align: center; transition: 0.2s; cursor: pointer; }
        .drink-card.selected { border-color: var(--primary); background: rgba(6, 182, 212, 0.1); transform: translateY(-3px); }
        .drink-card img { width: 100%; h-20; object-fit: cover; border-radius: 12px; margin-bottom: 6px; }

        .modal-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="pb-32">

    <header class="glass sticky top-0 z-50 px-6 py-5 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <button id="btn-back" onclick="irAHome()" class="hidden p-2 bg-white/10 rounded-xl text-white">←</button>
            <h1 id="header-txt" class="font-black italic text-xl uppercase tracking-tighter text-cyan-400">AGUADULCE <span class="text-white">EXPRESS</span></h1>
        </div>
        <img src="https://i.postimg.cc/C1tDpH9b/LOGO-fondo-blanco.png" class="w-10 h-10 rounded-full border border-white/10">
    </header>

    <div id="cat-nav" class="flex gap-4 p-6 overflow-x-auto hide-scroll bg-[#020617]"></div>

    <main id="app-content" class="p-4 max-w-xl mx-auto grid grid-cols-2 gap-5"></main>

    <div id="modal-detalle" class="fixed inset-0 z-[60] bg-black hidden overflow-y-auto modal-up">
        <div class="max-w-xl mx-auto pb-48">
            <div id="det-img-cont" class="h-80 w-full relative">
                <div class="absolute inset-0 bg-gradient-to-t from-black to-transparent"></div>
            </div>
            <div class="p-8 -mt-12 relative bg-black rounded-t-[3rem] space-y-6">
                <div class="flex justify-between items-start">
                    <h2 id="det-titulo" class="text-3xl font-black italic uppercase text-white leading-tight"></h2>
                    <span id="det-precio-base" class="text-cyan-400 text-2xl font-bold font-mono"></span>
                </div>
                <p id="det-desc" class="text-gray-500 text-sm italic"></p>

                <div id="cont-unica" class="space-y-3 hidden border-t border-white/5 pt-4">
                    <p class="text-[10px] font-black text-cyan-500 uppercase tracking-widest">Selección Obligatoria</p>
                    <div id="grid-unica" class="grid grid-cols-2 gap-2"></div>
                </div>

                <div id="cont-sugestivo" class="space-y-4 border-t border-white/5 pt-6">
                    <p class="text-[10px] font-black text-amber-500 uppercase tracking-widest">🥤 ¡Completa tu pedido!</p>
                    <div id="grid-sugerencias" class="flex gap-3 overflow-x-auto hide-scroll"></div>
                </div>

                <div class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-black via-black/90 to-transparent z-50">
                    <div class="max-w-xl mx-auto flex items-center gap-4">
                        <div class="flex items-center bg-white/10 rounded-2xl p-1">
                            <button onclick="cambiarCant(-1)" class="w-12 h-12 text-white text-xl font-bold">-</button>
                            <span id="det-cant" class="text-white font-black text-lg w-8 text-center">1</span>
                            <button onclick="cambiarCant(1)" class="w-12 h-12 text-white text-xl font-bold">+</button>
                        </div>
                        <button id="btn-add-carrito-final" class="flex-1 bg-cyan-600 h-16 rounded-2xl font-black uppercase text-white flex justify-between items-center px-6 shadow-xl">
                            <span>Añadir</span>
                            <span id="det-precio-final" class="bg-black/20 px-3 py-1 rounded-lg"></span>
                        </button>
                    </div>
                </div>
                <button onclick="cerrarDetalle()" class="w-full py-4 text-gray-700 font-bold uppercase text-[10px]">Volver</button>
            </div>
        </div>
    </div>

    <div id="basket-bar" class="fixed bottom-6 left-6 right-6 z-40 hidden modal-up">
        <div class="bg-cyan-600 rounded-[2.5rem] p-3 flex items-center justify-between shadow-2xl">
            <button onclick="vaciarCarrito()" class="p-4 bg-black/20 rounded-full text-white">🗑️</button>
            <div class="text-center" onclick="abrirCheckout()">
                <p id="basket-total" class="text-2xl font-black text-white font-mono">0.00 €</p>
                <p class="text-[8px] uppercase font-bold text-cyan-100">Ver Pedido</p>
            </div>
            <button onclick="abrirCheckout()" class="bg-slate-950 text-white px-8 py-4 rounded-full text-xs font-black uppercase">Pagar</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbz6v3d0YYIDAg5H3OY0ey6lWIGINVcR2iR26nGrut6xy68TY4fZmUxinUFu9R3jS4sK/exec";
        const COSTO_ENVIO = 3.50;
        let dataCache = null, carrito = [], restActivo = null, pAct = null, sUnica = null, sBebidas = [], cantAct = 1;
        let idRestCarrito = null;

        async function init() {
            try {
                const res = await fetch(API_URL);
                dataCache = await res.json();
                renderCats();
                renderHome();
            } catch (e) { console.error("Error cargando datos:", e); }
        }

        function renderCats(esMenu = false) {
            const nav = document.getElementById('cat-nav');
            nav.innerHTML = "";
            if (!esMenu) {
                const cats = [...new Set(dataCache.restaurantes.map(r => r.CATEGORIA))].filter(Boolean);
                nav.innerHTML = createBubble("TODOS", "Todos", true);
                cats.forEach(c => nav.innerHTML += createBubble(c, c, false));
            } else {
                const platos = dataCache.menus.filter(m => String(m.ID_RESTAURANTE) === String(restActivo.ID_RESTAURANTE));
                const catsMenu = [...new Set(platos.map(p => p.CATEGORIA))].filter(Boolean);
                nav.innerHTML = createBubble("TODOS", "Carta", true, true);
                catsMenu.forEach(c => nav.innerHTML += createBubble(c, c, false, true));
            }
        }

        function createBubble(id, name, active, esMenu = false) {
            const iconData = dataCache.iconos.find(i => i.CATEGORIA.toUpperCase() === id.toUpperCase());
            const img = iconData ? iconData.FOTO : "https://i.postimg.cc/mD44w655/all-food.jpg";
            const action = esMenu ? `filtrarMenu('${id}', this)` : `filtrarRest('${id}', this)`;
            return `<div onclick="${action}" class="cat-bubble ${active?'active':''}">
                <div class="cat-img-wrapper"><img src="${img}"></div><span>${name}</span></div>`;
        }

        function renderHome(f = null) {
            restActivo = null;
            document.getElementById('btn-back').classList.add('hidden');
            document.getElementById('header-txt').innerHTML = 'AGUADULCE <span class="text-white">EXPRESS</span>';
            const content = document.getElementById('app-content');
            content.className = "p-4 grid grid-cols-2 gap-5";
            const filt = (f && f !== 'TODOS') ? dataCache.restaurantes.filter(r => r.CATEGORIA === f) : dataCache.restaurantes;
            content.innerHTML = filt.map(r => `
                <div onclick="verMenu('${r.ID_RESTAURANTE}')" class="bg-white/5 rounded-[2rem] overflow-hidden border border-white/10 active:scale-95 transition shadow-lg">
                    <img src="${r.FOTO}" class="w-full h-32 object-cover">
                    <div class="p-4 text-center text-[10px] font-black uppercase text-white">${r.NOMBRE}</div>
                </div>`).join('');
            renderCats(false);
        }

        function verMenu(id) {
            restActivo = dataCache.restaurantes.find(r => String(r.ID_RESTAURANTE) === String(id));
            document.getElementById('btn-back').classList.remove('hidden');
            document.getElementById('header-txt').innerText = restActivo.NOMBRE;
            renderCats(true);
            filtrarMenu('TODOS');
        }

        function filtrarMenu(cat, el = null) {
            if(el) {
                document.querySelectorAll('.cat-bubble').forEach(b => b.classList.remove('active'));
                el.classList.add('active');
            }
            const content = document.getElementById('app-content');
            content.className = "p-4 flex flex-col gap-4";
            const platos = dataCache.menus.filter(m => String(m.ID_RESTAURANTE) === String(restActivo.ID_RESTAURANTE));
            const filt = (cat && cat !== 'TODOS') ? platos.filter(p => p.CATEGORIA === cat) : platos;
            content.innerHTML = filt.map(p => `
                <div onclick='abrirDetalle(${JSON.stringify(p)})' class="bg-white/5 p-4 rounded-[2.5rem] flex items-center gap-5 border border-white/10 active:scale-95 transition">
                    <img src="${p.FOTO}" class="w-24 h-24 rounded-[1.5rem] object-cover">
                    <div class="flex-1 font-black uppercase">
                        <p class="text-[12px] text-white mb-1">${p.PLATO}</p>
                        <p class="text-cyan-400 text-xl font-mono">${parseFloat(p.PRECIO).toFixed(2)}€</p>
                    </div>
                </div>`).join('');
        }

        function abrirDetalle(p) {
            if (idRestCarrito && String(idRestCarrito) !== String(p.ID_RESTAURANTE)) {
                if (!confirm("¿Vaciar cesta para pedir en otro restaurante?")) return;
                vaciarCarrito();
            }
            pAct = p; sUnica = null; sBebidas = []; cantAct = 1;
            document.getElementById('det-titulo').innerText = p.PLATO;
            document.getElementById('det-desc').innerText = p.DESCRIPCION || "";
            document.getElementById('det-precio-base').innerText = parseFloat(p.PRECIO).toFixed(2) + "€";
            document.getElementById('det-img-cont').innerHTML = `<img src="${p.FOTO}" class="w-full h-full object-cover">`;
            document.getElementById('det-cant').innerText = "1";

            // Selección Única (Tamaños)
            const gU = document.getElementById('grid-unica');
            gU.innerHTML = "";
            if(p.SELECCION_UNICA) {
                document.getElementById('cont-unica').classList.remove('hidden');
                p.SELECCION_UNICA.split(',').forEach(o => {
                    const [n, pr] = o.split(':');
                    const btn = document.createElement('div');
                    btn.className = "opt-btn";
                    btn.innerText = n.trim() + (parseFloat(pr)>0 ? ` (+${pr}€)` : "");
                    btn.onclick = () => {
                        gU.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
                        btn.classList.add('selected');
                        sUnica = { n: n.trim(), p: parseFloat(pr || 0) };
                        updatePrecio();
                    };
                    gU.appendChild(btn);
                });
            } else { document.getElementById('cont-unica').classList.add('hidden'); }

            // Lógica Universal Bebidas
            const bebidas = dataCache.menus.filter(m => 
                String(m.CATEGORIA).toLowerCase().includes('bebida') && 
                String(m.ID_RESTAURANTE) === String(p.ID_RESTAURANTE)
            );
            const gridSug = document.getElementById('grid-sugerencias');
            gridSug.innerHTML = bebidas.map(b => `
                <div class="drink-card" id="drink-${b.PLATO.replace(/\s/g,'')}" onclick='toggleBebida(${JSON.stringify(b)}, this)'>
                    <img src="${b.FOTO}">
                    <p class="truncate text-[9px] font-black">${b.PLATO}</p>
                    <span class="text-cyan-400 text-[10px] font-mono">${parseFloat(b.PRECIO).toFixed(2)}€</span>
                </div>`).join('');

            updatePrecio();
            document.getElementById('modal-detalle').classList.remove('hidden');
        }

        function toggleBebida(b, el) {
            el.classList.toggle('selected');
            const idx = sBebidas.findIndex(x => x.n === b.PLATO);
            if(idx > -1) sBebidas.splice(idx, 1);
            else sBebidas.push({ n: b.PLATO, p: parseFloat(b.PRECIO) });
            updatePrecio();
        }

        function cambiarCant(v) { cantAct = Math.max(1, cantAct + v); document.getElementById('det-cant').innerText = cantAct; updatePrecio(); }

        function updatePrecio() {
            let base = parseFloat(pAct.PRECIO) + (sUnica ? sUnica.p : 0);
            let totalBebidas = sBebidas.reduce((a, b) => a + b.p, 0);
            document.getElementById('det-precio-final').innerText = ((base + totalBebidas) * cantAct).toFixed(2) + "€";
        }

        document.getElementById('btn-add-carrito-final').onclick = () => {
            if(pAct.SELECCION_UNICA && !sUnica) return alert("Selecciona una opción obligatoria");
            if (carrito.length === 0) idRestCarrito = pAct.ID_RESTAURANTE;
            
            let principal = pAct.PLATO + (sUnica ? ` [${sUnica.n}]` : "");
            carrito.push({ n: principal, cant: cantAct, p: (parseFloat(pAct.PRECIO) + (sUnica ? sUnica.p : 0)) * cantAct });
            
            sBebidas.forEach(b => carrito.push({ n: b.n, cant: 1 * cantAct, p: b.p * cantAct }));
            
            cerrarDetalle(); updateBarra();
        };

        function updateBarra() {
            const t = carrito.reduce((a, b) => a + b.p, 0) + (carrito.length > 0 ? COSTO_ENVIO : 0);
            document.getElementById('basket-total').innerText = t.toFixed(2) + " €";
            document.getElementById('basket-bar').classList.toggle('hidden', carrito.length === 0);
        }

        function vaciarCarrito() { carrito = []; idRestCarrito = null; updateBarra(); }
        function irAHome() { renderHome(); }
        function cerrarDetalle() { document.getElementById('modal-detalle').classList.add('hidden'); }
        function abrirCheckout() {
            // Reutiliza tu lógica de WhatsApp aquí enviando el 'carrito' actual
            alert("Redirigiendo a WhatsApp...");
            // (Aquí iría tu función confirmarYEnviar() de la v24)
        }

        init();
    </script>
</body>
</html>
