<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aguadulce Express | Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'ae-azul': '#00BCD4', 'ae-grafito': '#2D3436' },
                    fontFamily: { 'montserrat': ['Montserrat', 'sans-serif'], 'opensans': ['Open Sans', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Open Sans', sans-serif; background-color: #fdfdfd; color: #2D3436; }
        .titulo-ae { font-family: 'Montserrat', sans-serif; font-weight: 900; letter-spacing: -0.02em; }
        .btn-ae { background: #00BCD4; color: white; border-radius: 20px; font-weight: 700; transition: 0.3s; }
        .btn-ae:active { transform: scale(0.95); }
        .input-ae { border: 2px solid #f1f1f1; border-radius: 20px; padding: 14px; width: 100%; outline: none; background: #f9f9f9; transition: 0.3s; }
        .input-ae:focus { border-color: #00BCD4; background: white; }
        .modal-blur { background: rgba(45,52,54,0.9); backdrop-filter: blur(8px); }
        .card-rest { transition: 0.3s; border-radius: 35px; overflow: hidden; border: 1px solid #f1f1f1; }
        .card-rest:hover { transform: translateY(-5px); border-color: #00BCD4; }
    </style>
</head>
<body class="pb-40">

    <script>
        // CONFIGURACIÓN DE CONEXIÓN
        const API_URL = "https://script.google.com/macros/s/AKfycbwNEtUvZpQo2ozQds8zBxmljyd6WhwSFzpoktrMlNkAwHldeLhCk-UumHi_jJ0mAQh3Yw/exec"; 
        const COSTO_ENVIO = 3.50;
    </script>

    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md px-6 py-5 border-b-2 border-ae-azul flex items-center justify-between shadow-sm">
        <button id="btn-back" onclick="mostrarRestaurantes()" class="hidden w-10 h-10 flex items-center justify-center rounded-xl bg-gray-100 text-ae-grafito">
            <i class="fas fa-arrow-left"></i>
        </button>
        <h1 id="header-titulo" class="titulo-ae text-xl text-ae-grafito flex-1 text-center italic uppercase">
            AGUADULCE <span class="text-ae-azul">EXPRESS</span>
        </h1>
        <div class="w-10"></div>
    </header>

    <main id="main-container" class="p-6 grid grid-cols-1 gap-6 max-w-2xl mx-auto">
        <div class="flex flex-col items-center justify-center py-20">
            <div class="w-12 h-12 border-4 border-ae-azul border-t-transparent rounded-full animate-spin"></div>
            <p class="mt-4 titulo-ae text-xs text-gray-400 uppercase tracking-widest">Cargando Ecosistema...</p>
        </div>
    </main>

    <div id="modal-checkout" class="fixed inset-0 z-[110] hidden flex items-end sm:items-center justify-center p-4 modal-blur">
        <div class="bg-white w-full max-w-md rounded-[40px] p-8 shadow-2xl max-h-[95vh] overflow-y-auto">
            <h3 class="titulo-ae text-2xl mb-2 uppercase italic text-ae-grafito">DATOS DE ENTREGA</h3>
            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-6">Información para Reparto Local</p>
            
            <div class="space-y-4">
                <input type="text" id="nombre-cliente" placeholder="Nombre completo" class="input-ae">
                <input type="tel" id="tel-cliente" placeholder="WhatsApp" class="input-ae">
                <input type="text" id="dir-cliente" placeholder="Dirección exacta / Referencia" class="input-ae">
                <textarea id="obs-cliente" placeholder="Observaciones (Ej: Sin cebolla, dejar en recepción...)" class="input-ae" rows="2"></textarea>
            </div>

            <div class="mt-8 p-6 bg-ae-grafito rounded-[30px] text-white">
                <div class="flex justify-between text-xs font-bold text-ae-azul uppercase mb-2"><span>Envío Aguadulce</span><span>$3.50</span></div>
                <div class="flex justify-between text-2xl titulo-ae border-t border-gray-700 pt-4 italic uppercase">
                    <span>TOTAL</span><span id="total-res">$0</span>
                </div>
            </div>

            <button onclick="finalizarPedido()" class="w-full mt-6 btn-ae py-5 shadow-xl shadow-ae-azul/30 uppercase tracking-widest text-xs">
                CONFIRMAR PEDIDO <i class="fab fa-whatsapp ml-2"></i>
            </button>
            <button onclick="cerrarModal()" class="w-full mt-2 py-3 text-gray-400 font-bold text-[10px] uppercase tracking-widest">Cancelar</button>
        </div>
    </div>

    <div id="cart-bar" class="fixed bottom-8 left-6 right-6 bg-ae-grafito text-white p-6 rounded-[35px] flex justify-between items-center shadow-2xl hidden z-50">
        <div>
            <p class="text-[9px] font-black text-ae-azul uppercase italic tracking-tighter">Total con Transporte</p>
            <p class="titulo-ae text-3xl italic leading-none">$<span id="cart-total">0</span></p>
        </div>
        <button onclick="abrirCheckout()" class="btn-ae px-12 py-4 uppercase text-[11px] tracking-widest shadow-lg">PAGAR</button>
    </div>

    <script>
        let menuGeneral = []; 
        let listaRestaurantes = [];
        let restauranteSeleccionado = null; 
        let carrito = [];

        async function cargarDatos() {
            try {
                const [resMenu, resRest] = await Promise.all([
                    fetch(`${API_URL}?sheet=MENU_GENERAL`),
                    fetch(`${API_URL}?sheet=RESTAURANTES`)
                ]);
                menuGeneral = await resMenu.json();
                listaRestaurantes = await resRest.json();
                mostrarRestaurantes();
            } catch (e) {
                document.getElementById('main-container').innerHTML = `
                    <div class="text-center py-20">
                        <i class="fas fa-exclamation-triangle text-ae-azul text-4xl mb-4"></i>
                        <p class="titulo-ae text-sm uppercase">Error de Conexión</p>
                        <p class="text-xs text-gray-400 mt-2">Verifica la URL del Apps Script.</p>
                    </div>`;
            }
        }

        function mostrarRestaurantes() {
            restauranteSeleccionado = null; 
            carrito = []; 
            actualizarBarra();
            document.getElementById('btn-back').classList.add('hidden');
            document.getElementById('header-titulo').innerHTML = 'AGUADULCE <span class="text-ae-azul">EXPRESS</span>';
            
            const container = document.getElementById('main-container');
            container.innerHTML = listaRestaurantes.map(r => `
                <div onclick="verMenu('${r.ID}')" class="card-rest bg-white shadow-sm cursor-pointer">
                    <img src="${r.FOTO || 'https://via.placeholder.com/600x300?text=Aguadulce+Express'}" class="w-full h-48 object-cover">
                    <div class="p-6">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="text-xl titulo-ae text-ae-grafito uppercase italic">${r.NOMBRE || 'Local'}</h3>
                                <p class="text-ae-azul text-[10px] font-bold uppercase tracking-widest mt-1">${r.DIRECCION || 'Aguadulce'}</p>
                            </div>
                            <span class="bg-green-100 text-green-600 text-[9px] font-black px-3 py-1 rounded-full uppercase">Abierto</span>
                        </div>
                    </div>
                </div>`).join('');
        }

        function verMenu(idRest) {
            restauranteSeleccionado = listaRestaurantes.find(r => String(r.ID) === String(idRest));
            const platos = menuGeneral.filter(p => String(p.ID_REST) === String(idRest));
            
            document.getElementById('header-titulo').innerText = restauranteSeleccionado.NOMBRE;
            document.getElementById('btn-back').classList.remove('hidden');
            
            const container = document.getElementById('main-container');
            if (platos.length === 0) {
                container.innerHTML = `<p class="text-center py-20 text-gray-400 italic">No hay platos registrados para este local.</p>`;
                return;
            }

            container.innerHTML = platos.map(p => `
                <div class="bg-white rounded-[30px] p-5 flex gap-5 items-center shadow-sm border border-gray-50">
                    <img src="${p.FOTO_PLATO || 'https://via.placeholder.com/150?text=AE'}" class="w-24 h-24 rounded-3xl object-cover shadow-sm">
                    <div class="flex-1">
                        <h3 class="titulo-ae text-xs text-ae-grafito uppercase">${p.NOMBRE_PLATO}</h3>
                        <p class="text-[10px] text-gray-400 italic mt-1 line-clamp-2">${p.DESCRIPCION || ''}</p>
                        <div class="flex justify-between items-center mt-3">
                            <span class="titulo-ae text-ae-azul text-xl italic">$${parseFloat(p.PRECIO || 0).toFixed(2)}</span>
                            <button onclick="agregar('${p.NOMBRE_PLATO}', ${p.PRECIO})" class="w-10 h-10 btn-ae flex items-center justify-center shadow-lg">
                                <i class="fas fa-plus text-xs"></i>
                            </button>
                        </div>
                    </div>
                </div>`).join('');
        }

        function agregar(n, p) { 
            carrito.push({nombre: n, precio: p}); 
            actualizarBarra(); 
        }

        function actualizarBarra() {
            const bar = document.getElementById('cart-bar');
            const sub = carrito.reduce((s, p) => s + p.precio, 0);
            if(carrito.length > 0) {
                bar.classList.remove('hidden');
                document.getElementById('cart-total').innerText = (sub + COSTO_ENVIO).toFixed(2);
            } else { bar.classList.add('hidden'); }
        }

        function abrirCheckout() {
            const sub = carrito.reduce((s, p) => s + p.precio, 0);
            document.getElementById('total-res').innerText = "$" + (sub + COSTO_ENVIO).toFixed(2);
            document.getElementById('modal-checkout').classList.remove('hidden');
        }

        function cerrarModal() { 
            document.getElementById('modal-checkout').classList.add('hidden'); 
        }

        async function finalizarPedido() {
            const btn = event.currentTarget;
            const nombre = document.getElementById('nombre-cliente').value;
            const tel = document.getElementById('tel-cliente').value;
            const dir = document.getElementById('dir-cliente').value;
            const obs = document.getElementById('obs-cliente').value;

            if(!nombre || !tel || !dir) { alert("¡Faltan datos de entrega!"); return; }

            btn.disabled = true; btn.innerText = "PROCESANDO...";

            const items = carrito.reduce((acc, p) => { acc[p.nombre] = (acc[p.nombre] || 0) + 1; return acc; }, {});
            let pedidoStr = ""; for (const [n, c] of Object.entries(items)) { pedidoStr += `${c}x ${n}, `; }
            const subtotal = carrito.reduce((s, p) => s + p.precio, 0);
            const totalF = (subtotal + COSTO_ENVIO).toFixed(2);

            // ENVÍO A LA BASE DE DATOS (EXCEL PARA APPSHEET)
            try {
                await fetch(API_URL, { 
                    method: 'POST', mode: 'no-cors', 
                    body: JSON.stringify({
                        cliente: nombre, telefono: tel, direccion: dir, observaciones: obs,
                        restaurante: restauranteSeleccionado.NOMBRE, pedido: pedidoStr.slice(0, -2), total: totalF
                    }) 
                });
            } catch (e) { console.error("Error guardando en DB"); }

            // ENVÍO A WHATSAPP DEL LOCAL
            const mensaje = `*PEDIDO AGUADULCE EXPRESS*\n\n👤 *Cliente:* ${nombre}\n📍 *Dirección:* ${dir}\n📞 *WhatsApp:* ${tel}\n📝 *Obs:* ${obs || 'Ninguna'}\n\n🏪 *Local:* ${restauranteSeleccionado.NOMBRE}\n🍴 *Pedido:* ${pedidoStr.slice(0, -2)}\n\n🛵 *Envío:* $3.50\n💰 *TOTAL A PAGAR: $${totalF}*`;
            
            window.open(`https://wa.me/${restauranteSeleccionado.TELEFONO}?text=${encodeURIComponent(mensaje)}`, '_blank');
            
            // Reiniciar App
            location.reload();
        }

        cargarDatos();
    </script>
</body>
</html>
