<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aguadulce Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { 'ae-azul': '#00BCD4', 'ae-grafito': '#2D3436' } } } }
    </script>
    <style>
        body { font-family: 'Open Sans', sans-serif; background: #fdfdfd; }
        .font-ae { font-family: 'Montserrat', sans-serif; font-weight: 900; }
        .btn-ae { background: #00BCD4; color: white; border-radius: 20px; font-weight: 700; transition: 0.3s; }
    </style>
</head>
<body class="pb-40">

    <script>
        // PEGA AQUÍ LA URL QUE COPIASTE DEL APPS SCRIPT
        const API_URL = "TU_URL_AQUI"; 
        const COSTO_ENVIO = 3.50;
    </script>

    <header class="sticky top-0 z-50 bg-white border-b-2 border-ae-azul px-6 py-5 flex items-center shadow-sm">
        <button id="btn-back" onclick="mostrarRestaurantes()" class="hidden mr-4"><i class="fas fa-arrow-left text-ae-grafito"></i></button>
        <h1 id="header-titulo" class="font-ae text-xl text-ae-grafito flex-1 text-center italic uppercase">AGUADULCE <span class="text-ae-azul">EXPRESS</span></h1>
    </header>

    <main id="main-container" class="p-6 max-w-xl mx-auto space-y-6"></main>

    <div id="cart-bar" class="fixed bottom-6 left-6 right-6 bg-ae-grafito text-white p-6 rounded-[30px] flex justify-between items-center shadow-2xl hidden z-50">
        <div><p class="text-[9px] font-bold text-ae-azul uppercase italic">Total Final</p><p class="font-ae text-3xl italic">$<span id="cart-total">0</span></p></div>
        <button onclick="document.getElementById('modal-checkout').classList.remove('hidden')" class="btn-ae px-10 py-4 uppercase text-xs tracking-widest">PEDIR</button>
    </div>

    <div id="modal-checkout" class="fixed inset-0 z-[100] hidden bg-ae-grafito/90 backdrop-blur-sm flex items-end justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[40px] p-8">
            <h3 class="font-ae text-2xl mb-6 uppercase italic text-ae-grafito">DATOS DE ENTREGA</h3>
            <div class="space-y-4">
                <input type="text" id="nombre-cliente" placeholder="Tu Nombre" class="w-full p-4 bg-gray-100 rounded-2xl border-none">
                <input type="tel" id="tel-cliente" placeholder="WhatsApp" class="w-full p-4 bg-gray-100 rounded-2xl border-none">
                <input type="text" id="dir-cliente" placeholder="Dirección exacta" class="w-full p-4 bg-gray-100 rounded-2xl border-none">
                <textarea id="obs-cliente" placeholder="Notas del pedido..." class="w-full p-4 bg-gray-100 rounded-2xl border-none" rows="2"></textarea>
            </div>
            <button onclick="enviarPedido()" class="w-full mt-6 btn-ae py-5 uppercase text-sm">CONFIRMAR PEDIDO</button>
            <button onclick="document.getElementById('modal-checkout').classList.add('hidden')" class="w-full mt-2 text-gray-400 font-bold uppercase text-[10px] text-center">Cancelar</button>
        </div>
    </div>

    <script>
        let menuGeneral = []; let listaRestaurantes = [];
        let restauranteActual = null; let carrito = [];

        async function cargarDatos() {
            try {
                const [resMenu, resRest] = await Promise.all([
                    fetch(`${API_URL}?sheet=MENU_GENERAL`),
                    fetch(`${API_URL}?sheet=RESTAURANTES`)
                ]);
                menuGeneral = await resMenu.json();
                listaRestaurantes = await resRest.json();
                mostrarRestaurantes();
            } catch (e) { alert("Error conectando con la base de datos."); }
        }

        function mostrarRestaurantes() {
            restauranteActual = null; carrito = []; actualizarBarra();
            document.getElementById('btn-back').classList.add('hidden');
            document.getElementById('header-titulo').innerHTML = 'AGUADULCE <span class="text-ae-azul">EXPRESS</span>';
            
            document.getElementById('main-container').innerHTML = listaRestaurantes.map(r => `
                <div onclick="verMenu('${r.ID_RESTAURANTE}')" class="bg-white rounded-[35px] overflow-hidden shadow-sm border border-gray-100 cursor-pointer">
                    <img src="${r.FOTO}" class="w-full h-44 object-cover">
                    <div class="p-6 flex justify-between items-center">
                        <div>
                            <h3 class="text-xl font-ae text-ae-grafito uppercase italic">${r.NOMBRE_RESTAURANTE}</h3>
                            <p class="text-ae-azul text-[10px] font-bold mt-1">${r.DIRECCION}</p>
                        </div>
                        <span class="text-[10px] font-bold ${r.ESTADO === 'Abierto' ? 'text-green-500' : 'text-red-500'} uppercase">${r.ESTADO}</span>
                    </div>
                </div>`).join('');
        }

        function verMenu(id) {
            restauranteActual = listaRestaurantes.find(r => String(r.ID_RESTAURANTE) === String(id));
            if(restauranteActual.ESTADO !== 'Abierto') return alert("Local cerrado actualmente.");

            const platos = menuGeneral.filter(p => String(p.ID_RESTAURANTE) === String(id));
            document.getElementById('header-titulo').innerText = restauranteActual.NOMBRE_RESTAURANTE;
            document.getElementById('btn-back').classList.remove('hidden');
            
            document.getElementById('main-container').innerHTML = platos.map(p => `
                <div class="bg-white rounded-[30px] p-4 flex gap-4 items-center shadow-sm border border-gray-50">
                    <img src="${p.FOTO}" class="w-20 h-20 rounded-2xl object-cover">
                    <div class="flex-1">
                        <h3 class="font-ae text-[11px] text-ae-grafito uppercase">${p.PLATO}</h3>
                        <p class="text-[9px] text-gray-400 line-clamp-1 mt-1">${p.DESCRIPCION}</p>
                        <div class="flex justify-between items-center mt-2">
                            <span class="font-ae text-ae-azul text-xl italic">$${parseFloat(p.PRECIO).toFixed(2)}</span>
                            <button onclick="agregar('${p.PLATO}', ${p.PRECIO})" class="w-9 h-9 btn-ae flex items-center justify-center shadow-md"><i class="fas fa-plus text-xs"></i></button>
                        </div>
                    </div>
                </div>`).join('');
        }

        function agregar(n, p) { carrito.push({nombre: n, precio: p}); actualizarBarra(); }
        function actualizarBarra() {
            const bar = document.getElementById('cart-bar');
            const total = carrito.reduce((s, p) => s + p.precio, 0) + (carrito.length > 0 ? COSTO_ENVIO : 0);
            if(carrito.length > 0) {
                bar.classList.remove('hidden');
                document.getElementById('cart-total').innerText = total.toFixed(2);
            } else { bar.classList.add('hidden'); }
        }

        async function enviarPedido() {
            const n = document.getElementById('nombre-cliente').value;
            const t = document.getElementById('tel-cliente').value;
            const d = document.getElementById('dir-cliente').value;
            const o = document.getElementById('obs-cliente').value;
            if(!n || !t || !d) return alert("Faltan datos");

            const items = carrito.reduce((acc, p) => { acc[p.nombre] = (acc[p.nombre] || 0) + 1; return acc; }, {});
            let pedStr = ""; for (const [name, qty] of Object.entries(items)) { pedStr += `${qty}x ${name}, `; }
            const totalF = (carrito.reduce((s, p) => s + p.precio, 0) + COSTO_ENVIO).toFixed(2);

            // POST AL EXCEL
            await fetch(API_URL, { 
                method: 'POST', mode: 'no-cors', 
                body: JSON.stringify({
                    cliente: n, telefono: t, direccion: d, observaciones: o,
                    restaurante: restauranteActual.NOMBRE_RESTAURANTE, pedido: pedStr.slice(0, -2), total: totalF
                }) 
            });

            const msg = `*AGUADULCE EXPRESS*\n\n*Cliente:* ${n}\n*WhatsApp:* ${t}\n*Dirección:* ${d}\n*Pedido:* ${pedStr}\n*TOTAL:* $${totalF}`;
            window.open(`https://wa.me/${restauranteActual.TELEFONO}?text=${encodeURIComponent(msg)}`, '_blank');
            location.reload();
        }
        cargarDatos();
    </script>
</body>
</html>
