<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express | Pro v32 Gold</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,900;1,900&display=swap');
        body { background: #020617; color: #f8fafc; font-family: ui-sans-serif, system-ui; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .brand-font { font-family: 'Poppins', sans-serif; font-weight: 900; font-style: italic; text-transform: uppercase; letter-spacing: -1.5px; line-height: 1; }
        .cat-bubble { flex: 0 0 75px; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; }
        .cat-img-wrapper { width: 55px; height: 55px; border-radius: 50%; background: #1e293b; padding: 2px; border: 2px solid transparent; overflow: hidden; transition: 0.2s; }
        .cat-img-wrapper img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .cat-bubble.active .cat-img-wrapper { border-color: #06b6d4; transform: scale(1.05); box-shadow: 0 0 15px rgba(6, 182, 212, 0.4); }
        .option-btn { border: 1px solid rgba(255,255,255,0.1); transition: 0.2s; background: rgba(255,255,255,0.03); }
        .option-selected { border-color: #06b6d4 !important; background: rgba(6, 182, 212, 0.15) !important; color: #06b6d4 !important; }
        .btn-confirm-final { background: #16a34a !important; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(22, 163, 74, 0); } 100% { box-shadow: 0 0 0 0 rgba(22, 163, 74, 0); } }
        .modal-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="pb-28">

    <header class="glass sticky top-0 z-50 px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-4 relative min-w-[200px]">
            <button id="btn-back" onclick="irAHome()" class="hidden absolute left-0 w-10 h-10 flex items-center justify-center bg-white/10 border border-white/10 rounded-xl text-white z-10">←</button>
            <div id="brand-container" class="flex flex-col brand-font transition-all duration-300">
                <span class="text-3xl text-cyan-400">AGUADULCE</span>
                <span class="text-lg text-white tracking-[0.3em] -mt-1">EXPRESS</span>
            </div>
        </div>
        <div class="w-11 h-11 rounded-full border border-white/20 overflow-hidden shadow-lg bg-white">
            <img src="Logo Aguadulce Express.jpeg" class="w-full h-full object-contain">
        </div>
    </header>

    <div id="rest-banner" class="hidden h-40 w-full relative overflow-hidden mb-4">
        <div id="banner-img" class="absolute inset-0 bg-cover bg-center transition-transform duration-1000"></div>
        <div class="absolute inset-0 bg-black/60 flex items-center justify-center">
            <h2 id="banner-name" class="text-3xl font-black italic uppercase text-white tracking-widest text-center px-4"></h2>
        </div>
    </div>

    <div id="cat-nav" class="flex gap-4 p-5 overflow-x-auto hide-scroll bg-[#020617]"></div>
    <main id="app-content" class="p-4 max-w-xl mx-auto grid grid-cols-2 gap-6"></main>

    <div id="modal-detalle" class="fixed inset-0 z-[60] bg-slate-950 hidden overflow-y-auto modal-up">
        <div class="max-w-xl mx-auto min-h-screen pb-48">
            <button onclick="cerrarDetalle()" class="absolute top-6 left-6 z-[70] w-12 h-12 bg-black/60 rounded-full text-white text-2xl flex items-center justify-center shadow-2xl backdrop-blur-sm">✕</button>
            <div id="det-img-cont" class="h-64 w-full bg-cover bg-center relative"><div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-transparent"></div></div>
            
            <div class="px-8 -mt-6 relative space-y-6">
                <div class="flex justify-between items-start gap-4">
                    <div class="flex-1">
                        <h2 id="det-titulo" class="text-2xl font-black italic uppercase text-white leading-tight"></h2>
                        <p id="det-desc" class="text-gray-400 text-xs mt-2 italic"></p>
                    </div>
                    <span id="det-precio-base" class="text-cyan-400 text-xl font-mono font-bold"></span>
                </div>

                <div id="cont-unica" class="hidden space-y-3 pt-2 border-t border-white/5">
                    <p class="text-[10px] font-black text-cyan-500 uppercase tracking-widest">Elige una opción:</p>
                    <div id="grid-unica" class="grid grid-cols-2 gap-3"></div>
                </div>

                <div id="cont-multi" class="hidden pt-2 border-t border-white/5">
                    <div onclick="toggleExtras()" class="flex justify-between items-center bg-white/5 p-4 rounded-xl cursor-pointer">
                        <div class="flex flex-col text-left">
                            <span class="text-[10px] font-black text-cyan-500 uppercase tracking-widest">Añadir extras</span>
                            <span class="text-[9px] text-gray-500 uppercase font-bold tracking-tight">Opcional</span>
                        </div>
                        <span id="extra-arrow" class="text-cyan-500 text-xl transition-transform duration-300">↓</span>
                    </div>
                    <div id="grid-multi" class="space-y-1 overflow-hidden transition-all duration-300 max-h-0"></div>
                </div>

                <div class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-slate-950 via-slate-950 to-transparent z-[65]">
                    <div class="max-w-xl mx-auto space-y-4">
                        <div class="flex flex-col items-center gap-2">
                            <div class="flex items-center bg-slate-900 border border-white/10 rounded-full px-4 py-1.5 gap-6 shadow-2xl">
                                <button onclick="cambiarCant(-1)" class="text-cyan-400 text-2xl font-light w-6">−</button>
                                <span id="det-cant" class="text-white font-black text-base w-4 text-center">1</span>
                                <button onclick="cambiarCant(1)" class="text-cyan-400 text-2xl font-light w-6">+</button>
                            </div>
                        </div>
                        <button onclick="ejecutarAddCarrito()" class="w-full bg-cyan-600 h-14 rounded-2xl font-black uppercase text-white flex justify-between items-center px-8 shadow-xl active:scale-95 transition-all">
                           <span class="text-[11px] tracking-widest">Agregar</span>
                           <span id="det-precio-final" class="bg-black/20 px-4 py-1.5 rounded-xl text-sm font-mono">0.00€</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="basket-bar" class="fixed bottom-6 left-6 right-6 z-40 hidden modal-up">
        <div onclick="abrirCheckout()" class="bg-cyan-600 rounded-2xl h-14 px-6 flex items-center justify-between shadow-2xl border border-cyan-400/20">
            <div class="flex items-center gap-3">
                <span id="basket-count" class="bg-black/30 w-6 h-6 rounded-lg text-[10px] font-black text-white flex items-center justify-center">0</span>
                <span class="text-[11px] font-black uppercase text-white tracking-widest">Mi Pedido</span>
            </div>
            <span id="basket-total" class="font-mono font-bold text-white text-base">0.00 €</span>
        </div>
    </div>

    <div id="modal-checkout" class="fixed inset-0 z-[75] bg-slate-950 hidden overflow-y-auto p-6 modal-up">
        <div class="max-w-md mx-auto space-y-8 pb-20 pt-10">
            <h2 class="text-3xl font-black italic text-white uppercase tracking-tighter">FINALIZAR <span class="text-cyan-400 underline decoration-cyan-400/30">PEDIDO</span></h2>
            <div id="checkout-list" class="space-y-2"></div>
            
            <div class="space-y-4 pt-4">
                <input type="text" id="o-name" placeholder="Tu Nombre" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-sm text-white focus:border-cyan-500 outline-none transition-all">
                <input type="tel" id="o-phone" placeholder="Tu WhatsApp (Ej: 34600...)" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-sm text-white focus:border-cyan-500 outline-none transition-all">
                <input type="text" id="o-addr" placeholder="Dirección de entrega" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-sm text-white focus:border-cyan-500 outline-none transition-all">
            </div>

            <div class="space-y-4">
                <button id="btn-flow" onclick="manejarFlujoPedido()" class="w-full bg-cyan-600 p-6 rounded-2xl font-black uppercase text-white shadow-xl transition-all text-sm tracking-widest flex flex-col items-center">
                    <span id="btn-text-main">1. ENVIAR WHATSAPP</span>
                    <span id="btn-text-sub" class="text-[8px] opacity-60 mt-1 uppercase">Paso necesario para el envío</span>
                </button>
                <p id="txt-ayuda-seguridad" class="text-[10px] text-yellow-500 text-center uppercase font-black tracking-widest hidden animate-pulse">⚠️ Regresa aquí para confirmar cuando termines</p>
            </div>
            <button onclick="cerrarCheckout()" class="w-full text-gray-500 font-bold uppercase text-[10px] text-center">Volver al menú</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbz6v3d0YYIDAg5H3OY0ey6lWIGINVcR2iR26nGrut6xy68TY4fZmUxinUFu9R3jS4sK/exec";
        const COSTO_ENVIO = 3.50;
        let dataCache = null, carrito = [], restActivo = null, pAct = null, sMulti = {}, sUnica = null, cantAct = 1, pasoConfirmacion = false;

        async function init() {
            try {
                const res = await fetch(API_URL);
                dataCache = await res.json();
                renderHome();
            } catch (e) { console.error("Error cargando datos"); }
        }

        function renderHome(f = null) {
            restActivo = null;
            document.getElementById('btn-back').classList.add('hidden');
            document.getElementById('rest-banner').classList.add('hidden');
            document.getElementById('brand-container').style.marginLeft = "0px";
            const content = document.getElementById('app-content');
            content.className = "p-4 grid grid-cols-2 gap-6";
            content.innerHTML = "";
            const filt = (f && f !== 'TODOS') ? dataCache.restaurantes.filter(r => r.CATEGORIA === f) : dataCache.restaurantes;
            filt.forEach(r => {
                content.innerHTML += `<div onclick="verMenu('${r.ID_RESTAURANTE}')" class="space-y-3 active:scale-95 transition-all"><img src="${r.FOTO}" class="w-full h-36 object-cover rounded-[2.2rem] shadow-lg border border-white/5"><p class="text-[10px] font-black uppercase text-center text-slate-400 tracking-wider">${r.NOMBRE}</p></div>`;
            });
            renderCats(dataCache.restaurantes, false);
        }

        function verMenu(id) {
            restActivo = dataCache.restaurantes.find(r => String(r.ID_RESTAURANTE) === String(id));
            const platos = dataCache.menus.filter(m => String(m.ID_RESTAURANTE) === String(id));
            document.getElementById('btn-back').classList.remove('hidden');
            document.getElementById('brand-container').style.marginLeft = "45px";
            const banner = document.getElementById('rest-banner');
            banner.classList.remove('hidden');
            document.getElementById('banner-img').style.backgroundImage = `url('${restActivo.FOTO}')`;
            document.getElementById('banner-name').innerText = restActivo.NOMBRE;
            const content = document.getElementById('app-content');
            content.className = "p-4 flex flex-col gap-4";
            content.innerHTML = "";
            platos.forEach(p => {
                content.innerHTML += `<div onclick='abrirDetalle(${JSON.stringify(p)})' class="bg-white/5 p-4 rounded-[1.8rem] flex items-center gap-5 border border-white/5 active:bg-white/10 transition-colors"><img src="${p.FOTO}" class="w-20 h-20 rounded-2xl object-cover shadow-xl"><div class="flex-1"><p class="text-[11px] font-black text-white uppercase leading-tight">${p.PLATO}</p><p class="text-cyan-400 font-mono font-bold text-base mt-1.5">${Number(p.PRECIO).toFixed(2)}€</p></div></div>`;
            });
            renderCats(platos, true);
        }

        function abrirDetalle(p) {
            pAct = p; sMulti = {}; sUnica = null; cantAct = 1;
            document.getElementById('det-titulo').innerText = p.PLATO;
            document.getElementById('det-desc').innerText = p.DESCRIPCION || "";
            document.getElementById('det-precio-base').innerText = Number(p.PRECIO).toFixed(2) + "€";
            document.getElementById('det-img-cont').style.backgroundImage = `url('${p.FOTO}')`;
            
            // LÓGICA DE SELECCIÓN ÚNICA (TAMAÑOS) - BASADA EN TU COLUMNA SELECCION_UNICA
            const gU = document.getElementById('grid-unica'); gU.innerHTML = "";
            if(p.SELECCION_UNICA) {
                p.SELECCION_UNICA.split(',').forEach((o, i) => {
                    const [n, pr] = o.split(':');
                    const btn = document.createElement('button');
                    btn.className = "option-btn p-4 rounded-2xl text-[10px] font-black uppercase text-slate-400 flex flex-col items-center border border-white/10";
                    btn.innerHTML = `<span>${n.trim()}</span><span class="text-cyan-600 font-mono mt-1">${Number(pr).toFixed(2)}€</span>`;
                    btn.onclick = () => selectUnica(n.trim(), Number(pr), btn);
                    gU.appendChild(btn);
                    if(i === 0) btn.click();
                });
                document.getElementById('cont-unica').classList.remove('hidden');
            } else { document.getElementById('cont-unica').classList.add('hidden'); }

            // LÓGICA DE EXTRAS
            const gM = document.getElementById('grid-multi'); gM.innerHTML = "";
            if(p.EXTRAS) {
                p.EXTRAS.split(',').forEach(o => {
                    const [n, pr] = o.split(':'); const nT = n.trim();
                    sMulti[nT] = { p: Number(pr || 0), cant: 0 };
                    const row = document.createElement('div');
                    row.className = "flex justify-between items-center py-4 border-b border-white/5";
                    row.innerHTML = `<div class="flex flex-col"><span class="text-[11px] font-bold text-slate-300 uppercase">${nT}</span><span class="text-cyan-600 font-mono text-[10px]">+${Number(pr).toFixed(2)}€</span></div>
                        <div class="flex items-center gap-4 bg-white/5 px-4 py-2 rounded-full border border-white/10">
                            <button onclick="cambiarExtra('${nT}', -1, this)" class="text-cyan-400 font-bold w-4 text-xl">−</button>
                            <span class="text-white text-[11px] font-black extra-count-val">0</span>
                            <button onclick="cambiarExtra('${nT}', 1, this)" class="text-cyan-400 font-bold w-4 text-xl">+</button></div>`;
                    gM.appendChild(row);
                });
                document.getElementById('cont-multi').classList.remove('hidden');
            } else { document.getElementById('cont-multi').classList.add('hidden'); }

            actualizarCalculo();
            document.getElementById('modal-detalle').classList.remove('hidden');
            document.body.style.overflow = "hidden";
        }

        function selectUnica(name, price, btn) {
            document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('option-selected'));
            btn.classList.add('option-selected');
            sUnica = { n: name, p: price };
            actualizarCalculo();
        }

        function toggleExtras() {
            const g = document.getElementById('grid-multi');
            const a = document.getElementById('extra-arrow');
            if(g.style.maxHeight === '0px' || !g.style.maxHeight) { g.style.maxHeight = '1000px'; a.style.transform = 'rotate(180deg)'; }
            else { g.style.maxHeight = '0px'; a.style.transform = 'rotate(0deg)'; }
        }

        function cambiarExtra(n, v, btn) {
            sMulti[n].cant = Math.max(0, sMulti[n].cant + v);
            btn.parentElement.querySelector('.extra-count-val').innerText = sMulti[n].cant;
            actualizarCalculo();
        }

        function actualizarCalculo() {
            let base = sUnica ? sUnica.p : Number(pAct.PRECIO);
            let ext = 0; for (let k in sMulti) { ext += sMulti[k].p * sMulti[k].cant; }
            const total = (base * cantAct) + ext;
            document.getElementById('det-precio-final').innerText = total.toFixed(2) + "€";
            document.getElementById('det-cant').innerText = cantAct;
        }

        function cambiarCant(v) { cantAct = Math.max(1, cantAct + v); actualizarCalculo(); }

        function ejecutarAddCarrito() {
            let basePrice = sUnica ? sUnica.p : Number(pAct.PRECIO);
            let extrasTxt = []; let extP = 0;
            for (let k in sMulti) { if(sMulti[k].cant > 0) { extrasTxt.push(`${sMulti[k].cant}x ${k}`); extP += sMulti[k].p * sMulti[k].cant; } }
            let finalN = `${cantAct}x ${pAct.PLATO}${sUnica ? ' ('+sUnica.n+')' : ''}`;
            if(extrasTxt.length > 0) finalN += ` + [${extrasTxt.join(', ')}]`;
            carrito.push({ n: finalN, p: (basePrice * cantAct) + extP });
            cerrarDetalle();
            actualizarBarraCesta();
        }

        function actualizarBarraCesta() {
            if(carrito.length > 0) {
                const total = carrito.reduce((acc, i) => acc + i.p, 0) + COSTO_ENVIO;
                document.getElementById('basket-total').innerText = total.toFixed(2) + " €";
                document.getElementById('basket-count').innerText = carrito.length;
                document.getElementById('basket-bar').classList.remove('hidden');
            } else { document.getElementById('basket-bar').classList.add('hidden'); }
        }

        function abrirCheckout() {
            const list = document.getElementById('checkout-list'); list.innerHTML = "";
            carrito.forEach((item, idx) => {
                list.innerHTML += `<div class="flex justify-between items-center bg-white/5 p-4 rounded-2xl border border-white/5 shadow-inner">
                    <div class="flex flex-col gap-1"><span class="text-[10px] font-black text-white uppercase leading-tight">${item.n}</span><span class="text-cyan-500 font-mono text-[9px]">${item.p.toFixed(2)}€</span></div>
                    <button onclick="borrarItem(${idx})" class="text-red-500 font-bold text-xs px-2">✕</button></div>`;
            });
            document.getElementById('modal-checkout').classList.remove('hidden');
        }

        function borrarItem(idx) { 
            carrito.splice(idx, 1); 
            if(!carrito.length) cerrarCheckout(); else abrirCheckout();
            actualizarBarraCesta();
        }

        function manejarFlujoPedido() {
            const n = document.getElementById('o-name').value, t = document.getElementById('o-phone').value, a = document.getElementById('o-addr').value;
            if(!n || !t || !a) return alert("Por favor, completa tus datos.");
            const btn = document.getElementById('btn-flow'), sub = document.getElementById('btn-text-sub'), main = document.getElementById('btn-text-main'), ayuda = document.getElementById('txt-ayuda-seguridad');

            if (!pasoConfirmacion) {
                alert("🛒 PASO 1:\nSe abrirá WhatsApp para enviar tu pedido.\n\n⚠️ RECUERDA:\nAl terminar, DEBES VOLVER AQUÍ para confirmar el registro final.");
                const totalF = (carrito.reduce((acc, i) => acc + i.p, 0) + COSTO_ENVIO).toFixed(2);
                let msg = `*🛍️ NUEVO PEDIDO*\n*REST:* ${restActivo.NOMBRE}\n*CLIENTE:* ${n.toUpperCase()}\n*TEL:* ${t}\n*DIR:* ${a.toUpperCase()}\n\n*PRODUCTOS:*\n`;
                carrito.forEach(i => msg += `• ${i.n} - ${i.p.toFixed(2)}€\n`);
                msg += `\n*ENVÍO:* ${COSTO_ENVIO.toFixed(2)}€\n*TOTAL: ${totalF}€*`;
                window.open(`https://wa.me/${restActivo.TELEFONO}?text=${encodeURIComponent(msg)}`);
                main.innerText = "2. ✅ YA LO ENVIÉ (CONFIRMAR)"; sub.innerText = "PULSA AQUÍ PARA FINALIZAR REGISTRO";
                btn.classList.add('btn-confirm-final'); ayuda.classList.remove('hidden'); pasoConfirmacion = true;
            } else {
                ejecutarRegistroExcel(n, a);
            }
        }

        function ejecutarRegistroExcel(nombre, direccion) {
            const totalF = (carrito.reduce((acc, i) => acc + i.p, 0) + COSTO_ENVIO).toFixed(2);
            const detalle = carrito.map(i => i.n).join(' | ');
            fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({id_restaurante:restActivo.ID_RESTAURANTE, cliente: nombre, direccion: direccion, detalle: detalle, total: totalF, whatsapp_rest: restActivo.TELEFONO })});
            alert("¡PEDIDO COMPLETADO!\nGracias por usar Aguadulce Express.");
            location.reload();
        }

        function renderCats(datos, esM) {
            const nav = document.getElementById('cat-nav'); nav.innerHTML = "";
            const cats = [...new Set(datos.map(i => i.CATEGORIA))].filter(Boolean);
            nav.innerHTML += createBubble("TODOS", esM ? "Carta" : "Todos", true, esM);
            cats.forEach(c => nav.innerHTML += createBubble(c, c, false, esM));
        }

        function createBubble(id, name, active, esM) {
            const icon = dataCache.iconos.find(i => i.CATEGORIA.toUpperCase() === id.toUpperCase());
            const imgDefault = "https://cdn-icons-png.flaticon.com/512/706/706164.png";
            const imgUrl = (icon && icon.FOTO) ? icon.FOTO : imgDefault;
            return `<div onclick="${esM?'filtrarMenu':'filtrarRest'}('${id}', this)" class="cat-bubble ${active?'active':''}">
                <div class="cat-img-wrapper"><img src="${imgUrl}" onerror="this.src='${imgDefault}'"></div>
                <span>${name}</span></div>`;
        }

        function filtrarRest(c, el) { document.querySelectorAll('.cat-bubble').forEach(b => b.classList.remove('active')); el.classList.add('active'); renderHome(c); }
        function filtrarMenu(c, el) { 
            document.querySelectorAll('.cat-bubble').forEach(b => b.classList.remove('active')); el.classList.add('active'); 
            const platos = dataCache.menus.filter(m => String(m.ID_RESTAURANTE) === String(restActivo.ID_RESTAURANTE));
            const filt = c === 'TODOS' ? platos : platos.filter(p => p.CATEGORIA === c);
            const content = document.getElementById('app-content'); content.innerHTML = "";
            filt.forEach(p => {
                content.innerHTML += `<div onclick='abrirDetalle(${JSON.stringify(p)})' class="bg-white/5 p-4 rounded-[1.8rem] flex items-center gap-5 border border-white/5 active:bg-white/10 transition-colors shadow-lg"><img src="${p.FOTO}" class="w-20 h-20 rounded-2xl object-cover border border-white/5 shadow-xl"><div class="flex-1"><p class="text-[11px] font-black text-white uppercase leading-tight">${p.PLATO}</p><p class="text-cyan-400 font-mono font-bold text-base mt-1.5">${Number(p.PRECIO).toFixed(2)}€</p></div></div>`;
            });
        }

        function irAHome() { renderHome(); }
        function cerrarDetalle() { document.getElementById('modal-detalle').classList.add('hidden'); document.body.style.overflow = "auto"; }
        function cerrarCheckout() { document.getElementById('modal-checkout').classList.add('hidden'); document.body.style.overflow = "auto"; }

        init();
    </script>
</body>
</html>
