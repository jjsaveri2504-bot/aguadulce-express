<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: ui-sans-serif, system-ui; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        
        /* Burbujas Home */
        .cat-bubble { flex: 0 0 85px; display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; }
        .cat-img-wrapper { 
            width: 70px; height: 70px; border-radius: 50%; background: #fff; border: 2px solid transparent;
            display: flex; items-center; justify-content: center; padding: 12px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .cat-img-wrapper img { width: 100%; height: 100%; object-fit: contain; }
        .cat-bubble.active .cat-img-wrapper { border-color: #06b6d4; transform: scale(1.1); box-shadow: 0 0 20px rgba(6, 182, 212, 0.4); }
        .cat-bubble span { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; }
        .cat-bubble.active span { color: #fff; }

        /* Subcategorías Internas */
        .subcat-pill { padding: 10px 18px; border-radius: 20px; background: rgba(255,255,255,0.05); font-size: 11px; font-weight: 800; text-transform: uppercase; white-space: nowrap; border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; transition: 0.2s; }
        .subcat-pill.active { background: #06b6d4; color: white; border-color: #06b6d4; }

        .extra-btn { transition: 0.2s; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.03); }
        .extra-btn.selected { background: rgba(6, 182, 212, 0.2); border-color: #06b6d4; color: #22d3ee; }
        .extra-btn.disabled { opacity: 0.3; pointer-events: none; }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-up { animation: slideUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
    </style>
</head>
<body class="pb-40">

    <header class="glass sticky top-0 z-50 px-6 py-5 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <button id="btn-back" onclick="irAHome()" class="hidden p-2.5 bg-white/5 rounded-2xl text-white">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            </button>
            <h1 id="header-txt" class="font-black italic text-xl uppercase tracking-tighter text-cyan-400">AGUADULCE <span class="text-white">EXPRESS</span></h1>
        </div>
        <img src="https://i.postimg.cc/C1tDpH9b/LOGO-fondo-blanco.png" class="w-10 h-10 rounded-full">
    </header>

    <div id="cat-nav" class="sticky top-[72px] z-40 bg-[#020617]/95 py-6 overflow-x-auto hide-scroll flex gap-4 px-6 border-b border-white/5"></div>
    <div id="subcat-nav" class="sticky top-[72px] z-40 bg-[#020617]/95 py-4 overflow-x-auto hide-scroll flex gap-3 px-6 border-b border-white/5 hidden"></div>

    <main id="main-container" class="p-4 max-w-xl mx-auto">
        <div id="promo-banner" class="mb-8 rounded-[2.5rem] bg-gradient-to-br from-slate-800 to-slate-950 p-6 border border-white/10">
            <h3 class="text-2xl font-black italic text-white uppercase leading-tight">Sabores de Aguadulce<br>en minutos 🛵</h3>
        </div>
        <div id="app-content" class="grid grid-cols-2 gap-5"></div>
    </main>

    <div id="modal-detalle" class="fixed inset-0 z-[60] bg-slate-950 hidden overflow-y-auto animate-up">
        <div class="max-w-xl mx-auto pb-40">
            <div id="det-img-cont" class="h-[40vh] w-full relative"></div>
            <div class="p-8 -mt-16 relative bg-slate-950 rounded-t-[3.5rem] space-y-6">
                <div class="flex justify-between items-start">
                    <h2 id="det-titulo" class="text-3xl font-black italic uppercase text-white"></h2>
                    <span id="det-precio-base" class="text-cyan-400 text-2xl font-black font-mono"></span>
                </div>
                <div id="section-ingredientes" class="space-y-4 pt-4 border-t border-white/5 hidden">
                    <p id="ing-aviso" class="text-[10px] font-black text-cyan-500 uppercase">Elige tus ingredientes:</p>
                    <div id="ing-grid" class="flex flex-wrap gap-2"></div>
                </div>
                <div id="section-extras" class="space-y-4 pt-4 border-t border-white/5 hidden">
                    <p class="text-[10px] font-black text-gray-500 uppercase">Añadidos especiales:</p>
                    <div id="extras-grid" class="flex flex-wrap gap-2"></div>
                </div>
                <button id="btn-add-det" class="w-full bg-cyan-600 p-6 rounded-[2.5rem] font-black uppercase text-white flex justify-between items-center shadow-2xl">
                    <span>Añadir pedido</span>
                    <span id="det-precio-final" class="bg-black/30 px-5 py-1.5 rounded-2xl font-mono text-lg">0.00€</span>
                </button>
                <button onclick="cerrarDetalle()" class="w-full py-4 text-gray-500 font-bold uppercase text-[10px]">Cerrar</button>
            </div>
        </div>
    </div>

    <div id="basket-bar" class="fixed bottom-8 left-6 right-6 z-40 hidden animate-up">
        <div class="bg-cyan-600 rounded-[3rem] p-3.5 flex items-center justify-between shadow-2xl">
            <button onclick="vaciarCarrito()" class="p-4 bg-black/20 rounded-full">🗑️</button>
            <p id="basket-total" class="text-2xl font-black text-white font-mono">0.00 €</p>
            <button onclick="abrirCheckout()" class="bg-slate-950 text-white px-8 py-4.5 rounded-full text-[11px] font-black uppercase">Pagar</button>
        </div>
    </div>

    <div id="modal-checkout" class="fixed inset-0 z-[70] bg-slate-950 hidden overflow-y-auto p-6 pb-32 animate-up">
        <div class="max-w-md mx-auto space-y-6">
            <h2 class="text-4xl font-black italic text-white pt-8">RESI<br><span class="text-cyan-500">MEN</span></h2>
            <div id="checkout-list" class="space-y-3"></div>
            <div class="space-y-4">
                <input type="text" id="order-name" placeholder="Nombre" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-white outline-none focus:border-cyan-500">
                <input type="text" id="order-phone" placeholder="WhatsApp" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-white outline-none focus:border-cyan-500">
                <input type="text" id="order-addr" placeholder="Dirección" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-white outline-none focus:border-cyan-500">
            </div>
            <button onclick="confirmarPedidoFinal()" class="w-full bg-cyan-600 p-8 rounded-[2.8rem] font-black uppercase text-white shadow-2xl">Confirmar Pedido</button>
            <button onclick="cerrarCheckout()" class="w-full py-2 text-gray-500 font-bold uppercase text-[10px]">Volver</button>
        </div>
    </div>

    <script>
        // PEGA AQUÍ TU URL DE GOOGLE SCRIPT
        const API_URL = "https://script.google.com/macros/s/AKfycbyLcC2mGNa5iz3mPNJ1rG7kEsim7S2_ti2bV-bWpOy8mRtZsL2YYdjTwzeOiO-oxEyy/exec";

        let dataCache = null, carrito = [], restActivo = null, platoActual = null, extrasSeleccionados = [], maxIng = 99;

        const catImages = {
            "TODOS": "https://cdn-icons-png.flaticon.com/512/741/741548.png",
            "HAMBURGUESA": "https://cdn-icons-png.flaticon.com/512/1046/1046784.png",
            "PIZZA": "https://cdn-icons-png.flaticon.com/512/3595/3595455.png",
            "POLLO": "https://cdn-icons-png.flaticon.com/512/1046/1046786.png",
            "SUSHI": "https://cdn-icons-png.flaticon.com/512/2252/2252431.png"
        };

        async function init() {
            try {
                const res = await fetch(API_URL);
                dataCache = await res.json();
                renderHome(); renderCategorias();
                ['name', 'phone', 'addr'].forEach(k => document.getElementById('order-'+k).value = localStorage.getItem('ae_'+k) || '');
            } catch (e) { alert("Error de conexión"); }
        }

        function renderCategorias() {
            const cats = [...new Set(dataCache.restaurantes.map(r => r.CATEGORIA))].filter(Boolean);
            const nav = document.getElementById('cat-nav');
            nav.innerHTML = createCatBubble("TODOS", "Todos");
            cats.forEach(c => nav.innerHTML += createCatBubble(c, c));
        }

        function createCatBubble(id, name) {
            const img = catImages[id.toUpperCase()] || "https://cdn-icons-png.flaticon.com/512/706/706164.png";
            return `<div onclick="filtrarRest('${id}', this)" class="cat-bubble ${id==='TODOS'?'active':''}">
                <div class="cat-img-wrapper"><img src="${img}"></div><span>${name}</span></div>`;
        }

        function renderHome(f = null) {
            document.getElementById('cat-nav').classList.remove('hidden');
            document.getElementById('subcat-nav').classList.add('hidden');
            document.getElementById('btn-back').classList.add('hidden');
            document.getElementById('promo-banner').classList.remove('hidden');
            document.getElementById('header-txt').innerHTML = 'AGUADULCE <span class="text-white">EXPRESS</span>';
            const content = document.getElementById('app-content');
            content.className = "grid grid-cols-2 gap-5"; content.innerHTML = "";
            const filt = (f && f !== 'TODOS') ? dataCache.restaurantes.filter(r => r.CATEGORIA === f) : dataCache.restaurantes;
            filt.forEach(r => {
                content.innerHTML += `<div onclick="verMenu('${r.ID_RESTAURANTE}')" class="bg-white/5 rounded-[2.5rem] overflow-hidden border border-white/5 active:scale-95 transition">
                    <img src="${r.FOTO}" class="w-full h-36 object-cover"><div class="p-5 text-center font-black uppercase italic text-xs text-white">${r.NOMBRE}</div></div>`;
            });
            window.scrollTo(0,0);
        }

        function verMenu(id, subF = null) {
            restActivo = dataCache.restaurantes.find(r => String(r.ID_RESTAURANTE) === String(id));
            const platos = dataCache.menus.filter(m => String(m.ID_RESTAURANTE) === String(id));
            document.getElementById('cat-nav').classList.add('hidden');
            document.getElementById('promo-banner').classList.add('hidden');
            document.getElementById('btn-back').classList.remove('hidden');
            document.getElementById('header-txt').innerText = restActivo.NOMBRE;

            const subNav = document.getElementById('subcat-nav');
            const subCats = [...new Set(platos.map(p => p.CATEGORIA))].filter(Boolean);
            if(subCats.length > 0) {
                subNav.classList.remove('hidden');
                subNav.innerHTML = `<button onclick="verMenu('${id}')" class="subcat-pill ${!subF?'active':''}">Todo</button>`;
                subCats.forEach(sc => subNav.innerHTML += `<button onclick="verMenu('${id}', '${sc}')" class="subcat-pill ${subF===sc?'active':''}">${sc}</button>`);
            } else { subNav.classList.add('hidden'); }

            const content = document.getElementById('app-content');
            content.className = "grid grid-cols-1 gap-4"; content.innerHTML = "";
            const filt = subF ? platos.filter(p => p.CATEGORIA === subF) : platos;
            filt.forEach(p => {
                content.innerHTML += `<div onclick='abrirDetalle(${JSON.stringify(p)})' class="bg-white/5 p-4 rounded-[2.5rem] flex items-center gap-5 border border-white/5 active:scale-95 transition">
                    <img src="${p.FOTO}" class="w-24 h-24 rounded-[2rem] object-cover shadow-lg">
                    <div class="flex-1 font-black uppercase"><p class="text-sm text-white">${p.PLATO}</p><p class="text-cyan-400 text-lg font-mono">${parseFloat(p.PRECIO).toFixed(2)}€</p></div></div>`;
            });
            window.scrollTo(0,0);
        }

        function abrirDetalle(p) {
            platoActual = p; extrasSeleccionados = [];
            // Lógica invisible de ingredientes: Detectar número en el nombre
            const match = p.PLATO.match(/(\d+)\s*ing/i);
            maxIng = match ? parseInt(match[1]) : 99;
            
            document.getElementById('det-titulo').innerText = p.PLATO;
            document.getElementById('det-precio-base').innerText = parseFloat(p.PRECIO).toFixed(2) + "€";
            document.getElementById('det-img-cont').innerHTML = `<img src="${p.FOTO}" class="w-full h-full object-cover">`;
            document.getElementById('det-desc').innerText = p.DESCRIPCION || "";
            document.getElementById('ing-aviso').innerText = maxIng < 99 ? `Elige máximo ${maxIng} ingredientes:` : "Añade a tu gusto:";

            const ingGrid = document.getElementById('ing-grid');
            const extGrid = document.getElementById('extras-grid');
            ingGrid.innerHTML = ""; extGrid.innerHTML = "";
            document.getElementById('section-ingredientes').classList.add('hidden');
            document.getElementById('section-extras').classList.add('hidden');

            if(p.EXTRAS) {
                p.EXTRAS.split(',').forEach(ex => {
                    const [n, pr] = ex.split(':');
                    const cost = parseFloat(pr || 0);
                    const btn = document.createElement('button');
                    btn.className = "extra-btn px-5 py-3 rounded-2xl text-[10px] font-black uppercase";
                    btn.innerText = `${n.trim()} ${cost > 0 ? '('+cost.toFixed(2)+'€)' : ''}`;
                    
                    btn.onclick = () => {
                        const idx = extrasSeleccionados.findIndex(e => e.n === n.trim());
                        if(idx > -1) {
                            extrasSeleccionados.splice(idx,1);
                            btn.classList.remove('selected');
                        } else {
                            if(cost === 0 && extrasSeleccionados.filter(e => e.p === 0).length >= maxIng) return;
                            extrasSeleccionados.push({n: n.trim(), p: cost});
                            btn.classList.add('selected');
                        }
                        actualizarUIExtras();
                    };

                    if(cost === 0) {
                        ingGrid.appendChild(btn);
                        document.getElementById('section-ingredientes').classList.remove('hidden');
                    } else {
                        extGrid.appendChild(btn);
                        document.getElementById('section-extras').classList.remove('hidden');
                    }
                });
            }
            actualizarUIExtras();
            document.getElementById('modal-detalle').classList.remove('hidden');
        }

        function actualizarUIExtras() {
            const ingCount = extrasSeleccionados.filter(e => e.p === 0).length;
            document.querySelectorAll('#ing-grid .extra-btn').forEach(btn => {
                const isSel = btn.classList.contains('selected');
                btn.classList.toggle('disabled', !isSel && ingCount >= maxIng);
            });
            const total = parseFloat(platoActual.PRECIO) + extrasSeleccionados.reduce((s, e) => s + e.p, 0);
            document.getElementById('det-precio-final').innerText = total.toFixed(2) + "€";
        }

        function addAlCarrito() {
            const exTxt = extrasSeleccionados.map(e => e.n).join(', ');
            const total = parseFloat(platoActual.PRECIO) + extrasSeleccionados.reduce((s, e) => s + e.p, 0);
            carrito.push({ n: exTxt ? `${platoActual.PLATO} (${exTxt})` : platoActual.PLATO, p: total });
            cerrarDetalle(); actualizarBarra();
        }

        async function confirmarPedidoFinal() {
            const n = document.getElementById('order-name').value;
            const ph = document.getElementById('order-phone').value;
            const ad = document.getElementById('order-addr').value;
            if(!n || !ph || !ad) return alert("Faltan datos");
            const total = carrito.reduce((s, i) => s + i.p, 0).toFixed(2);
            const detalle = carrito.map(i => i.n).join(', ');
            
            fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ restaurante: restActivo.NOMBRE, nombre: n, direccion: ad, telefono: ph, pedido: detalle, total: total }) });
            
            ['name', 'phone', 'addr'].forEach(k => localStorage.setItem('ae_'+k, document.getElementById('order-'+k).value));
            let tel = restActivo.TELEFONO ? restActivo.TELEFONO.toString().replace(/\s/g, '') : "34600000000";
            if(!tel.startsWith('34')) tel = '34' + tel;
            let msg = `*🛍️ PEDIDO AGUADULCE EXPRESS*\n*🏪 Local:* ${restActivo.NOMBRE}\n\n`;
            carrito.forEach(i => msg += `• *${i.n}* - ${i.p.toFixed(2)}€\n`);
            msg += `\n*💰 TOTAL:* ${total}€\n*👤 CLIENTE:* ${n}\n*📍 DIR:* ${ad}`;
            window.open(`https://wa.me/${tel}?text=${encodeURIComponent(msg)}`);
        }

        function filtrarRest(c, el) { document.querySelectorAll('.cat-bubble').forEach(b => b.classList.remove('active')); el.classList.add('active'); renderHome(c); }
        function irAHome() { renderHome(); }
        function cerrarDetalle() { document.getElementById('modal-detalle').classList.add('hidden'); }
        function cerrarCheckout() { document.getElementById('modal-checkout').classList.add('hidden'); }
        function abrirCheckout() {
            const l = document.getElementById('checkout-list'); l.innerHTML = "";
            carrito.forEach(i => l.innerHTML += `<div class="flex justify-between bg-white/5 p-4 rounded-xl border border-white/5 text-xs text-white"><span>${i.n}</span><span class="font-bold text-cyan-400">${i.p.toFixed(2)}€</span></div>`);
            document.getElementById('modal-checkout').classList.remove('hidden');
        }
        function vaciarCarrito() { carrito = []; actualizarBarra(); }
        function actualizarBarra() {
            const t = carrito.reduce((s, i) => s + i.p, 0);
            document.getElementById('basket-total').innerText = t.toFixed(2) + " €";
            document.getElementById('basket-bar').classList.toggle('hidden', carrito.length === 0);
        }
        document.getElementById('btn-add-det').onclick = addAlCarrito;
        init();
    </script>
</body>
</html>
