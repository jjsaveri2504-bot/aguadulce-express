<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; background-color: #F8FAFC; color: #1E293B; overflow-x: hidden; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .carrusel-row { display: flex; overflow-x: auto; gap: 14px; padding: 10px 0 20px 0; }
        .card-rest { flex: 0 0 160px; border-radius: 25px; overflow: hidden; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s; }
        .card-rest:active { transform: scale(0.95); }
        .img-wrapper { width: 100%; height: 140px; }
        .img-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .cat-line { height: 1px; flex: 1; background: linear-gradient(to right, #00BCD4, transparent); }
        .plato-card { background: white; border-radius: 25px; border: 1px solid rgba(0,0,0,0.04); }
    </style>
</head>
<body class="pb-32">

    <header class="bg-white sticky top-0 z-50 p-5 border-b-2 border-cyan-500 flex items-center gap-4">
        <button id="btn-back" onclick="location.reload()" class="hidden w-10 h-10 bg-gray-50 rounded-xl flex items-center justify-center">←</button>
        <h1 id="header-titulo" class="font-black italic uppercase text-lg">AGUADULCE <span class="text-cyan-500">EXPRESS</span></h1>
    </header>

    <main id="main-container" class="p-6 max-w-lg mx-auto space-y-8">
        <div id="loader" class="flex flex-col items-center py-20 text-gray-400">
            <div class="w-10 h-10 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin"></div>
            <p class="mt-4 text-[10px] font-black uppercase italic">Sincronizando...</p>
        </div>
    </main>

    <div id="basket-bar" onclick="finalizarPedido()" class="fixed bottom-6 left-6 right-6 h-16 bg-cyan-500 rounded-2xl hidden flex items-center justify-between px-6 text-white shadow-2xl z-50 font-bold active:scale-95 transition cursor-pointer">
        <span class="text-xs uppercase">VER PEDIDO</span>
        <span id="basket-total"></span>
    </div>

    <script>
        // REEMPLAZA ESTA URL CON TU NUEVA IMPLEMENTACIÓN (URL de Apps Script)
        const API_URL = "https://script.google.com/macros/s/AKfycbzdfhedROcY8W6fXx_GHTgl8GmjrY8kXOhWQHt3XHtFXlU5weUAJlv3z9zMdgRSdpgT/exec"; 
        
        let dataCache = null;
        let carrito = [];
        let restauranteActual = null;

        async function iniciar() {
            const cache = localStorage.getItem('ae_cache_v11');
            if(cache) {
                dataCache = JSON.parse(cache);
                renderLayout();
            }
            try {
                const res = await fetch(`${API_URL}?v=${Date.now()}`);
                const data = await res.json();
                if (data && data.restaurantes) {
                    dataCache = data;
                    localStorage.setItem('ae_cache_v11', JSON.stringify(data));
                    renderLayout();
                }
            } catch (e) { console.error("Error conexión:", e); }
        }

        function renderLayout() {
            if (!dataCache || !dataCache.restaurantes) return;
            const container = document.getElementById('main-container');
            container.innerHTML = "";
            const cats = [...new Set(dataCache.restaurantes.map(r => r.CATEGORIA))].filter(c => c);

            cats.forEach(c => {
                const fila = dataCache.restaurantes.filter(r => r.CATEGORIA === c);
                let html = `<div><div class="flex items-center gap-4 mb-4">
                            <h2 class="text-[10px] font-black text-gray-400 uppercase italic flex-none">${c}</h2>
                            <div class="cat-line"></div></div>
                            <div class="carrusel-row hide-scroll">`;
                fila.forEach(r => {
                    html += `
                        <div onclick="verMenu('${r.ID_RESTAURANTE}')" class="card-rest">
                            <div class="img-wrapper"><img src="${r.FOTO}" onerror="this.src='https://via.placeholder.com/300'"></div>
                            <p class="p-3 text-[10px] font-black text-center uppercase italic leading-tight">${r.NOMBRE_RESTAURANTE}</p>
                        </div>`;
                });
                container.innerHTML += html + `</div></div>`;
            });
        }

        function verMenu(id) {
            restauranteActual = dataCache.restaurantes.find(r => String(r.ID_RESTAURANTE) === String(id));
            const platos = dataCache.menus.filter(p => String(p.ID_RESTAURANTE) === String(id));
            document.getElementById('header-titulo').innerText = restauranteActual.NOMBRE_RESTAURANTE;
            document.getElementById('btn-back').classList.remove('hidden');
            
            let html = `<div class="grid gap-4">`;
            platos.forEach(p => {
                html += `
                    <div onclick="add('${p.PLATO}', ${p.PRECIO})" class="plato-card p-4 flex gap-4 items-center active:scale-95 transition cursor-pointer">
                        <img src="${p.FOTO_PLATO}" class="w-20 h-20 rounded-2xl object-cover shadow-sm">
                        <div class="flex-1"><p class="font-black text-xs uppercase italic">${p.PLATO}</p><p class="text-cyan-500 font-bold">${parseFloat(p.PRECIO).toFixed(2)} €</p></div>
                        <div class="text-cyan-500 font-bold text-xl">+</div>
                    </div>`;
            });
            document.getElementById('main-container').innerHTML = html + `</div>`;
            window.scrollTo(0,0);
        }

        function add(n, p) {
            carrito.push({n, p: parseFloat(p)});
            const total = carrito.reduce((s, i) => s + i.p, 0) + 3.50;
            document.getElementById('basket-total').innerText = total.toFixed(2) + " €";
            document.getElementById('basket-bar').classList.remove('hidden');
        }

        function finalizarPedido() {
            const nom = prompt("Tu Nombre:");
            const dir = prompt("Dirección de entrega:");
            if (!nom || !dir) return;
            const total = (carrito.reduce((s, i) => s + i.p, 0) + 3.50).toFixed(2);
            const prods = carrito.map(i => i.n).join(", ");
            const msg = `*NUEVO PEDIDO*\n*Cliente:* ${nom}\n*Dirección:* ${dir}\n*Productos:* ${prods}\n*Total:* ${total} €`;
            window.location.href = `https://wa.me/${restauranteActual.TELEFONO}?text=${encodeURIComponent(msg)}`;
        }

        iniciar();
    </script>
</body>
</html>
