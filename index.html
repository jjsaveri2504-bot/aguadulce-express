<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; background-color: #F8FAFC; color: #1E293B; margin: 0; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .card-rest { flex: 0 0 160px; border-radius: 25px; overflow: hidden; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .plato-card { background: white; border-radius: 25px; border: 1px solid rgba(0,0,0,0.04); }
    </style>
</head>
<body class="pb-32">

    <header class="bg-white sticky top-0 z-50 p-5 border-b-2 border-cyan-500 flex items-center gap-4">
        <button id="btn-back" onclick="location.reload()" class="hidden w-10 h-10 bg-gray-50 rounded-xl flex items-center justify-center">←</button>
        <h1 id="header-titulo" class="font-black italic uppercase text-lg">AGUADULCE <span class="text-cyan-500">EXPRESS</span></h1>
    </header>

    <main id="main-container" class="p-6 max-w-lg mx-auto">
        <div id="loader" class="flex flex-col items-center py-20 text-gray-400">
            <div class="w-10 h-10 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin"></div>
            <p class="mt-4 text-[10px] font-black uppercase italic">Sincronizando...</p>
        </div>
    </main>

    <div id="basket-bar" onclick="abrirFormulario()" class="fixed bottom-6 left-6 right-6 h-16 bg-cyan-500 rounded-2xl hidden flex items-center justify-between px-6 text-white shadow-2xl z-50 active:scale-95 transition cursor-pointer font-bold">
        <span>PEDIR AHORA</span>
        <span id="basket-total"></span>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbx1H3ZwRycKEok84xOrGSuayz9Bgu5bORLjoxYuLoNULGUbR0RbdWa2_SAKPgkH0bC8/exec";
        let BD = null;
        let carrito = [];
        let restActual = null;

        // Función para recibir datos JSONP (Salta el bloqueo de comunicación)
        function respuestaServidor(datos) {
            BD = datos;
            renderHome();
        }

        async function cargarTienda() {
            const script = document.createElement('script');
            script.src = API_URL + "?callback=respuestaServidor";
            document.body.appendChild(script);
        }

        function renderHome() {
            const container = document.getElementById('main-container');
            container.innerHTML = "";
            const cats = [...new Set(BD.restaurantes.map(r => r.CATEGORIA))];
            
            cats.forEach(c => {
                const rests = BD.restaurantes.filter(r => r.CATEGORIA === c);
                let html = `<p class="text-[10px] font-bold text-gray-400 uppercase mb-3 ml-2 italic">${c}</p>
                            <div class="flex overflow-x-auto gap-4 hide-scroll mb-8">`;
                rests.forEach(r => {
                    html += `
                        <div onclick="verMenu('${r.ID_RESTAURANTE}')" class="card-rest active:scale-95 transition cursor-pointer">
                            <img src="${r.FOTO}" class="w-full h-28 object-cover">
                            <p class="p-3 text-[10px] font-black text-center uppercase italic">${r.NOMBRE_RESTAURANTE}</p>
                        </div>`;
                });
                container.innerHTML += html + `</div>`;
            });
        }

        function verMenu(id) {
            restActual = BD.restaurantes.find(r => String(r.ID_RESTAURANTE) === String(id));
            const platos = BD.menus.filter(p => String(p.ID_RESTAURANTE) === String(id));
            document.getElementById('header-titulo').innerText = restActual.NOMBRE_RESTAURANTE;
            document.getElementById('btn-back').classList.remove('hidden');
            
            let html = `<div class="grid gap-4">`;
            platos.forEach(p => {
                html += `
                    <div onclick="add('${p.PLATO}', ${p.PRECIO})" class="plato-card p-4 flex gap-4 items-center active:scale-95 transition cursor-pointer">
                        <img src="${p.FOTO_PLATO}" class="w-16 h-16 rounded-2xl object-cover">
                        <div class="flex-1"><p class="font-bold text-xs uppercase italic">${p.PLATO}</p><p class="text-cyan-500 font-bold">${parseFloat(p.PRECIO).toFixed(2)} €</p></div>
                        <div class="text-cyan-500 font-bold text-xl">+</div>
                    </div>`;
            });
            document.getElementById('main-container').innerHTML = html + `</div>`;
        }

        function add(n, p) {
            carrito.push({n, p});
            const total = carrito.reduce((s, i) => s + i.p, 0) + 3.50;
            document.getElementById('basket-total').innerText = total.toFixed(2) + " €";
            document.getElementById('basket-bar').classList.remove('hidden');
        }

        function abrirFormulario() {
            const nom = prompt("Tu Nombre:");
            const dir = prompt("Dirección de entrega:");
            if (!nom || !dir) return alert("Datos necesarios para el envío.");

            const total = (carrito.reduce((s, i) => s + i.p, 0) + 3.50).toFixed(2);
            const prods = carrito.map(i => i.n).join(", ");

            // ENVIAR AL EXCEL (Cindy)
            // Usamos un Beacon o Image para asegurar que salga antes de cerrar
            const logUrl = `${API_URL}?cliente=${encodeURIComponent(nom)}&whatsapp=Movil&direccion=${encodeURIComponent(dir)}&productos=${encodeURIComponent(prods)}&total=${total}&restaurante=${restActual.ID_RESTAURANTE}`;
            
            const img = new Image();
            img.src = logUrl; 

            // ENVIAR A WHATSAPP
            const msg = `*NUEVO PEDIDO AGUADULCE EXPRESS*\n\n*Cliente:* ${nom}\n*Dirección:* ${dir}\n*Productos:* ${prods}\n\n*Total:* ${total} €`;
            
            setTimeout(() => {
                window.location.href = `https://wa.me/${restActual.TELEFONO}?text=${encodeURIComponent(msg)}`;
            }, 500);
        }

        cargarTienda();
    </script>
</body>
</html>
