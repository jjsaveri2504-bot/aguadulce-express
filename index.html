<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aguadulce Express | Demo Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
        .rest-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .rest-card:hover { transform: scale(1.02); }
        .glass-header { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); border-bottom: 1px solid #e2e8f0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .modal-blur { backdrop-filter: blur(10px); background: rgba(0,0,0,0.6); }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-pop { animation: slideUp 0.4s ease forwards; }
        .category-pill.active { background: #ef4444; color: white; border-color: #ef4444; box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3); }
    </style>
</head>
<body class="pb-32">

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzED0RJ90vtBNDXT15TRT6iDqpX7REjN5XiQ2IL8yDElatGRwELgZDwq6HbSDpNoAZuFQ/exec";
    </script>

    <header class="glass-header sticky top-0 z-50 px-6 py-5 flex items-center justify-between">
        <button id="btn-back" onclick="mostrarSelectorRestaurantes()" class="hidden w-10 h-10 flex items-center justify-center rounded-2xl bg-gray-50 text-gray-800 shadow-sm border border-gray-100">
            <i class="fas fa-arrow-left"></i>
        </button>
        <div class="flex-1 text-center">
            <h1 id="header-titulo" class="text-xl font-800 tracking-tighter text-gray-900 uppercase italic">Aguadulce <span class="text-red-500">Express</span></h1>
        </div>
        <div class="w-10 flex justify-end">
            <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
        </div>
    </header>

    <div id="categorias-container" class="flex overflow-x-auto px-6 py-4 gap-3 sticky top-[76px] z-40 no-scrollbar hidden bg-slate-50/80"></div>

    <main id="main-container" class="p-6 grid grid-cols-1 gap-6 max-w-2xl mx-auto">
        <div class="flex flex-col items-center justify-center py-24 text-gray-400">
            <div class="w-10 h-10 border-4 border-red-500 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p class="font-bold text-[10px] tracking-[0.2em] uppercase">Sincronizando Base de Datos</p>
        </div>
    </main>

    <div id="modal-upsell" class="fixed inset-0 z-[100] hidden flex items-end sm:items-center justify-center p-4 modal-blur">
        <div class="bg-white w-full max-w-md rounded-[40px] overflow-hidden animate-pop shadow-2xl">
            <div class="p-8">
                <div class="flex justify-center mb-4">
                    <span class="bg-red-100 text-red-600 text-[10px] font-900 px-3 py-1 rounded-full uppercase tracking-widest">¿Tienes sed?</span>
                </div>
                <h3 class="text-2xl font-800 text-gray-900 text-center leading-tight">Completa tu combo</h3>
                <p class="text-gray-400 text-center text-sm mt-1 font-medium italic">Sugerencia recomendada por el Chef</p>
                
                <div id="sugerencia-item" class="mt-8 bg-gray-50 rounded-[30px] p-5 flex items-center gap-5 border border-gray-100">
                    </div>

                <div class="grid grid-cols-1 gap-3 mt-8">
                    <button id="btn-add-upsell" class="bg-gray-900 text-white py-5 rounded-[22px] font-800 text-sm uppercase tracking-widest shadow-xl active:scale-95 transition-all">¡Agregar a mi orden!</button>
                    <button onclick="cerrarUpsell()" class="py-3 text-gray-400 font-bold text-[10px] uppercase tracking-[0.2em] hover:text-gray-600 transition-colors">Ahora no, gracias</button>
                </div>
            </div>
        </div>
    </div>

    <div id="cart-bar" class="fixed bottom-8 left-6 right-6 bg-gray-900 text-white p-5 rounded-[30px] flex justify-between items-center shadow-2xl hidden z-50 animate-pop">
        <div class="flex items-center gap-4 border-r border-gray-700 pr-4">
            <p class="font-800 text-2xl leading-none tracking-tighter">$<span id="cart-total">0</span></p>
        </div>
        <button onclick="enviarPedidoProfesional()" class="bg-red-500 text-white px-8 py-3 rounded-2xl font-800 text-xs uppercase tracking-widest active:scale-95 transition-transform">
            Confirmar Pedido <i class="fab fa-whatsapp ml-2"></i>
        </button>
    </div>

    <script>
        let todosLosRestaurantes = [];
        let todoElMenu = [];
        let restauranteSeleccionado = null;
        let carrito = [];

        async function cargarDatos() {
            try {
                const [resRest, resMenu] = await Promise.all([
                    fetch(`${API_URL}?sheet=RESTAURANTES`),
                    fetch(`${API_URL}?sheet=MENU_GENERAL`)
                ]);
                todosLosRestaurantes = await resRest.json();
                todoElMenu = await resMenu.json();
                mostrarSelectorRestaurantes();
            } catch (error) {
                document.getElementById('main-container').innerHTML = `<p class="text-center font-bold text-red-500">Error de conexión. Verifica tu URL de Apps Script.</p>`;
            }
        }

        function mostrarSelectorRestaurantes() {
            restauranteSeleccionado = null; carrito = []; actualizarBarraCarrito();
            document.getElementById('btn-back').classList.add('hidden');
            document.getElementById('header-titulo').innerHTML = 'AGUADULCE <span class="text-red-500">EXPRESS</span>';
            document.getElementById('categorias-container').classList.add('hidden');
            
            const container = document.getElementById('main-container');
            container.innerHTML = `<h2 class="text-3xl font-800 text-gray-900 tracking-tighter mb-2 italic">DESCUBRE<br>NUEVOS SABORES</h2>` + 
            todosLosRestaurantes.map(r => {
                const abierto = r.ESTADO === "ACTIVO" || r.ESTADO === "SI";
                return `
                <div onclick="${abierto ? `abrirRestaurante('${r.ID}')` : ''}" 
                     class="rest-card relative bg-white rounded-[40px] shadow-2xl shadow-slate-200/60 overflow-hidden mb-2 ${!abierto ? 'grayscale opacity-50' : 'cursor-pointer active:scale-95 transition-all'}">
                    <div class="h-64 relative">
                        <img src="${r.FOTO}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-gradient-to-t from-black via-black/20 to-transparent"></div>
                        <div class="absolute bottom-8 left-8">
                            <h3 class="text-3xl font-800 text-white uppercase italic tracking-tighter leading-none">${r.NOMBRE}</h3>
                            <div class="flex gap-2 mt-3">
                                <span class="bg-white/20 backdrop-blur-md text-white text-[9px] font-bold px-3 py-1 rounded-full uppercase tracking-widest border border-white/20">${r.DIRECCION || 'Premium'}</span>
                                <span class="bg-red-500 text-white text-[9px] font-bold px-3 py-1 rounded-full uppercase tracking-widest shadow-lg">★ 4.9</span>
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function abrirRestaurante(id) {
            restauranteSeleccionado = todosLosRestaurantes.find(r => r.ID == id);
            const platos = todoElMenu.filter(p => p.ID_RESTAURANTE == id);
            document.getElementById('header-titulo').innerText = restauranteSeleccionado.NOMBRE;
            document.getElementById('btn-back').classList.remove('hidden');
            renderizarCategorias(platos);
            renderizarProductos(platos, 'Todos');
        }

        function renderizarCategorias(platos) {
            const container = document.getElementById('categorias-container');
            container.classList.remove('hidden');
            const cats = ["Todos", ...new Set(platos.map(p => p.Categoria))].filter(c => c);
            container.innerHTML = cats.map(c => `
                <button onclick="filtrarProductos('${c}')" class="category-pill px-6 py-2.5 rounded-2xl bg-white border border-gray-200 text-[10px] font-900 uppercase tracking-widest shadow-sm">
                    ${c}
                </button>
            `).join('');
        }

        function filtrarProductos(cat) {
            const platos = todoElMenu.filter(p => p.ID_RESTAURANTE == restauranteSeleccionado.ID);
            renderizarProductos(platos, cat);
        }

        function renderizarProductos(platos, cat) {
            document.querySelectorAll('.category-pill').forEach(b => b.classList.toggle('active', b.innerText === cat));
            const container = document.getElementById('main-container');
            const filtrados = cat === 'Todos' ? platos : platos.filter(p => p.Categoria === cat);
            
            container.innerHTML = filtrados.map(p => `
                <div class="bg-white rounded-[32px] p-4 flex gap-5 border border-white shadow-xl shadow-slate-100 items-center">
                    <img src="${p.Foto}" class="w-24 h-24 rounded-[22px] object-cover shadow-inner border border-gray-50">
                    <div class="flex-1 flex flex-col justify-between h-24 py-1">
                        <div>
                            <h3 class="font-800 text-gray-900 text-xs uppercase tracking-tight leading-tight">${p.Nombre}</h3>
                            <p class="text-[9px] text-gray-400 mt-1 line-clamp-2 font-medium italic">${p.Descripcion || 'Ingredientes seleccionados.'}</p>
                        </div>
                        <div class="flex justify-between items-end">
                            <span class="font-800 text-red-600 text-2xl tracking-tighter leading-none italic">$${p.Precio}</span>
                            <button onclick="agregarSmart('${p.Nombre}', ${p.Precio}, '${p.Categoria}')" class="bg-gray-900 text-white w-10 h-10 rounded-2xl flex items-center justify-center shadow-xl active:scale-90 transition-all">
                                <i class="fas fa-plus text-xs"></i>
                            </button>
                        </div>
                    </div>
                </div>`).join('');
        }

        // LÓGICA DE VENTA CRUZADA MEJORADA
        function agregarSmart(nombre, precio, categoria) {
            carrito.push({nombre, precio});
            actualizarBarraCarrito();

            // Solo sugerir si lo agregado es plato principal
            const esPrincipal = !["BEBIDAS", "POSTRES", "ADICIONALES"].includes(categoria.toUpperCase());
            
            if(esPrincipal) {
                const extras = todoElMenu.filter(p => 
                    p.ID_RESTAURANTE == restauranteSeleccionado.ID && 
                    ["BEBIDAS", "POSTRES", "ADICIONALES"].includes(p.Categoria.toUpperCase())
                );

                if(extras.length > 0) {
                    const item = extras[Math.floor(Math.random() * extras.length)];
                    mostrarUpsell(item);
                }
            }
        }

        function mostrarUpsell(item) {
            const container = document.getElementById('sugerencia-item');
            container.innerHTML = `
                <img src="${item.Foto}" class="w-20 h-20 rounded-2xl object-cover shadow-lg border-2 border-white">
                <div class="text-left flex-1">
                    <h4 class="font-800 text-gray-900 text-xs uppercase leading-tight">${item.Nombre}</h4>
                    <p class="text-red-500 font-900 text-lg italic">$${item.Precio}</p>
                    <span class="bg-gray-200 text-gray-600 text-[8px] font-black px-2 py-0.5 rounded-full uppercase">Complemento ideal</span>
                </div>
            `;
            document.getElementById('btn-add-upsell').onclick = () => {
                carrito.push({nombre: item.Nombre, precio: item.Precio});
                actualizarBarraCarrito();
                cerrarUpsell();
            };
            document.getElementById('modal-upsell').classList.remove('hidden');
        }

        function cerrarUpsell() { document.getElementById('modal-upsell').classList.add('hidden'); }

        function actualizarBarraCarrito() {
            const bar = document.getElementById('cart-bar');
            const total = carrito.reduce((sum, p) => sum + p.precio, 0);
            if(carrito.length > 0) {
                bar.classList.remove('hidden');
                document.getElementById('cart-total').innerText = total.toFixed(2);
            } else { bar.classList.add('hidden'); }
        }

        async function enviarPedidoProfesional() {
            const items = carrito.reduce((acc, p) => { acc[p.nombre] = (acc[p.nombre] || 0) + 1; return acc; }, {});
            let detalles = ""; for (const [nombre, cant] of Object.entries(items)) { detalles += `${cant}x ${nombre}, `; }
            const total = document.getElementById('cart-total').innerText;
            
            // Envío a Excel y WhatsApp
            fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({id_restaurante: restauranteSeleccionado.ID, restaurante_nombre: restauranteSeleccionado.NOMBRE, detalles_pedido: detalles.slice(0, -2), total: total, cliente_nombre: "Pedido Web Smart"}) });
            
            const msj = `*NUEVO PEDIDO SMART - AGUADULCE EXPRESS*\n\n📍 *Restaurante:* ${restauranteSeleccionado.NOMBRE}\n📝 *Pedido:* ${detalles.slice(0, -2)}\n💰 *TOTAL: $${total}*\n\n_¡Gracias por confiar en nosotros!_`;
            window.open(`https://wa.me/${restauranteSeleccionado.TELEFONO}?text=${encodeURIComponent(msj)}`, '_blank');
            carrito = []; mostrarSelectorRestaurantes();
        }

        cargarDatos();
    </script>
</body>
</html>
