<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express - Master Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
        .btn-cyan { background: linear-gradient(135deg, #06b6d4, #0891b2); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .card-menu:active { transform: scale(0.97); background: rgba(6, 182, 212, 0.1); }
        .sugerencia-card { flex: 0 0 140px; background: rgba(255,255,255,0.03); border-radius: 24px; padding: 12px; border: 1px solid rgba(255,255,255,0.05); }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-up { animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="pb-32">

    <header class="glass sticky top-0 z-40 p-5 flex items-center justify-between border-b border-white/5">
        <div class="flex items-center gap-4">
            <button id="btn-back" onclick="irAHome()" class="hidden p-2 rounded-xl bg-white/5 text-white">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            </button>
            <h1 id="header-txt" class="font-black italic text-xl uppercase tracking-tighter text-cyan-400">AGUADULCE <span class="text-white">EXPRESS</span></h1>
        </div>
    </header>

    <main id="main-container" class="p-4 max-w-xl mx-auto">
        <div id="loader" class="py-32 text-center text-gray-500 font-bold uppercase text-[10px] tracking-widest animate-pulse">
            Sincronizando con la central...
        </div>
    </main>

    <div id="modal-detalle" class="fixed inset-0 z-[60] bg-slate-950 hidden overflow-y-auto animate-up">
        <div class="max-w-xl mx-auto relative">
            <button onclick="cerrarDetalle()" class="absolute top-5 left-5 z-10 bg-black/50 p-3 rounded-full backdrop-blur-md">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            </button>
            
            <div id="detalle-content">
                </div>

            <div class="p-6 space-y-6 pb-32">
                <div>
                    <h2 id="det-titulo" class="text-3xl font-black italic uppercase tracking-tighter"></h2>
                    <p id="det-precio" class="text-cyan-400 text-2xl font-black mt-1"></p>
                    <p id="det-desc" class="text-gray-400 text-sm mt-4 leading-relaxed"></p>
                </div>

                <div class="space-y-3">
                    <p class="text-[10px] font-black text-gray-500 uppercase tracking-widest">¿Algún extra o nota?</p>
                    <textarea id="det-nota" placeholder="Ej: Sin cebolla, extra de ketchup..." class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none text-white h-24 focus:border-cyan-500 transition-all"></textarea>
                </div>

                <div id="det-sugerencias-box">
                    </div>

                <button id="btn-add-det" class="w-full btn-cyan p-6 rounded-[2rem] font-black uppercase text-sm shadow-xl flex justify-between items-center text-white">
                    <span>Añadir a la cesta</span>
                    <span id="det-precio-btn"></span>
                </button>
            </div>
        </div>
    </div>

    <div id="basket-bar" class="fixed bottom-6 left-4 right-4 z-40 hidden animate-up">
        <div class="btn-cyan rounded-[2.5rem] p-4 flex items-center justify-between shadow-[0_20px_50px_rgba(6,182,212,0.4)]">
            <button onclick="vaciarCarrito()" class="p-3 bg-black/20 rounded-2xl active:scale-90 transition">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
            </button>
            <div class="flex-1 px-4 flex items-center justify-between cursor-pointer" onclick="abrirCheckout()">
                <div class="flex flex-col">
                    <span id="basket-total" class="text-lg font-black tracking-tighter text-white font-mono">0.00 €</span>
                </div>
                <span class="bg-white text-cyan-600 px-6 py-2.5 rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-lg">Mi Pedido</span>
            </div>
        </div>
    </div>

    <div id="modal-checkout" class="fixed inset-0 z-[70] bg-slate-950 hidden overflow-y-auto p-5 pb-24">
        <div class="max-w-md mx-auto space-y-8">
            <div class="flex justify-between items-center">
                <h2 class="text-3xl font-black italic uppercase tracking-tighter text-white leading-none">CHECK<br><span class="text-cyan-500">OUT</span></h2>
                <button onclick="cerrarCheckout()" class="p-3 bg-white/5 rounded-full text-white">✕</button>
            </div>
            
            <div id="checkout-list" class="space-y-3"></div>

            <div class="space-y-4">
                <p class="text-[10px] font-black text-gray-500 uppercase tracking-widest">Información de Entrega</p>
                <input type="text" id="order-name" placeholder="Tu Nombre" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none text-white focus:border-cyan-500">
                <input type="text" id="order-phone" placeholder="WhatsApp" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none text-white">
                <input type="text" id="order-address" placeholder="Dirección de entrega" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none text-white">
                <textarea id="order-note-final" placeholder="Comentarios generales..." class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none h-20 text-white"></textarea>
            </div>

            <div class="bg-cyan-500/5 p-5 rounded-3xl border border-cyan-500/20">
                <label class="flex items-start gap-4 cursor-pointer">
                    <input type="checkbox" id="order-terms" class="mt-1 w-6 h-6 accent-cyan-500">
                    <span class="text-[9px] text-gray-400 uppercase font-bold leading-relaxed">Acepto el tratamiento de datos para la gestión confidencial de este pedido según los términos de venta.</span>
                </label>
            </div>

            <button onclick="enviarWhatsApp()" class="w-full btn-cyan p-6 rounded-[2rem] font-black uppercase text-sm shadow-xl text-white">Confirmar Pedido</button>
        </div>
    </div>

    <script>
        // --- CONFIG ---
        const API_URL = "https://script.google.com/macros/s/AKfycbxEBihvxk1icSDalXL2WdIroijpP4r7Oa7UC0fAQhGnNZkL3jMMZNEPlXWPaFc3-iFe/exec"; 
        const WHATSAPP_NUM = "34600000000"; 

        let dataCache = JSON.parse(localStorage.getItem('aguadulce_data')) || null;
        let carrito = JSON.parse(localStorage.getItem('aguadulce_carrito')) || [];
        let restActivo = JSON.parse(localStorage.getItem('aguadulce_rest')) || null;

        async function init() {
            if(dataCache) renderHome();
            try {
                const res = await fetch(API_URL);
                dataCache = await res.json();
                localStorage.setItem('aguadulce_data', JSON.stringify(dataCache));
                renderHome();
            } catch (e) { console.log("Modo Offline"); }

            document.getElementById('order-name').value = localStorage.getItem('user_name') || '';
            document.getElementById('order-phone').value = localStorage.getItem('user_phone') || '';
            document.getElementById('order-address').value = localStorage.getItem('user_addr') || '';
        }

        function renderHome() {
            restActivo = null;
            document.getElementById('header-txt').innerHTML = 'AGUADULCE <span class="text-white">EXPRESS</span>';
            document.getElementById('btn-back').classList.add('hidden');
            const container = document.getElementById('main-container');
            container.innerHTML = "";
            const cats = [...new Set(dataCache.restaurantes.map(r => r.CATEGORIA))].filter(Boolean);
            cats.forEach(cat => {
                const rests = dataCache.restaurantes.filter(r => r.CATEGORIA === cat);
                let html = `<h2 class="text-[10px] font-black text-gray-700 uppercase tracking-[0.4em] mt-10 mb-4 pl-2 font-mono">${cat}</h2><div class="grid grid-cols-2 gap-4">`;
                rests.forEach(r => {
                    html += `<div onclick="verMenu('${r.ID_RESTAURANTE}')" class="glass rounded-[2.5rem] overflow-hidden card-menu shadow-lg border border-white/5 active:scale-95 transition">
                        <img src="${r.FOTO}" class="w-full h-32 object-cover">
                        <p class="p-5 text-[11px] font-black uppercase italic text-white/90">${r.NOMBRE}</p>
                    </div>`;
                });
                container.innerHTML += html + "</div>";
            });
            actualizarBarra();
        }

        function verMenu(id) {
            if (carrito.length > 0 && restActivo && restActivo.ID_RESTAURANTE != id) {
                if(!confirm("No puedes mezclar restaurantes. ¿Vaciar cesta?")) return;
                vaciarCarrito();
            }
            restActivo = dataCache.restaurantes.find(r => r.ID_RESTAURANTE == id);
            localStorage.setItem('aguadulce_rest', JSON.stringify(restActivo));
            document.getElementById('header-txt').innerText = restActivo.NOMBRE;
            document.getElementById('btn-back').classList.remove('hidden');
            const container = document.getElementById('main-container');
            container.innerHTML = `<div class="space-y-4 pt-4">`;
            dataCache.menus.filter(m => m.ID_RESTAURANTE == id).forEach(p => {
                container.innerHTML += `<div onclick="abrirDetalle('${p.PLATO}', '${p.PRECIO}', '${p.FOTO}', '${p.DESCRIPCION || ''}', '${p.CATEGORIA}')" class="glass p-4 rounded-[2rem] flex items-center gap-4 card-menu active:scale-95 transition cursor-pointer">
                    <img src="${p.FOTO}" class="w-20 h-20 rounded-2xl object-cover">
                    <div class="flex-1">
                        <p class="font-black text-xs uppercase italic tracking-tighter">${p.PLATO}</p>
                        <p class="text-cyan-400 font-black text-sm mt-1">${parseFloat(p.PRECIO).toFixed(2)}€</p>
                    </div>
                    <div class="text-cyan-400 font-black text-2xl pr-2">+</div>
                </div>`;
            });
        }

        // --- FUNCIONES DEL DETALLE ---
        function abrirDetalle(nom, pre, img, desc, cat) {
            document.getElementById('detalle-content').innerHTML = `<img src="${img}" class="w-full h-80 object-cover rounded-b-[3rem] shadow-2xl">`;
            document.getElementById('det-titulo').innerText = nom;
            document.getElementById('det-precio').innerText = parseFloat(pre).toFixed(2) + " €";
            document.getElementById('det-precio-btn').innerText = parseFloat(pre).toFixed(2) + " €";
            document.getElementById('det-desc').innerText = desc;
            document.getElementById('det-nota').value = "";
            
            document.getElementById('btn-add-det').onclick = () => {
                const nota = document.getElementById('det-nota').value;
                const nombreConNota = nota ? `${nom} (Nota: ${nota})` : nom;
                add(nombreConNota, pre);
                cerrarDetalle();
            };

            renderSugerenciasDetalle(cat, nom);
            document.getElementById('modal-detalle').classList.remove('hidden');
            document.body.style.overflow = "hidden";
        }

        function cerrarDetalle() {
            document.getElementById('modal-detalle').classList.add('hidden');
            document.body.style.overflow = "auto";
        }

        function renderSugerenciasDetalle(catActual, platoEvitar) {
            const sugs = dataCache.menus.filter(m => m.ID_RESTAURANTE == restActivo.ID_RESTAURANTE && m.CATEGORIA != catActual && m.PLATO != platoEvitar).slice(0, 5);
            const box = document.getElementById('det-sugerencias-box');
            if(sugs.length === 0) { box.innerHTML = ""; return; }
            box.innerHTML = `<h3 class="text-[10px] font-black text-cyan-500 uppercase tracking-widest mb-4">Combínalo con...</h3>
                <div class="flex overflow-x-auto gap-3 hide-scroll pb-4">
                ${sugs.map(s => `<div onclick="abrirDetalle('${s.PLATO}', '${s.PRECIO}', '${s.FOTO}', '${s.DESCRIPCION || ''}', '${s.CATEGORIA}')" class="sugerencia-card active:scale-95 transition">
                    <img src="${s.FOTO}" class="w-full h-20 object-cover rounded-xl mb-3">
                    <p class="text-[9px] font-black uppercase truncate">${s.PLATO}</p>
                    <p class="text-cyan-400 text-[10px] font-bold mt-1">${parseFloat(s.PRECIO).toFixed(2)}€</p>
                </div>`).join('')}</div>`;
        }

        function add(n, p) {
            carrito.push({n, p: parseFloat(p)});
            localStorage.setItem('aguadulce_carrito', JSON.stringify(carrito));
            actualizarBarra();
        }

        function actualizarBarra() {
            const bar = document.getElementById('basket-bar');
            if (carrito.length > 0) {
                const total = carrito.reduce((s, i) => s + i.p, 0);
                document.getElementById('basket-total').innerText = total.toFixed(2) + " €";
                bar.classList.remove('hidden');
            } else { bar.classList.add('hidden'); }
        }

        function vaciarCarrito() {
            carrito = [];
            localStorage.removeItem('aguadulce_carrito');
            actualizarBarra();
        }

        function abrirCheckout() {
            const list = document.getElementById('checkout-list');
            list.innerHTML = "";
            const resumen = carrito.reduce((acc, i) => { acc[i.n] = (acc[i.n] || 0) + 1; return acc; }, {});
            for (const [nom, cant] of Object.entries(resumen)) {
                const p = carrito.find(i=>i.n==nom).p;
                list.innerHTML += `<div class="flex justify-between items-center glass p-5 rounded-3xl text-xs font-bold text-white border border-white/5 shadow-sm">
                    <span class="flex-1">${cant}x ${nom}</span>
                    <span class="text-cyan-400 font-mono ml-4">${(p*cant).toFixed(2)}€</span>
                </div>`;
            }
            document.getElementById('modal-checkout').classList.remove('hidden');
        }

        function cerrarCheckout() { document.getElementById('modal-checkout').classList.add('hidden'); }
        function irAHome() { renderHome(); }

        function enviarWhatsApp() {
            const name = document.getElementById('order-name').value;
            const addr = document.getElementById('order-address').value;
            const terms = document.getElementById('order-terms').checked;
            if(!name || !terms || !addr) return alert("Completa Nombre, Dirección y acepta los términos.");

            localStorage.setItem('user_name', name);
            localStorage.setItem('user_phone', document.getElementById('order-phone').value);
            localStorage.setItem('user_addr', addr);

            let msg = `*🛍️ NUEVO PEDIDO: ${restActivo.NOMBRE}*\n\n`;
            const resumen = carrito.reduce((acc, i) => { acc[i.n] = (acc[i.n] || 0) + 1; return acc; }, {});
            let total = 0;
            for (const [nom, cant] of Object.entries(resumen)) {
                const p = carrito.find(i=>i.n==nom).p;
                msg += `• ${cant}x ${nom} (${(p*cant).toFixed(2)}€)\n`;
                total += p*cant;
            }
            msg += `\n*TOTAL: ${total.toFixed(2)}€*\n\n👤 ${name}\n📍 ${addr}\n📝 ${document.getElementById('order-note-final').value}`;
            window.open(`https://wa.me/${WHATSAPP_NUM}?text=${encodeURIComponent(msg)}`);
        }

        init();
    </script>
</body>
</html>
