<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express | Pro v26</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: ui-sans-serif, system-ui; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        
        /* Categorías */
        .cat-bubble { flex: 0 0 75px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
        .cat-img-wrapper { width: 55px; height: 55px; border-radius: 50%; background: #1e293b; padding: 2px; border: 2px solid transparent; overflow: hidden; transition: 0.2s; }
        .cat-img-wrapper img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .cat-bubble.active .cat-img-wrapper { border-color: #06b6d4; transform: scale(1.05); }
        .cat-bubble span { font-size: 9px; font-weight: 800; color: #64748b; text-transform: uppercase; }

        /* Extras con contador */
        .extra-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .extra-counter { display: flex; items-center: center; gap: 12px; background: rgba(255,255,255,0.05); padding: 4px 12px; rounded-full: 9999px; border: 1px solid rgba(255,255,255,0.1); }
        
        .modal-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="pb-24">

    <header class="glass sticky top-0 z-50 px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <button id="btn-back" onclick="irAHome()" class="hidden w-10 h-10 flex items-center justify-center bg-white/10 rounded-xl text-white text-xl">←</button>
            <h1 id="header-txt" class="font-black italic text-lg uppercase tracking-tighter text-cyan-400">AGUADULCE <span class="text-white">EXPRESS</span></h1>
        </div>
        <img src="https://i.postimg.cc/C1tDpH9b/LOGO-fondo-blanco.png" class="w-8 h-8 rounded-full border border-white/10">
    </header>

    <div id="rest-banner" class="hidden h-40 w-full relative overflow-hidden">
        <div id="banner-img" class="absolute inset-0 bg-cover bg-center"></div>
        <div class="absolute inset-0 bg-black/60 flex items-center justify-center p-6 text-center">
            <h2 id="banner-name" class="text-3xl font-black italic uppercase text-white tracking-widest drop-shadow-2xl"></h2>
        </div>
    </div>
 
    <div id="cat-nav" class="flex gap-4 p-5 overflow-x-auto hide-scroll"></div>
    <main id="app-content" class="p-4 max-w-xl mx-auto grid grid-cols-2 gap-6"></main>
 
    <div id="modal-detalle" class="fixed inset-0 z-[60] bg-slate-950 hidden overflow-y-auto modal-up">
        <div class="max-w-xl mx-auto min-h-screen pb-48">
            <div id="det-img-cont" class="h-64 w-full bg-cover bg-center relative">
                <button onclick="cerrarDetalle()" class="absolute top-6 left-6 w-10 h-10 bg-black/60 rounded-full text-white text-xl">✕</button>
                <div class="absolute inset-0 bg-gradient-to-t from-slate-950"></div>
            </div>
            
            <div class="px-8 -mt-6 relative space-y-6">
                <div class="flex justify-between items-start gap-4">
                    <div class="flex-1">
                        <h2 id="det-titulo" class="text-2xl font-black italic uppercase text-white leading-tight"></h2>
                        <p id="det-desc" class="text-gray-400 text-xs mt-2 italic"></p>
                    </div>
                    <span id="det-precio-base" class="text-cyan-400 text-xl font-mono font-bold"></span>
                </div>

                <div id="cont-multi" class="pt-6 border-t border-white/5">
                    <p class="text-[10px] font-black text-cyan-500 uppercase tracking-widest mb-4">Complementos (Opcional)</p>
                    <div id="grid-multi" class="space-y-2"></div>
                </div>

                <div class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-slate-950 via-slate-950 to-transparent">
                    <div class="max-w-xl mx-auto space-y-4">
                        <div class="flex flex-col items-center gap-2">
                           <p class="text-[9px] uppercase font-bold text-gray-500 tracking-widest">Cantidad de platos</p>
                            <div class="flex items-center bg-slate-900 border border-white/10 rounded-full px-4 py-1.5 gap-6 shadow-2xl">
                                <button onclick="cambiarCant(-1)" class="text-white text-2xl font-light w-6">−</button>
                                <span id="det-cant" class="text-white font-black text-base w-4 text-center">1</span>
                                <button onclick="cambiarCant(1)" class="text-white text-2xl font-light w-6">+</button>
                            </div>
                        </div>
                        <button onclick="ejecutarAddCarrito()" class="w-full bg-cyan-600 h-14 rounded-2xl font-black uppercase text-white flex justify-between items-center px-8 shadow-xl active:scale-95 transition-all">
                           <span class="text-[11px] tracking-widest uppercase">Confirmar pedido</span>
                           <span id="det-precio-final" class="bg-black/20 px-4 py-1.5 rounded-xl text-sm font-mono">0.00€</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
 
    <div id="basket-bar" class="fixed bottom-6 left-6 right-6 z-40 hidden">
        <div onclick="abrirCheckout()" class="bg-cyan-600 h-14 rounded-2xl px-6 flex items-center justify-between shadow-2xl active:scale-95 transition-all">
            <div class="flex items-center gap-3">
                <span id="basket-count" class="bg-black/30 w-6 h-6 rounded-lg text-[10px] font-black text-white flex items-center justify-center">0</span>
                <span class="text-[11px] font-black uppercase text-white tracking-widest tracking-tighter">Mi Cesta</span>
            </div>
            <span id="basket-total" class="font-mono font-bold text-white text-base">0.00 €</span>
        </div>
    </div>

    <div id="modal-checkout" class="fixed inset-0 z-[70] bg-slate-950 hidden overflow-y-auto p-6 modal-up">
        <div class="max-w-md mx-auto space-y-8 pb-20 pt-10">
            <h2 class="text-3xl font-black italic text-white uppercase tracking-tighter">DATOS DE <span class="text-cyan-400">ENTREGA</span></h2>
            <div id="checkout-list" class="space-y-2"></div>
            
            <div class="space-y-4">
                <input type="text" id="o-name" placeholder="Nombre completo" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-white focus:border-cyan-500 outline-none">
                <input type="tel" id="o-phone" placeholder="Teléfono" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-white focus:border-cyan-500 outline-none">
                <input type="text" id="o-addr" placeholder="Dirección completa" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-white focus:border-cyan-500 outline-none">
            </div>

            <div class="flex items-start gap-4 p-5 bg-white/5 rounded-2xl border border-white/10">
                <input type="checkbox" id="o-terms" class="mt-1 w-6 h-6 accent-cyan-500 rounded">
                <label for="o-terms" class="text-[10px] text-gray-400 uppercase font-bold leading-tight italic">Confirmo que mis datos son correctos y acepto que el pedido se procese vía WhatsApp.</label>
            </div>

            <button onclick="confirmarYEnviar()" class="w-full bg-cyan-600 p-6 rounded-2xl font-black uppercase text-white shadow-xl active:scale-95 transition-all">Finalizar por WhatsApp</button>
            <button onclick="cerrarCheckout()" class="w-full text-gray-500 font-bold uppercase text-[10px] text-center">Volver al menú</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbz6v3d0YYIDAg5H3OY0ey6lWIGINVcR2iR26nGrut6xy68TY4fZmUxinUFu9R3jS4sK/exec";
        const COSTO_ENVIO = 3.50;
        let dataCache = null, carrito = [], restActivo = null, pAct = null, sMulti = {}, cantAct = 1;

        async function init() {
            try {
                const res = await fetch(API_URL);
                dataCache = await res.json();
                renderHome();
            } catch (e) { console.error("Error cargando API"); }
        }

        function renderHome(f = null) {
            restActivo = null;
            document.getElementById('btn-back').classList.add('hidden');
            document.getElementById('rest-banner').classList.add('hidden');
            document.getElementById('header-txt').classList.remove('hidden');
            
            const content = document.getElementById('app-content');
            content.className = "p-4 grid grid-cols-2 gap-6";
            content.innerHTML = "";
            
            const filt = (f && f !== 'TODOS') ? dataCache.restaurantes.filter(r => r.CATEGORIA === f) : dataCache.restaurantes;
            
            filt.forEach(r => {
                content.innerHTML += `
                    <div onclick="verMenu('${r.ID_RESTAURANTE}')" class="space-y-3 active:scale-95 transition-all">
                        <img src="${r.FOTO}" class="w-full h-36 object-cover rounded-[2.2rem] shadow-lg border border-white/5">
                        <p class="text-[10px] font-black uppercase text-center text-slate-400 tracking-widest">${r.NOMBRE}</p>
                    </div>`;
            });
            renderCats(dataCache.restaurantes, false);
        }

        function verMenu(id) {
            restActivo = dataCache.restaurantes.find(r => String(r.ID_RESTAURANTE) === String(id));
            const platos = dataCache.menus.filter(m => String(m.ID_RESTAURANTE) === String(id));
            
            // CORRECCIÓN: Botón retroceso visible y header oculto
            document.getElementById('btn-back').classList.remove('hidden');
            document.getElementById('header-txt').classList.add('hidden');
            
            const banner = document.getElementById('rest-banner');
            banner.classList.remove('hidden');
            document.getElementById('banner-img').style.backgroundImage = `url('${restActivo.FOTO}')`;
            document.getElementById('banner-name').innerText = restActivo.NOMBRE;

            const content = document.getElementById('app-content');
            content.className = "p-4 flex flex-col gap-4";
            content.innerHTML = "";
            
            platos.forEach(p => {
                content.innerHTML += `
                <div onclick='abrirDetalle(${JSON.stringify(p)})' class="bg-white/5 p-4 rounded-[1.8rem] flex items-center gap-5 border border-white/5 active:bg-white/10 transition-colors">
                    <img src="${p.FOTO}" class="w-20 h-20 rounded-2xl object-cover shadow-inner">
                    <div class="flex-1">
                        <p class="text-[12px] font-black text-white uppercase leading-tight">${p.PLATO}</p>
                        <p class="text-cyan-400 font-mono font-bold text-base mt-1">${Number(p.PRECIO).toFixed(2)}€</p>
                    </div>
                </div>`;
            });
            renderCats(platos, true);
        }

        function abrirDetalle(p) {
            pAct = p; sMulti = {}; cantAct = 1; // sMulti ahora es un objeto para contar cada extra
            document.getElementById('det-titulo').innerText = p.PLATO;
            document.getElementById('det-desc').innerText = p.DESCRIPCION || "";
            document.getElementById('det-precio-base').innerText = Number(p.PRECIO).toFixed(2) + "€";
            document.getElementById('det-img-cont').style.backgroundImage = `url('${p.FOTO}')`;
            
            const gM = document.getElementById('grid-multi'); gM.innerHTML = "";
            if(p.EXTRAS) {
                p.EXTRAS.split(',').forEach((o, index) => {
                    const [nombre, precio] = o.split(':');
                    const nTrim = nombre.trim();
                    sMulti[nTrim] = { p: Number(precio || 0), cant: 0 };

                    const row = document.createElement('div');
                    row.className = "extra-item";
                    row.innerHTML = `
                        <div class="text-[11px] font-bold text-slate-300 uppercase">${nTrim} <span class="text-cyan-600 font-mono ml-1">+${Number(precio).toFixed(2)}€</span></div>
                        <div class="flex items-center gap-3 bg-white/5 px-3 py-1 rounded-full border border-white/10">
                            <button onclick="cambiarExtra('${nTrim}', -1, this)" class="text-white font-bold w-4">-</button>
                            <span class="text-white text-[11px] font-black extra-count-val">0</span>
                            <button onclick="cambiarExtra('${nTrim}', 1, this)" class="text-white font-bold w-4">+</button>
                        </div>`;
                    gM.appendChild(row);
                });
            }
            actualizarCalculo();
            document.getElementById('modal-detalle').classList.remove('hidden');
            document.body.style.overflow = "hidden";
        }

        function cambiarExtra(nombre, val, btn) {
            sMulti[nombre].cant = Math.max(0, sMulti[nombre].cant + val);
            btn.parentElement.querySelector('.extra-count-val').innerText = sMulti[nombre].cant;
            actualizarCalculo();
        }

        function actualizarCalculo() {
            // Lógica: (Plato * Cantidad) + (Extras * Sus propias cantidades)
            const precioPlatoTotal = Number(pAct.PRECIO) * cantAct;
            let precioExtrasTotal = 0;
            for (let key in sMulti) {
                precioExtrasTotal += sMulti[key].p * sMulti[key].cant;
            }
            const total = precioPlatoTotal + precioExtrasTotal;
            
            document.getElementById('det-precio-final').innerText = total.toFixed(2) + "€";
            document.getElementById('det-cant').innerText = cantAct;
        }

        function cambiarCant(v) { 
            cantAct = Math.max(1, cantAct + v); 
            actualizarCalculo(); 
        }

        function ejecutarAddCarrito() {
            const precioPlatoTotal = Number(pAct.PRECIO) * cantAct;
            let extrasTxt = [];
            let precioExtrasTotal = 0;
            
            for (let key in sMulti) {
                if (sMulti[key].cant > 0) {
                    extrasTxt.push(`${sMulti[key].cant}x ${key}`);
                    precioExtrasTotal += sMulti[key].p * sMulti[key].cant;
                }
            }

            let nombreFinal = `${cantAct}x ${pAct.PLATO}`;
            if(extrasTxt.length > 0) nombreFinal += ` + [${extrasTxt.join(', ')}]`;

            carrito.push({
                n: nombreFinal,
                p: precioPlatoTotal + precioExtrasTotal,
                cant: 1 // La cantidad ya va implícita en el nombre para el ticket
            });

            cerrarDetalle();
            actualizarBarraCesta();
        }

        function actualizarBarraCesta() {
            if(carrito.length > 0) {
                const subtotal = carrito.reduce((acc, i) => acc + i.p, 0);
                const totalCesta = subtotal + COSTO_ENVIO;
                document.getElementById('basket-total').innerText = totalCesta.toFixed(2) + " €";
                document.getElementById('basket-count').innerText = carrito.length;
                document.getElementById('basket-bar').classList.remove('hidden');
            } else {
                document.getElementById('basket-bar').classList.add('hidden');
            }
        }

        function abrirCheckout() {
            const list = document.getElementById('checkout-list');
            list.innerHTML = "";
            carrito.forEach((item, idx) => {
                list.innerHTML += `<div class="flex justify-between items-center bg-white/5 p-4 rounded-2xl border border-white/5">
                    <div class="flex flex-col"><span class="text-[10px] font-black text-white uppercase leading-tight">${item.n}</span><span class="text-cyan-500 font-mono text-[9px] mt-1">${item.p.toFixed(2)}€</span></div>
                    <button onclick="borrarItem(${idx})" class="text-red-500 font-bold text-xs px-2">✕</button></div>`;
            });
            document.getElementById('modal-checkout').classList.remove('hidden');
        }

        function borrarItem(idx) { 
            carrito.splice(idx, 1); 
            if(!carrito.length) cerrarCheckout(); else abrirCheckout();
            actualizarBarraCesta();
        }

        function confirmarYEnviar() {
            const n = document.getElementById('o-name').value, t = document.getElementById('o-phone').value, a = document.getElementById('o-addr').value;
            if(!n || !t || !a || !document.getElementById('o-terms').checked) return alert("Completa los datos y acepta los términos.");
            
            const totalF = (carrito.reduce((acc, i) => acc + i.p, 0) + COSTO_ENVIO).toFixed(2);
            const detalle = carrito.map(i => i.n).join(' | ');

            fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({
                id_restaurante: restActivo.ID_RESTAURANTE, cliente: n, direccion: a, detalle: detalle, total: totalF, whatsapp_rest: restActivo.TELEFONO 
            })});

            let msg = `*🛍️ PEDIDO: ${restActivo.NOMBRE}*\n\n*Cliente:* ${n}\n*Tel:* ${t}\n*Dir:* ${a}\n\n*Pedido:*\n`;
            carrito.forEach(i => msg += `• ${i.n} - ${i.p.toFixed(2)}€\n`);
            msg += `\n*Envío:* ${COSTO_ENVIO.toFixed(2)}€\n*TOTAL: ${totalF}€*`;
            window.open(`https://wa.me/${restActivo.TELEFONO}?text=${encodeURIComponent(msg)}`);
        }

        function renderCats(datos, esM) {
            const nav = document.getElementById('cat-nav'); nav.innerHTML = "";
            const cats = [...new Set(datos.map(i => i.CATEGORIA))].filter(Boolean);
            nav.innerHTML += createBubble("TODOS", esM ? "Carta" : "Todos", true, esM);
            cats.forEach(c => nav.innerHTML += createBubble(c, c, false, esM));
        }

        function createBubble(id, name, active, esM) {
            const icon = dataCache.iconos.find(i => i.CATEGORIA.toUpperCase() === id.toUpperCase());
            const img = icon ? icon.FOTO : "https://i.postimg.cc/mD44w655/all-food.jpg";
            return `<div onclick="${esM?'filtrarMenu':'filtrarRest'}('${id}', this)" class="cat-bubble ${active?'active':''}">
                <div class="cat-img-wrapper"><img src="${img}"></div><span>${name}</span></div>`;
        }

        function filtrarRest(c, el) { document.querySelectorAll('.cat-bubble').forEach(b => b.classList.remove('active')); el.classList.add('active'); renderHome(c); }
        function filtrarMenu(c, el) { document.querySelectorAll('.cat-bubble').forEach(b => b.classList.remove('active')); el.classList.add('active'); 
            const platos = dataCache.menus.filter(m => String(m.ID_RESTAURANTE) === String(restActivo.ID_RESTAURANTE));
            const filt = c === 'TODOS' ? platos : platos.filter(p => p.CATEGORIA === c);
            const content = document.getElementById('app-content'); content.innerHTML = "";
            filt.forEach(p => {
                content.innerHTML += `<div onclick='abrirDetalle(${JSON.stringify(p)})' class="bg-white/5 p-4 rounded-[1.8rem] flex items-center gap-5 border border-white/5"><img src="${p.FOTO}" class="w-20 h-20 rounded-2xl object-cover"><div class="flex-1"><p class="text-[11px] font-black text-white uppercase leading-tight">${p.PLATO}</p><p class="text-cyan-400 font-mono font-bold text-base mt-1">${Number(p.PRECIO).toFixed(2)}€</p></div></div>`;
            });
        }

        function irAHome() { renderHome(); }
        function cerrarDetalle() { document.getElementById('modal-detalle').classList.add('hidden'); document.body.style.overflow = "auto"; }
        function cerrarCheckout() { document.getElementById('modal-checkout').classList.add('hidden'); document.body.style.overflow = "auto"; }

        init();
    </script>
</body>
</html>
