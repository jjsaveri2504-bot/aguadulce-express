<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express | Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #ff4757; --blue: #1d3557; --dark: #2d3436; --gray: #f9f9f9; --green: #2ed573; --border: #eee; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #fff; color: var(--dark); overflow-x: hidden; }

        .view { display: none; min-height: 100vh; padding-bottom: 120px; }
        .view.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .hero { background: linear-gradient(180deg, var(--brand) 0%, #c0392b 100%); padding: 50px 20px 70px; border-radius: 0 0 50px 50px; text-align: center; color: white; }
        .card { background: white; border-radius: 30px; overflow: hidden; margin: -40px 20px 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 1px solid var(--border); cursor: pointer; }
        .btn-main { background: var(--brand); color: white; border: none; width: 100%; padding: 20px; border-radius: 22px; font-weight: 800; font-size: 16px; cursor: pointer; }
        
        /* ESTADOS DE CARGA */
        #status-msg { text-align: center; padding: 40px; color: #666; font-weight: 600; }
        .error-log { color: #ff4757; background: #fff1f2; padding: 15px; border-radius: 15px; margin: 20px; font-size: 12px; display: none; }

        /* CARRITO Y FORMULARIO */
        .cart-bar { position: fixed; bottom: 25px; left: 20px; right: 20px; background: var(--dark); color: white; padding: 20px; border-radius: 25px; display: none; z-index: 1000; justify-content: space-between; align-items: center; box-shadow: 0 15px 30px rgba(0,0,0,0.3); }
        .bottom-sheet { display: none; position: fixed; bottom: 0; width: 100%; background: white; border-radius: 40px 40px 0 0; padding: 35px 25px; z-index: 3001; max-height: 85vh; overflow-y: auto; box-shadow: 0 -10px 40px rgba(0,0,0,0.2); }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3000; backdrop-filter: blur(8px); }
        input, select { width: 100%; padding: 18px; border-radius: 18px; border: 1px solid #ddd; background: var(--gray); margin-bottom: 15px; font-size: 16px; }
    </style>
</head>
<body>

    <div id="status-msg">🚀 Conectando con Aguadulce Express...</div>
    <div id="error-display" class="error-log"></div>

    <div id="view-home" class="view">
        <div class="hero"><h1>Aguadulce Express</h1><p>Tus favoritos a domicilio</p></div>
        <div id="res-list"></div>
    </div>

    <div id="view-menu" class="view">
        <div id="menu-hero" style="height: 180px; background-size: cover; background-position: center; position: relative;">
            <button onclick="location.href=location.pathname" style="position:absolute; top:20px; left:20px; background:white; border:none; width:40px; height:40px; border-radius:50%; font-weight:800; cursor:pointer;">←</button>
        </div>
        <div style="background:white; border-radius:40px 40px 0 0; margin-top:-40px; padding:30px 20px;">
            <h2 id="m-name" style="margin:0"></h2>
            <div id="p-list" style="margin-top:20px;"></div>
        </div>
    </div>

    <div id="view-checkout" class="view" style="padding: 30px 25px;">
        <button onclick="backToMenu()" style="border:none; background:none; color:var(--brand); font-weight:800; margin-bottom:20px; cursor:pointer;">← EDITAR PEDIDO</button>
        <h2>Datos de Entrega</h2>
        <div id="order-summary" style="background: var(--gray); padding: 20px; border-radius: 25px; margin-bottom: 20px;"></div>
        <input type="text" id="c-name" placeholder="¿A qué nombre va el pedido?">
        <input type="tel" id="c-tel" placeholder="Tu teléfono">
        <input type="text" id="c-dir" placeholder="Dirección exacta">
        <select id="c-pay">
            <option value="Efectivo">Efectivo al repartidor</option>
            <option value="Bizum">Bizum al repartidor</option>
        </select>
        <button class="btn-main" id="btn-final" style="background:var(--green)" onclick="enviarPedidoFinal()">🚀 ENVIAR POR WHATSAPP</button>
    </div>

    <div id="modal-overlay" class="modal-overlay" onclick="closeSheet()"></div>
    <div id="sheet" class="bottom-sheet">
        <h2 id="s-title" style="margin:0"></h2>
        <div id="s-info" style="margin:15px 0;"></div>
        <div id="s-options"></div>
        <button class="btn-main" id="btn-sheet" onclick="logicAddToCart()">Confirmar Unidad #1</button>
    </div>

    <div id="cart-bar" class="cart-bar" onclick="goToCheckout()">
        <span id="cart-q" style="background:var(--brand); padding:5px 12px; border-radius:12px; font-weight:800;">0</span>
        <b>VER MI PEDIDO</b>
        <span id="cart-t" style="font-weight:800;">0.00€</span>
    </div>

    <script>
        // CONFIGURACIÓN CENTRAL
        const API_URL = "https://script.google.com/macros/s/AKfycbwsTYdXkGY21Ib3J6O6DLhy-O-Lk-odTP6XV7vTCaJoEP-Z7iaM7P3efJ_N4KFloJQK/exec";
        const ENVIO = 3.50;
        
        let cart = [], activeResData = null, currentMenu = [], tempProd = null, unitCount = 1;

        async function init() {
            try {
                const resp = await fetch(`${API_URL}?sheet=RESTAURANTES`);
                const locales = await resp.json();
                
                if(!locales || locales.length === 0) throw "No se encontraron locales en la pestaña RESTAURANTES";

                document.getElementById('status-msg').style.display = 'none';
                document.getElementById('view-home').classList.add('active');
                
                const list = document.getElementById('res-list');
                locales.forEach(res => {
                    list.innerHTML += `
                        <div class="card" onclick="openMenu('${res.ID}', '${res.Sheet}', '${res.Nombre}', '${res.WhatsApp}', '${res.Foto}')">
                            <img src="${res.Foto}" style="width:100%; height:160px; object-fit:cover;">
                            <div style="padding:20px;"><b>${res.Nombre}</b><br><small>Envío: ${ENVIO.toFixed(2)}€</small></div>
                        </div>`;
                });
            } catch (e) {
                document.getElementById('status-msg').innerText = "❌ Error de conexión";
                document.getElementById('error-display').style.display = 'block';
                document.getElementById('error-display').innerText = "Causa: " + e + ". Revisa que la pestaña RESTAURANTES tenga los títulos: ID, Nombre, WhatsApp, Sheet, Foto.";
            }
        }

        async function openMenu(id, sheet, nombre, wa, foto) {
            activeResData = { id, sheet, nombre, wa };
            document.getElementById('view-home').classList.remove('active');
            document.getElementById('view-menu').classList.add('active');
            document.getElementById('m-name').innerText = nombre;
            document.getElementById('menu-hero').style.backgroundImage = `url(${foto})`;
            document.getElementById('p-list').innerHTML = "Cargando carta...";

            const resp = await fetch(`${API_URL}?sheet=${sheet}`);
            currentMenu = await resp.json();
            
            document.getElementById('p-list').innerHTML = currentMenu.map((p, idx) => {
                if(p.Disponible !== "SI") return '';
                return `
                    <div style="display:flex; justify-content:space-between; padding:15px 0; border-bottom:1px solid #eee;" onclick="openSheet(${idx})">
                        <div style="flex:1">
                            <b>${p.Producto}</b><br>
                            <small style="color:#777">${p.Descripción || ''}</small><br>
                            <b style="color:var(--brand)">${parseFloat(p.Precio).toFixed(2)}€</b>
                        </div>
                        <img src="${p.Foto}" style="width:75px; height:75px; border-radius:15px; object-fit:cover; background:#eee;">
                    </div>`;
            }).join('');
        }

        function openSheet(idx) {
            tempProd = currentMenu[idx];
            unitCount = 1;
            document.getElementById('s-title').innerText = tempProd.Producto;
            renderOptionsUI();
            document.getElementById('modal-overlay').style.display = "block";
            document.getElementById('sheet').style.display = "block";
        }

        function renderOptionsUI() {
            document.getElementById('s-info').innerHTML = `
                <div style="font-weight:800; color:var(--brand);">${parseFloat(tempProd.Precio).toFixed(2)}€</div>
                <div style="background:var(--blue); color:white; padding:5px; border-radius:8px; font-size:11px; text-align:center; margin-top:10px;">UNIDAD #${unitCount}</div>
            `;
            const container = document.getElementById('s-options');
            const opts = tempProd.Opciones || '';
            container.innerHTML = opts ? opts.split(",").map(o => `
                <div style="display:flex; justify-content:space-between; padding:12px; background:var(--gray); border-radius:12px; margin-bottom:8px;">
                    <span>${o.trim()}</span><input type="checkbox" name="opt" value="${o.trim()}" style="width:20px; height:20px;">
                </div>`).join('') : '<small>Sin extras disponibles</small>';
            document.getElementById('btn-sheet').innerText = `Confirmar Unidad #${unitCount}`;
        }

        function logicAddToCart() {
            const selected = Array.from(document.querySelectorAll('input[name="opt"]:checked')).map(c => c.value);
            cart.push({ name: tempProd.Producto, price: parseFloat(tempProd.Precio), options: selected.length ? selected.join(", ") : "Normal" });
            
            if(confirm("¿Quieres añadir otra unidad de este mismo plato con diferentes extras?")) {
                unitCount++;
                renderOptionsUI();
            } else {
                closeSheet();
                updateCartUI();
            }
        }

        function updateCartUI() {
            let total = 0; cart.forEach(i => total += i.price);
            document.getElementById('cart-bar').style.display = cart.length ? 'flex' : 'none';
            document.getElementById('cart-q').innerText = cart.length;
            document.getElementById('cart-t').innerText = (total + ENVIO).toFixed(2) + "€";
        }

        function goToCheckout() {
            document.getElementById('view-menu').classList.remove('active');
            document.getElementById('view-checkout').classList.add('active');
            document.getElementById('cart-bar').style.display = 'none';
            let total = 0;
            let html = cart.map((i, idx) => {
                total += i.price;
                return `<div style="font-size:13px; margin-bottom:5px;"><b>${idx+1}. ${i.name}</b><br><small>${i.options}</small> <span style="float:right">${i.price.toFixed(2)}€</span></div>`;
            }).join('');
            html += `<hr><b>Total con Envío: <span style="float:right">${(total+ENVIO).toFixed(2)}€</span></b>`;
            document.getElementById('order-summary').innerHTML = html;
        }

        async function enviarPedidoFinal() {
            const btn = document.getElementById('btn-final');
            const n = document.getElementById('c-name').value;
            const d = document.getElementById('c-dir').value;
            if(!n || !d) return alert("Falta nombre o dirección");

            btn.disabled = true; btn.innerText = "⏳ REGISTRANDO...";

            let resumen = ""; let totalProd = 0;
            cart.forEach(i => { resumen += `${i.name} (${i.options}) | `; totalProd += i.price; });

            const payload = {
                sheet: "PEDIDOS",
                restaurante: activeResData.nombre,
                cliente: n,
                detalle: resumen,
                total: (totalProd + ENVIO).toFixed(2),
                pago: document.getElementById('c-pay').value,
                comision: ((totalProd + ENVIO) * 0.18).toFixed(2)
            };

            const resp = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
            const result = await resp.json();

            let msg = `*🚀 NUEVO PEDIDO AGUADULCE EXPRESS*%0A*CONTROL:* ${result.control}%0A━━━━━━━━━━━━━━%0A👤 *Cliente:* ${n}%0A📍 *Dirección:* ${d}%0A%0A*DETALLE:*%0A`;
            cart.forEach(i => msg += `✅ ${i.name} (${i.options})%0A`);
            msg += `%0A💰 *TOTAL: ${(totalProd + ENVIO).toFixed(2)}€*`;

            window.location.href = `https://wa.me/${activeResData.wa}?text=${msg}`;
        }

        function closeSheet() { document.getElementById('modal-overlay').style.display="none"; document.getElementById('sheet').style.display="none"; }
        function backToMenu() { document.getElementById('view-checkout').classList.remove('active'); document.getElementById('view-menu').classList.add('active'); updateCartUI(); }
        
        window.onload = init;
    </script>
</body>

</html>
