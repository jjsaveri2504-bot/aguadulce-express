<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aguadulce Express | Pedidos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'ae-azul': '#00BCD4', 'ae-grafito': '#2D3436' },
                    fontFamily: { 'montserrat': ['Montserrat', 'sans-serif'], 'opensans': ['Open Sans', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Open Sans', sans-serif; background-color: #fdfdfd; color: #2D3436; }
        .titulo-ae { font-family: 'Montserrat', sans-serif; font-weight: 900; letter-spacing: -0.02em; }
        .btn-ae { background: #00BCD4; color: white; border-radius: 20px; font-weight: 700; transition: 0.3s; }
        .input-ae { border: 2px solid #f1f1f1; border-radius: 20px; padding: 14px; width: 100%; outline: none; background: #f9f9f9; }
    </style>
</head>
<body class="pb-36">

    <script>
        // REEMPLAZA ESTO CON TU URL DE AGUADULCE EXPRESS
        const API_URL = "https://script.google.com/macros/s/AKfycby1yQIH-6JyzuwV_9thV0Oj2_R-qTugNMunae5RzH4wYjgCRMYKOjIJkWSplpV1S3eqTA/exec"; 
        const COSTO_ENVIO = 3.50;
    </script>

    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md px-6 py-5 border-b-2 border-ae-azul flex items-center justify-between shadow-sm">
        <button id="btn-back" onclick="mostrarRestaurantes()" class="hidden w-10 h-10 flex items-center justify-center rounded-xl bg-gray-100"><i class="fas fa-arrow-left"></i></button>
        <h1 id="header-titulo" class="titulo-ae text-xl text-ae-grafito flex-1 text-center italic uppercase">AGUADULCE <span class="text-ae-azul">EXPRESS</span></h1>
        <div class="w-10"></div>
    </header>

    <main id="main-container" class="p-6 grid grid-cols-1 gap-6 max-w-2xl mx-auto"></main>

    <div id="modal-checkout" class="fixed inset-0 z-[110] hidden flex items-end sm:items-center justify-center p-4 bg-ae-grafito/80 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-[40px] p-8 shadow-2xl">
            <h3 class="titulo-ae text-2xl mb-2 uppercase italic text-ae-grafito">DATOS DE ENTREGA</h3>
            <div class="space-y-4 mt-4">
                <input type="text" id="nombre-cliente" placeholder="Nombre completo" class="input-ae">
                <input type="tel" id="tel-cliente" placeholder="WhatsApp" class="input-ae">
                <input type="text" id="dir-cliente" placeholder="Dirección exacta" class="input-ae">
                <textarea id="obs-cliente" placeholder="Observaciones (Ej: Sin cebolla, llamar al llegar...)" class="input-ae" rows="2"></textarea>
            </div>
            <div class="mt-6 p-6 bg-ae-grafito rounded-[30px] text-white">
                <div class="flex justify-between text-2xl titulo-ae italic uppercase"><span>TOTAL</span><span id="total-res">$0</span></div>
            </div>
            <button onclick="enviarPedido()" class="w-full mt-6 btn-ae py-5 shadow-xl uppercase tracking-widest text-xs">CONFIRMAR PEDIDO <i class="fab fa-whatsapp ml-2"></i></button>
            <button onclick="cerrarModal()" class="w-full mt-2 py-3 text-gray-400 font-bold text-[10px] uppercase tracking-widest">Volver</button>
        </div>
    </div>

    <div id="cart-bar" class="fixed bottom-8 left-6 right-6 bg-ae-grafito text-white p-6 rounded-[35px] flex justify-between items-center shadow-2xl hidden z-50">
        <div>
            <p class="text-[9px] font-black text-ae-azul uppercase italic">Total con Envío</p>
            <p class="titulo-ae text-3xl italic leading-none">$<span id="cart-total">0</span></p>
        </div>
        <button onclick="abrirCheckout()" class="btn-ae px-10 py-4 uppercase text-[11px] tracking-widest shadow-lg">PEDIR YA</button>
    </div>

    <script>
        let menuGeneral = []; let listaRestaurantes = [];
        let restauranteSeleccionado = null; let carrito = [];

        async function cargarDatos() {
            try {
                const [resMenu, resRest] = await Promise.all([
                    fetch(`${API_URL}?sheet=MENU_GENERAL`),
                    fetch(`${API_URL}?sheet=RESTAURANTES`)
                ]);
                menuGeneral = await resMenu.json();
                listaRestaurantes = await resRest.json();
                mostrarRestaurantes();
            } catch (e) { alert("Error de conexión con el Cerebro de Aguadulce Express"); }
        }

        function mostrarRestaurantes() {
            restauranteSeleccionado = null; carrito = []; actualizarBarra();
            document.getElementById('btn-back').classList.add('hidden');
            document.getElementById('header-titulo').innerHTML = 'AGUADULCE <span class="text-ae-azul">EXPRESS</span>';
            
            // Usamos la estructura de tu hoja RESTAURANTES (ID, NOMBRE, FOTO)
            document.getElementById('main-container').innerHTML = listaRestaurantes.map(r => `
                <div onclick="verMenu('${r.ID}')" class="bg-white rounded-[35px] overflow-hidden shadow-sm border border-gray-100 cursor-pointer">
                    <img src="${r.Foto}" class="w-full h-48 object-cover">
                    <div class="p-6">
                        <h3 class="text-xl titulo-ae text-ae-grafito uppercase italic">${r.NOMBRE}</h3>
                        <p class="text-ae-azul text-[10px] font-bold uppercase tracking-widest">${r.DIRECCION}</p>
                    </div>
                </div>`).join('');
        }

        function verMenu(idRest) {
            restauranteSeleccionado = listaRestaurantes.find(r => String(r.ID) === String(idRest));
            const platos = menuGeneral.filter(p => String(p.ID_REST) === String(idRest));
            document.getElementById('header-titulo').innerText = restauranteSeleccionado.NOMBRE;
            document.getElementById('btn-back').classList.remove('hidden');
            
            document.getElementById('main-container').innerHTML = platos.map(p => `
                <div class="bg-white rounded-[30px] p-4 flex gap-4 items-center shadow-sm border border-gray-50">
                    <img src="${p.FOTO_PLATO}" class="w-20 h-20 rounded-2xl object-cover">
                    <div class="flex-1">
                        <h3 class="titulo-ae text-xs text-ae-grafito uppercase">${p.NOMBRE_PLATO}</h3>
                        <p class="text-[9px] text-gray-400 italic line-clamp-1">${p.DESCRIPCION}</p>
                        <div class="flex justify-between items-center mt-2">
                            <span class="titulo-ae text-ae-azul text-lg italic">$${p.PRECIO.toFixed(2)}</span>
                            <button onclick="agregar('${p.NOMBRE_PLATO}', ${p.PRECIO})" class="w-9 h-9 btn-ae flex items-center justify-center shadow-md"><i class="fas fa-plus text-[10px]"></i></button>
                        </div>
                    </div>
                </div>`).join('');
        }

        function agregar(n, p) { carrito.push({nombre: n, precio: p}); actualizarBarra(); }

        function actualizarBarra() {
            const bar = document.getElementById('cart-bar');
            const sub = carrito.reduce((s, p) => s + p.precio, 0);
            if(carrito.length > 0) {
                bar.classList.remove('hidden');
                document.getElementById('cart-total').innerText = (sub + COSTO_ENVIO).toFixed(2);
            } else { bar.classList.add('hidden'); }
        }

        function abrirCheckout() {
            const sub = carrito.reduce((s, p) => s + p.precio, 0);
            document.getElementById('total-res').innerText = "$" + (sub + COSTO_ENVIO).toFixed(2);
            document.getElementById('modal-checkout').classList.remove('hidden');
        }

        function cerrarModal() { document.getElementById('modal-checkout').classList.add('hidden'); }

        async function enviarPedido() {
            const nombre = document.getElementById('nombre-cliente').value;
            const tel = document.getElementById('tel-cliente').value;
            const dir = document.getElementById('dir-cliente').value;
            const obs = document.getElementById('obs-cliente').value;

            if(!nombre || !tel || !dir) { alert("¡Faltan datos para el reparto!"); return; }

            const items = carrito.reduce((acc, p) => { acc[p.nombre] = (acc[p.nombre] || 0) + 1; return acc; }, {});
            let pedidoStr = ""; for (const [n, c] of Object.entries(items)) { pedidoStr += `${c}x ${n}, `; }
            const totalF = (carrito.reduce((s, p) => s + p.precio, 0) + COSTO_ENVIO).toFixed(2);

            // GUARDAR EN EXCEL (PARA APPSHEET)
            await fetch(API_URL, { 
                method: 'POST', mode: 'no-cors', 
                body: JSON.stringify({
                    cliente: nombre, telefono: tel, direccion: dir, observaciones: obs,
                    restaurante: restauranteSeleccionado.NOMBRE, pedido: pedidoStr.slice(0, -2), total: totalF
                }) 
            });

            // WHATSAPP AL RESTAURANTE
            const mensaje = `*PEDIDO AGUADULCE EXPRESS*\n\n👤 *Cliente:* ${nombre}\n📍 *Dir:* ${dir}\n📝 *Obs:* ${obs || 'Ninguna'}\n\n🍴 *Pedido:* ${pedidoStr.slice(0, -2)}\n💰 *TOTAL: $${totalF}*`;
            window.open(`https://wa.me/${restauranteSeleccionado.TELEFONO}?text=${encodeURIComponent(mensaje)}`, '_blank');
            location.reload();
        }

        cargarDatos();
    </script>
</body>
</html>
