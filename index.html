<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express - Ultimate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
        .btn-cyan { background: linear-gradient(135deg, #06b6d4, #0891b2); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .card-menu:active { transform: scale(0.98); background: rgba(6, 182, 212, 0.1); }
        .sugerencia-card { flex: 0 0 130px; background: rgba(255,255,255,0.03); border-radius: 20px; padding: 10px; border: 1px solid rgba(255,255,255,0.05); }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-up { animation: slideUp 0.3s ease-out; }
    </style>
</head>
<body class="pb-32">

    <header class="glass sticky top-0 z-50 p-5 flex items-center justify-between border-b border-white/5">
        <div class="flex items-center gap-4">
            <button id="btn-back" onclick="irAHome()" class="hidden p-2 rounded-xl bg-white/5">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            </button>
            <h1 id="header-txt" class="font-black italic text-xl uppercase tracking-tighter text-cyan-400">AGUADULCE <span class="text-white">EXPRESS</span></h1>
        </div>
    </header>

    <main id="main-container" class="p-4 max-w-xl mx-auto">
        <div id="loader" class="py-32 text-center">
            <div class="inline-block w-10 h-10 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin"></div>
        </div>
    </main>

    <div id="basket-bar" class="fixed bottom-6 left-4 right-4 z-40 hidden animate-up">
        <div class="btn-cyan rounded-[2rem] p-4 flex items-center justify-between shadow-[0_20px_50px_rgba(6,182,212,0.3)]">
            <button onclick="vaciarCarrito()" class="p-3 bg-black/20 rounded-2xl active:scale-90 transition">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
            </button>
            <div class="flex-1 px-4 flex items-center justify-between cursor-pointer" onclick="abrirCheckout()">
                <div class="flex flex-col">
                    <span class="text-[10px] uppercase font-black opacity-70 tracking-widest">Tu pedido</span>
                    <span id="basket-total" class="text-lg font-black tracking-tighter">0.00 €</span>
                </div>
                <span class="bg-white text-cyan-600 px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest shadow-sm">Pagar</span>
            </div>
        </div>
    </div>

    <div id="modal-checkout" class="fixed inset-0 z-[60] bg-slate-950 hidden overflow-y-auto p-5 pb-20">
        <div class="max-w-md mx-auto space-y-8">
            <div class="flex justify-between items-center">
                <h2 class="text-3xl font-black italic uppercase tracking-tighter">Mi <span class="text-cyan-500">Cesta</span></h2>
                <button onclick="cerrarCheckout()" class="p-2 bg-white/5 rounded-full">✕</button>
            </div>
            
            <div id="checkout-list" class="space-y-3"></div>

            <div class="space-y-4 pt-4">
                <p class="text-[10px] font-black text-gray-500 uppercase tracking-widest">Datos de Entrega</p>
                <input type="text" id="order-name" placeholder="Nombre" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none focus:border-cyan-500 transition-all">
                <input type="text" id="order-phone" placeholder="WhatsApp" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none">
                <input type="text" id="order-address" placeholder="Dirección Exacta" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none">
                <textarea id="order-note" placeholder="Notas adicionales..." class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none h-20"></textarea>
            </div>

            <div class="bg-cyan-500/5 p-5 rounded-3xl border border-cyan-500/20">
                <label class="flex items-start gap-4 cursor-pointer">
                    <input type="checkbox" id="order-terms" class="mt-1 w-5 h-5 accent-cyan-500">
                    <span class="text-[9px] text-gray-400 uppercase font-bold leading-relaxed">Acepto el tratamiento confidencial de mis datos para la gestión exclusiva de este pedido según términos de venta.</span>
                </label>
            </div>

            <button onclick="enviarWhatsApp()" class="w-full btn-cyan p-6 rounded-[2rem] font-black uppercase text-sm shadow-xl">Confirmar Pedido</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxEBihvxk1icSDalXL2WdIroijpP4r7Oa7UC0fAQhGnNZkL3jMMZNEPlXWPaFc3-iFe/exec"; 
        const WHATSAPP_NUM = "34600000000"; 

        let dataCache = null;
        let carrito = [];
        let restActivo = null;

        async function init() {
            try {
                const res = await fetch(API_URL);
                dataCache = await res.json();
                renderHome();
            } catch (e) { alert("Error de carga"); }
        }

        function renderHome() {
            restActivo = null;
            document.getElementById('header-txt').innerHTML = 'AGUADULCE <span class="text-white">EXPRESS</span>';
            document.getElementById('btn-back').classList.add('hidden');
            const container = document.getElementById('main-container');
            container.innerHTML = "";
            const cats = [...new Set(dataCache.restaurantes.map(r => r.CATEGORIA))].filter(Boolean);

            cats.forEach(cat => {
                const rests = dataCache.restaurantes.filter(r => r.CATEGORIA === cat);
                let html = `<h2 class="text-[10px] font-black text-gray-600 uppercase tracking-[0.3em] mt-10 mb-4 pl-2">${cat}</h2><div class="grid grid-cols-2 gap-4">`;
                rests.forEach(r => {
                    html += `
                        <div onclick="verMenu('${r.ID_RESTAURANTE}')" class="glass rounded-[2.5rem] overflow-hidden card-menu shadow-lg">
                            <img src="${r.FOTO}" class="w-full h-32 object-cover">
                            <p class="p-5 text-[11px] font-black uppercase italic tracking-tighter text-white/90">${r.NOMBRE}</p>
                        </div>`;
                });
                container.innerHTML += html + "</div>";
            });
            actualizarBarra();
        }

        function verMenu(id) {
            if (carrito.length > 0 && carrito[0].restId != id) {
                if(!confirm("Tienes productos de otro restaurante. ¿Deseas vaciar la cesta para comprar aquí?")) return;
                vaciarCarrito();
            }

            restActivo = dataCache.restaurantes.find(r => r.ID_RESTAURANTE == id);
            const platos = dataCache.menus.filter(m => m.ID_RESTAURANTE == id);

            document.getElementById('header-txt').innerText = restActivo.NOMBRE;
            document.getElementById('btn-back').classList.remove('hidden');
            
            const container = document.getElementById('main-container');
            container.innerHTML = `<div class="space-y-4 pt-4">`;

            platos.forEach(p => {
                container.innerHTML += `
                    <div onclick="add('${p.PLATO}', '${p.PRECIO}', '${p.CATEGORIA}')" class="glass p-4 rounded-[2rem] flex items-center gap-4 card-menu">
                        <img src="${p.FOTO}" class="w-20 h-20 rounded-2xl object-cover">
                        <div class="flex-1">
                            <p class="font-black text-xs uppercase italic tracking-tighter">${p.PLATO}</p>
                            <p class="text-[9px] text-gray-500 my-1 line-clamp-1">${p.DESCRIPCION || ''}</p>
                            <p class="text-cyan-400 font-black text-sm">${parseFloat(p.PRECIO).toFixed(2)}€</p>
                        </div>
                        <div class="bg-cyan-500/10 text-cyan-400 w-10 h-10 rounded-2xl flex items-center justify-center font-black text-2xl">+</div>
                    </div>`;
            });
        }

        function add(n, p, catActual) {
            carrito.push({n, p: parseFloat(p), restId: restActivo.ID_RESTAURANTE});
            actualizarBarra();
            renderSugerencias(catActual);
        }

        function renderSugerencias(catActual) {
            // Buscamos platos del mismo restaurante pero de DISTINTA categoría (Sugerencias)
            const sugerencias = dataCache.menus.filter(m => m.ID_RESTAURANTE == restActivo.ID_RESTAURANTE && m.CATEGORIA != catActual).slice(0, 5);
            
            if (sugerencias.length === 0) return;

            const container = document.getElementById('main-container');
            let sugDiv = document.getElementById('sugerencias-box');
            if(!sugDiv) {
                sugDiv = document.createElement('div');
                sugDiv.id = 'sugerencias-box';
                sugDiv.className = 'mt-10 mb-20';
                container.appendChild(sugDiv);
            }

            sugDiv.innerHTML = `
                <h3 class="text-[10px] font-black text-cyan-500 uppercase tracking-widest mb-4 italic">¿Te gustaría acompañarlo con...?</h3>
                <div class="flex overflow-x-auto gap-3 hide-scroll">
                    ${sugerencias.map(s => `
                        <div onclick="add('${s.PLATO}', '${s.PRECIO}', '${s.CATEGORIA}')" class="sugerencia-card active:scale-95 transition">
                            <img src="${s.FOTO}" class="w-full h-20 object-cover rounded-xl mb-2">
                            <p class="text-[9px] font-black uppercase truncate">${s.PLATO}</p>
                            <p class="text-cyan-400 text-[10px] font-bold">${parseFloat(s.PRECIO).toFixed(2)}€</p>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function actualizarBarra() {
            const bar = document.getElementById('basket-bar');
            if (carrito.length > 0) {
                const total = carrito.reduce((s, i) => s + i.p, 0);
                document.getElementById('basket-total').innerText = total.toFixed(2) + " €";
                bar.classList.remove('hidden');
            } else { bar.classList.add('hidden'); }
        }

        function vaciarCarrito() {
            carrito = [];
            actualizarBarra();
            const box = document.getElementById('sugerencias-box');
            if(box) box.remove();
        }

        function abrirCheckout() {
            const list = document.getElementById('checkout-list');
            list.innerHTML = "";
            const resumen = carrito.reduce((acc, i) => { acc[i.n] = (acc[i.n] || 0) + 1; return acc; }, {});
            for (const [nom, cant] of Object.entries(resumen)) {
                const p = carrito.find(i=>i.n==nom).p;
                list.innerHTML += `<div class="flex justify-between items-center glass p-4 rounded-2xl text-xs font-bold"><span>${cant}x ${nom}</span><span class="text-cyan-400">${(p*cant).toFixed(2)}€</span></div>`;
            }
            document.getElementById('modal-checkout').classList.remove('hidden');
        }

        function cerrarCheckout() { document.getElementById('modal-checkout').classList.add('hidden'); }
        function irAHome() { renderHome(); }

        function enviarWhatsApp() {
            const name = document.getElementById('order-name').value;
            const terms = document.getElementById('order-terms').checked;
            if(!name || !terms) return alert("Nombre y Términos obligatorios.");

            let msg = `*🛍️ PEDIDO: ${restActivo.NOMBRE}*\n\n`;
            const resumen = carrito.reduce((acc, i) => { acc[i.n] = (acc[i.n] || 0) + 1; return acc; }, {});
            let total = 0;
            for (const [nom, cant] of Object.entries(resumen)) {
                const p = carrito.find(i=>i.n==nom).p;
                msg += `• ${cant}x ${nom} (${(p*cant).toFixed(2)}€)\n`;
                total += p*cant;
            }
            msg += `\n*TOTAL: ${total.toFixed(2)}€*\n\n👤 ${name}\n📞 ${document.getElementById('order-phone').value}\n📍 ${document.getElementById('order-address').value}\n📝 ${document.getElementById('order-note').value}`;
            window.open(`https://wa.me/${WHATSAPP_NUM}?text=${encodeURIComponent(msg)}`);
        }

        init();
    </script>
</body>
</html>
