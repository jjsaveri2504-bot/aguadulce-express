<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; background-color: #F8FAFC; margin: 0; padding: 0; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .card-rest { flex: 0 0 150px; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; }
        .plato-item { background: white; border-radius: 20px; padding: 12px; display: flex; align-items: center; gap: 12px; margin-bottom: 10px; border: 1px solid #f1f5f9; }
    </style>
</head>
<body class="pb-32">

    <header class="bg-white sticky top-0 z-50 p-5 border-b-2 border-cyan-500 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <button id="btn-back" onclick="location.reload()" class="hidden bg-gray-100 p-2 rounded-lg text-xs">VOLVER</button>
            <h1 id="header-titulo" class="font-bold italic text-sm uppercase">AGUADULCE <span class="text-cyan-500">EXPRESS</span></h1>
        </div>
    </header>

    <main id="main-container" class="p-5 max-w-lg mx-auto">
        <div id="loader" class="text-center py-20">
            <div class="inline-block w-8 h-8 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin"></div>
            <p class="mt-4 font-bold text-xs text-gray-400 uppercase tracking-widest">Cargando Menús...</p>
        </div>
    </main>

    <div id="basket-bar" onclick="finalizarPedido()" class="fixed bottom-6 left-6 right-6 h-16 bg-cyan-500 rounded-2xl hidden flex items-center justify-between px-6 text-white shadow-2xl z-50 font-bold active:scale-95 transition">
        <span id="basket-count" class="bg-white text-cyan-500 px-2 py-1 rounded-lg text-xs">0</span>
        <span class="text-xs uppercase italic">Pedir ahora</span>
        <span id="basket-total">0.00 €</span>
    </div>

    <script>
        // CONFIGURACIÓN
        const API_URL = "https://script.google.com/macros/s/AKfycbx1H3ZwRycKEok84xOrGSuayz9Bgu5bORLjoxYuLoNULGUbR0RbdWa2_SAKPgkH0bC8/exec";
        let BD = null;
        let carrito = [];
        let restActual = null;

        // Función que recibe los datos del Excel (JSONP)
        window.callbackExcel = function(datos) {
            console.log("Datos recibidos:", datos);
            BD = datos;
            renderRestaurantes();
        };

        // Solicitar datos al servidor
        function conectar() {
            const script = document.createElement('script');
            script.src = API_URL + "?callback=callbackExcel";
            document.body.appendChild(script);
        }

        // Mostrar lista de restaurantes
        function renderRestaurantes() {
            const container = document.getElementById('main-container');
            container.innerHTML = "";
            
            const categorias = [...new Set(BD.restaurantes.map(r => r.CATEGORIA))];

            categorias.forEach(cat => {
                const fila = BD.restaurantes.filter(r => r.CATEGORIA === cat);
                let html = `<p class="text-[10px] font-bold text-gray-400 uppercase mb-3 italic tracking-widest">${cat}</p>
                            <div class="flex overflow-x-auto gap-4 hide-scroll mb-8">`;
                
                fila.forEach(r => {
                    html += `
                        <div onclick="verMenu('${r.ID_RESTAURANTE}')" class="card-rest">
                            <img src="${r.FOTO}" class="w-full h-28 object-cover">
                            <p class="p-3 text-[10px] font-bold text-center uppercase">${r.NOMBRE_RESTAURANTE}</p>
                        </div>`;
                });
                container.innerHTML += html + `</div>`;
            });
        }

        // Mostrar platos de un restaurante
        function verMenu(id) {
            restActual = BD.restaurantes.find(r => String(r.ID_RESTAURANTE) === String(id));
            const platos = BD.menus.filter(p => String(p.ID_RESTAURANTE) === String(id));
            
            document.getElementById('header-titulo').innerText = restActual.NOMBRE_RESTAURANTE;
            document.getElementById('btn-back').classList.remove('hidden');
            
            const container = document.getElementById('main-container');
            container.innerHTML = `<div class="grid gap-3">`;
            platos.forEach(p => {
                container.innerHTML += `
                    <div onclick="agregar('${p.PLATO}', ${p.PRECIO})" class="plato-item shadow-sm active:scale-95 transition">
                        <img src="${p.FOTO_PLATO}" class="w-16 h-16 rounded-xl object-cover">
                        <div class="flex-1">
                            <p class="font-bold text-[11px] uppercase">${p.PLATO}</p>
                            <p class="text-cyan-500 font-bold text-sm">${parseFloat(p.PRECIO).toFixed(2)} €</p>
                        </div>
                        <div class="text-cyan-500 font-bold text-lg">+</div>
                    </div>`;
            });
            container.innerHTML += `</div>`;
            window.scrollTo(0,0);
        }

        // Agregar al carrito
        function agregar(nombre, precio) {
            carrito.push({nombre, precio});
            actualizarCesta();
        }

        function actualizarCesta() {
            const bar = document.getElementById('basket-bar');
            const total = carrito.reduce((s, i) => s + i.precio, 0) + 3.50;
            document.getElementById('basket-count').innerText = carrito.length;
            document.getElementById('basket-total').innerText = total.toFixed(2) + " €";
            bar.classList.remove('hidden');
        }

        // Finalizar pedido y enviar a Excel + WhatsApp
        function finalizarPedido() {
            const nombre = prompt("Tu Nombre:");
            const direccion = prompt("Dirección de entrega:");
            if (!nombre || !direccion) return;

            const totalFinal = (carrito.reduce((s, i) => s + i.precio, 0) + 3.50).toFixed(2);
            const listaProductos = carrito.map(i => i.nombre).join(", ");

            // Enviar al Excel (Modo invisible)
            const urlExcel = `${API_URL}?cliente=${encodeURIComponent(nombre)}&whatsapp=Movil&direccion=${encodeURIComponent(direccion)}&productos=${encodeURIComponent(listaProductos)}&total=${totalFinal}&restaurante=${restActual.ID_RESTAURANTE}`;
            const img = new Image();
            img.src = urlExcel;

            // Enviar a WhatsApp
            const textoWA = `*NUEVO PEDIDO*\nCliente: ${nombre}\nDirección: ${direccion}\nProductos: ${listaProductos}\nTotal: ${totalFinal} €`;
            
            setTimeout(() => {
                window.location.href = `https://wa.me/${restActual.TELEFONO}?text=${encodeURIComponent(textoWA)}`;
            }, 500);
        }

        // Iniciar carga
        conectar();
    </script>
</body>
</html>
