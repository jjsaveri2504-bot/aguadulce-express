<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: ui-sans-serif, system-ui; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        
        /* Círculos de categorías (Pequeños y elegantes) */
        .cat-bubble { flex: 0 0 70px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
        .cat-img-wrapper { width: 55px; height: 55px; border-radius: 50%; background: #1e293b; padding: 2px; border: 2px solid transparent; overflow: hidden; transition: 0.3s; }
        .cat-img-wrapper img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .cat-bubble.active .cat-img-wrapper { border-color: #06b6d4; transform: scale(1.05); }
        .cat-bubble span { font-size: 9px; font-weight: 700; color: #64748b; text-transform: uppercase; text-align: center; }

        /* Estilo Lista para Extras (Estilo Uber) */
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .check-custom { width: 18px; height: 18px; border: 2px solid #334155; border-radius: 4px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .selected .check-custom { border-color: #06b6d4; background: #06b6d4; }
        .selected .check-custom::after { content: '✓'; color: white; font-size: 10px; font-weight: bold; }

        /* Animaciones */
        .modal-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="pb-24">
 
    <header class="glass sticky top-0 z-50 px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <button id="btn-back" onclick="irAHome()" class="hidden p-2 bg-white/5 rounded-lg text-white">←</button>
            <h1 id="header-txt" class="font-black italic text-lg uppercase tracking-tighter text-cyan-400">AGUADULCE <span class="text-white">EXPRESS</span></h1>
        </div>
        <img src="https://i.postimg.cc/C1tDpH9b/LOGO-fondo-blanco.png" class="w-8 h-8 rounded-full">
    </header>

    <div id="rest-banner" class="hidden h-32 w-full relative overflow-hidden mb-4">
        <div id="banner-img" class="absolute inset-0 bg-cover bg-center"></div>
        <div class="absolute inset-0 bg-black/60 flex items-center justify-center">
            <h2 id="banner-name" class="text-2xl font-black italic uppercase text-white tracking-widest drop-shadow-lg"></h2>
        </div>
    </div>
 
    <div id="cat-nav" class="flex gap-4 p-5 overflow-x-auto hide-scroll"></div>
    <main id="app-content" class="p-4 max-w-xl mx-auto grid grid-cols-2 gap-4"></main>
 
    <div id="modal-detalle" class="fixed inset-0 z-[60] bg-slate-950 hidden overflow-y-auto modal-up">
        <div class="max-w-xl mx-auto min-h-screen pb-32">
            <div id="det-img-cont" class="h-64 w-full relative">
                <button onclick="cerrarDetalle()" class="absolute top-6 left-6 z-10 w-10 h-10 bg-black/50 rounded-full text-white flex items-center justify-center">✕</button>
                <div class="absolute inset-0 bg-gradient-to-t from-slate-950"></div>
            </div>
            
            <div class="px-6 -mt-10 relative space-y-6">
                <div class="flex justify-between items-start">
                    <div class="flex-1">
                        <h2 id="det-titulo" class="text-2xl font-black italic uppercase text-white leading-none"></h2>
                        <p id="det-desc" class="text-gray-400 text-xs mt-2 italic"></p>
                    </div>
                    <span id="det-precio-base" class="text-cyan-400 text-xl font-mono font-bold"></span>
                </div>

                <div id="cont-multi" class="pt-4 border-t border-white/5">
                    <p class="text-[10px] font-black text-cyan-400 uppercase tracking-widest mb-2">Añade complementos</p>
                    <div id="grid-multi" class="space-y-1"></div>
                </div>

                <div class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-slate-950 via-slate-950 to-transparent">
                    <div class="max-w-xl mx-auto space-y-4">
                        <div class="flex justify-center">
                            <div class="flex items-center bg-slate-900 border border-white/10 rounded-full px-3 py-1 gap-4 shadow-xl">
                                <button onclick="cambiarCant(-1)" class="text-white text-xl font-bold w-6">−</button>
                                <span id="det-cant" class="text-white font-black text-sm w-4 text-center">1</span>
                                <button onclick="cambiarCant(1)" class="text-white text-xl font-bold w-6">+</button>
                            </div>
                        </div>
                        <button id="btn-add-carrito" class="w-full bg-cyan-600 h-12 rounded-xl font-black uppercase text-white flex justify-between items-center px-6 shadow-lg active:scale-95 transition-all">
                           <span class="text-[10px] tracking-widest">Añadir al pedido</span>
                           <span id="det-precio-final" class="text-sm font-mono">0.00€</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
 
    <div id="basket-bar" class="fixed bottom-4 left-6 right-6 z-40 hidden">
        <div onclick="abrirCheckout()" class="bg-cyan-600 rounded-2xl h-12 px-5 flex items-center justify-between shadow-2xl cursor-pointer active:scale-95 transition-all">
            <span class="bg-black/20 px-2 py-0.5 rounded-lg text-[10px] font-black text-white" id="basket-count">0</span>
            <span class="text-[10px] font-black uppercase text-white tracking-widest">Ver Pedido</span>
            <span id="basket-total" class="font-mono font-bold text-white text-sm">0.00 €</span>
        </div>
    </div>

    <script>
        const API_URL = "TU_URL_DE_SCRIPT";
        const COSTO_ENVIO = 3.50;
        let dataCache = null, carrito = [], restActivo = null, pAct = null, sMulti = [], cantAct = 1;

        async function init() {
            const res = await fetch(API_URL);
            dataCache = await res.json();
            renderHome();
        }

        function renderHome(f = null) {
            restActivo = null;
            document.getElementById('btn-back').classList.add('hidden');
            document.getElementById('rest-banner').classList.add('hidden');
            document.getElementById('header-txt').innerHTML = 'AGUADULCE <span class="text-white">EXPRESS</span>';
            
            const content = document.getElementById('app-content');
            content.className = "p-4 grid grid-cols-2 gap-4";
            content.innerHTML = "";
            
            const filt = (f && f !== 'TODOS') ? dataCache.restaurantes.filter(r => r.CATEGORIA === f) : dataCache.restaurantes;
            
            filt.forEach(r => {
                // VOLVEMOS AL ESTILO ORIGINAL: Foto arriba, Nombre abajo
                content.innerHTML += `
                    <div onclick="verMenu('${r.ID_RESTAURANTE}')" class="space-y-2 active:scale-95 transition">
                        <img src="${r.FOTO}" class="w-full h-32 object-cover rounded-2xl shadow-lg border border-white/5">
                        <p class="text-[10px] font-black uppercase text-center text-gray-300 tracking-tighter">${r.NOMBRE}</p>
                    </div>`;
            });
            renderCats(dataCache.restaurantes, false);
        }

        function verMenu(id) {
            restActivo = dataCache.restaurantes.find(r => String(r.ID_RESTAURANTE) === String(id));
            const platos = dataCache.menus.filter(m => String(m.ID_RESTAURANTE) === String(id));
            
            // ACTIVAR EL BANNER CON IMAGEN (LO QUE PEDISTE)
            document.getElementById('btn-back').classList.remove('hidden');
            document.getElementById('header-txt').innerText = ""; // Ocultamos texto header para no saturar
            document.getElementById('rest-banner').classList.remove('hidden');
            document.getElementById('banner-img').style.backgroundImage = `url('${restActivo.FOTO}')`;
            document.getElementById('banner-name').innerText = restActivo.NOMBRE;

            const content = document.getElementById('app-content');
            content.className = "p-4 flex flex-col gap-3";
            content.innerHTML = "";
            
            platos.forEach(p => {
                content.innerHTML += `
                <div onclick='abrirDetalle(${JSON.stringify(p)})' class="bg-white/5 p-3 rounded-2xl flex items-center gap-4 border border-white/5">
                    <img src="${p.FOTO}" class="w-16 h-16 rounded-xl object-cover">
                    <div class="flex-1">
                        <p class="text-[11px] font-bold text-white uppercase leading-tight">${p.PLATO}</p>
                        <p class="text-cyan-400 font-mono text-sm mt-1">${parseFloat(p.PRECIO).toFixed(2)}€</p>
                    </div>
                </div>`;
            });
            renderCats(platos, true);
        }

        function abrirDetalle(p) {
            pAct = p; sMulti = []; cantAct = 1;
            document.getElementById('det-titulo').innerText = p.PLATO;
            document.getElementById('det-desc').innerText = p.DESCRIPCION || "";
            document.getElementById('det-precio-base').innerText = parseFloat(p.PRECIO).toFixed(2) + "€";
            document.getElementById('det-img-cont').style.background = `url('${p.FOTO}') center/cover`;
            
            const gM = document.getElementById('grid-multi'); gM.innerHTML = "";
            if(p.EXTRAS) {
                p.EXTRAS.split(',').forEach(o => {
                    const [n, pr] = o.split(':');
                    const row = document.createElement('div'); 
                    row.className = "list-item";
                    row.innerHTML = `
                        <div class="text-[11px] font-medium text-gray-300 uppercase">${n.trim()} <span class="text-cyan-500 ml-2">+${parseFloat(pr).toFixed(2)}€</span></div>
                        <div class="check-custom"></div>`;
                    row.onclick = () => {
                        row.classList.toggle('selected');
                        const idx = sMulti.findIndex(x => x.n === n.trim());
                        if(idx > -1) sMulti.splice(idx, 1); else sMulti.push({ n: n.trim(), p: parseFloat(pr || 0) });
                        updatePrecio();
                    };
                    gM.appendChild(row);
                });
            }
            updatePrecio();
            document.getElementById('modal-detalle').classList.remove('hidden');
        }

        function updatePrecio() {
            let total = (parseFloat(pAct.PRECIO) + sMulti.reduce((a, b) => a + b.p, 0)) * cantAct;
            document.getElementById('det-precio-final').innerText = total.toFixed(2) + "€";
            document.getElementById('det-cant').innerText = cantAct;
        }

        function cambiarCant(v) { cantAct = Math.max(1, cantAct + v); updatePrecio(); }
        function irAHome() { renderHome(); }
        function cerrarDetalle() { document.getElementById('modal-detalle').classList.add('hidden'); }
        
        // El resto de funciones (renderCats, updateBarra, abrirCheckout) se mantienen iguales a tu v24
        init();
    </script>
</body>
</html>
