<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express | Seguridad v32</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,900;1,900&display=swap');
        body { background: #020617; color: #f8fafc; font-family: ui-sans-serif, system-ui; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .brand-font { font-family: 'Poppins', sans-serif; font-weight: 900; font-style: italic; text-transform: uppercase; letter-spacing: -1.5px; line-height: 1; }
        .modal-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        /* Animación para el botón de confirmación final */
        .btn-confirm-final { background: #22c55e !important; box-shadow: 0 0 20px rgba(34, 197, 94, 0.4); }
    </style>
</head>
<body class="pb-32">

    <header class="glass sticky top-0 z-50 px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3 relative">
            <button id="btn-back" onclick="irAHome()" class="hidden w-10 h-10 flex items-center justify-center bg-white/10 rounded-xl text-white mr-1">←</button>
            <div class="w-11 h-11 rounded-full border border-white/20 overflow-hidden bg-white shadow-lg flex-shrink-0">
                <img src="Logo Aguadulce Express.jpeg" class="w-full h-full object-contain">
            </div>
            <div class="flex flex-col brand-font">
                <span class="text-2xl text-cyan-400">AGUADULCE</span>
                <span class="text-xs text-white tracking-[0.3em] -mt-1">EXPRESS</span>
            </div>
        </div>
        <div class="w-10 h-10 rounded-full border border-white/10 bg-slate-800 flex items-center justify-center text-[10px] font-black text-slate-500">AE</div>
    </header>

    <div id="cat-nav" class="flex gap-4 p-5 overflow-x-auto bg-[#020617]"></div>
    <main id="app-content" class="p-4 max-w-xl mx-auto grid grid-cols-2 gap-6"></main>

    <div id="modal-checkout" class="fixed inset-0 z-[75] bg-slate-950 hidden overflow-y-auto p-6 modal-up">
        <div class="max-w-md mx-auto space-y-8 pb-20 pt-10">
            <h2 class="text-3xl font-black italic text-white uppercase tracking-tighter">FINALIZAR <span class="text-cyan-400">PEDIDO</span></h2>
            
            <div id="checkout-list" class="space-y-2"></div>

            <div id="form-datos" class="space-y-4">
                <input type="text" id="o-name" placeholder="Tu Nombre" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-white outline-none focus:border-cyan-500">
                <input type="tel" id="o-phone" placeholder="Teléfono" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-white outline-none focus:border-cyan-500">
                <input type="text" id="o-addr" placeholder="Dirección de entrega" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-white outline-none focus:border-cyan-500">
            </div>

            <div class="space-y-4">
                <button id="btn-flow" onclick="manejarFlujoPedido()" class="w-full bg-cyan-600 p-6 rounded-2xl font-black uppercase text-white shadow-xl transition-all duration-300">
                    1. Enviar a WhatsApp
                </button>
                
                <p id="txt-ayuda" class="text-[10px] text-gray-500 text-center uppercase font-bold tracking-widest hidden">
                    Primero envía el mensaje, luego confirma aquí para avisar al repartidor.
                </p>
            </div>

            <button onclick="cerrarCheckout()" class="w-full text-gray-600 font-bold uppercase text-[10px] text-center">Cancelar pedido</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbz6v3d0YYIDAg5H3OY0ey6lWIGINVcR2iR26nGrut6xy68TY4fZmUxinUFu9R3jS4sK/exec";
        const COSTO_ENVIO = 3.50;
        let dataCache = null, carrito = [], restActivo = null, pasoConfirmacion = false;

        async function init() {
            try {
                const res = await fetch(API_URL);
                dataCache = await res.json();
                renderHome();
            } catch (e) { console.error("Error API"); }
        }

        function manejarFlujoPedido() {
            const btn = document.getElementById('btn-flow');
            const ayuda = document.getElementById('txt-ayuda');
            const n = document.getElementById('o-name').value;
            const t = document.getElementById('o-phone').value;
            const a = document.getElementById('o-addr').value;

            if(!n || !t || !a) return alert("Por favor, rellena tus datos.");

            if (!pasoConfirmacion) {
                // PASO 1: ABRIR WHATSAPP
                const totalF = (carrito.reduce((acc, i) => acc + i.p, 0) + COSTO_ENVIO).toFixed(2);
                let msg = `*🛍️ PEDIDO: ${restActivo.NOMBRE}*\n\n*CLIENTE:* ${n.toUpperCase()}\n*DIR:* ${a.toUpperCase()}\n\n*Pedido:*\n`;
                carrito.forEach(i => msg += `• ${i.n} - ${i.p.toFixed(2)}€\n`);
                msg += `\n*TOTAL: ${totalF}€*`;
                
                window.open(`https://wa.me/${restActivo.TELEFONO}?text=${encodeURIComponent(msg)}`);

                // Cambiar el estado del botón
                btn.innerText = "2. Confirmar que ya lo envié";
                btn.classList.add('btn-confirm-final');
                ayuda.classList.remove('hidden');
                pasoConfirmacion = true;
            } else {
                // PASO 2: ENVIAR A EXCEL (Ahora sí es real)
                ejecutarEnvioFinalExcel();
            }
        }

        function ejecutarEnvioFinalExcel() {
            const n = document.getElementById('o-name').value;
            const a = document.getElementById('o-addr').value;
            const totalF = (carrito.reduce((acc, i) => acc + i.p, 0) + COSTO_ENVIO).toFixed(2);
            const detalle = carrito.map(i => i.n).join(' | ');

            // Mostrar cargando
            document.getElementById('btn-flow').innerText = "PROCESANDO...";
            document.getElementById('btn-flow').disabled = true;

            fetch(API_URL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify({
                    id_restaurante: restActivo.ID_RESTAURANTE, 
                    cliente: n, 
                    direccion: a, 
                    detalle: detalle, 
                    total: totalF, 
                    whatsapp_rest: restActivo.TELEFONO
                })
            });

            // Finalización exitosa
            setTimeout(() => {
                alert("¡Pedido registrado con éxito! El repartidor se pondrá en marcha.");
                location.reload(); // Reiniciar App
            }, 1000);
        }

        // --- Resto de funciones de renderizado (se mantienen igual que antes) ---
        function renderHome() {
            document.getElementById('btn-back').classList.add('hidden');
            const content = document.getElementById('app-content');
            content.innerHTML = "";
            dataCache.restaurantes.forEach(r => {
                content.innerHTML += `<div onclick="verMenu('${r.ID_RESTAURANTE}')" class="space-y-3"><img src="${r.FOTO}" class="w-full h-36 object-cover rounded-[2.2rem] border border-white/5"><p class="text-[10px] font-black uppercase text-center text-slate-400">${r.NOMBRE}</p></div>`;
            });
        }

        function verMenu(id) {
            restActivo = dataCache.restaurantes.find(r => String(r.ID_RESTAURANTE) === String(id));
            const platos = dataCache.menus.filter(m => String(m.ID_RESTAURANTE) === String(id));
            document.getElementById('btn-back').classList.remove('hidden');
            const content = document.getElementById('app-content');
            content.className = "p-4 flex flex-col gap-4";
            content.innerHTML = "";
            platos.forEach(p => {
                content.innerHTML += `<div onclick='agregarAlCarritoDirecto(${JSON.stringify(p)})' class="bg-white/5 p-4 rounded-[1.8rem] flex items-center gap-5 border border-white/5 active:scale-95 transition-all"><img src="${p.FOTO}" class="w-16 h-16 rounded-2xl object-cover"><div class="flex-1"><p class="text-[11px] font-black text-white uppercase">${p.PLATO}</p><p class="text-cyan-400 font-bold">${Number(p.PRECIO).toFixed(2)}€</p></div></div>`;
            });
        }

        function agregarAlCarritoDirecto(p) {
            carrito.push({ n: `1x ${p.PLATO}`, p: Number(p.PRECIO) });
            actualizarBarraCesta();
        }

        function actualizarBarraCesta() {
            // (Lógica para mostrar el botón flotante de ver pedido)
        }

        function abrirCheckout() {
            const list = document.getElementById('checkout-list');
            list.innerHTML = "";
            carrito.forEach(i => list.innerHTML += `<div class="bg-white/5 p-3 rounded-xl text-[10px] uppercase font-bold text-gray-400">${i.n}</div>`);
            document.getElementById('modal-checkout').classList.remove('hidden');
        }

        function cerrarCheckout() {
            document.getElementById('modal-checkout').classList.add('hidden');
            // Resetear flujo si cancela
            pasoConfirmacion = false;
            document.getElementById('btn-flow').innerText = "1. Enviar a WhatsApp";
            document.getElementById('btn-flow').classList.remove('btn-confirm-final');
        }

        init();
    </script>
</body>
</html>
