<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express - PRUEBA V11</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background: #f8fafc; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .carrusel { display: flex; overflow-x: auto; gap: 15px; padding: 10px; }
        .card-rest { flex: 0 0 160px; background: white; border-radius: 20px; overflow: hidden; shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .img-rest { width: 100%; height: 120px; object-fit: cover; }
        .plato-card { background: white; border-radius: 20px; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .img-plato { width: 80px; height: 80px; border-radius: 15px; object-fit: cover; }
    </style>
</head>
<body class="pb-20">

    <header class="bg-white p-5 border-b-2 border-cyan-500 sticky top-0 z-50 flex items-center gap-4">
        <button id="btn-back" onclick="location.reload()" class="hidden bg-gray-100 p-2 rounded-lg">←</button>
        <h1 id="header-titulo" class="font-black italic uppercase text-lg">AGUADULCE <span class="text-cyan-500">EXPRESS</span></h1>
    </header>

    <main id="main-container" class="p-4 max-w-lg mx-auto">
        <div id="loader" class="text-center py-20">
            <div class="inline-block w-8 h-8 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin"></div>
            <p class="mt-4 text-xs font-bold text-gray-400 uppercase">Cargando datos del Excel...</p>
        </div>
    </main>

    <div id="basket-bar" class="fixed bottom-5 left-5 right-5 h-16 bg-cyan-500 rounded-2xl hidden flex items-center justify-between px-6 text-white font-bold shadow-xl">
        <span>VER PEDIDO</span>
        <span id="basket-total">0.00 €</span>
    </div>

    <script>
        // --- CONFIGURACIÓN ---
        const API_URL = "https://script.google.com/macros/s/AKfycbwtfhWSfjLZioAFM6oa9R56IQJbR1PuL2U9yW0-zSuhBZzl6u5MHQmLsexVe4g3TkJp/exec"; // <--- PEGA AQUÍ TU URL /exec
        
        let dataCache = null;
        let carrito = [];

        async function iniciar() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                
                if (data.error) {
                    document.getElementById('main-container').innerHTML = `<p class="text-red-500 text-center">Error: ${data.message}</p>`;
                    return;
                }

                dataCache = data;
                renderRestaurantes();
            } catch (e) {
                document.getElementById('main-container').innerHTML = `<p class="text-center text-gray-500">Error de conexión. Revisa la URL.</p>`;
            }
        }

        function renderRestaurantes() {
            const container = document.getElementById('main-container');
            container.innerHTML = "";
            
            // Sacamos categorías únicas usando el nombre exacto de tu Excel
            const categorias = [...new Set(dataCache.restaurantes.map(r => r.CATEGORIA))].filter(c => c);

            categorias.forEach(cat => {
                const filtrados = dataCache.restaurantes.filter(r => r.CATEGORIA === cat);
                
                let html = `
                    <div class="mb-8">
                        <h2 class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3 italic">${cat}</h2>
                        <div class="carrusel hide-scroll">`;
                
                filtrados.forEach(r => {
                    // Usamos NOMBRE_RESTAURANTE y FOTO (según tus capturas)
                    html += `
                        <div onclick="verMenu('${r.ID_RESTAURANTE}')" class="card-rest">
                            <img src="${r.FOTO}" class="img-rest" onerror="this.src='https://via.placeholder.com/300?text=Restaurante'">
                            <div class="p-3">
                                <p class="text-[10px] font-black uppercase italic leading-tight">${r.NOMBRE_RESTAURANTE}</p>
                            </div>
                        </div>`;
                });
                
                container.innerHTML += html + `</div></div>`;
            });
        }

        function verMenu(idRest) {
            const rest = dataCache.restaurantes.find(r => r.ID_RESTAURANTE == idRest);
            const platos = dataCache.menus.filter(m => m.ID_RESTAURANTE == idRest);
            
            document.getElementById('header-titulo').innerText = rest.NOMBRE_RESTAURANTE;
            document.getElementById('btn-back').classList.remove('hidden');
            
            const container = document.getElementById('main-container');
            container.innerHTML = `<div class="space-y-3">`;

            platos.forEach(p => {
                // Usamos PLATO, FOTO_PLATO y PRECIO_VENTA (según tus capturas)
                container.innerHTML += `
                    <div onclick="agregar('${p.PLATO}', '${p.PRECIO_VENTA}')" class="plato-card active:scale-95 transition">
                        <img src="${p.FOTO_PLATO}" class="img-plato" onerror="this.src='https://via.placeholder.com/150?text=Comida'">
                        <div class="flex-1">
                            <p class="font-black text-xs uppercase italic">${p.PLATO}</p>
                            <p class="text-xs text-gray-400 mb-1">${p.DESCRIPCION || ''}</p>
                            <p class="text-cyan-500 font-bold">${p.PRECIO_VENTA} €</p>
                        </div>
                        <div class="bg-cyan-50 text-cyan-500 w-8 h-8 rounded-full flex items-center justify-center font-bold">+</div>
                    </div>`;
            });

            window.scrollTo(0,0);
        }

        function agregar(nombre, precio) {
            const p = parseFloat(precio.replace(',', '.'));
            carrito.push({nombre, p});
            const total = carrito.reduce((s, item) => s + item.p, 0);
            document.getElementById('basket-total').innerText = total.toFixed(2) + " €";
            document.getElementById('basket-bar').classList.remove('hidden');
        }

        iniciar();
    </script>
</body>
</html>
