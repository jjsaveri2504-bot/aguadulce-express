<!DOCTYPE html>
<html lang="es">
<head>
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    colors: { 
                        'ae-main': '#00BCD4', 
                        'ae-dark': '#070B14', 
                        'ae-header-bg': '#020617', // Un negro azulado aún más profundo
                        'ae-card': '#161B28'
                    },
                    backgroundImage: {
                        // Textura sutil opcional (puedes cambiar esta URL por un patrón de comida)
                        'header-pattern': "url('https://www.transparenttextures.com/patterns/dark-dotted-2.png')",
                    }
                } 
            } 
        }
    </script>
    <style>
        /* ... (tus estilos CSS actuales) ... */

        /* Estilo MEMORABLE para el Header */
        .premium-header {
            background-color: #020617; /* Fondo base */
            background-image: linear-gradient(135deg, #020617 0%, #0F172A 100%); /* Degradado sutil */
            position: sticky;
            top: 0;
            z-index: 80;
            box-shadow: 0 10px 30px -5px rgba(0, 188, 212, 0.2); /* Sombra Cian */
            border-bottom: 2px solid #00BCD4; /* Línea Cian Brillante */
        }

        /* Backdrop Blur sutil para cuando haya scroll */
        .premium-header-blur {
            position: absolute;
            inset: 0;
            background-image: inherit; /* Mismo degradado */
            opacity: 0.9; /* Un poco transparente */
            backdrop-filter: blur(10px);
            z-index: -1;
        }

        /* Resalte de Texto con Sombra */
        .logo-text {
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            letter-spacing: -0.05em; /* Letras más juntas para impacto */
        }
    </style>
</head>
<body class="pb-32 bg-ae-dark text-ae-light">

    <script>
        /* ... (tu configuración JS actual) ... */
    </script>

    <header class="premium-header px-6 py-5">
        <div class="premium-header-blur bg-header-pattern opacity-10"></div>
        
        <div class="flex items-center justify-between relative z-10">
            <button id="btn-back" onclick="location.reload()" class="hidden w-10 h-10 bg-white/5 rounded-xl flex items-center justify-center border border-white/10 active:scale-90 transition-all">
                <i class="fas fa-arrow-left text-white/70 text-sm"></i>
            </button>
            
            <div class="flex-1 text-center flex items-center justify-center gap-2 logo-text">
                <i class="fas fa-shipping-fast text-ae-main text-2xl animate-pulse"></i>
                
                <h1 id="header-titulo" class="font-extrabold text-2xl text-white uppercase italic leading-none">
                    AGUADULCE <span class="text-ae-main font-black">EXPRESS</span>
                </h1>
            </div>
            
            <div class="w-10"></div>
        </div>
    </header>

    <main id="main-container" class="p-6 max-w-xl mx-auto space-y-8 animate-fade-in"></main>

    </body>
</html>
