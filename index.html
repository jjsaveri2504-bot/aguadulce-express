<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: ui-sans-serif, system-ui; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        
        /* Burbujas superiores con fotos reales */
        .cat-bubble { flex: 0 0 85px; display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; }
        .cat-img-wrapper { 
            width: 65px; height: 65px; border-radius: 50%; background: #fff; padding: 2px; 
            border: 2px solid transparent; transition: 0.3s; overflow: hidden;
        }
        .cat-img-wrapper img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .cat-bubble.active .cat-img-wrapper { border-color: #06b6d4; transform: scale(1.1); box-shadow: 0 0 15px rgba(6, 182, 212, 0.4); }
        .cat-bubble span { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; }

        /* Botones de Opciones */
        .opt-btn { padding: 12px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.03); font-size: 11px; font-weight: 700; text-transform: uppercase; color: #cbd5e1; transition: 0.2s; cursor: pointer; text-align: center; }
        .opt-btn.selected { background: rgba(6, 182, 212, 0.2); border-color: #06b6d4; color: #22d3ee; }

        .modal-up { animation: slideUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="pb-32">

    <header class="glass sticky top-0 z-50 px-6 py-5 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <button id="btn-back" onclick="irAHome()" class="hidden p-2 bg-white/10 rounded-xl text-white">←</button>
            <h1 id="header-txt" class="font-black italic text-xl uppercase tracking-tighter text-cyan-400">AGUADULCE <span class="text-white">EXPRESS</span></h1>
        </div>
        <img src="https://i.postimg.cc/C1tDpH9b/LOGO-fondo-blanco.png" class="w-10 h-10 rounded-full border border-white/10">
    </header>

    <div id="cat-nav" class="flex gap-4 p-6 overflow-x-auto hide-scroll bg-[#020617]"></div>

    <main id="app-content" class="p-4 max-w-xl mx-auto grid grid-cols-2 gap-5"></main>

    <div id="modal-detalle" class="fixed inset-0 z-[60] bg-slate-950 hidden overflow-y-auto modal-up">
        <div class="max-w-xl mx-auto pb-40">
            <div id="det-img-cont" class="h-72 w-full relative"></div>
            <div class="p-8 -mt-10 relative bg-slate-950 rounded-t-[3rem] space-y-6">
                <div class="flex justify-between items-start">
                    <h2 id="det-titulo" class="text-2xl font-black italic uppercase text-white leading-tight"></h2>
                    <span id="det-precio-base" class="text-cyan-400 text-xl font-bold font-mono"></span>
                </div>
                <p id="det-desc" class="text-gray-400 text-sm"></p>

                <div id="cont-unica" class="space-y-3 hidden">
                    <p class="text-[10px] font-black text-cyan-500 uppercase tracking-widest">Selecciona una opción (obligatorio):</p>
                    <div id="grid-unica" class="grid grid-cols-2 gap-2"></div>
                </div>

                <div id="cont-multi" class="space-y-3 hidden">
                    <p class="text-[10px] font-black text-gray-500 uppercase tracking-widest">Añade extras (opcional):</p>
                    <div id="grid-multi" class="grid grid-cols-2 gap-2"></div>
                </div>

                <button id="btn-confirmar-plato" class="w-full bg-cyan-600 p-6 rounded-3xl font-black uppercase text-white flex justify-between items-center shadow-lg">
                    <span>Añadir pedido</span>
                    <span id="det-precio-final" class="bg-black/20 px-4 py-1 rounded-xl">0.00€</span>
                </button>
                <button onclick="cerrarDetalle()" class="w-full py-4 text-gray-500 font-bold uppercase text-[10px]">Cerrar</button>
            </div>
        </div>
    </div>

    <div id="basket-bar" class="fixed bottom-6 left-6 right-6 z-40 hidden modal-up">
        <div class="bg-cyan-600 rounded-[2.5rem] p-3 flex items-center justify-between shadow-2xl">
            <button onclick="vaciarCarrito()" class="p-4 bg-black/20 rounded-full text-white">🗑️</button>
            <p id="basket-total" class="text-2xl font-black text-white font-mono">0.00 €</p>
            <button onclick="abrirCheckout()" class="bg-slate-950 text-white px-8 py-4 rounded-full text-xs font-black uppercase">Pagar</button>
        </div>
    </div>

    <div id="modal-checkout" class="fixed inset-0 z-[70] bg-slate-950 hidden overflow-y-auto p-6 modal-up">
        <div class="max-w-md mx-auto space-y-8 pb-20">
            <h2 class="text-3xl font-black italic text-white uppercase pt-10">Tu <span class="text-cyan-400">Pedido</span></h2>
            <div id="checkout-list" class="space-y-2"></div>
            
            <div class="space-y-4 pt-4 border-t border-white/10">
                <input type="text" id="o-name" placeholder="Nombre" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-white">
                <input type="text" id="o-addr" placeholder="Dirección" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-white">
                
                <div class="flex items-start gap-3 p-4 bg-white/5 rounded-2xl border border-white/10">
                    <input type="checkbox" id="o-terms" class="mt-1 w-5 h-5 accent-cyan-500">
                    <label for="o-terms" class="text-[10px] text-gray-400 uppercase font-bold leading-tight">
                        Acepto las condiciones de uso y el manejo de mis datos para la gestión de este pedido.
                    </label>
                </div>
            </div>

            <button onclick="enviarWhatsApp()" class="w-full bg-cyan-600 p-7 rounded-3xl font-black uppercase text-white shadow-xl">Confirmar WhatsApp</button>
            <button onclick="cerrarCheckout()" class="w-full py-2 text-gray-500 font-bold uppercase text-[10px]">Volver</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwn3g8hrZjRe8EjgP9oXGBPP3gjIuM76lHwZCcm_t0vOt54B9gmez6ABUXJralRAZdV/exec"; 
        let dataCache = null, carrito = [], restActivo = null, pActual = null, selUnica = null, selMulti = [];

        // Imágenes reales para las categorías superiores
        const catImg = {
            "PIZZA": "https://i.postimg.cc/hj4Xf6b5/pizza-real.jpg",
            "HAMBURGUESA": "https://i.postimg.cc/85zXw6m4/burger-real.jpg",
            "TODOS": "https://i.postimg.cc/mD44w655/all-food.jpg"
        };

        async function init() {
            try {
                const res = await fetch(API_URL);
                dataCache = await res.json();
                renderCategorias();
                renderHome();
            } catch (e) { alert("Error al cargar datos."); }
        }

        function renderCategorias() {
            const cats = [...new Set(dataCache.restaurantes.map(r => r.CATEGORIA))].filter(Boolean);
            const nav = document.getElementById('cat-nav');
            nav.innerHTML = createBubble("TODOS", "Todos");
            cats.forEach(c => nav.innerHTML += createBubble(c, c));
        }

        function createBubble(id, name) {
            const img = catImg[id.toUpperCase()] || "https://i.postimg.cc/Hk654321/generic.jpg";
            return `<div onclick="filtrarRest('${id}', this)" class="cat-bubble ${id==='TODOS'?'active':''}">
                <div class="cat-img-wrapper"><img src="${img}"></div><span>${name}</span></div>`;
        }

        function renderHome(f = null) {
            document.getElementById('btn-back').classList.add('hidden');
            const content = document.getElementById('app-content');
            content.className = "p-4 grid grid-cols-2 gap-5"; content.innerHTML = "";
            const filt = (f && f !== 'TODOS') ? dataCache.restaurantes.filter(r => r.CATEGORIA === f) : dataCache.restaurantes;
            filt.forEach(r => {
                content.innerHTML += `<div onclick="verMenu('${r.ID_RESTAURANTE}')" class="bg-white/5 rounded-[2rem] overflow-hidden border border-white/5 shadow-lg">
                    <img src="${r.FOTO}" class="w-full h-32 object-cover">
                    <div class="p-4 text-center text-[10px] font-black uppercase italic">${r.NOMBRE}</div></div>`;
            });
        }

        function verMenu(id) {
            restActivo = dataCache.restaurantes.find(r => String(r.ID_RESTAURANTE) === String(id));
            const platos = dataCache.menus.filter(m => String(m.ID_RESTAURANTE) === String(id));
            document.getElementById('btn-back').classList.remove('hidden');
            document.getElementById('header-txt').innerText = restActivo.NOMBRE;
            const content = document.getElementById('app-content');
            content.className = "p-4 flex flex-col gap-4"; content.innerHTML = "";
            
            platos.forEach(p => {
                content.innerHTML += `<div onclick='abrirDetalle(${JSON.stringify(p)})' class="bg-white/5 p-4 rounded-[2rem] flex items-center gap-5 border border-white/10 active:scale-95 transition">
                    <img src="${p.FOTO}" class="w-20 h-20 rounded-2xl object-cover shadow-lg">
                    <div class="flex-1 font-black uppercase">
                        <p class="text-[11px] text-white leading-tight mb-1">${p.NOMBRE}</p>
                        <p class="text-cyan-400 text-lg font-mono">${parseFloat(p.PRECIO).toFixed(2)}€</p>
                    </div></div>`;
            });
        }

        function abrirDetalle(p) {
            pActual = p; selUnica = null; selMulti = [];
            document.getElementById('det-titulo').innerText = p.NOMBRE;
            document.getElementById('det-desc').innerText = p.DESCRIPCION || "";
            document.getElementById('det-precio-base').innerText = parseFloat(p.PRECIO).toFixed(2) + "€";
            document.getElementById('det-img-cont').innerHTML = `<img src="${p.FOTO}" class="w-full h-full object-cover">`;

            // Lógica SELECCION UNICA (Columna J)
            const gridUnica = document.getElementById('grid-unica'); gridUnica.innerHTML = "";
            const contUnica = document.getElementById('cont-unica');
            if(p.SELECCION_UNICA) {
                contUnica.classList.remove('hidden');
                p.SELECCION_UNICA.split(',').forEach(opt => {
                    const [n, pr] = opt.split(':');
                    const btn = document.createElement('div');
                    btn.className = "opt-btn";
                    btn.innerText = n + (pr > 0 ? ` (+${pr}€)` : "");
                    btn.onclick = () => {
                        document.querySelectorAll('#grid-unica .opt-btn').forEach(b => b.classList.remove('selected'));
                        btn.classList.add('selected');
                        selUnica = { n: n.trim(), p: parseFloat(pr || 0) };
                        calcPrecio();
                    };
                    gridUnica.appendChild(btn);
                });
            } else { contUnica.classList.add('hidden'); }

            // Lógica EXTRAS MULTIPLES (Columna H)
            const gridMulti = document.getElementById('grid-multi'); gridMulti.innerHTML = "";
            const contMulti = document.getElementById('cont-multi');
            if(p.EXTRAS) {
                contMulti.classList.remove('hidden');
                p.EXTRAS.split(',').forEach(opt => {
                    const [n, pr] = opt.split(':');
                    const btn = document.createElement('div');
                    btn.className = "opt-btn";
                    btn.innerText = n + (pr > 0 ? ` (+${pr}€)` : "");
                    btn.onclick = () => {
                        btn.classList.toggle('selected');
                        const idx = selMulti.findIndex(x => x.n === n.trim());
                        if(idx > -1) selMulti.splice(idx, 1);
                        else selMulti.push({ n: n.trim(), p: parseFloat(pr || 0) });
                        calcPrecio();
                    };
                    gridMulti.appendChild(btn);
                });
            } else { contMulti.classList.add('hidden'); }

            calcPrecio();
            document.getElementById('modal-detalle').classList.remove('hidden');
        }

        function calcPrecio() {
            let total = parseFloat(pActual.PRECIO);
            if(selUnica) total += selUnica.p;
            selMulti.forEach(x => total += x.p);
            document.getElementById('det-precio-final').innerText = total.toFixed(2) + "€";
        }

        document.getElementById('btn-confirmar-plato').onclick = () => {
            if(document.getElementById('cont-unica').offsetParent !== null && !selUnica) {
                alert("Por favor, selecciona una opción obligatoria."); return;
            }
            const extrasTxt = selMulti.map(x => x.n).join(', ');
            let nombreFinal = pActual.NOMBRE;
            if(selUnica) nombreFinal += ` [${selUnica.n}]`;
            if(extrasTxt) nombreFinal += ` (Extras: ${extrasTxt})`;
            
            let precioFinal = parseFloat(pActual.PRECIO) + (selUnica ? selUnica.p : 0) + selMulti.reduce((a,b) => a+b.p, 0);
            carrito.push({ n: nombreFinal, p: precioFinal });
            cerrarDetalle(); actualizarBarra();
        };

        function enviarWhatsApp() {
            const n = document.getElementById('o-name').value;
            const a = document.getElementById('o-addr').value;
            const terms = document.getElementById('o-terms').checked;
            if(!n || !a) return alert("Faltan datos de entrega.");
            if(!terms) return alert("Debes aceptar las condiciones.");

            let msg = `*NUEVO PEDIDO: ${restActivo.NOMBRE}*\n*Cliente:* ${n}\n*Dir:* ${a}\n\n`;
            carrito.forEach(i => msg += `• ${i.n} - ${i.p.toFixed(2)}€\n`);
            msg += `\n*TOTAL: ${carrito.reduce((a,b)=>a+b.p, 0).toFixed(2)}€*`;
            window.open(`https://wa.me/${restActivo.TELEFONO}?text=${encodeURIComponent(msg)}`);
        }

        function filtrarRest(c, el) { 
            document.querySelectorAll('.cat-bubble').forEach(b => b.classList.remove('active'));
            el.classList.add('active'); renderHome(c); 
        }
        function irAHome() { renderHome(); }
        function cerrarDetalle() { document.getElementById('modal-detalle').classList.add('hidden'); }
        function cerrarCheckout() { document.getElementById('modal-checkout').classList.add('hidden'); }
        function vaciarCarrito() { carrito = []; actualizarBarra(); }
        function actualizarBarra() {
            const t = carrito.reduce((a, b) => a + b.p, 0);
            document.getElementById('basket-total').innerText = t.toFixed(2) + " €";
            document.getElementById('basket-bar').classList.toggle('hidden', carrito.length === 0);
        }
        function abrirCheckout() {
            const l = document.getElementById('checkout-list'); l.innerHTML = "";
            carrito.forEach(i => l.innerHTML += `<div class="flex justify-between text-[11px] uppercase font-bold text-white bg-white/5 p-3 rounded-xl border border-white/5"><span>${i.n}</span><span>${i.p.toFixed(2)}€</span></div>`);
            document.getElementById('modal-checkout').classList.remove('hidden');
        }

        init();
    </script>
</body>
</html>
