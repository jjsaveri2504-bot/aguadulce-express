<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .loader { border-top-color: #facc15; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* --- NUEVO DISEÑO DE MOSAICO --- */
        #contenedor-productos {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 columnas en móvil */
            gap: 12px;
            padding: 15px;
            padding-bottom: 160px; /* Espacio extra para que la barra no tape el último plato */
        }

        .product-card {
            background: white;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #f0f0f0;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
            cursor: pointer;
        }

        .product-card:active { transform: scale(0.96); }

        .product-card img {
            width: 100%;
            height: 120px;
            object-fit: cover;
        }

        .product-info {
            padding: 12px;
            text-align: center;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product-info h4 {
            font-size: 0.8rem;
            font-weight: 900;
            text-transform: uppercase;
            color: #1a1a1a;
            line-height: 1.2;
            margin-bottom: 5px;
            /* Limita a 2 líneas el nombre */
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-info .price {
            font-size: 1.1rem;
            font-weight: 900;
            color: #111;
        }

        /* Responsive para PC */
        @media (min-width: 768px) {
            #contenedor-productos { grid-template-columns: repeat(4, 1fr); gap: 20px; }
            .product-card img { height: 160px; }
        }

        /* Modales y Barra */
        .modal-subir { transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); }
        .modal-subir.active { transform: translateY(0); }
        #barra-carrito { transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .carrito-burbuja { width: 65px; height: 65px; border-radius: 50% !important; padding: 0 !important; justify-content: center !important; }
        .carrito-burbuja .info-texto, .carrito-burbuja button { display: none !important; }
        .carrito-burbuja .icono-flotante { display: flex !important; }
    </style>
</head>
<body class="bg-stone-50 font-sans text-gray-900 no-scrollbar overflow-x-hidden">

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxab4l6A-VMEOvjxxE_8kNid1vYy9LlRa7LiZp83iy2luS96wuoPZIu0PL9lZSw4CkprQ/exec";
        const COSTO_ENVIO = 3.50;
    </script>

    <div id="loading" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-100 h-16 w-16 mb-6"></div>
        <p class="text-gray-400 font-bold tracking-widest uppercase text-xs">Cargando...</p>
    </div>

    <div id="pantalla-restaurantes" class="min-h-screen">
        <header class="relative bg-gray-950 h-[30vh] overflow-hidden">
            <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=1600&auto=format&fit=crop" class="absolute inset-0 w-full h-full object-cover opacity-50">
            <div class="absolute inset-0 bg-gradient-to-b from-transparent to-gray-950"></div>
            <div class="relative z-10 max-w-md mx-auto h-full flex flex-col justify-end p-7 pb-10 text-center">
                <h1 class="text-4xl font-black italic tracking-tighter text-white leading-none uppercase">Aguadulce<br><span class="text-yellow-400">Express</span></h1>
            </div>
        </header>
        <main class="p-7 max-w-md mx-auto relative z-20 bg-stone-50 -mt-8 rounded-t-[3rem] shadow-2xl space-y-6">
            <div id="lista-locales" class="grid grid-cols-1 gap-6"></div>
        </main>
    </div>

    <div id="pantalla-menu" class="hidden max-w-md mx-auto min-h-screen bg-white">
        <nav class="p-4 bg-white/95 backdrop-blur-xl sticky top-0 z-40 flex items-center justify-between border-b border-gray-100">
            <button onclick="irAInicio()" class="w-12 h-12 flex items-center justify-center bg-stone-100 rounded-2xl active:scale-90">
                <i class="fas fa-arrow-left"></i>
            </button>
            <div class="text-center flex-1 px-4 truncate">
                <h2 id="nombre-restaurante-titulo" class="font-black uppercase italic tracking-tight text-gray-950 truncate">Menú</h2>
            </div>
            <div class="w-12 h-12"></div>
        </nav>
        <div id="contenedor-productos"></div>
    </div>

    <div id="barra-carrito" onclick="expandirDesdeBurbuja()" class="fixed bottom-6 right-4 left-auto bg-gray-950 text-white p-6 flex items-center justify-between hidden z-[60] rounded-[2.5rem] shadow-2xl border border-white/5 cursor-pointer">
        <div class="icono-flotante hidden w-full h-full flex items-center justify-center relative">
            <i class="fas fa-shopping-basket text-yellow-400 text-2xl"></i>
            <span id="badge-count" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center">0</span>
        </div>
        <div class="info-texto text-left">
            <p id="cuenta-items" class="text-[10px] uppercase font-black text-yellow-400 tracking-widest italic">Tu Pedido</p>
            <p class="text-2xl font-black tracking-tighter text-white">$<span id="total-carrito">0</span></p>
        </div>
        <button onclick="mostrarFormulario(event)" class="bg-yellow-400 text-gray-950 px-6 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest active:scale-95 shadow-xl">
            Confirmar
        </button>
    </div>

    <div id="modal-producto" class="fixed inset-0 bg-gray-950/80 z-[80] hidden flex items-end justify-center transition-all">
        <div id="modal-container-prod" class="bg-white w-full max-w-md rounded-t-[3rem] p-8 max-h-[90vh] overflow-y-auto relative modal-subir">
            <div class="w-20 h-2 bg-gray-200 mx-auto mb-8 rounded-full" onclick="cerrarModal()"></div>
            <div id="detalle-producto-content"></div>
        </div>
    </div>

    <div id="modal-cliente" class="fixed inset-0 bg-gray-950/95 z-[90] hidden flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl">
            <h3 class="text-2xl font-black uppercase italic mb-6 text-center text-gray-950">Datos de Entrega</h3>
            <div class="space-y-4">
                <input type="text" id="cli-nombre" placeholder="Nombre completo" class="w-full p-4 bg-stone-100 rounded-2xl border-none text-sm font-bold outline-none focus:ring-2 focus:ring-yellow-400">
                <input type="tel" id="cli-tel" placeholder="WhatsApp / Teléfono" class="w-full p-4 bg-stone-100 rounded-2xl border-none text-sm font-bold outline-none focus:ring-2 focus:ring-yellow-400">
                <textarea id="cli-dir" placeholder="Dirección exacta y referencia" class="w-full p-4 bg-stone-100 rounded-2xl border-none text-sm font-bold outline-none focus:ring-2 focus:ring-yellow-400 h-24"></textarea>
            </div>
            <button onclick="validarYEnviar()" class="w-full bg-gray-950 text-white py-5 rounded-2xl font-black mt-6 uppercase tracking-widest text-xs active:scale-95 shadow-xl">Pedir por WhatsApp</button>
            <button onclick="cerrarForm()" class="w-full text-gray-400 font-bold mt-4 text-[10px] uppercase">Cerrar</button>
        </div>
    </div>

    <script>
        let locales = [];
        let menuActual = [];
        let carrito = [];
        let restauranteSeleccionado = null;

        async function cargarRestaurantes() {
            try {
                const res = await fetch(`${API_URL}?sheet=RESTAURANTES`);
                locales = await res.json();
                document.getElementById('lista-locales').innerHTML = locales.map(l => `
                    <div onclick="seleccionarRestaurante('${l.Nombre}', '${l.Sheet}', '${l.WhatsApp}')" class="bg-white rounded-[2rem] overflow-hidden shadow-xl border border-gray-100 active:scale-95 transition-all cursor-pointer">
                        <img src="${l.Foto}" class="w-full h-44 object-cover">
                        <div class="p-5 text-center">
                            <h3 class="text-xl font-black uppercase italic text-gray-950 tracking-tighter">${l.Nombre}</h3>
                        </div>
                    </div>
                `).join('');
                document.getElementById('loading').classList.add('hidden');
            } catch (e) { alert("Error de conexión."); }
        }

        async function seleccionarRestaurante(nombre, sheet, whatsapp) {
            document.getElementById('loading').classList.remove('hidden');
            restauranteSeleccionado = { nombre, sheet, whatsapp };
            document.getElementById('nombre-restaurante-titulo').innerText = nombre;
            try {
                const res = await fetch(`${API_URL}?sheet=${sheet}`);
                menuActual = await res.json();
                renderizarMenu(menuActual);
                document.getElementById('pantalla-restaurantes').classList.add('hidden');
                document.getElementById('pantalla-menu').classList.remove('hidden');
                actualizarBarra(true);
                window.scrollTo(0,0);
            } catch (e) { alert("Menú no disponible."); }
            document.getElementById('loading').classList.add('hidden');
        }

        function renderizarMenu(productos) {
            const container = document.getElementById('contenedor-productos');
            // Mosaico 2x2: Imagen, Título y Precio. Descripción oculta.
            container.innerHTML = productos.filter(p => p.Disponible !== "NO").map((p, i) => `
                <div onclick="verFicha(${i})" class="product-card">
                    <img src="${p.Foto}" alt="${p.Nombre}">
                    <div class="product-info">
                        <h4>${p.Nombre}</h4>
                        <p class="price">$${p.Precio}</p>
                    </div>
                </div>
            `).join('');
        }

        function verFicha(index) {
            const p = menuActual[index];
            const content = document.getElementById('detalle-producto-content');
            let opcionesHTML = "";
            if(p.Opciones && p.Opciones !== "") {
                opcionesHTML = `<p class="font-black text-[10px] text-gray-400 uppercase mt-6 mb-3 tracking-widest">Personaliza tu orden:</p><div class="space-y-3">`;
                p.Opciones.split(',').forEach(opt => {
                    const parts = opt.split(':');
                    const n = parts[0].trim();
                    const pr = parts[1] ? parts[1].trim() : "0";
                    opcionesHTML += `
                        <label class="flex items-center justify-between p-4 bg-stone-50 rounded-2xl border border-stone-100">
                            <div class="flex items-center gap-3">
                                <input type="checkbox" class="extra-opt w-6 h-6 accent-gray-950" data-nombre="${n}" data-precio="${pr}">
                                <span class="text-sm font-bold text-gray-700">${n}</span>
                            </div>
                            <span class="font-black text-stone-400 text-sm">+$${pr}</span>
                        </label>`;
                });
                opcionesHTML += `</div>`;
            }
            content.innerHTML = `
                <img src="${p.Foto}" class="w-full h-64 object-cover rounded-[2.5rem] mb-6 shadow-xl">
                <div class="text-left">
                    <h2 class="text-3xl font-black italic uppercase text-gray-950 leading-none">${p.Nombre}</h2>
                    <p class="text-sm text-stone-500 mt-4 font-medium">${p.Descripcion || 'Sin descripción disponible.'}</p>
                    ${opcionesHTML}
                    <button onclick="agregar('${p.Nombre}', ${p.Precio})" class="w-full bg-gray-950 text-white py-6 rounded-3xl font-black mt-8 uppercase tracking-widest text-xs shadow-2xl active:scale-95">Añadir al Pedido</button>
                </div>`;
            document.getElementById('modal-producto').classList.remove('hidden');
            setTimeout(() => document.getElementById('modal-container-prod').classList.add('active'), 10);
        }

        function agregar(nombre, precioBase) {
            let totalItem = parseFloat(precioBase);
            let extras = [];
            document.querySelectorAll('.extra-opt:checked').forEach(chk => {
                extras.push(chk.dataset.nombre);
                totalItem += parseFloat(chk.dataset.precio);
            });
            carrito.push({ nombre, precio: totalItem, extras: extras.join(', '), restaurante: restauranteSeleccionado.nombre });
            actualizarBarra(true);
            cerrarModal();
        }

        function actualizarBarra(expandir = false) {
            const barra = document.getElementById('barra-carrito');
            const subtotal = carrito.reduce((sum, item) => sum + item.precio, 0);
            
            if (carrito.length > 0) {
                barra.classList.remove('hidden');
                document.getElementById('badge-count').innerText = carrito.length;
                document.getElementById('total-carrito').innerText = (subtotal + COSTO_ENVIO).toFixed(2);
                
                if (expandir) {
                    barra.classList.remove('carrito-burbuja');
                    barra.style.left = "16px";
                } else {
                    barra.classList.add('carrito-burbuja');
                    barra.style.left = "auto";
                }
            } else {
                barra.classList.add('hidden');
            }
        }

        function irAInicio() {
            document.getElementById('pantalla-restaurantes').classList.remove('hidden');
            document.getElementById('pantalla-menu').classList.add('hidden');
            actualizarBarra(false);
            window.scrollTo(0,0);
        }

        function expandirDesdeBurbuja() {
            if (document.getElementById('barra-carrito').classList.contains('carrito-burbuja')) {
                actualizarBarra(true);
            }
        }

        function cerrarModal() {
            document.getElementById('modal-container-prod').classList.remove('active');
            setTimeout(() => document.getElementById('modal-producto').classList.add('hidden'), 400);
        }

        function mostrarFormulario(e) {
            e.stopPropagation();
            document.getElementById('modal-cliente').classList.remove('hidden');
        }
        
        function cerrarForm() { document.getElementById('modal-cliente').classList.add('hidden'); }

        function validarYEnviar() {
            const nombre = document.getElementById('cli-nombre').value;
            const tel = document.getElementById('cli-tel').value;
            const dir = document.getElementById('cli-dir').value;

            if(!nombre || !tel || !dir) { alert("Completa tus datos para el envío."); return; }

            let subtotal = carrito.reduce((sum, item) => sum + item.precio, 0);
            let resumen = `*🚀 NUEVO PEDIDO - AGUADULCE EXPRESS*\n`;
            resumen += `--------------------------------\n`;
            resumen += `👤 *CLIENTE:* ${nombre}\n`;
            resumen += `📞 *TELÉFONO:* ${tel}\n`;
            resumen += `📍 *ENTREGA:* ${dir}\n`;
            resumen += `--------------------------------\n`;
            
            carrito.forEach(item => {
                resumen += `✅ *${item.nombre}* [${item.restaurante}]\n   ↳ $${item.precio.toFixed(2)}${item.extras ? ' (' + item.extras + ')' : ''}\n`;
            });

            resumen += `--------------------------------\n`;
            resumen += `💰 Subtotal: $${subtotal.toFixed(2)}\n`;
            resumen += `🛵 Envío: $${COSTO_ENVIO.toFixed(2)}\n`;
            resumen += `🔥 *TOTAL A PAGAR: $${(subtotal + COSTO_ENVIO).toFixed(2)}*\n`;
            
            window.open(`https://wa.me/${restauranteSeleccionado.whatsapp}?text=${encodeURIComponent(resumen)}`, '_blank');
            cerrarForm();
        }

        cargarRestaurantes();
    </script>
</body>
</html>
