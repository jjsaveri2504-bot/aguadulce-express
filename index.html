<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express | Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,900;1,900&display=swap');
        body { background: #020617; color: #f8fafc; font-family: ui-sans-serif, system-ui; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .brand-font { font-family: 'Poppins', sans-serif; font-weight: 900; font-style: italic; text-transform: uppercase; letter-spacing: -1.5px; line-height: 1; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .cat-bubble { flex: 0 0 75px; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; }
        .cat-img-wrapper { width: 55px; height: 55px; border-radius: 50%; background: #1e293b; padding: 2px; border: 2px solid transparent; overflow: hidden; transition: 0.2s; }
        .cat-img-wrapper img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .cat-bubble.active .cat-img-wrapper { border-color: #06b6d4; transform: scale(1.05); box-shadow: 0 0 15px rgba(6, 182, 212, 0.4); }
        .option-btn { border: 1px solid rgba(255,255,255,0.1); transition: 0.2s; background: rgba(255,255,255,0.03); }
        .option-selected { border-color: #06b6d4 !important; background: rgba(6, 182, 212, 0.15) !important; color: #06b6d4 !important; }
        .btn-confirm-final { background: #16a34a !important; animation: pulse 2s infinite; transform: scale(1.05); }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(22, 163, 74, 0); } 100% { box-shadow: 0 0 0 0 rgba(22, 163, 74, 0); } }
        .modal-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="pb-28">

    <header class="glass sticky top-0 z-50 px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-4 relative min-w-[200px]">
            <button id="btn-back" onclick="irAHome()" class="hidden absolute left-0 w-10 h-10 flex items-center justify-center bg-white/10 border border-white/10 rounded-xl text-white z-10">←</button>
            <div id="brand-container" class="flex flex-col brand-font transition-all duration-300">
                <span class="text-3xl text-cyan-400">AGUADULCE</span>
                <span class="text-lg text-white tracking-[0.3em] -mt-1">EXPRESS</span>
            </div>
        </div>
        <div class="w-12 h-12 rounded-full border border-white/20 overflow-hidden shadow-lg bg-white flex items-center justify-center">
            <img src="Logo Aguadulce Express.jpeg" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3448/3448601.png'" class="w-full h-full object-contain">
        </div>
    </header>

    <div id="rest-banner" class="hidden h-44 w-full relative overflow-hidden mb-4">
        <div id="banner-img" class="absolute inset-0 bg-cover bg-center transition-transform duration-1000"></div>
        <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-black/40 to-transparent flex items-end p-6">
            <h2 id="banner-name" class="text-3xl font-black italic uppercase text-white tracking-widest leading-none"></h2>
        </div>
    </div>

    <div id="cat-nav" class="flex gap-4 p-5 overflow-x-auto hide-scroll bg-[#020617]"></div>

    <main id="app-content" class="p-4 max-w-xl mx-auto grid grid-cols-2 gap-6"></main>

    <div id="modal-detalle" class="fixed inset-0 z-[60] bg-slate-950 hidden overflow-y-auto modal-up">
        <div class="max-w-xl mx-auto min-h-screen pb-48">
            <button onclick="cerrarDetalle()" class="absolute top-6 left-6 z-[70] w-12 h-12 bg-black/60 rounded-full text-white text-2xl flex items-center justify-center backdrop-blur-md">✕</button>
            <div id="det-img-cont" class="h-80 w-full bg-cover bg-center relative"><div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-transparent"></div></div>
            
            <div class="px-8 -mt-10 relative space-y-6 bg-slate-950 rounded-t-[3rem] pt-8">
                <div class="flex justify-between items-start gap-4">
                    <div class="flex-1">
                        <h2 id="det-titulo" class="text-3xl font-black italic uppercase text-white leading-tight"></h2>
                        <p id="det-desc" class="text-gray-400 text-sm mt-2 italic"></p>
                    </div>
                    <span id="det-precio-base" class="text-cyan-400 text-2xl font-mono font-bold"></span>
                </div>

                <div id="cont-unica" class="hidden space-y-4 pt-4 border-t border-white/5">
                    <p class="text-[10px] font-black text-cyan-500 uppercase tracking-widest italic">Elige una opción:</p>
                    <div id="grid-unica" class="grid grid-cols-2 gap-3"></div>
                </div>

                <div class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-slate-950 via-slate-950 to-transparent z-[65]">
                    <div class="max-w-xl mx-auto flex items-center gap-4">
                        <div class="flex items-center bg-slate-900 border border-white/10 rounded-2xl px-5 py-3 gap-8 shadow-2xl">
                            <button onclick="cambiarCant(-1)" class="text-cyan-400 text-3xl font-light">−</button>
                            <span id="det-cant" class="text-white font-black text-xl w-6 text-center">1</span>
                            <button onclick="cambiarCant(1)" class="text-cyan-400 text-3xl font-light">+</button>
                        </div>
                        <button onclick="ejecutarAddCarrito()" class="flex-1 bg-cyan-600 h-16 rounded-2xl font-black uppercase text-white flex justify-between items-center px-8 shadow-xl active:scale-95 transition-all">
                           <span class="text-[11px] tracking-widest">Añadir</span>
                           <span id="det-precio-final" class="bg-black/20 px-4 py-1.5 rounded-xl text-sm font-mono">0.00€</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="basket-bar" class="fixed bottom-6 left-6 right-6 z-40 hidden modal-up">
        <div onclick="abrirCheckout()" class="bg-cyan-600 rounded-[2.2rem] h-16 px-8 flex items-center justify-between shadow-2xl border border-white/10">
            <div class="flex items-center gap-4">
                <span id="basket-count" class="bg-white text-cyan-600 w-7 h-7 rounded-full text-[11px] font-black flex items-center justify-center shadow-lg">0</span>
                <span class="text-[11px] font-black uppercase text-white tracking-widest">Revisar Pedido</span>
            </div>
            <span id="basket-total" class="font-mono font-bold text-white text-lg">0.00 €</span>
        </div>
    </div>

    <div id="modal-checkout" class="fixed inset-0 z-[75] bg-slate-950 hidden overflow-y-auto p-6 modal-up">
        <div class="max-w-md mx-auto space-y-8 pb-20 pt-10">
            <h2 class="text-4xl font-black italic text-white uppercase tracking-tighter">TU <span class="text-cyan-400">CESTA</span></h2>
            
            <div id="checkout-list" class="space-y-3"></div>
            
            <div class="space-y-4 pt-4 bg-white/5 p-6 rounded-[2.5rem] border border-white/5">
                <input type="text" id="o-name" placeholder="Tu Nombre Completo" class="w-full bg-slate-900 border border-white/10 rounded-2xl p-5 text-sm text-white focus:border-cyan-500 outline-none transition-all">
                <input type="text" id="o-addr" placeholder="Dirección Exacta de Entrega" class="w-full bg-slate-900 border border-white/10 rounded-2xl p-5 text-sm text-white focus:border-cyan-500 outline-none transition-all">
            </div>

            <div class="space-y-4">
                <button id="btn-flow" onclick="manejarFlujoPedido()" class="w-full bg-cyan-600 p-7 rounded-[2.5rem] font-black uppercase text-white shadow-xl transition-all text-sm tracking-widest flex flex-col items-center gap-1">
                    <span id="btn-text-main">1. ENVIAR A WHATSAPP</span>
                    <span id="btn-text-sub" class="text-[9px] opacity-60">Toca para preparar el mensaje</span>
                </button>
                <p id="txt-ayuda-seguridad" class="text-[11px] text-yellow-500 text-center uppercase font-black px-4 hidden leading-relaxed">
                    ⚠️ PASO FINAL: Tras enviar el WhatsApp, regresa aquí y pulsa el botón verde de CONFIRMAR.
                </p>
            </div>
            <button onclick="cerrarCheckout()" class="w-full text-slate-500 font-bold uppercase text-[10px] text-center tracking-widest">Seguir pidiendo</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbz6v3d0YYIDAg5H3OY0ey6lWIGINVcR2iR26nGrut6xy68TY4fZmUxinUFu9R3jS4sK/exec";
        const COSTO_ENVIO = 3.50;
        let dataCache = null, carrito = [], restActivo = null, pAct = null, sUnica = null, cantAct = 1, pasoConfirmacion = false;

        async function init() {
            try {
                const res = await fetch(API_URL);
                dataCache = await res.json();
                renderHome();
            } catch (e) { console.error("Error de conexión"); }
        }

        function renderHome(f = null) {
            restActivo = null;
            document.getElementById('btn-back').classList.add('hidden');
            document.getElementById('rest-banner').classList.add('hidden');
            document.getElementById('brand-container').style.marginLeft = "0px";
            const content = document.getElementById('app-content');
            content.className = "p-4 grid grid-cols-2 gap-6";
            content.innerHTML = "";
            const filt = (f && f !== 'TODOS') ? dataCache.restaurantes.filter(r => r.CATEGORIA === f) : dataCache.restaurantes;
            filt.forEach(r => {
                content.innerHTML += `<div onclick="verMenu('${r.ID_RESTAURANTE}')" class="space-y-3 active:scale-95 transition-all"><img src="${r.FOTO}" class="w-full h-40 object-cover rounded-[2.8rem] shadow-2xl border border-white/5"><p class="text-[11px] font-black uppercase text-center text-slate-400 tracking-wider">${r.NOMBRE}</p></div>`;
            });
            renderCats(dataCache.restaurantes, false);
        }

        function verMenu(id) {
            restActivo = dataCache.restaurantes.find(r => String(r.ID_RESTAURANTE) === String(id));
            const platos = dataCache.menus.filter(m => String(m.ID_RESTAURANTE) === String(id));
            document.getElementById('btn-back').classList.remove('hidden');
            document.getElementById('brand-container').style.marginLeft = "45px";
            const banner = document.getElementById('rest-banner');
            banner.classList.remove('hidden');
            document.getElementById('banner-img').style.backgroundImage = `url('${restActivo.FOTO}')`;
            document.getElementById('banner-name').innerText = restActivo.NOMBRE;
            const content = document.getElementById('app-content');
            content.className = "p-4 flex flex-col gap-4";
            content.innerHTML = "";
            platos.forEach(p => {
                content.innerHTML += `<div onclick='abrirDetalle(${JSON.stringify(p)})' class="bg-white/5 p-4 rounded-[2.2rem] flex items-center gap-5 border border-white/5 active:bg-white/10 transition-colors"><img src="${p.FOTO}" class="w-20 h-20 rounded-2xl object-cover shadow-xl"><div class="flex-1"><p class="text-[12px] font-black text-white uppercase leading-tight">${p.PLATO}</p><p class="text-cyan-400 font-mono font-bold text-lg mt-1">${Number(p.PRECIO).toFixed(2)}€</p></div></div>`;
            });
            renderCats(platos, true);
        }

        function abrirDetalle(p) {
            pAct = p; sUnica = null; cantAct = 1;
            document.getElementById('det-titulo').innerText = p.PLATO;
            document.getElementById('det-desc').innerText = p.DESCRIPCION || "";
            document.getElementById('det-precio-base').innerText = Number(p.PRECIO).toFixed(2) + "€";
            document.getElementById('det-img-cont').style.backgroundImage = `url('${p.FOTO}')`;
            
            const gU = document.getElementById('grid-unica'); gU.innerHTML = "";
            if(p.SELECCION_UNICA) {
                p.SELECCION_UNICA.split(',').forEach((o, i) => {
                    const [n, pr] = o.split(':');
                    const btn = document.createElement('button');
                    btn.className = "option-btn p-5 rounded-[1.5rem] text-[10px] font-black uppercase text-slate-400 border border-white/10 flex flex-col items-center gap-1";
                    btn.innerHTML = `<span>${n.trim()}</span><span class="text-cyan-500 font-mono">${Number(pr).toFixed(2)}€</span>`;
                    btn.onclick = () => {
                        document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('option-selected'));
                        btn.classList.add('option-selected');
                        sUnica = { n: n.trim(), p: Number(pr) };
                        actualizarCalculo();
                    };
                    gU.appendChild(btn);
                    if(i === 0) btn.click();
                });
                document.getElementById('cont-unica').classList.remove('hidden');
            } else { document.getElementById('cont-unica').classList.add('hidden'); }

            actualizarCalculo();
            document.getElementById('modal-detalle').classList.remove('hidden');
            document.body.style.overflow = "hidden";
        }

        function actualizarCalculo() {
            let base = sUnica ? sUnica.p : Number(pAct.PRECIO);
            const total = base * cantAct;
            document.getElementById('det-precio-final').innerText = total.toFixed(2) + "€";
            document.getElementById('det-cant').innerText = cantAct;
        }

        function cambiarCant(v) { cantAct = Math.max(1, cantAct + v); actualizarCalculo(); }

        function ejecutarAddCarrito() {
            let basePrice = sUnica ? sUnica.p : Number(pAct.PRECIO);
            let finalN = `${cantAct}x ${pAct.PLATO}${sUnica ? ' ('+sUnica.n+')' : ''}`;
            carrito.push({ n: finalN, p: basePrice * cantAct });
            cerrarDetalle();
            actualizarBarraCesta();
        }

        function actualizarBarraCesta() {
            if(carrito.length > 0) {
                const total = carrito.reduce((acc, i) => acc + i.p, 0) + COSTO_ENVIO;
                document.getElementById('basket-total').innerText = total.toFixed(2) + " €";
                document.getElementById('basket-count').innerText = carrito.length;
                document.getElementById('basket-bar').classList.remove('hidden');
            } else { document.getElementById('basket-bar').classList.add('hidden'); }
        }

        function abrirCheckout() {
            const list = document.getElementById('checkout-list'); list.innerHTML = "";
            carrito.forEach((item, idx) => {
                list.innerHTML += `<div class="flex justify-between items-center bg-white/5 p-5 rounded-[1.8rem] border border-white/5 shadow-inner">
                    <div class="flex flex-col gap-1"><span class="text-[11px] font-black text-white uppercase leading-tight">${item.n}</span><span class="text-cyan-500 font-mono text-xs">${item.p.toFixed(2)}€</span></div>
                    <button onclick="borrarItem(${idx})" class="text-red-500 font-bold text-lg px-2">✕</button></div>`;
            });
            document.getElementById('modal-checkout').classList.remove('hidden');
        }

        function borrarItem(idx) { 
            carrito.splice(idx, 1); 
            if(!carrito.length) cerrarCheckout(); else abrirCheckout();
            actualizarBarraCesta();
        }

        function manejarFlujoPedido() {
            const n = document.getElementById('o-name').value, a = document.getElementById('o-addr').value;
            if(!n || !a) return alert("Por favor, completa tus datos de entrega.");
            const btn = document.getElementById('btn-flow'), sub = document.getElementById('btn-text-sub'), main = document.getElementById('btn-text-main'), ayuda = document.getElementById('txt-ayuda-seguridad');

            if (!pasoConfirmacion) {
                const totalF = (carrito.reduce((acc, i) => acc + i.p, 0) + COSTO_ENVIO).toFixed(2);
                let msg = `*🛍️ NUEVO PEDIDO*\n*CLIENTE:* ${n.toUpperCase()}\n*DIR:* ${a.toUpperCase()}\n\n*PRODUCTOS:*\n`;
                carrito.forEach(i => msg += `• ${i.n} - ${i.p.toFixed(2)}€\n`);
                msg += `\n*TOTAL CON ENVÍO: ${totalF}€*`;
                
                // SALTO A WHATSAPP
                window.open(`https://wa.me/${restActivo.TELEFONO}?text=${encodeURIComponent(msg)}`, '_blank');
                
                // CAMBIO A MODO CONFIRMACIÓN FINAL
                main.innerText = "2. ✅ CONFIRMAR PEDIDO AQUÍ";
                sub.innerText = "¡Toca para registrar tu pedido!";
                btn.classList.add('btn-confirm-final');
                ayuda.classList.remove('hidden');
                pasoConfirmacion = true;
            } else {
                finalizarTodo(n, a);
            }
        }

        function finalizarTodo(nombre, direccion) {
            const totalF = (carrito.reduce((acc, i) => acc + i.p, 0) + COSTO_ENVIO).toFixed(2);
            const detalle = carrito.map(i => i.n).join(' | ');
            fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({id_restaurante:restActivo.ID_RESTAURANTE, cliente: nombre, direccion: direccion, detalle: detalle, total: totalF, whatsapp_rest: restActivo.TELEFONO })});
            alert("¡EXCELENTE!\nTu pedido se ha registrado. Los socios ya lo están preparando.");
            location.reload();
        }

        function renderCats(datos, esM) {
            const nav = document.getElementById('cat-nav'); nav.innerHTML = "";
            const cats = [...new Set(datos.map(i => i.CATEGORIA))].filter(Boolean);
            nav.innerHTML += createBubble("TODOS", esM ? "Carta" : "Inicio", true, esM);
            cats.forEach(c => nav.innerHTML += createBubble(c, c, false, esM));
        }

        function createBubble(id, name, active, esM) {
            const icon = dataCache.iconos.find(i => i.CATEGORIA.toUpperCase() === id.toUpperCase());
            const imgDefault = "https://cdn-icons-png.flaticon.com/512/706/706164.png";
            const imgUrl = (icon && icon.FOTO) ? icon.FOTO : imgDefault;
            return `<div onclick="${esM?'filtrarMenu':'filtrarRest'}('${id}', this)" class="cat-bubble ${active?'active':''}">
                <div class="cat-img-wrapper"><img src="${imgUrl}" onerror="this.src='${imgDefault}'"></div>
                <span class="text-[9px] font-black uppercase text-slate-500">${name}</span></div>`;
        }

        function filtrarRest(c, el) { 
            document.querySelectorAll('.cat-bubble').forEach(b => b.classList.remove('active')); 
            el.classList.add('active'); 
            renderHome(c); 
        }

        function filtrarMenu(c, el) { 
            document.querySelectorAll('.cat-bubble').forEach(b => b.classList.remove('active')); 
            el.classList.add('active'); 
            const platos = dataCache.menus.filter(m => String(m.ID_RESTAURANTE) === String(restActivo.ID_RESTAURANTE));
            const filt = c === 'TODOS' ? platos : platos.filter(p => p.CATEGORIA === c);
            const content = document.getElementById('app-content'); content.innerHTML = "";
            filt.forEach(p => {
                content.innerHTML += `<div onclick='abrirDetalle(${JSON.stringify(p)})' class="bg-white/5 p-4 rounded-[2.2rem] flex items-center gap-5 border border-white/5 active:bg-white/10 transition-colors shadow-lg"><img src="${p.FOTO}" class="w-20 h-20 rounded-2xl object-cover border border-white/5 shadow-xl"><div class="flex-1"><p class="text-[12px] font-black text-white uppercase leading-tight">${p.PLATO}</p><p class="text-cyan-400 font-mono font-bold text-lg mt-1">${Number(p.PRECIO).toFixed(2)}€</p></div></div>`;
            });
        }

        function irAHome() { renderHome(); }
        function cerrarDetalle() { document.getElementById('modal-detalle').classList.add('hidden'); document.body.style.overflow = "auto"; }
        function cerrarCheckout() { document.getElementById('modal-checkout').classList.add('hidden'); document.body.style.overflow = "auto"; }

        init();
    </script>
</body>
</html>
