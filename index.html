<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express</title>
    
    <meta name="theme-color" content="#020617">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="manifest" href="data:application/manifest+json;base64,ewogICJpZCI6ICIvIiwKICAic2hvcnRfbmFtZSI6ICJBZ3VhZHVsY2VFeHByZXNzIiwKICAibmFtZSI6ICJBZ3VhZHVsY2UgRXhwcmVzcyIsCiAgImljb25zIjogWwogICAgewogICAgICAic3JjIjogImh0dHBzOi8vaS5wb3N0aW1nLmNjL0MxdERwSDliL0xPR08tZm9uZG8tYmxhbmNvLnBuZyIsCiAgICAgICJzaXplcyI6ICI1MTJ4NTEyIiwKICAicHVycG9zYWJsZSI6ICdhbnknLAogICAgICAidHlwZSI6ICJpbWFnZS9wbmciCiAgICB9LAogICB7CiAgICAgICJzcmMiOiAiaHR0cHM6Ly9pLnBvc3RpbWcuY2MvQzF0RHBIOWIvTE9HTy1mb25kby1ibGFuY28ucG5nIiwKICAgICAgInNpemVzIjogIjE5MngxOTIiLAogICAgICAidHlwZSI6ICJpbWFnZS9wbmciCiAgICB9CiAgWSwKICAic3RhcnRfdXJsIjogIi4iLAogICJkaXNwbGF5IjogInN0YW5kYWxvbmUiLAogICJiYWNrZ3JvdW5kX2NvbG9yIjogIzAyMDYxNyIsCiAgInRoZW1lX2NvbG9yIjogIzAyMDYxNyIKfQ==">
    
    <link rel="apple-touch-icon" href="https://i.postimg.cc/C1tDpH9b/LOGO-fondo-blanco.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .btn-cyan { background: linear-gradient(135deg, #06b6d4, #0891b2); }
        .card-menu:active { transform: scale(0.96); background: rgba(6, 182, 212, 0.1); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-up { animation: slideUp 0.35s cubic-bezier(0.2, 0.8, 0.2, 1); }
    </style>
</head>
<body class="pb-32 selection:bg-cyan-500/30">

    <header class="glass sticky top-0 z-40 px-6 py-5 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <button id="btn-back" onclick="irAHome()" class="hidden p-2 rounded-2xl bg-white/5 text-white active:scale-90 transition">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            </button>
            <h1 id="header-txt" class="font-black italic text-xl uppercase tracking-tighter text-cyan-400">AGUADULCE <span class="text-white">EXPRESS</span></h1>
        </div>
    </header>

    <main id="main-container" class="p-4 max-w-xl mx-auto min-h-screen">
        <div id="loader" class="py-40 text-center">
            <div class="inline-block w-8 h-8 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin"></div>
        </div>
    </main>

    <div id="install-instruction" class="fixed bottom-28 left-6 right-6 z-30 hidden animate-up">
        <div class="bg-slate-900 border border-white/10 p-5 rounded-3xl flex items-center gap-4 shadow-2xl">
            <img src="https://i.postimg.cc/C1tDpH9b/LOGO-fondo-blanco.png" class="w-12 h-12 rounded-xl">
            <div class="flex-1">
                <p class="text-xs font-bold text-white uppercase tracking-tight">Instala la App Oficial</p>
                <p class="text-[10px] text-gray-400 mt-1">Pulsa en 'Añadir a pantalla de inicio' en tu navegador para usarla siempre.</p>
            </div>
            <button onclick="document.getElementById('install-instruction').remove()" class="text-gray-600 p-2">✕</button>
        </div>
    </div>

    <div id="modal-detalle" class="fixed inset-0 z-[60] bg-slate-950 hidden overflow-y-auto animate-up">
        <div class="max-w-xl mx-auto pb-32">
            <div class="relative h-[45vh]">
                <button onclick="cerrarDetalle()" class="absolute top-6 left-6 z-10 bg-black/40 backdrop-blur-xl p-3 rounded-full border border-white/10">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                </button>
                <div id="det-img-cont" class="w-full h-full"></div>
            </div>
            
            <div class="p-8 -mt-10 relative bg-slate-950 rounded-t-[3rem] space-y-6">
                <div class="flex justify-between items-start gap-4">
                    <h2 id="det-titulo" class="text-3xl font-black italic uppercase tracking-tighter leading-tight flex-1 text-white"></h2>
                    <span id="det-precio" class="text-cyan-400 text-2xl font-black font-mono"></span>
                </div>
                <p id="det-desc" class="text-gray-400 text-sm leading-relaxed"></p>

                <div class="space-y-3 pt-4 border-t border-white/5">
                    <p class="text-[10px] font-black text-gray-500 uppercase tracking-widest pl-1 italic">Preferencias</p>
                    <textarea id="det-nota" placeholder="¿Cómo lo quieres? Ej: Sin cebolla, extra de ketchup..." class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 outline-none text-white h-28 focus:border-cyan-500 transition-all text-sm"></textarea>
                </div>

                <div id="det-sugerencias-box" class="pt-4 border-t border-white/5"></div>

                <button id="btn-add-det" class="w-full btn-cyan p-6 rounded-[2.2rem] font-black uppercase text-sm shadow-[0_20px_40px_rgba(6,182,212,0.3)] flex justify-between items-center text-white active:scale-95 transition">
                    <span>Añadir a la cesta</span>
                    <span id="det-precio-btn" class="font-mono"></span>
                </button>
            </div>
        </div>
    </div>

    <div id="basket-bar" class="fixed bottom-8 left-6 right-6 z-40 hidden animate-up">
        <div class="btn-cyan rounded-[2.5rem] p-4 flex items-center justify-between shadow-2xl shadow-cyan-900/40 border border-white/10">
            <button onclick="vaciarCarrito()" class="p-3.5 bg-black/20 rounded-2xl active:scale-90 transition">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
            </button>
            <div class="flex-1 px-5 flex items-center justify-between cursor-pointer" onclick="abrirCheckout()">
                <div class="flex flex-col">
                    <span id="basket-total" class="text-xl font-black tracking-tighter text-white font-mono">0.00 €</span>
                    <span class="text-[9px] uppercase font-black text-white/60 tracking-widest">Ver Pedido</span>
                </div>
                <div class="bg-white/20 p-3 rounded-2xl">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14m-7-7 7 7-7 7"/></svg>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-checkout" class="fixed inset-0 z-[70] bg-slate-950 hidden overflow-y-auto p-6 pb-24 animate-up">
        <div class="max-w-md mx-auto space-y-10">
            <div class="flex justify-between items-center pt-4">
                <h2 class="text-4xl font-black italic uppercase tracking-tighter text-white leading-none">CHECK<br><span class="text-cyan-500">OUT</span></h2>
                <button onclick="cerrarCheckout()" class="p-3 bg-white/5 rounded-full text-white active:scale-90 transition">✕</button>
            </div>
            
            <div id="checkout-list" class="space-y-4"></div>

            <div class="space-y-5">
                <p class="text-[10px] font-black text-gray-500 uppercase tracking-[0.2em] pl-1">Información de Entrega</p>
                <input type="text" id="order-name" placeholder="Tu Nombre" class="w-full bg-white/5 border border-white/10 rounded-[1.5rem] p-5 outline-none text-white focus:border-cyan-500 transition-all font-bold">
                <input type="text" id="order-phone" placeholder="WhatsApp (Ej: 34600...)" class="w-full bg-white/5 border border-white/10 rounded-[1.5rem] p-5 outline-none text-white font-bold">
                <input type="text" id="order-address" placeholder="¿Dónde lo llevamos?" class="w-full bg-white/5 border border-white/10 rounded-[1.5rem] p-5 outline-none text-white font-bold">
                <textarea id="order-note-final" placeholder="Alguna nota extra para el repartidor..." class="w-full bg-white/5 border border-white/10 rounded-[1.5rem] p-5 outline-none h-24 text-white font-medium"></textarea>
            </div>

            <div class="bg-cyan-500/5 p-6 rounded-[2rem] border border-cyan-500/20">
                <label class="flex items-start gap-5 cursor-pointer">
                    <input type="checkbox" id="order-terms" class="mt-1 w-6 h-6 rounded-lg accent-cyan-500">
                    <span class="text-[10px] text-gray-400 uppercase font-black leading-relaxed tracking-tight">Confirmo mi pedido y acepto el tratamiento confidencial de mis datos conforme a la LOPD.</span>
                </label>
            </div>

            <button onclick="enviarWhatsApp()" class="w-full btn-cyan p-7 rounded-[2.5rem] font-black uppercase text-sm shadow-2xl text-white active:scale-95 transition">Confirmar y Pedir por WhatsApp</button>
        </div>
    </div>

    <script>
        // PEGA AQUÍ TU URL NUEVA QUE TERMINA EN /exec
        const API_URL = "https://script.google.com/macros/s/AKfycbxEBihvxk1icSDalXL2WdIroijpP4r7Oa7UC0fAQhGnNZkL3jMMZNEPlXWPaFc3-iFe/exec"; 
        const WHATSAPP_NUM = "34600000000"; 

        // --- PWA SERVICE WORKER MOCK (Para forzar detección) ---
        if ('serviceWorker' in navigator) {
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('data:text/javascript;base64,c2VsZi5hZGRFdmVudExpc3RlbmVyKCdmZXRjaCcsIGV2ID0+IHsgfSk7');
          });
        }

        let dataCache = JSON.parse(localStorage.getItem('aguadulce_data')) || null;
        let carrito = JSON.parse(localStorage.getItem('aguadulce_carrito')) || [];
        let restActivo = JSON.parse(localStorage.getItem('aguadulce_rest')) || null;

        async function init() {
            if(dataCache) renderHome();
            
            // Mostramos la instrucción de instalación si no es PWA y es Android
            if (!window.matchMedia('(display-mode: standalone)').matches && /Android/i.test(navigator.userAgent)) {
                setTimeout(() => document.getElementById('install-instruction').classList.remove('hidden'), 3000);
            }

            try {
                const res = await fetch(API_URL);
                dataCache = await res.json();
                localStorage.setItem('aguadulce_data', JSON.stringify(dataCache));
                renderHome();
            } catch (e) { console.log("Modo Offline"); }

            document.getElementById('order-name').value = localStorage.getItem('user_name') || '';
            document.getElementById('order-phone').value = localStorage.getItem('user_phone') || '';
            document.getElementById('order-address').value = localStorage.getItem('user_addr') || '';
        }

        function renderHome() {
            restActivo = null;
            document.getElementById('header-txt').innerHTML = 'AGUADULCE <span class="text-white">EXPRESS</span>';
            document.getElementById('btn-back').classList.add('hidden');
            const container = document.getElementById('main-container');
            container.innerHTML = "";
            const cats = [...new Set(dataCache.restaurantes.map(r => r.CATEGORIA))].filter(Boolean);
            cats.forEach(cat => {
                const rests = dataCache.restaurantes.filter(r => r.CATEGORIA === cat);
                let html = `<h2 class="text-[10px] font-black text-gray-700 uppercase tracking-[0.4em] mt-12 mb-5 pl-2 italic font-mono">${cat}</h2><div class="grid grid-cols-2 gap-5">`;
                rests.forEach(r => {
                    html += `<div onclick="verMenu('${r.ID_RESTAURANTE}')" class="glass rounded-[2.8rem] overflow-hidden card-menu shadow-lg border border-white/5 active:scale-95 transition">
                        <img src="${r.FOTO}" class="w-full h-36 object-cover">
                        <p class="p-6 text-[11px] font-black uppercase italic text-white/90 tracking-tighter">${r.NOMBRE}</p>
                    </div>`;
                });
                container.innerHTML += html + "</div>";
            });
            actualizarBarra();
        }

        function verMenu(id) {
            if (carrito.length > 0 && restActivo && restActivo.ID_RESTAURANTE != id) {
                if(!confirm("No puedes mezclar restaurantes. ¿Vaciar cesta?")) return;
                vaciarCarrito();
            }
            restActivo = dataCache.restaurantes.find(r => r.ID_RESTAURANTE == id);
            localStorage.setItem('aguadulce_rest', JSON.stringify(restActivo));
            document.getElementById('header-txt').innerText = restActivo.NOMBRE;
            document.getElementById('btn-back').classList.remove('hidden');
            const container = document.getElementById('main-container');
            container.innerHTML = `<div class="space-y-4 pt-4">`;
            dataCache.menus.filter(m => m.ID_RESTAURANTE == id).forEach(p => {
                container.innerHTML += `<div onclick="abrirDetalle('${p.PLATO}', '${p.PRECIO}', '${p.FOTO}', '${p.DESCRIPCION || ''}', '${p.CATEGORIA}')" class="glass p-5 rounded-[2.2rem] flex items-center gap-5 card-menu cursor-pointer active:scale-95 transition">
                    <img src="${p.FOTO}" class="w-20 h-20 rounded-[1.5rem] object-cover shadow-lg">
                    <div class="flex-1">
                        <p class="font-black text-sm uppercase italic tracking-tighter text-white">${p.PLATO}</p>
                        <p class="text-cyan-400 font-black text-base mt-1 font-mono">${parseFloat(p.PRECIO).toFixed(2)}€</p>
                    </div>
                    <div class="text-cyan-500 font-black text-2xl pr-2">+</div>
                </div>`;
            });
            actualizarBarra();
        }

        function abrirDetalle(nom, pre, img, desc, cat) {
            document.getElementById('det-img-cont').innerHTML = `<img src="${img}" class="w-full h-full object-cover shadow-2xl">`;
            document.getElementById('det-titulo').innerText = nom;
            document.getElementById('det-precio').innerText = parseFloat(pre).toFixed(2) + " €";
            document.getElementById('det-precio-btn').innerText = parseFloat(pre).toFixed(2) + " €";
            document.getElementById('det-desc').innerText = desc;
            document.getElementById('det-nota').value = "";
            document.getElementById('btn-add-det').onclick = () => {
                const nota = document.getElementById('det-nota').value;
                add(nota ? `${nom} [Nota: ${nota}]` : nom, pre);
                cerrarDetalle();
            };
            renderSugerenciasDetalle(cat, nom);
            document.getElementById('modal-detalle').classList.remove('hidden');
            document.body.style.overflow = "hidden";
        }

        function cerrarDetalle() { document.getElementById('modal-detalle').classList.add('hidden'); document.body.style.overflow = "auto"; }

        function renderSugerenciasDetalle(catActual, platoEvitar) {
            const sugs = dataCache.menus.filter(m => m.ID_RESTAURANTE == restActivo.ID_RESTAURANTE && m.CATEGORIA != catActual && m.PLATO != platoEvitar).slice(0, 5);
            const box = document.getElementById('det-sugerencias-box');
            if(sugs.length === 0) { box.innerHTML = ""; return; }
            box.innerHTML = `<h3 class="text-[10px] font-black text-cyan-500 uppercase tracking-widest mb-5 italic">¿Y si añades...?</h3>
                <div class="flex overflow-x-auto gap-4 hide-scroll pb-4">
                ${sugs.map(s => `<div onclick="abrirDetalle('${s.PLATO}', '${s.PRECIO}', '${s.FOTO}', '${s.DESCRIPCION || ''}', '${s.CATEGORIA}')" class="sugerencia-card active:scale-95 transition cursor-pointer">
                    <img src="${s.FOTO}" class="w-full h-24 object-cover rounded-[1.2rem] mb-3 shadow-md">
                    <p class="text-[9px] font-black uppercase truncate text-white tracking-tighter">${s.PLATO}</p>
                    <p class="text-cyan-400 text-[11px] font-black mt-1 font-mono">${parseFloat(s.PRECIO).toFixed(2)}€</p>
                </div>`).join('')}</div>`;
        }

        function add(n, p) {
            carrito.push({n, p: parseFloat(p)});
            localStorage.setItem('aguadulce_carrito', JSON.stringify(carrito));
            actualizarBarra();
        }

        function actualizarBarra() {
            const bar = document.getElementById('basket-bar');
            if (carrito.length > 0) {
                const total = carrito.reduce((s, i) => s + i.p, 0);
                document.getElementById('basket-total').innerText = total.toFixed(2) + " €";
                bar.classList.remove('hidden');
            } else { bar.classList.add('hidden'); }
        }

        function vaciarCarrito() {
            carrito = [];
            localStorage.removeItem('aguadulce_carrito');
            actualizarBarra();
        }

        function abrirCheckout() {
            const list = document.getElementById('checkout-list');
            list.innerHTML = "";
            const resumen = carrito.reduce((acc, i) => { acc[i.n] = (acc[i.n] || 0) + 1; return acc; }, {});
            for (const [nom, cant] of Object.entries(resumen)) {
                const p = carrito.find(i=>i.n==nom).p;
                list.innerHTML += `<div class="flex justify-between gap-4 items-center glass p-6 rounded-[2rem] text-xs font-bold text-white border border-white/5 shadow-inner">
                    <span class="flex-1">${cant}x ${nom}</span>
                    <span class="text-cyan-400 font-mono ml-4 text-sm">${(p*cant).toFixed(2)}€</span>
                </div>`;
            }
            document.getElementById('modal-checkout').classList.remove('hidden');
        }

        function cerrarCheckout() { document.getElementById('modal-checkout').classList.add('hidden'); }
        function irAHome() { renderHome(); }

        function enviarWhatsApp() {
            const name = document.getElementById('order-name').value;
            const addr = document.getElementById('order-address').value;
            const terms = document.getElementById('order-terms').checked;
            if(!name || !terms || !addr) return alert("Completa Nombre, Dirección y acepta los términos.");

            localStorage.setItem('user_name', name);
            localStorage.setItem('user_phone', document.getElementById('order-phone').value);
            localStorage.setItem('user_addr', addr);

            let msg = `*🛍️ PEDIDO AGUADULCE EXPRESS*\n--------------------------------\n*Restaurante:* ${restActivo.NOMBRE}\n\n`;
            const resumen = carrito.reduce((acc, i) => { acc[i.n] = (acc[i.n] || 0) + 1; return acc; }, {});
            let total = 0;
            for (const [nom, cant] of Object.entries(resumen)) {
                const p = carrito.find(i=>i.n==nom).p;
                msg += `*${cant}x* ${nom} _(${(p*cant).toFixed(2)}€)_\n`;
                total += p*cant;
            }
            msg += `\n*TOTAL:* ${total.toFixed(2)}€\n--------------------------------\n*CLIENTE:* ${name}\n*DIR:* ${addr}\n*NOTA:* ${document.getElementById('order-note-final').value}`;
            window.open(`https://wa.me/${WHATSAPP_NUM}?text=${encodeURIComponent(msg)}`);
        }

        init();
    </script>
</body>
</html>
