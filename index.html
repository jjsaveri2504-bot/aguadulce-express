<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express | Premium v24</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: ui-sans-serif, system-ui; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        
        /* Burbujas de Categorías */
        .cat-bubble { flex: 0 0 85px; display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; }
        .cat-img-wrapper { width: 65px; height: 65px; border-radius: 50%; background: #fff; padding: 2px; border: 2px solid transparent; overflow: hidden; transition: 0.3s; }
        .cat-img-wrapper img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .cat-bubble.active .cat-img-wrapper { border-color: #06b6d4; transform: scale(1.1); box-shadow: 0 0 15px rgba(6, 182, 212, 0.4); }
        .cat-bubble span { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; text-align: center; }

        /* Botones de Opciones y Extras */
        .opt-btn { padding: 14px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.03); font-size: 11px; font-weight: 700; text-transform: uppercase; color: #cbd5e1; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .opt-btn.selected { background: rgba(6, 182, 212, 0.15); border-color: #06b6d4; color: #22d3ee; }

        /* Carrusel de Círculos para Bebidas (Prolijo) */
        .story-circle { flex: 0 0 80px; text-align: center; cursor: pointer; }
        .story-img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #1e293b; padding: 2px; transition: 0.3s; object-fit: cover; margin: 0 auto; }
        .story-circle.selected .story-img { border-color: #06b6d4; transform: scale(1.1); }
        .story-name { font-size: 9px; font-weight: 700; text-transform: uppercase; margin-top: 6px; color: #64748b; }

        .modal-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="pb-32">
 
    <header class="glass sticky top-0 z-50 px-6 py-5 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <button id="btn-back" onclick="irAHome()" class="hidden p-2 bg-white/10 rounded-xl text-white">←</button>
            <h1 id="header-txt" class="font-black italic text-xl uppercase tracking-tighter text-cyan-400">AGUADULCE <span class="text-white">EXPRESS</span></h1>
        </div>
        <img src="https://i.postimg.cc/C1tDpH9b/LOGO-fondo-blanco.png" class="w-10 h-10 rounded-full border border-white/10">
    </header>
 
    <div id="cat-nav" class="flex gap-4 p-6 overflow-x-auto hide-scroll bg-[#020617]"></div>
    <main id="app-content" class="p-4 max-w-xl mx-auto grid grid-cols-2 gap-5"></main>
 
    <div id="modal-detalle" class="fixed inset-0 z-[60] bg-slate-950 hidden overflow-y-auto modal-up">
        <div class="max-w-xl mx-auto pb-48">
            <div id="det-img-cont" class="h-80 w-full relative"></div>
            <div class="p-8 -mt-12 relative bg-slate-950 rounded-t-[3rem] space-y-8">
                <div class="flex justify-between items-start">
                    <div>
                        <h2 id="det-titulo" class="text-3xl font-black italic uppercase text-white leading-tight tracking-tighter"></h2>
                        <p id="det-desc" class="text-gray-500 text-sm mt-2 italic font-medium"></p>
                    </div>
                    <span id="det-precio-base" class="text-cyan-400 text-2xl font-black font-mono mt-1"></span>
                </div>

                <div id="cont-unica" class="space-y-3 hidden border-t border-white/5 pt-6">
                    <p class="text-[10px] font-black text-cyan-500 uppercase tracking-[0.2em]">Selección Obligatoria</p>
                    <div id="grid-unica" class="flex flex-col gap-2"></div>
                </div>

                <div id="cont-multi" class="space-y-3 hidden border-t border-white/5 pt-6">
                    <p class="text-[10px] font-black text-gray-500 uppercase tracking-[0.2em]">¿Añadir algo más?</p>
                    <div id="grid-multi" class="flex flex-col gap-2"></div>
                </div>

                <div id="cont-bebidas" class="space-y-4 pt-6 border-t border-white/5">
                    <p class="text-[10px] font-black text-amber-500 uppercase tracking-[0.2em] italic">🥤 Completa tu pedido</p>
                    <div id="grid-bebidas" class="flex gap-4 overflow-x-auto hide-scroll pb-2"></div>
                </div>

                <div class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-slate-950 via-slate-950/90 to-transparent z-50">
                    <div class="max-w-xl mx-auto flex items-center gap-4">
                        <div class="flex items-center bg-white/5 border border-white/10 rounded-2xl p-1">
                            <button onclick="cambiarCant(-1)" class="w-12 h-12 text-white text-xl font-bold">-</button>
                            <span id="det-cant" class="text-white font-black text-lg w-8 text-center">1</span>
                            <button onclick="cambiarCant(1)" class="w-12 h-12 text-white text-xl font-bold">+</button>
                        </div>
                        <button id="btn-add-carrito" class="flex-1 bg-cyan-600 h-16 rounded-2xl font-black uppercase text-white flex justify-between items-center px-8 shadow-2xl">
                           <span>Añadir</span>
                           <span id="det-precio-final" class="bg-black/20 px-4 py-1.5 rounded-xl font-mono">0.00€</span>
                        </button>
                    </div>
                </div>
                <button onclick="cerrarDetalle()" class="w-full py-4 text-gray-700 font-bold uppercase text-[10px] tracking-widest">Cerrar</button>
            </div>
        </div>
    </div>
 
    <div id="basket-bar" class="fixed bottom-6 left-6 right-6 z-40 hidden modal-up">
        <div class="bg-cyan-600 rounded-[2.5rem] p-3 flex items-center justify-between shadow-2xl">
            <button onclick="vaciarCarrito()" class="p-4 bg-black/20 rounded-full text-white">🗑️</button>
            <div class="text-center" onclick="abrirCheckout()">
                <p id="basket-total" class="text-2xl font-black text-white font-mono">0.00 €</p>
                <p class="text-[8px] uppercase font-bold text-cyan-100">+3.50€ Envío incl.</p>
            </div>
            <button onclick="abrirCheckout()" class="bg-slate-950 text-white px-8 py-4 rounded-full text-xs font-black uppercase">Pagar</button>
        </div>
    </div>
 
    <div id="modal-checkout" class="fixed inset-0 z-[70] bg-slate-950 hidden overflow-y-auto p-6 modal-up">
        <div class="max-w-md mx-auto space-y-6 pb-20 pt-10">
            <h2 class="text-3xl font-black italic text-white uppercase tracking-tighter">TU <span class="text-cyan-400">PEDIDO</span></h2>
            <div id="checkout-list" class="space-y-2"></div>
            <div class="p-4 bg-cyan-900/30 rounded-2xl border border-cyan-500/30 flex justify-between text-cyan-400 font-bold text-xs uppercase">
                <span>Gastos de Envío</span><span>3.50 €</span>
            </div>
            <div class="space-y-4 pt-4">
                <input type="text" id="o-name" placeholder="Nombre completo" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-white outline-none focus:border-cyan-500">
                <input type="tel" id="o-phone" placeholder="Teléfono" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-white outline-none focus:border-cyan-500">
                <input type="text" id="o-addr" placeholder="Dirección exacta" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-white outline-none focus:border-cyan-500">
                <div class="p-4 bg-white/5 rounded-2xl border border-dashed border-cyan-500/40 text-center">
                    <p class="text-[10px] font-black text-cyan-400 uppercase tracking-widest mb-1">💳 Forma de Pago</p>
                    <p class="text-[11px] text-gray-300 font-bold uppercase">Efectivo o Tarjeta con TPV</p>
                </div>
                <div class="flex items-start gap-3 p-4 bg-white/5 rounded-2xl border border-white/10">
                    <input type="checkbox" id="o-terms" class="mt-1 w-5 h-5 accent-cyan-500">
                    <label for="o-terms" class="text-[10px] text-gray-400 uppercase font-bold leading-tight">Acepto las condiciones de uso y privacidad.</label>
                </div>
            </div>
            <button onclick="confirmarYEnviar()" class="w-full bg-cyan-600 p-7 rounded-[2rem] font-black uppercase text-white shadow-xl active:scale-95 transition">Confirmar WhatsApp</button>
            <button onclick="cerrarCheckout()" class="w-full py-2 text-gray-500 font-bold uppercase text-[10px]">Volver al menú</button>
        </div>
    </div>
 
    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbz6v3d0YYIDAg5H3OY0ey6lWIGINVcR2iR26nGrut6xy68TY4fZmUxinUFu9R3jS4sK/exec";
        const COSTO_ENVIO = 3.50;
        let dataCache = null, carrito = [], restActivo = null, pAct = null, sUnica = null, sMulti = [], sBebidas = [], cantAct = 1;
        let idRestCarrito = null;
 
        async function init() {
            try {
                const res = await fetch(API_URL);
                dataCache = await res.json();
                renderCats();
                renderHome();
            } catch (e) { console.error(e); }
        }
 
        function renderCats() {
            const cats = [...new Set(dataCache.restaurantes.map(r => r.CATEGORIA))].filter(Boolean);
            const nav = document.getElementById('cat-nav');
            nav.innerHTML = createBubble("TODOS", "Todos");
            cats.forEach(c => nav.innerHTML += createBubble(c, c));
        }
 
        function createBubble(id, name) {
            const iconData = dataCache.iconos.find(i => i.CATEGORIA.toUpperCase() === id.toUpperCase());
            const img = iconData ? iconData.FOTO : "https://i.postimg.cc/mD44w655/all-food.jpg";
            return `<div onclick="filtrarRest('${id}', this)" class="cat-bubble ${id==='TODOS'?'active':''}">
                <div class="cat-img-wrapper"><img src="${img}"></div><span>${name}</span></div>`;
        }
 
        function renderHome(f = null) {
            document.getElementById('btn-back').classList.add('hidden');
            document.getElementById('header-txt').innerHTML = 'AGUADULCE <span class="text-white">EXPRESS</span>';
            const content = document.getElementById('app-content');
            content.className = "p-4 grid grid-cols-2 gap-5"; content.innerHTML = "";
            const filt = (f && f !== 'TODOS') ? dataCache.restaurantes.filter(r => r.CATEGORIA === f) : dataCache.restaurantes;
            filt.forEach(r => {
                content.innerHTML += `<div onclick="verMenu('${r.ID_RESTAURANTE}')" class="bg-white/5 rounded-[2rem] overflow-hidden border border-white/10 shadow-lg active:scale-95 transition">
                    <img src="${r.FOTO}" class="w-full h-32 object-cover">
                    <div class="p-4 text-center text-[10px] font-black uppercase text-white">${r.NOMBRE}</div></div>`;
            });
        }
 
        function verMenu(id) {
            restActivo = dataCache.restaurantes.find(r => String(r.ID_RESTAURANTE) === String(id));
            const platos = dataCache.menus.filter(m => String(m.ID_RESTAURANTE) === String(id));
            document.getElementById('btn-back').classList.remove('hidden');
            document.getElementById('header-txt').innerText = restActivo.NOMBRE;
            const content = document.getElementById('app-content');
            content.className = "p-4 flex flex-col gap-4"; content.innerHTML = "";
            platos.forEach(p => {
                content.innerHTML += `<div onclick='abrirDetalle(${JSON.stringify(p)})' class="bg-white/5 p-4 rounded-[2rem] flex items-center gap-5 border border-white/10 active:scale-95 transition">
                    <img src="${p.FOTO}" class="w-20 h-20 rounded-2xl object-cover">
                    <div class="flex-1 font-black uppercase">
                        <p class="text-[11px] text-white mb-1 leading-tight">${p.PLATO}</p>
                        <p class="text-cyan-400 text-lg font-mono">${parseFloat(p.PRECIO).toFixed(2)}€</p>
                    </div></div>`;
            });
        }
 
        function abrirDetalle(p) {
            if (idRestCarrito && String(idRestCarrito) !== String(p.ID_RESTAURANTE)) {
                if (confirm("¿Vaciar cesta para pedir en otro restaurante?")) { vaciarCarrito(); } else { return; }
            }
            pAct = p; sUnica = null; sMulti = []; sBebidas = []; cantAct = 1;
            document.getElementById('det-titulo').innerText = p.PLATO;
            document.getElementById('det-desc').innerText = p.DESCRIPCION || "";
            document.getElementById('det-precio-base').innerText = parseFloat(p.PRECIO).toFixed(2) + "€";
            document.getElementById('det-img-cont').innerHTML = `<img src="${p.FOTO}" class="w-full h-full object-cover shadow-2xl"> <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-transparent"></div>`;
            document.getElementById('det-cant').innerText = "1";

            // OPCIONES ÚNICAS
            const gU = document.getElementById('grid-unica'); gU.innerHTML = "";
            if(p.SELECCION_UNICA) {
                document.getElementById('cont-unica').classList.remove('hidden');
                p.SELECCION_UNICA.split(',').forEach(o => {
                    const [n, pr] = o.split(':');
                    const btn = document.createElement('div'); btn.className = "opt-btn";
                    btn.innerHTML = `<span>${n.trim()}</span> <span class="text-cyan-500 font-mono text-[10px]">${parseFloat(pr)>0 ? `+${pr}€` : "Gratis"}</span>`;
                    btn.onclick = () => {
                        gU.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
                        btn.classList.add('selected');
                        sUnica = { n: n.trim(), p: parseFloat(pr || 0) }; updatePrecio();
                    };
                    gU.appendChild(btn);
                });
            } else { document.getElementById('cont-unica').classList.add('hidden'); }
 
            // EXTRAS MÚLTIPLES
            const gM = document.getElementById('grid-multi'); gM.innerHTML = "";
            if(p.EXTRAS) {
                document.getElementById('cont-multi').classList.remove('hidden');
                p.EXTRAS.split(',').forEach(o => {
                    const [n, pr] = o.split(':');
                    const btn = document.createElement('div'); btn.className = "opt-btn";
                    btn.innerHTML = `<span>${n.trim()}</span> <span class="text-cyan-500 font-mono text-[10px]">+${parseFloat(pr).toFixed(2)}€</span>`;
                    btn.onclick = () => {
                        btn.classList.toggle('selected');
                        const idx = sMulti.findIndex(x => x.n === n.trim());
                        idx > -1 ? sMulti.splice(idx, 1) : sMulti.push({ n: n.trim(), p: parseFloat(pr || 0) });
                        updatePrecio();
                    };
                    gM.appendChild(btn);
                });
            } else { document.getElementById('cont-multi').classList.add('hidden'); }

            // LÓGICA BEBIDAS (Círculos)
            const bebidas = dataCache.menus.filter(m => String(m.CATEGORIA).toLowerCase().includes('bebida') && String(m.ID_RESTAURANTE) === String(p.ID_RESTAURANTE));
            const gridBeb = document.getElementById('grid-bebidas'); gridBeb.innerHTML = "";
            bebidas.forEach(b => {
                const bubble = document.createElement('div');
                bubble.className = "story-circle";
                bubble.innerHTML = `<img src="${b.FOTO}" class="story-img"><p class="story-name truncate">${b.PLATO}</p>`;
                bubble.onclick = () => {
                    bubble.classList.toggle('selected');
                    const idx = sBebidas.findIndex(x => x.n === b.PLATO);
                    idx > -1 ? sBebidas.splice(idx, 1) : sBebidas.push({ n: b.PLATO, p: parseFloat(b.PRECIO) });
                    updatePrecio();
                };
                gridBeb.appendChild(bubble);
            });

            updatePrecio();
            document.getElementById('modal-detalle').classList.remove('hidden');
        }
 
        function cambiarCant(v) { cantAct = Math.max(1, cantAct + v); document.getElementById('det-cant').innerText = cantAct; updatePrecio(); }

        function updatePrecio() {
            let base = parseFloat(pAct.PRECIO) + (sUnica ? sUnica.p : 0) + sMulti.reduce((a, b) => a + b.p, 0) + sBebidas.reduce((a, b) => a + b.p, 0);
            let total = base * cantAct;
            document.getElementById('det-precio-final').innerText = total.toFixed(2) + "€";
        }
 
        document.getElementById('btn-add-carrito').onclick = () => {
            if(document.getElementById('cont-unica').offsetParent !== null && !sUnica) return alert("Selecciona una opción");
            if (carrito.length === 0) idRestCarrito = pAct.ID_RESTAURANTE;
            
            // Añadir Plato con extras
            let nombre = pAct.PLATO + (sUnica ? ` [${sUnica.n}]` : "");
            if(sMulti.length) nombre += ` (Extras: ${sMulti.map(x=>x.n).join(', ')})`;
            
            let precioUnitario = parseFloat(pAct.PRECIO) + (sUnica ? sUnica.p : 0) + sMulti.reduce((a, b) => a + b.p, 0);
            carrito.push({ n: nombre, p: precioUnitario * cantAct, cant: cantAct });

            // Añadir Bebidas seleccionadas (como items individuales para que salgan en el ticket)
            sBebidas.forEach(b => {
                carrito.push({ n: b.n, p: b.p * cantAct, cant: cantAct });
            });

            cerrarDetalle(); updateBarra();
        };
 
        function updateBarra() {
            const t = carrito.reduce((a, b) => a + b.p, 0) + (carrito.length > 0 ? COSTO_ENVIO : 0);
            document.getElementById('basket-total').innerText = t.toFixed(2) + " €";
            document.getElementById('basket-bar').classList.toggle('hidden', carrito.length === 0);
        }
 
        function vaciarCarrito() { carrito = []; idRestCarrito = null; updateBarra(); cerrarCheckout(); }
 
        async function confirmarYEnviar() {
            const n = document.getElementById('o-name').value, t = document.getElementById('o-phone').value, a = document.getElementById('o-addr').value;
            if(!n || !t || !a || !document.getElementById('o-terms').checked) return alert("Faltan datos o aceptar términos");
 
            const totalFinal = (carrito.reduce((a, b) => a + b.p, 0) + COSTO_ENVIO).toFixed(2);
            const detalleStr = carrito.map(i => `${i.cant}x ${i.n}`).join(', ');
 
            try {
                fetch(API_URL, {
                    method: 'POST', mode: 'no-cors',
                    body: JSON.stringify({
                        id_restaurante: restActivo.ID_RESTAURANTE, cliente: n, direccion: a, detalle: detalleStr, total: totalFinal, whatsapp_rest: restActivo.TELEFONO 
                    })
                });
            } catch (e) { console.error("Error Guardado:", e); }
 
            let msg = `*🛍️ NUEVO PEDIDO: ${restActivo.NOMBRE}*\n*Cliente:* ${n}\n*Dir:* ${a}\n\n*Productos:*\n`;
            carrito.forEach(i => msg += `• ${i.cant}x ${i.n} - ${i.p.toFixed(2)}€\n`);
            msg += `\n*Envío:* ${COSTO_ENVIO.toFixed(2)}€\n*TOTAL:* ${totalFinal}€\n\n*Pago:* Efectivo/Tarjeta TPV`;
            window.open(`https://wa.me/${restActivo.TELEFONO}?text=${encodeURIComponent(msg)}`);
        }
 
        function filtrarRest(c, el) { document.querySelectorAll('.cat-bubble').forEach(b => b.classList.remove('active')); el.classList.add('active'); renderHome(c); }
        function irAHome() { renderHome(); }
        function cerrarDetalle() { document.getElementById('modal-detalle').classList.add('hidden'); }
        function cerrarCheckout() { document.getElementById('modal-checkout').classList.add('hidden'); }
        function abrirCheckout() {
            const list = document.getElementById('checkout-list'); list.innerHTML = "";
            carrito.forEach(i => list.innerHTML += `<div class="flex justify-between bg-white/5 p-4 rounded-xl text-[10px] uppercase font-bold text-white border border-white/5"><span>${i.cant}x ${i.n}</span><span>${i.p.toFixed(2)}€</span></div>`);
            document.getElementById('modal-checkout').classList.remove('hidden');
        }
        init();
    </script>
</body>
</html>
