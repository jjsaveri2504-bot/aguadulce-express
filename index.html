<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express | Master ES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    colors: { 'ae-main': '#00BCD4', 'ae-accent': '#84CC16', 'ae-bg': '#F1F5F9', 'ae-card': '#FFFFFF', 'ae-text': '#1E293B', 'ae-sub': '#64748B' }
                } 
            } 
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F1F5F9; color: #1E293B; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .premium-header { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-bottom: 2px solid #00BCD4; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .carrusel-row { display: flex; overflow-x: auto; gap: 16px; padding: 10px 0 20px 0; scroll-snap-type: x mandatory; }
        .card-rest { flex: 0 0 190px; scroll-snap-align: start; transition: all 0.3s; border-radius: 24px; overflow: hidden; background: #fff; box-shadow: 0 10px 20px -5px rgba(0,0,0,0.05); }
        .card-rest.cerrado { filter: grayscale(1); opacity: 0.7; }
        .img-container { position: relative; width: 100%; height: 250px; }
        .badge-cerrado { position: absolute; top: 12px; left: 12px; background: #EF4444; color: white; padding: 4px 10px; border-radius: 10px; font-size: 9px; font-weight: 800; text-transform: uppercase; z-index: 10; }
        .plato-card { background: white; border-radius: 28px; transition: 0.2s; border: 1px solid rgba(0,0,0,0.02); }
        .anim-up { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .sug-selected { border-color: #00BCD4 !important; background-color: rgba(0, 188, 212, 0.05) !important; transform: scale(0.95); }
    </style>
</head>
<body class="pb-32">

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyO3k6Jo-XgrF8VhSjOfiO2tzFTnKJr-akZyqKoCQzW9ylRNe-UAjN8kgr52jVr3m5C/exec"; 
        const COSTO_ENVIO = 3.50;
        const LISTA_NEGRA = ["600000000"]; // Añadir números aquí

        let carrito = JSON.parse(localStorage.getItem('ae_cart_v3')) || [];
        let dataCache = JSON.parse(localStorage.getItem('ae_cache_v3')) || null;
        let restauranteActual = null;
        let sugerenciasElegidas = [];

        function formatEuro(m) { return `${parseFloat(m).toFixed(2).replace('.', ',')} €`; }

        // LÓGICA DE HORARIOS (ESPAÑA)
        function estaAbierto(horarioStr, estadoManual) {
            if (estadoManual === "CERRADO") return { abierto: false, msg: "LOCAL CERRADO" };
            if (!horarioStr) return { abierto: true, msg: "" };

            const ahora = new Date();
            const horaActual = ahora.getHours() * 100 + ahora.getMinutes();
            const bloques = horarioStr.split(',');
            
            for (let b of bloques) {
                const [inicio, fin] = b.trim().split('-');
                const hInicio = parseInt(inicio.replace(':', ''));
                const hFin = parseInt(fin.replace(':', ''));
                if (horaActual >= hInicio && horaActual <= hFin) return { abierto: true, msg: "" };
            }
            return { abierto: false, msg: "ABRIMOS PRONTO" };
        }

        function guardarPerfil() {
            const p = { n: document.getElementById('c-nombre').value, t: document.getElementById('c-tel').value, d: document.getElementById('c-dir').value };
            localStorage.setItem('ae_perfil_v3', JSON.stringify(p));
        }

        function cargarPerfil() {
            const p = JSON.parse(localStorage.getItem('ae_perfil_v3'));
            if (p) {
                document.getElementById('c-nombre').value = p.n || "";
                document.getElementById('c-tel').value = p.t || "";
                document.getElementById('c-dir').value = p.d || "";
            }
        }
    </script>

    <header class="premium-header sticky top-0 z-[80] px-6 py-5">
        <div class="flex items-center justify-between">
            <button id="btn-back" onclick="location.reload()" class="hidden w-10 h-10 bg-gray-50 rounded-xl flex items-center justify-center border border-gray-100 shadow-sm">
                <i class="fas fa-arrow-left text-ae-sub text-sm"></i>
            </button>
            <div class="flex-1 flex items-center justify-center gap-3">
                <i class="fas fa-shipping-fast text-ae-main text-2xl animate-pulse"></i>
                <h1 id="header-titulo" class="font-extrabold text-2xl text-ae-text uppercase italic leading-none tracking-tighter">
                    AGUADULCE <span class="text-ae-main font-black">EXPRESS</span>
                </h1>
            </div>
            <div class="w-10"></div>
        </div>
    </header>

    <div id="modal-resume" class="fixed inset-0 z-[300] hidden bg-black/40 backdrop-blur-md flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-xs p-8 rounded-[40px] text-center shadow-2xl anim-up">
            <div class="w-16 h-16 bg-ae-main/10 rounded-full flex items-center justify-center mx-auto mb-6 text-ae-main text-2xl"><i class="fas fa-shopping-basket"></i></div>
            <h3 class="text-ae-text font-black uppercase italic text-lg mb-2">¿Seguimos?</h3>
            <p class="text-ae-sub text-[10px] mb-8">Tienes un pedido a medias en tu cesta.</p>
            <div class="space-y-3">
                <button onclick="document.getElementById('modal-resume').classList.add('hidden')" class="w-full bg-ae-main text-white py-4 rounded-2xl font-black uppercase text-[10px] italic shadow-lg shadow-ae-main/20">Continuar pedido</button>
                <button onclick="reiniciarPedido()" class="w-full text-ae-sub font-bold text-[10px] uppercase">Nueva orden</button>
            </div>
        </div>
    </div>

    <main id="main-container" class="p-6 max-w-xl mx-auto space-y-10"></main>

    <div id="modal-producto" class="fixed inset-0 z-[200] hidden bg-black/60 backdrop-blur-md flex items-end justify-center">
        <div class="bg-white w-full max-w-md rounded-t-[45px] anim-up overflow-hidden shadow-2xl">
            <div class="relative h-64">
                <img id="p-foto" src="" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-white via-transparent to-transparent"></div>
                <button onclick="cerrarProducto()" class="absolute top-6 right-6 w-10 h-10 bg-white/80 rounded-full flex items-center justify-center shadow-lg"><i class="fas fa-times text-xs"></i></button>
            </div>
            <div class="p-8">
                <h3 id="p-nombre" class="text-2xl font-black text-ae-text uppercase italic tracking-tight"></h3>
                <p id="p-desc" class="text-ae-sub mt-2 text-[10px]"></p>
                <div class="mt-8">
                    <p class="text-[9px] font-black text-ae-accent uppercase tracking-widest mb-4 italic">Personaliza tu pedido</p>
                    <div id="p-sugerencias-lista" class="flex gap-4 overflow-x-auto hide-scroll pb-2"></div>
                </div>
                <div class="flex items-center justify-between mt-10 pt-6 border-t border-gray-50">
                    <span id="p-precio" class="text-3xl font-black text-ae-text italic tracking-tighter"></span>
                    <button id="btn-add-final" onclick="confirmarAgregar()" class="bg-ae-main text-white px-10 py-4 rounded-2xl font-black italic uppercase text-xs shadow-lg shadow-ae-main/20">Añadir</button>
                </div>
            </div>
        </div>
    </div>

    <div id="basket-bar" onclick="abrirCheckout()" class="fixed bottom-6 left-6 right-6 h-16 bg-ae-main rounded-2xl flex justify-between items-center px-6 shadow-2xl hidden z-[90] active:scale-95 transition cursor-pointer">
        <div class="flex items-center gap-3 text-white font-black"><i class="fas fa-shopping-bag"></i><span id="basket-count" class="text-sm">0</span></div>
        <span class="text-white font-black uppercase italic text-[10px] tracking-widest">Ver Pedido</span>
        <span id="basket-total" class="text-white font-black text-lg italic"></span>
    </div>

    <div id="modal-checkout" class="fixed inset-0 z-[150] hidden bg-black/40 backdrop-blur-md flex items-end justify-center">
        <div class="bg-white w-full max-w-md p-8 rounded-t-[40px] anim-up max-h-[90vh] overflow-y-auto">
            <div class="w-12 h-1 bg-gray-100 rounded-full mx-auto mb-8"></div>
            <h3 class="text-xl font-black text-ae-text text-center mb-6 uppercase italic">Tus Datos</h3>
            <div id="checkout-items" class="space-y-2 mb-8 border-b pb-6"></div>
            <div class="space-y-4">
                <input type="text" id="c-nombre" oninput="guardarPerfil()" placeholder="Nombre" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 text-ae-text font-bold">
                <input type="tel" id="c-tel" oninput="guardarPerfil(); verificarBloqueo();" placeholder="WhatsApp (Ej: 600123456)" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 text-ae-text font-bold">
                <div id="msg-bloqueo" class="hidden bg-red-50 p-4 rounded-2xl text-center border border-red-100">
                    <p class="text-[9px] text-red-600 font-black uppercase italic">Número restringido por seguridad</p>
                </div>
                <input type="text" id="c-dir" oninput="guardarPerfil()" placeholder="Dirección y portal" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 text-ae-text font-bold">
            </div>
            <button id="btn-finalizar" onclick="finalizarCompra()" class="w-full mt-8 bg-ae-main text-white py-5 rounded-2xl font-black italic uppercase text-xs shadow-xl shadow-ae-main/20 transition-all">FINALIZAR PEDIDO</button>
            <button onclick="cerrarCheckout()" class="w-full mt-4 text-ae-sub font-bold text-[10px] uppercase">Seguir comprando</button>
        </div>
    </div>

    <script>
        async function iniciar() {
            if (carrito.length > 0) document.getElementById('modal-resume').classList.remove('hidden');
            actualizarCestaBar();
            if(dataCache) renderNetflixLayout();
            try {
                const res = await fetch(`${API_URL}?v=${Date.now()}`);
                dataCache = await res.json();
                localStorage.setItem('ae_cache_v3', JSON.stringify(dataCache));
                renderNetflixLayout();
            } catch (e) { console.log("Carga Offline"); }
        }

        function reiniciarPedido() {
            carrito = []; localStorage.removeItem('ae_cart_v3');
            document.getElementById('modal-resume').classList.add('hidden');
            actualizarCestaBar();
        }

        function renderNetflixLayout() {
            const container = document.getElementById('main-container');
            container.innerHTML = "";
            const categorias = [...new Set(dataCache.restaurantes.map(r => r.CATEGORIA))];
            
            categorias.forEach(cat => {
                if(!cat) return;
                const fila = dataCache.restaurantes.filter(r => r.CATEGORIA === cat);
                const section = document.createElement('div');
                section.innerHTML = `
                    <div class="flex items-center gap-3 mb-2"><h2 class="text-[10px] font-black text-ae-sub uppercase tracking-[0.4em] italic">${cat}</h2><div class="h-px flex-1 bg-gray-100"></div></div>
                    <div class="carrusel-row hide-scroll">
                        ${fila.map(r => {
                            const status = estaAbierto(r.HORARIO, r.ESTADO_MANUAL);
                            return `
                            <div onclick="${status.abierto ? `verMenu('${r.ID_RESTAURANTE}')` : ''}" class="card-rest ${!status.abierto ? 'cerrado' : ''}">
                                <div class="img-container">
                                    ${!status.abierto ? `<div class="badge-cerrado">${status.msg}</div>` : ''}
                                    <img src="${r.FOTO}" class="w-full h-full object-cover">
                                    <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                                    <div class="absolute bottom-4 left-4 right-4"><p class="text-[11px] font-black uppercase text-white leading-tight italic tracking-tighter">${r.NOMBRE_RESTAURANTE}</p></div>
                                </div>
                            </div>`;
                        }).join('')}
                    </div>`;
                container.appendChild(section);
            });
        }

        function verMenu(id) {
            restauranteActual = dataCache.restaurantes.find(r => String(r.ID_RESTAURANTE) === String(id));
            const platos = dataCache.menus.filter(p => String(p.ID_RESTAURANTE) === String(id));
            document.getElementById('header-titulo').innerText = restauranteActual.NOMBRE_RESTAURANTE;
            document.getElementById('btn-back').classList.remove('hidden');
            document.getElementById('main-container').innerHTML = `<div class="grid grid-cols-1 gap-4">${platos.map(p => `
                <div onclick="abrirProducto('${p.ID_PLATO}')" class="plato-card p-4 flex gap-5 items-center">
                    <img src="${p.FOTO_PLATO}" class="w-24 h-24 rounded-[22px] object-cover bg-gray-50 shadow-sm">
                    <div class="flex-1">
                        <h3 class="font-black text-ae-text uppercase italic text-[11px] leading-tight">${p.PLATO}</h3>
                        <p class="text-[9px] text-ae-sub mt-2 line-clamp-2">${p.DESCRIPCION || ''}</p>
                        <span class="block mt-3 font-black text-ae-main text-lg italic tracking-tighter">${formatEuro(p.PRECIO)}</span>
                    </div>
                </div>`).join('')}</div>`;
        }

        function abrirProducto(idPlato) {
            const p = dataCache.menus.find(item => String(item.ID_PLATO) === String(idPlato));
            productoSeleccionado = { nombre: p.PLATO, precio: parseFloat(p.PRECIO), foto: p.FOTO_PLATO };
            sugerenciasElegidas = [];
            
            document.getElementById('p-nombre').innerText = p.PLATO;
            document.getElementById('p-precio').innerText = formatEuro(p.PRECIO);
            document.getElementById('p-foto').src = p.FOTO_PLATO;
            document.getElementById('p-desc').innerText = p.DESCRIPCION || "Deliciosa especialidad de Aguadulce Express.";

            // LÓGICA DE EXTRAS DINÁMICOS
            const listaSugerencias = document.getElementById('p-sugerencias-lista');
            listaSugerencias.innerHTML = "";

            if(p.EXTRAS) {
                // Si el plato tiene extras específicos en la columna H
                const extrasArr = p.EXTRAS.split(',');
                extrasArr.forEach(ex => {
                    const [n, pr] = ex.trim().split(':');
                    listaSugerencias.innerHTML += `
                        <div onclick="toggleExtra(this, '${n}', ${pr})" class="flex-none w-28 p-3 rounded-2xl border bg-gray-50 text-center transition">
                            <p class="text-[8px] font-black text-ae-text uppercase italic mb-1">${n}</p>
                            <p class="text-ae-main font-bold text-[9px]">+${formatEuro(pr)}</p>
                        </div>`;
                });
            } else {
                // Sugerencias generales (Refresco, Papas, Malteada) extraídas de tu propio menú
                const generales = dataCache.menus.filter(item => ["Refresco 600ml", "Papas Supreme", "Malteada Oreo"].includes(item.PLATO));
                generales.forEach(g => {
                    listaSugerencias.innerHTML += `
                        <div onclick="toggleExtra(this, '${g.PLATO}', ${g.PRECIO})" class="flex-none w-28 p-3 rounded-2xl border bg-gray-50 text-center transition">
                            <img src="${g.FOTO_PLATO}" class="w-10 h-10 rounded-lg mx-auto mb-2 object-cover shadow-sm">
                            <p class="text-[8px] font-black text-ae-text uppercase truncate italic">${g.PLATO}</p>
                            <p class="text-ae-main font-bold text-[9px]">+${formatEuro(g.PRECIO)}</p>
                        </div>`;
                });
            }
            document.getElementById('modal-producto').classList.remove('hidden');
        }

        function toggleExtra(el, n, p) {
            const i = sugerenciasElegidas.findIndex(s => s.nombre === n);
            if(i > -1) { sugerenciasElegidas.splice(i, 1); el.classList.remove('sug-selected'); }
            else { sugerenciasElegidas.push({ nombre: n, precio: parseFloat(p) }); el.classList.add('sug-selected'); }
        }

        function confirmarAgregar() {
            carrito.push(productoSeleccionado);
            sugerenciasElegidas.forEach(s => carrito.push(s));
            localStorage.setItem('ae_cart_v3', JSON.stringify(carrito));
            actualizarCestaBar(); cerrarProducto();
        }

        function cerrarProducto() { document.getElementById('modal-producto').classList.add('hidden'); }

        function actualizarCestaBar() {
            const b = document.getElementById('basket-bar');
            if(carrito.length > 0) {
                const t = carrito.reduce((s, i) => s + i.precio, 0) + COSTO_ENVIO;
                document.getElementById('basket-count').innerText = carrito.length;
                document.getElementById('basket-total').innerText = formatEuro(t);
                b.classList.remove('hidden');
            } else { b.classList.add('hidden'); }
        }

        function abrirCheckout() {
            document.getElementById('modal-checkout').classList.remove('hidden');
            cargarPerfil(); verificarBloqueo();
            const t = carrito.reduce((s, i) => s + i.precio, 0) + COSTO_ENVIO;
            document.getElementById('checkout-items').innerHTML = carrito.map(i => `
                <div class="flex justify-between text-[9px] font-bold uppercase text-ae-sub">
                    <span>${i.nombre}</span><span>${formatEuro(i.precio)}</span>
                </div>`).join('') + `<div class="pt-2 mt-2 border-t flex justify-between text-ae-main font-black"><span>ENVÍO</span><span>${formatEuro(COSTO_ENVIO)}</span></div>`;
            document.getElementById('btn-finalizar').innerText = `TRAMITAR PEDIDO (${formatEuro(t)})`;
        }

        function verificarBloqueo() {
            const tel = document.getElementById('c-tel').value.trim();
            const btn = document.getElementById('btn-finalizar');
            const msg = document.getElementById('msg-bloqueo');
            if (LISTA_NEGRA.includes(tel)) {
                btn.disabled = true; btn.classList.add('opacity-30'); msg.classList.remove('hidden');
            } else {
                btn.disabled = false; btn.classList.remove('opacity-30'); msg.classList.add('hidden');
            }
        }

        function finalizarCompra() {
            const n = document.getElementById('c-nombre').value, t = document.getElementById('c-tel').value, d = document.getElementById('c-dir').value;
            if(!n || !t || !d) return alert("Completa tus datos");
            const det = carrito.map(i => i.nombre).join(', ');
            const tot = formatEuro(carrito.reduce((s, i) => s + i.precio, 0) + COSTO_ENVIO);
            fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ restaurante: restauranteActual.NOMBRE_RESTAURANTE, cliente: n, telefono: t, direccion: d, pedido: det, total: tot })});
            window.location.href = `https://wa.me/${restauranteActual.TELEFONO}?text=${encodeURIComponent(`*PEDIDO AGUADULCE*\n\n*Cliente:* ${n}\n*WhatsApp:* ${t}\n*Dirección:* ${d}\n\n*PEDIDO:* ${det}\n\n*TOTAL:* ${tot}`)}`;
            localStorage.removeItem('ae_cart_v3');
        }

        function cerrarCheckout() { document.getElementById('modal-checkout').classList.add('hidden'); }

        iniciar();
    </script>
</body>
</html>
