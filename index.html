<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aguadulce Express - Sistema de Pedidos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .category-pill.active { background-color: #ef4444; color: white; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .rest-card:active { transform: scale(0.98); }
    </style>
</head>
<body class="bg-gray-100 font-sans pb-24">

    <script>
        // PEGA AQUÍ TU NUEVA URL DE IMPLEMENTACIÓN DE APPS SCRIPT
        const API_URL = "https://script.google.com/macros/s/AKfycbyLQ4o-2Ky8_k1UeTluo6Ia4aTQM1zaDJPTY0XBSNKbHTM_g_GaiuTmtedqHRf6LSD1NA/exec";
    </script>

    <header class="bg-white shadow-md sticky top-0 z-50 p-4 flex items-center">
        <button id="btn-back" onclick="mostrarSelectorRestaurantes()" class="hidden mr-4 text-gray-600 p-2">
            <i class="fas fa-arrow-left text-xl"></i>
        </button>
        <h1 id="header-titulo" class="text-xl font-bold text-gray-800 flex-1 text-center italic uppercase tracking-wider">Aguadulce Express</h1>
        <div id="spacer" class="w-10 hidden"></div>
    </header>

    <div id="categorias-container" class="flex overflow-x-auto p-4 gap-2 sticky top-[68px] bg-gray-100 z-40 no-scrollbar hidden">
    </div>

    <main id="main-container" class="p-4 grid grid-cols-1 gap-4">
        <div class="flex flex-col items-center justify-center py-20 text-gray-400">
            <i class="fas fa-spinner fa-spin text-3xl mb-4"></i>
            <p>Cargando establecimientos...</p>
        </div>
    </main>

    <div id="cart-bar" class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 flex justify-between items-center shadow-[0_-4px_10px_rgba(0,0,0,0.05)] hidden z-50">
        <div class="flex flex-col">
            <span class="text-[10px] text-gray-400 uppercase font-bold">Total Pedido</span>
            <div class="flex items-center">
                <span id="cart-count" class="bg-red-500 text-white px-2 py-0.5 rounded-md text-[10px] font-bold">0</span>
                <span class="ml-2 font-black text-xl text-gray-800">$<span id="cart-total">0</span></span>
            </div>
        </div>
        <button onclick="enviarPedidoProfesional()" class="bg-green-500 hover:bg-green-600 text-white px-8 py-3 rounded-xl font-black flex items-center gap-2 transition-all shadow-lg active:scale-95">
            <i class="fab fa-whatsapp text-xl"></i> CONFIRMAR
        </button>
    </div>

    <script>
        let todosLosRestaurantes = [];
        let todoElMenu = [];
        let menuFiltrado = [];
        let restauranteSeleccionado = null;
        let carrito = [];

        // 1. CARGA INICIAL DE DATOS
        async function cargarDatos() {
            try {
                const [resRest, resMenu] = await Promise.all([
                    fetch(`${API_URL}?sheet=RESTAURANTES`),
                    fetch(`${API_URL}?sheet=MENUS`)
                ]);
                
                todosLosRestaurantes = await resRest.json();
                todoElMenu = await resMenu.json();

                mostrarSelectorRestaurantes();
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('main-container').innerHTML = `
                    <div class="text-center p-10">
                        <i class="fas fa-exclamation-triangle text-red-500 text-4xl mb-4"></i>
                        <p class="text-gray-600">No pudimos conectar con el servidor.<br>Revisa tu conexión o la URL del script.</p>
                    </div>`;
            }
        }

        // 2. VISTA: SELECTOR DE RESTAURANTES
        function mostrarSelectorRestaurantes() {
            restauranteSeleccionado = null;
            carrito = [];
            actualizarBarraCarrito();
            
            document.getElementById('btn-back').classList.add('hidden');
            document.getElementById('spacer').classList.add('hidden');
            document.getElementById('header-titulo').innerText = "Aguadulce Express";
            document.getElementById('categorias-container').classList.add('hidden');
            
            const container = document.getElementById('main-container');
            container.innerHTML = todosLosRestaurantes.map(r => `
                <div onclick="seleccionarRestaurante('${r.ID}')" class="rest-card bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-200 transition-all cursor-pointer">
                    <div class="relative">
                        <img src="${r.FOTO || 'https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=500'}" class="w-full h-44 object-cover">
                        <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/70 to-transparent p-4">
                            <h3 class="font-black text-white text-xl uppercase">${r.NOMBRE_REST}</h3>
                        </div>
                    </div>
                    <div class="p-4 flex justify-between items-center">
                        <p class="text-sm text-gray-500 font-medium"><i class="fas fa-map-marker-alt text-red-500 mr-1"></i> ${r.DIRECCION}</p>
                        <span class="bg-gray-100 text-[10px] font-bold px-2 py-1 rounded uppercase text-gray-400">Abierto</span>
                    </div>
                </div>
            `).join('');
        }

        // 3. VISTA: MENÚ DEL RESTAURANTE
        function seleccionarRestaurante(id) {
            restauranteSeleccionado = todosLosRestaurantes.find(r => r.ID === id);
            menuFiltrado = todoElMenu.filter(p => p.ID_RESTAURANTE === id);
            
            document.getElementById('btn-back').classList.remove('hidden');
            document.getElementById('spacer').classList.remove('hidden');
            document.getElementById('header-titulo').innerText = restauranteSeleccionado.NOMBRE_REST;
            
            renderizarCategorias();
            renderizarProductos('Todos');
        }

        function renderizarCategorias() {
            const container = document.getElementById('categorias-container');
            container.classList.remove('hidden');
            const cats = ["Todos", ...new Set(menuFiltrado.map(p => p.CATEGORIA))];
            
            container.innerHTML = cats.map(c => `
                <button onclick="renderizarProductos('${c}')" class="category-pill px-5 py-2 rounded-xl bg-white border border-gray-200 text-sm font-bold whitespace-nowrap shadow-sm transition-all">
                    ${c}
                </button>
            `).join('');
        }

        function renderizarProductos(cat) {
            document.querySelectorAll('.category-pill').forEach(b => {
                b.classList.toggle('active', b.innerText === cat);
            });

            const container = document.getElementById('main-container');
            const productos = cat === 'Todos' ? menuFiltrado : menuFiltrado.filter(p => p.CATEGORIA === cat);
            
            if(productos.length === 0) {
                container.innerHTML = `<p class="text-center py-10 text-gray-400">No hay productos en esta categoría.</p>`;
                return;
            }

            container.innerHTML = productos.map(p => `
                <div class="bg-white rounded-2xl shadow-sm flex border border-gray-100 p-3 gap-4 items-center transition-all">
                    <img src="${p.FOTO || 'https://via.placeholder.com/150'}" class="w-24 h-24 rounded-xl object-cover shadow-inner">
                    <div class="flex-1 flex flex-col h-24 justify-between">
                        <div>
                            <h3 class="font-black text-gray-800 text-sm uppercase leading-tight">${p.NOMBRE_PLATO}</h3>
                            <p class="text-[10px] text-gray-400 mt-1 italic">${p.ACOMPAÑANTES || 'Tradicional'}</p>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="font-black text-red-600 text-lg">$${p.PRECIO}</span>
                            <button onclick="agregar('${p.NOMBRE_PLATO}', ${p.PRECIO})" class="bg-gray-900 text-white w-10 h-10 rounded-xl font-bold flex items-center justify-center hover:bg-red-500 transition-colors shadow-md active:scale-90">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 4. LÓGICA DE CARRITO Y ENVÍO
        function agregar(nombre, precio) {
            carrito.push({nombre, precio});
            actualizarBarraCarrito();
        }

        function actualizarBarraCarrito() {
            const bar = document.getElementById('cart-bar');
            const total = carrito.reduce((sum, p) => sum + p.precio, 0);
            
            if(carrito.length > 0) {
                bar.classList.remove('hidden');
                document.getElementById('cart-count').innerText = carrito.length;
                document.getElementById('cart-total').innerText = total.toFixed(2);
            } else {
                bar.classList.add('hidden');
            }
        }

        async function enviarPedidoProfesional() {
            const items = carrito.reduce((acc, p) => {
                acc[p.nombre] = (acc[p.nombre] || 0) + 1;
                return acc;
            }, {});

            let detalles = "";
            for (const [nombre, cant] of Object.entries(items)) {
                detalles += `${cant}x ${nombre}, `;
            }

            const datosPedido = {
                id_restaurante: restauranteSeleccionado.ID,
                restaurante_nombre: restauranteSeleccionado.NOMBRE_REST,
                detalles_pedido: detalles.slice(0, -2),
                total: document.getElementById('cart-total').innerText,
                cliente_nombre: "Cliente Web" 
            };

            // Bloqueamos botón para evitar doble envío
            const btn = event.currentTarget;
            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-sync fa-spin"></i> PROCESANDO...`;

            try {
                // REGISTRO EN PANEL PROFESIONAL (EXCEL)
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Importante para evitar bloqueos de navegador
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datosPedido)
                });

                // NOTIFICACIÓN WHATSAPP
                let mensajeWA = `*NUEVO PEDIDO - AGUADULCE EXPRESS*\n\n`;
                mensajeWA += `📍 *Restaurante:* ${restauranteSeleccionado.NOMBRE_REST}\n`;
                mensajeWA += `📝 *Pedido:* ${datosPedido.detalles_pedido}\n`;
                mensajeWA += `💰 *TOTAL: $${datosPedido.total}*\n\n`;
                mensajeWA += `_El pedido ha sido registrado en el Panel de Control._`;

                const url = `https://wa.me/${restauranteSeleccionado.TELEFONO}?text=${encodeURIComponent(mensajeWA)}`;
                
                alert("¡Pedido registrado profesionalmente!");
                window.open(url, '_blank');

                // Reiniciar App
                carrito = [];
                mostrarSelectorRestaurantes();

            } catch (error) {
                console.error("Error:", error);
                alert("Hubo un error al conectar con el Panel. Intenta de nuevo.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i class="fab fa-whatsapp text-xl"></i> CONFIRMAR`;
            }
        }

        cargarDatos();
    </script>
</body>
</html>
