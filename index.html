<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express | Pro v28</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: ui-sans-serif, system-ui; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        
        /* Botón Cerrar Flotante */
        .btn-close-modal { position: absolute; top: 20px; left: 20px; z-index: 100; width: 45px; height: 45px; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); }

        /* Categorías Estilo Burbuja */
        .cat-bubble { flex: 0 0 75px; display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; }
        .cat-img-wrapper { width: 60px; height: 60px; border-radius: 50%; background: #1e293b; padding: 2px; border: 2px solid transparent; overflow: hidden; transition: 0.3s; }
        .cat-img-wrapper img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .cat-bubble.active .cat-img-wrapper { border-color: #06b6d4; transform: scale(1.1); box-shadow: 0 0 15px rgba(6, 182, 212, 0.3); }
        .cat-bubble span { font-size: 9px; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }

        /* Acordeón de Complementos */
        .extra-header { cursor: pointer; display: flex; justify-content: space-between; align-items: center; padding: 18px; background: rgba(30, 41, 59, 0.5); border-radius: 1.2rem; border: 1px solid rgba(255,255,255,0.08); margin-top: 10px; }
        #grid-multi { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); max-height: 0; overflow: hidden; opacity: 0; }
        #grid-multi.open { max-height: 2000px; opacity: 1; padding: 15px 5px; }
        
        /* Items de la lista de extras */
        .extra-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .mini-counter { display: flex; items-center: center; gap: 10px; background: #0f172a; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 4px 10px; }

        .modal-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="pb-28">

    <header class="glass sticky top-0 z-50 px-6 py-5 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <button id="btn-back" onclick="irAHome()" class="hidden w-10 h-10 flex items-center justify-center bg-white/5 border border-white/10 rounded-xl text-white text-xl">←</button>
            <h1 id="header-txt" class="font-black italic text-xl uppercase tracking-tighter text-cyan-400 leading-none">HARO <span class="text-white text-lg">RESTAURANTE</span></h1>
        </div>
        <img src="https://i.postimg.cc/C1tDpH9b/LOGO-fondo-blanco.png" class="w-9 h-9 rounded-full border border-white/20 shadow-lg">
    </header>

    <div id="rest-banner" class="hidden h-44 w-full relative overflow-hidden">
        <div id="banner-img" class="absolute inset-0 bg-cover bg-center transition-transform duration-700"></div>
        <div class="absolute inset-0 bg-gradient-to-b from-black/20 via-black/40 to-slate-950"></div>
        <div class="absolute inset-0 flex items-center justify-center p-6">
            <h2 id="banner-name" class="text-3xl font-black italic uppercase text-white tracking-[0.2em] text-center drop-shadow-2xl"></h2>
        </div>
    </div>
 
    <div id="cat-nav" class="flex gap-4 p-6 overflow-x-auto hide-scroll"></div>
    <main id="app-content" class="p-4 max-w-xl mx-auto grid grid-cols-2 gap-6"></main>
 
    <div id="modal-detalle" class="fixed inset-0 z-[60] bg-slate-950 hidden overflow-y-auto modal-up">
        <div class="max-w-xl mx-auto min-h-screen pb-56">
            
            <button onclick="cerrarDetalle()" class="btn-close-modal">✕</button>
            
            <div id="det-img-cont" class="h-80 w-full bg-cover bg-center relative">
                <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-transparent to-transparent"></div>
            </div>
            
            <div class="px-8 -mt-10 relative space-y-8">
                <div class="flex justify-between items-start gap-4">
                    <div class="flex-1">
                        <h2 id="det-titulo" class="text-3xl font-black italic uppercase text-white leading-[1.1] tracking-tight"></h2>
                        <p id="det-desc" class="text-slate-400 text-[11px] mt-3 italic font-medium leading-relaxed"></p>
                    </div>
                    <span id="det-precio-base" class="text-cyan-400 text-2xl font-mono font-bold"></span>
                </div>

                <div id="cont-multi" class="pt-4 border-t border-white/10">
                    <div onclick="toggleExtras()" class="extra-header">
                        <div class="flex flex-col">
                            <span class="text-[11px] font-black text-cyan-500 uppercase tracking-widest">Complementos</span>
                            <span id="extra-sub" class="text-[9px] text-slate-500 uppercase font-bold mt-1 tracking-tighter">Selecciona bebidas o extras (Opcional)</span>
                        </div>
                        <span id="extra-arrow" class="text-cyan-500 text-xl transition-transform duration-300">↓</span>
                    </div>
                    <div id="grid-multi" class="space-y-1"></div>
                </div>

                <div class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-slate-950 via-slate-950/95 to-transparent z-[70]">
                    <div class="max-w-xl mx-auto space-y-5">
                        <div class="flex flex-col items-center gap-3">
                           <p class="text-[10px] uppercase font-black text-slate-500 tracking-[0.2em]">Cantidad de platos</p>
                            <div class="flex items-center bg-slate-900 border border-white/10 rounded-2xl px-6 py-2 gap-8 shadow-inner">
                                <button onclick="cambiarCant(-1)" class="text-cyan-400 text-3xl font-light w-8">−</button>
                                <span id="det-cant" class="text-white font-black text-xl w-6 text-center">1</span>
                                <button onclick="cambiarCant(1)" class="text-cyan-400 text-3xl font-light w-8">+</button>
                            </div>
                        </div>
                        <button onclick="ejecutarAddCarrito()" class="w-full bg-cyan-600 h-16 rounded-[1.5rem] font-black uppercase text-white flex justify-between items-center px-10 shadow-[0_20px_40px_-10px_rgba(6,182,212,0.3)] active:scale-[0.97] transition-all">
                           <span class="text-[12px] tracking-widest">Añadir al carrito</span>
                           <span id="det-precio-final" class="bg-black/20 px-4 py-2 rounded-xl text-base font-mono">0.00€</span>
                        </button>
                        <p onclick="cerrarDetalle()" class="text-center text-[10px] font-black text-slate-600 uppercase tracking-widest cursor-pointer hover:text-slate-400">Volver al menú</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
 
    <div id="basket-bar" class="fixed bottom-8 left-6 right-6 z-40 hidden">
        <div onclick="abrirCheckout()" class="bg-cyan-600 h-16 rounded-[1.4rem] px-8 flex items-center justify-between shadow-2xl border border-cyan-400/20 active:scale-95 transition-all">
            <div class="flex items-center gap-4">
                <span id="basket-count" class="bg-white/20 w-7 h-7 rounded-lg text-xs font-black text-white flex items-center justify-center">0</span>
                <span class="text-[12px] font-black uppercase text-white tracking-widest">Ver mi pedido</span>
            </div>
            <span id="basket-total" class="font-mono font-bold text-white text-lg tracking-tighter">0.00 €</span>
        </div>
    </div>

    <div id="modal-checkout" class="fixed inset-0 z-[80] bg-slate-950 hidden overflow-y-auto p-8 modal-up">
        <div class="max-w-md mx-auto space-y-10 pb-20 pt-6">
            <div class="space-y-2 text-center">
                <h2 class="text-4xl font-black italic text-white uppercase tracking-tighter">ESTÁS A UN <span class="text-cyan-400 underline decoration-2">PASO</span></h2>
                <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Revisa tu pedido antes de enviar</p>
            </div>

            <div id="checkout-list" class="space-y-3"></div>
            
            <div class="space-y-4 pt-4">
                <input type="text" id="o-name" placeholder="NOMBRE Y APELLIDO" class="w-full bg-slate-900 border border-white/5 rounded-2xl p-5 text-sm text-white focus:border-cyan-500 outline-none transition-all placeholder:text-slate-600 font-bold">
                <input type="tel" id="o-phone" placeholder="TELÉFONO DE CONTACTO" class="w-full bg-slate-900 border border-white/5 rounded-2xl p-5 text-sm text-white focus:border-cyan-500 outline-none transition-all placeholder:text-slate-600 font-bold">
                <input type="text" id="o-addr" placeholder="DIRECCIÓN DE ENTREGA" class="w-full bg-slate-900 border border-white/5 rounded-2xl p-5 text-sm text-white focus:border-cyan-500 outline-none transition-all placeholder:text-slate-600 font-bold">
            </div>

            <div class="flex items-start gap-4 p-6 bg-cyan-950/20 rounded-2xl border border-cyan-500/10">
                <input type="checkbox" id="o-terms" class="mt-1 w-6 h-6 accent-cyan-500 rounded-md">
                <label for="o-terms" class="text-[10px] text-slate-400 uppercase font-black leading-tight italic">Confirmo que el pedido es correcto y acepto el servicio de entrega.</label>
            </div>

            <button onclick="confirmarYEnviar()" class="w-full bg-cyan-600 p-6 rounded-2xl font-black uppercase text-white shadow-xl active:scale-95 transition-all text-sm tracking-widest">Pedir por WhatsApp</button>
            <p onclick="cerrarCheckout()" class="text-center text-[10px] font-black text-slate-600 uppercase tracking-widest cursor-pointer">Seguir comprando</p>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbz6v3d0YYIDAg5H3OY0ey6lWIGINVcR2iR26nGrut6xy68TY4fZmUxinUFu9R3jS4sK/exec";
        const COSTO_ENVIO = 3.50;
        let dataCache = null, carrito = [], restActivo = null, pAct = null, sMulti = {}, cantAct = 1;

        async function init() {
            try {
                const res = await fetch(API_URL);
                dataCache = await res.json();
                renderHome();
            } catch (e) { console.error("Error al conectar con la base de datos."); }
        }

        function renderHome(f = null) {
            restActivo = null;
            document.getElementById('btn-back').classList.add('hidden');
            document.getElementById('rest-banner').classList.add('hidden');
            document.getElementById('header-txt').classList.remove('hidden');
            
            const content = document.getElementById('app-content');
            content.className = "p-4 grid grid-cols-2 gap-6";
            content.innerHTML = "";
            
            const filt = (f && f !== 'TODOS') ? dataCache.restaurantes.filter(r => r.CATEGORIA === f) : dataCache.restaurantes;
            
            filt.forEach(r => {
                content.innerHTML += `
                    <div onclick="verMenu('${r.ID_RESTAURANTE}')" class="space-y-4 active:scale-95 transition-all group">
                        <div class="relative overflow-hidden rounded-[2.5rem] shadow-xl border border-white/5">
                            <img src="${r.FOTO}" class="w-full h-40 object-cover group-hover:scale-110 transition-transform duration-500">
                        </div>
                        <p class="text-[10px] font-black uppercase text-center text-slate-400 tracking-[0.15em] leading-tight">${r.NOMBRE}</p>
                    </div>`;
            });
            renderCats(dataCache.restaurantes, false);
        }

        function verMenu(id) {
            restActivo = dataCache.restaurantes.find(r => String(r.ID_RESTAURANTE) === String(id));
            const platos = dataCache.menus.filter(m => String(m.ID_RESTAURANTE) === String(id));
            
            document.getElementById('btn-back').classList.remove('hidden');
            document.getElementById('header-txt').classList.add('hidden');
            
            const banner = document.getElementById('rest-banner');
            banner.classList.remove('hidden');
            document.getElementById('banner-img').style.backgroundImage = `url('${restActivo.FOTO}')`;
            document.getElementById('banner-name').innerText = restActivo.NOMBRE;

            const content = document.getElementById('app-content');
            content.className = "p-4 flex flex-col gap-5";
            content.innerHTML = "";
            
            platos.forEach(p => {
                content.innerHTML += `
                <div onclick='abrirDetalle(${JSON.stringify(p)})' class="bg-slate-900/40 p-5 rounded-[2rem] flex items-center gap-6 border border-white/5 active:bg-slate-800/60 transition-all shadow-lg">
                    <img src="${p.FOTO}" class="w-24 h-24 rounded-3xl object-cover shadow-2xl border border-white/5">
                    <div class="flex-1">
                        <p class="text-sm font-black text-white uppercase leading-tight tracking-tighter">${p.PLATO}</p>
                        <p class="text-cyan-400 font-mono font-bold text-lg mt-2">${Number(p.PRECIO).toFixed(2)}€</p>
                    </div>
                </div>`;
            });
            renderCats(platos, true);
        }

        function abrirDetalle(p) {
            pAct = p; sMulti = {}; cantAct = 1;
            document.getElementById('det-titulo').innerText = p.PLATO;
            document.getElementById('det-desc').innerText = p.DESCRIPCION || "Deliciosa selección de ingredientes frescos preparados al momento.";
            document.getElementById('det-precio-base').innerText = Number(p.PRECIO).toFixed(2) + "€";
            document.getElementById('det-img-cont').style.backgroundImage = `url('${p.FOTO}')`;
            
            document.getElementById('grid-multi').classList.remove('open');
            document.getElementById('extra-arrow').style.transform = "rotate(0deg)";

            const gM = document.getElementById('grid-multi'); gM.innerHTML = "";
            if(p.EXTRAS) {
                p.EXTRAS.split(',').forEach(o => {
                    const [nombre, precio] = o.split(':');
                    const nTrim = nombre.trim();
                    sMulti[nTrim] = { p: Number(precio || 0), cant: 0 };

                    const row = document.createElement('div');
                    row.className = "extra-item";
                    row.innerHTML = `
                        <div class="flex flex-col">
                            <span class="text-[11px] font-black text-slate-300 uppercase leading-none">${nTrim}</span>
                            <span class="text-cyan-500 font-mono text-[10px] mt-1">+${Number(precio).toFixed(2)}€</span>
                        </div>
                        <div class="mini-counter">
                            <button onclick="cambiarExtra('${nTrim}', -1, this)" class="text-white font-bold text-lg">−</button>
                            <span class="text-white text-xs font-black extra-count-val">0</span>
                            <button onclick="cambiarExtra('${nTrim}', 1, this)" class="text-white font-bold text-lg">+</button>
                        </div>`;
                    gM.appendChild(row);
                });
                document.getElementById('cont-multi').classList.remove('hidden');
            } else {
                document.getElementById('cont-multi').classList.add('hidden');
            }

            actualizarCalculo();
            document.getElementById('modal-detalle').classList.remove('hidden');
            document.body.style.overflow = "hidden";
        }

        function toggleExtras() {
            const grid = document.getElementById('grid-multi');
            const arrow = document.getElementById('extra-arrow');
            grid.classList.toggle('open');
            arrow.style.transform = grid.classList.contains('open') ? "rotate(180deg)" : "rotate(0deg)";
        }

        function cambiarExtra(nombre, val, btn) {
            sMulti[nombre].cant = Math.max(0, sMulti[nombre].cant + val);
            btn.parentElement.querySelector('.extra-count-val').innerText = sMulti[nombre].cant;
            actualizarCalculo();
        }

        function actualizarCalculo() {
            const precioPlatoTotal = Number(pAct.PRECIO) * cantAct;
            let precioExtrasTotal = 0;
            for (let key in sMulti) { precioExtrasTotal += sMulti[key].p * sMulti[key].cant; }
            const total = precioPlatoTotal + precioExtrasTotal;
            document.getElementById('det-precio-final').innerText = total.toFixed(2) + "€";
            document.getElementById('det-cant').innerText = cantAct;
        }

        function cambiarCant(v) { cantAct = Math.max(1, cantAct + v); actualizarCalculo(); }

        function ejecutarAddCarrito() {
            const precioPlatoTotal = Number(pAct.PRECIO) * cantAct;
            let extrasTxt = [];
            let precioExtrasTotal = 0;
            for (let key in sMulti) {
                if (sMulti[key].cant > 0) {
                    extrasTxt.push(`${sMulti[key].cant}x ${key}`);
                    precioExtrasTotal += sMulti[key].p * sMulti[key].cant;
                }
            }
            let nombreFinal = `${cantAct}x ${pAct.PLATO}`;
            if(extrasTxt.length > 0) nombreFinal += ` + [${extrasTxt.join(', ')}]`;

            carrito.push({ n: nombreFinal, p: precioPlatoTotal + precioExtrasTotal, cant: 1 });
            cerrarDetalle();
            actualizarBarraCesta();
        }

        function actualizarBarraCesta() {
            if(carrito.length > 0) {
                const subtotal = carrito.reduce((acc, i) => acc + i.p, 0);
                const totalCesta = subtotal + COSTO_ENVIO;
                document.getElementById('basket-total').innerText = totalCesta.toFixed(2) + " €";
                document.getElementById('basket-count').innerText = carrito.length;
                document.getElementById('basket-bar').classList.remove('hidden');
            } else {
                document.getElementById('basket-bar').classList.add('hidden');
            }
        }

        function abrirCheckout() {
            const list = document.getElementById('checkout-list');
            list.innerHTML = "";
            carrito.forEach((item, idx) => {
                list.innerHTML += `<div class="flex justify-between items-center bg-slate-900 p-5 rounded-2xl border border-white/5">
                    <div class="flex flex-col gap-1"><span class="text-[10px] font-black text-white uppercase leading-tight">${item.n}</span><span class="text-cyan-500 font-mono text-[10px]">${item.p.toFixed(2)}€</span></div>
                    <button onclick="borrarItem(${idx})" class="text-red-500 font-black text-lg px-2">✕</button></div>`;
            });
            document.getElementById('modal-checkout').classList.remove('hidden');
        }

        function borrarItem(idx) { 
            carrito.splice(idx, 1); 
            if(!carrito.length) cerrarCheckout(); else abrirCheckout();
            actualizarBarraCesta();
        }

        function confirmarYEnviar() {
            const n = document.getElementById('o-name').value, t = document.getElementById('o-phone').value, a = document.getElementById('o-addr').value;
            if(!n || !t || !a || !document.getElementById('o-terms').checked) return alert("Por favor, completa tus datos para la entrega.");
            const totalF = (carrito.reduce((acc, i) => acc + i.p, 0) + COSTO_ENVIO).toFixed(2);
            const detalle = carrito.map(i => i.n).join(' | ');
            fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({id_restaurante:restActivo.ID_RESTAURANTE, cliente: n, direccion: a, detalle: detalle, total: totalF, whatsapp_rest: restActivo.TELEFONO })});
            let msg = `*🛍️ NUEVO PEDIDO: ${restActivo.NOMBRE}*\n\n*CLIENTE:* ${n.toUpperCase()}\n*TEL:* ${t}\n*DIR:* ${a.toUpperCase()}\n\n*DETALLE:*\n`;
            carrito.forEach(i => msg += `• ${i.n} - ${i.p.toFixed(2)}€\n`);
            msg += `\n*COSTO ENVÍO:* ${COSTO_ENVIO.toFixed(2)}€\n*TOTAL A PAGAR: ${totalF}€*`;
            window.open(`https://wa.me/${restActivo.TELEFONO}?text=${encodeURIComponent(msg)}`);
        }

        function renderCats(datos, esM) {
            const nav = document.getElementById('cat-nav'); nav.innerHTML = "";
            const cats = [...new Set(datos.map(i => i.CATEGORIA))].filter(Boolean);
            nav.innerHTML += createBubble("TODOS", esM ? "CARTA" : "TODOS", true, esM);
            cats.forEach(c => nav.innerHTML += createBubble(c, c, false, esM));
        }

        function createBubble(id, name, active, esM) {
            const icon = dataCache.iconos.find(i => i.CATEGORIA.toUpperCase() === id.toUpperCase());
            const img = icon ? icon.FOTO : "https://i.postimg.cc/mD44w655/all-food.jpg";
            return `<div onclick="${esM?'filtrarMenu':'filtrarRest'}('${id}', this)" class="cat-bubble ${active?'active':''}">
                <div class="cat-img-wrapper"><img src="${img}"></div><span>${name}</span></div>`;
        }

        function filtrarRest(c, el) { document.querySelectorAll('.cat-bubble').forEach(b => b.classList.remove('active')); el.classList.add('active'); renderHome(c); }
        function filtrarMenu(c, el) { 
            document.querySelectorAll('.cat-bubble').forEach(b => b.classList.remove('active')); el.classList.add('active'); 
            const platos = dataCache.menus.filter(m => String(m.ID_RESTAURANTE) === String(restActivo.ID_RESTAURANTE));
            const filt = c === 'TODOS' ? platos : platos.filter(p => p.CATEGORIA === c);
            const content = document.getElementById('app-content'); content.innerHTML = "";
            filt.forEach(p => {
                content.innerHTML += `<div onclick='abrirDetalle(${JSON.stringify(p)})' class="bg-slate-900/40 p-5 rounded-[2rem] flex items-center gap-6 border border-white/5 shadow-lg"><img src="${p.FOTO}" class="w-24 h-24 rounded-3xl object-cover border border-white/5 shadow-xl"><div class="flex-1"><p class="text-sm font-black text-white uppercase leading-tight">${p.PLATO}</p><p class="text-cyan-400 font-mono font-bold text-lg mt-2">${Number(p.PRECIO).toFixed(2)}€</p></div></div>`;
            });
        }

        function irAHome() { renderHome(); }
        function cerrarDetalle() { document.getElementById('modal-detalle').classList.add('hidden'); document.body.style.overflow = "auto"; }
        function cerrarCheckout() { document.getElementById('modal-checkout').classList.add('hidden'); document.body.style.overflow = "auto"; }

        init();
    </script>
</body>
</html>
