<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express | Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,900;1,900&display=swap');

        body { background: #020617; color: #f8fafc; font-family: ui-sans-serif, system-ui; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        
        .brand-font { font-family: 'Poppins', sans-serif; font-weight: 900; font-style: italic; text-transform: uppercase; letter-spacing: -1.5px; line-height: 1; }

        /* Categorías */
        .cat-bubble { flex: 0 0 75px; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; }
        .cat-img-wrapper { width: 55px; height: 55px; border-radius: 50%; background: #1e293b; padding: 2px; border: 2px solid transparent; overflow: hidden; transition: 0.3s; }
        .cat-img-wrapper img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .cat-bubble.active .cat-img-wrapper { border-color: #06b6d4; transform: scale(1.05); }
        .cat-bubble span { font-size: 9px; font-weight: 800; color: #64748b; text-transform: uppercase; text-align: center; }

        /* Extras Acordeón */
        .extra-header { cursor: pointer; display: flex; justify-content: space-between; align-items: center; padding: 16px; background: rgba(30, 41, 59, 0.4); border-radius: 1rem; border: 1px solid rgba(255,255,255,0.05); }
        #grid-multi { transition: all 0.4s ease; max-height: 0; overflow: hidden; opacity: 0; }
        #grid-multi.open { max-height: 1000px; opacity: 1; padding: 10px 0; }
        .extra-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .modal-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="pb-32">

    <header class="glass sticky top-0 z-50 px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3 relative">
            <button id="btn-back" onclick="irAHome()" class="hidden w-10 h-10 flex items-center justify-center bg-white/10 rounded-xl text-white mr-1">←</button>
            
            <div class="w-11 h-11 rounded-full border border-white/20 overflow-hidden bg-white shadow-lg flex-shrink-0">
                <img src="Logo Aguadulce Express.jpeg" class="w-full h-full object-contain">
            </div>

            <div class="flex flex-col brand-font">
                <span class="text-2xl text-cyan-400">AGUADULCE</span>
                <span class="text-xs text-white tracking-[0.3em] -mt-1">EXPRESS</span>
            </div>
        </div>
        
        <div class="w-10 h-10 rounded-full border border-white/10 bg-slate-800 flex items-center justify-center text-[10px] font-black text-slate-500">AE</div>
    </header>

    <div id="rest-banner" class="hidden h-40 w-full relative overflow-hidden mb-4">
        <div id="banner-img" class="absolute inset-0 bg-cover bg-center"></div>
        <div class="absolute inset-0 bg-black/60 flex items-center justify-center">
            <h2 id="banner-name" class="text-3xl font-black italic uppercase text-white tracking-widest drop-shadow-2xl"></h2>
        </div>
    </div>
 
    <div id="cat-nav" class="flex gap-4 p-5 overflow-x-auto hide-scroll bg-[#020617]"></div>
    <main id="app-content" class="p-4 max-w-xl mx-auto grid grid-cols-2 gap-6"></main>
 
    <div id="modal-detalle" class="fixed inset-0 z-[60] bg-slate-950 hidden overflow-y-auto modal-up">
        <div class="max-w-xl mx-auto min-h-screen pb-48">
            <button onclick="cerrarDetalle()" class="absolute top-6 left-6 z-[70] w-12 h-12 bg-black/60 rounded-full text-white text-2xl flex items-center justify-center">✕</button>
            <div id="det-img-cont" class="h-64 w-full bg-cover bg-center relative"></div>
            
            <div class="px-8 mt-6 space-y-6">
                <div class="flex justify-between items-start">
                    <div class="flex-1">
                        <h2 id="det-titulo" class="text-2xl font-black italic uppercase text-white leading-tight"></h2>
                        <p id="det-desc" class="text-gray-400 text-xs mt-2"></p>
                    </div>
                    <span id="det-precio-base" class="text-cyan-400 text-xl font-mono font-bold"></span>
                </div>

                <div id="cont-multi" class="hidden">
                    <div onclick="toggleExtras()" class="extra-header">
                        <span class="text-[10px] font-black text-cyan-500 uppercase">¿Añadir extras?</span>
                        <span id="extra-arrow" class="text-cyan-500 transition-transform">↓</span>
                    </div>
                    <div id="grid-multi"></div>
                </div>

                <div class="fixed bottom-0 left-0 right-0 p-6 bg-slate-950 z-[65]">
                    <div class="max-w-xl mx-auto space-y-4">
                        <div class="flex items-center justify-center gap-8 bg-slate-900 rounded-full py-2">
                            <button onclick="cambiarCant(-1)" class="text-cyan-400 text-3xl">-</button>
                            <span id="det-cant" class="text-white font-black text-xl">1</span>
                            <button onclick="cambiarCant(1)" class="text-cyan-400 text-3xl">+</button>
                        </div>
                        <button onclick="ejecutarAddCarrito()" class="w-full bg-cyan-600 h-14 rounded-2xl font-black uppercase text-white flex justify-between items-center px-8">
                           <span>Confirmar</span>
                           <span id="det-precio-final">0.00€</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
 
    <div id="basket-bar" class="fixed bottom-6 left-6 right-6 z-40 hidden">
        <div onclick="abrirCheckout()" class="bg-cyan-600 rounded-2xl h-14 px-6 flex items-center justify-between shadow-2xl border border-cyan-400/20">
            <div class="flex items-center gap-3">
                <span id="basket-count" class="bg-black/30 w-6 h-6 rounded-lg text-[10px] font-black text-white flex items-center justify-center">0</span>
                <span class="text-[11px] font-black uppercase text-white">Ver Pedido</span>
            </div>
            <span id="basket-total" class="font-mono font-bold text-white">0.00 €</span>
        </div>
    </div>

    <div id="modal-checkout" class="fixed inset-0 z-[75] bg-slate-950 hidden overflow-y-auto p-6 modal-up">
        <div class="max-w-md mx-auto space-y-8 pb-20 pt-10">
            <h2 class="text-3xl font-black italic text-white uppercase">Checkout</h2>
            <div id="checkout-list" class="space-y-2"></div>
            <div class="space-y-4">
                <input type="text" id="o-name" placeholder="Nombre" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-white outline-none">
                <input type="tel" id="o-phone" placeholder="Teléfono" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-white outline-none">
                <input type="text" id="o-addr" placeholder="Dirección" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-white outline-none">
            </div>
            <button onclick="confirmarYEnviar()" class="w-full bg-cyan-600 p-6 rounded-2xl font-black uppercase text-white">Pedir por WhatsApp</button>
            <button onclick="cerrarCheckout()" class="w-full text-gray-500 uppercase text-[10px]">Cerrar</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbz6v3d0YYIDAg5H3OY0ey6lWIGINVcR2iR26nGrut6xy68TY4fZmUxinUFu9R3jS4sK/exec";
        const COSTO_ENVIO = 3.50;
        let dataCache = null, carrito = [], restActivo = null, pAct = null, sMulti = {}, cantAct = 1;

        async function init() {
            try {
                const res = await fetch(API_URL);
                dataCache = await res.json();
                renderHome();
            } catch (e) { console.error("Error"); }
        }

        function renderHome(f = null) {
            restActivo = null;
            document.getElementById('btn-back').classList.add('hidden');
            document.getElementById('rest-banner').classList.add('hidden');
            const content = document.getElementById('app-content');
            content.className = "p-4 grid grid-cols-2 gap-6";
            content.innerHTML = "";
            const filt = (f && f !== 'TODOS') ? dataCache.restaurantes.filter(r => r.CATEGORIA === f) : dataCache.restaurantes;
            filt.forEach(r => {
                content.innerHTML += `<div onclick="verMenu('${r.ID_RESTAURANTE}')" class="space-y-3"><img src="${r.FOTO}" class="w-full h-36 object-cover rounded-[2.2rem] border border-white/5"><p class="text-[10px] font-black uppercase text-center text-slate-400">${r.NOMBRE}</p></div>`;
            });
            renderCats(dataCache.restaurantes, false);
        }

        function verMenu(id) {
            restActivo = dataCache.restaurantes.find(r => String(r.ID_RESTAURANTE) === String(id));
            const platos = dataCache.menus.filter(m => String(m.ID_RESTAURANTE) === String(id));
            document.getElementById('btn-back').classList.remove('hidden');
            document.getElementById('rest-banner').classList.remove('hidden');
            document.getElementById('banner-img').style.backgroundImage = `url('${restActivo.FOTO}')`;
            document.getElementById('banner-name').innerText = restActivo.NOMBRE;
            const content = document.getElementById('app-content');
            content.className = "p-4 flex flex-col gap-4";
            content.innerHTML = "";
            platos.forEach(p => {
                content.innerHTML += `<div onclick='abrirDetalle(${JSON.stringify(p)})' class="bg-white/5 p-4 rounded-[1.8rem] flex items-center gap-5 border border-white/5"><img src="${p.FOTO}" class="w-20 h-20 rounded-2xl object-cover"><div class="flex-1"><p class="text-[12px] font-black text-white uppercase">${p.PLATO}</p><p class="text-cyan-400 font-bold">${Number(p.PRECIO).toFixed(2)}€</p></div></div>`;
            });
            renderCats(platos, true);
        }

        function abrirDetalle(p) {
            pAct = p; sMulti = {}; cantAct = 1;
            document.getElementById('det-titulo').innerText = p.PLATO;
            document.getElementById('det-desc').innerText = p.DESCRIPCION || "";
            document.getElementById('det-precio-base').innerText = Number(p.PRECIO).toFixed(2) + "€";
            document.getElementById('det-img-cont').style.backgroundImage = `url('${p.FOTO}')`;
            const gM = document.getElementById('grid-multi'); gM.innerHTML = "";
            if(p.EXTRAS) {
                p.EXTRAS.split(',').forEach(o => {
                    const [nombre, precio] = o.split(':');
                    sMulti[nombre.trim()] = { p: Number(precio || 0), cant: 0 };
                    gM.innerHTML += `<div class="extra-item"><span>${nombre.trim()} (+${Number(precio).toFixed(2)}€)</span><div class="flex items-center gap-3"><button onclick="cambiarExtra('${nombre.trim()}', -1, this)">-</button><span class="extra-count-val">0</span><button onclick="cambiarExtra('${nombre.trim()}', 1, this)">+</button></div></div>`;
                });
                document.getElementById('cont-multi').classList.remove('hidden');
            } else { document.getElementById('cont-multi').classList.add('hidden'); }
            actualizarCalculo();
            document.getElementById('modal-detalle').classList.remove('hidden');
        }

        function cambiarExtra(nombre, val, btn) {
            sMulti[nombre].cant = Math.max(0, sMulti[nombre].cant + val);
            btn.parentElement.querySelector('.extra-count-val').innerText = sMulti[nombre].cant;
            actualizarCalculo();
        }

        function actualizarCalculo() {
            let extraP = 0; for(let k in sMulti) extraP += sMulti[k].p * sMulti[k].cant;
            const total = (Number(pAct.PRECIO) * cantAct) + extraP;
            document.getElementById('det-precio-final').innerText = total.toFixed(2) + "€";
            document.getElementById('det-cant').innerText = cantAct;
        }

        function cambiarCant(v) { cantAct = Math.max(1, cantAct + v); actualizarCalculo(); }

        function ejecutarAddCarrito() {
            let totalItem = (Number(pAct.PRECIO) * cantAct);
            let extrasTxt = [];
            for(let k in sMulti) { if(sMulti[k].cant > 0) { extrasTxt.push(`${sMulti[k].cant}x ${k}`); totalItem += sMulti[k].p * sMulti[k].cant; } }
            carrito.push({ n: `${cantAct}x ${pAct.PLATO} ${extrasTxt.length ? '('+extrasTxt.join(', ')+')' : ''}`, p: totalItem });
            cerrarDetalle();
            actualizarBarraCesta();
        }

        function actualizarBarraCesta() {
            if(carrito.length > 0) {
                const total = carrito.reduce((acc, i) => acc + i.p, 0) + COSTO_ENVIO;
                document.getElementById('basket-total').innerText = total.toFixed(2) + " €";
                document.getElementById('basket-count').innerText = carrito.length;
                document.getElementById('basket-bar').classList.remove('hidden');
            } else { document.getElementById('basket-bar').classList.add('hidden'); }
        }

        function abrirCheckout() {
            const list = document.getElementById('checkout-list'); list.innerHTML = "";
            carrito.forEach((item, idx) => {
                list.innerHTML += `<div class="flex justify-between bg-white/5 p-4 rounded-xl"><span>${item.n}</span><button onclick="borrarItem(${idx})">✕</button></div>`;
            });
            document.getElementById('modal-checkout').classList.remove('hidden');
        }

        function borrarItem(idx) { carrito.splice(idx,1); if(!carrito.length) cerrarCheckout(); else abrirCheckout(); actualizarBarraCesta(); }

        function confirmarYEnviar() {
            const n = document.getElementById('o-name').value, t = document.getElementById('o-phone').value, a = document.getElementById('o-addr').value;
            if(!n || !t || !a) return alert("Faltan datos");
            const total = (carrito.reduce((acc, i) => acc + i.p, 0) + COSTO_ENVIO).toFixed(2);
            let msg = `🛍️ NUEVO PEDIDO\n\nCLIENTE: ${n}\nDIR: ${a}\n\n`;
            carrito.forEach(i => msg += `• ${i.n} - ${i.p.toFixed(2)}€\n`);
            msg += `\nEnvío: ${COSTO_ENVIO.toFixed(2)}€\nTOTAL: ${total}€`;
            window.open(`https://wa.me/${restActivo.TELEFONO}?text=${encodeURIComponent(msg)}`);
        }

        function renderCats(datos, esM) {
            const nav = document.getElementById('cat-nav'); nav.innerHTML = "";
            const cats = [...new Set(datos.map(i => i.CATEGORIA))].filter(Boolean);
            nav.innerHTML += createBubble("TODOS", esM ? "Carta" : "Todos", true, esM);
            cats.forEach(c => nav.innerHTML += createBubble(c, c, false, esM));
        }

        function createBubble(id, name, active, esM) {
            const icon = dataCache.iconos.find(i => i.CATEGORIA.toUpperCase() === id.toUpperCase());
            const imgDefault = "https://cdn-icons-png.flaticon.com/512/706/706164.png";
            const imgUrl = (icon && icon.FOTO) ? icon.FOTO : imgDefault;
            return `<div onclick="${esM?'filtrarMenu':'filtrarRest'}('${id}', this)" class="cat-bubble ${active?'active':''}">
                <div class="cat-img-wrapper"><img src="${imgUrl}" onerror="this.src='${imgDefault}'"></div><span>${name}</span></div>`;
        }

        function filtrarRest(c, el) { document.querySelectorAll('.cat-bubble').forEach(b => b.classList.remove('active')); el.classList.add('active'); renderHome(c); }
        function filtrarMenu(c, el) { 
            document.querySelectorAll('.cat-bubble').forEach(b => b.classList.remove('active')); el.classList.add('active'); 
            const platos = dataCache.menus.filter(m => String(m.ID_RESTAURANTE) === String(restActivo.ID_RESTAURANTE));
            const filt = c === 'TODOS' ? platos : platos.filter(p => p.CATEGORIA === c);
            const content = document.getElementById('app-content'); content.innerHTML = "";
            filt.forEach(p => {
                content.innerHTML += `<div onclick='abrirDetalle(${JSON.stringify(p)})' class="bg-white/5 p-4 rounded-[1.8rem] flex items-center gap-5 border border-white/5"><img src="${p.FOTO}" class="w-20 h-20 rounded-2xl object-cover"><div class="flex-1"><p class="text-[12px] font-black text-white uppercase">${p.PLATO}</p><p class="text-cyan-400 font-bold">${Number(p.PRECIO).toFixed(2)}€</p></div></div>`;
            });
        }

        function irAHome() { renderHome(); }
        function cerrarDetalle() { document.getElementById('modal-detalle').classList.add('hidden'); }
        function cerrarCheckout() { document.getElementById('modal-checkout').classList.add('hidden'); }
        function toggleExtras() { document.getElementById('grid-multi').classList.toggle('open'); }

        init();
    </script>
</body>
</html>
