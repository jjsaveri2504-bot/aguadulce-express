<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: ui-sans-serif, system-ui; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        
        /* Burbujas Home */
        .cat-bubble { flex: 0 0 85px; display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; transition: 0.3s; }
        .cat-img-wrapper { 
            width: 65px; height: 65px; border-radius: 50%; background: white; padding: 12px; 
            border: 2px solid transparent; transition: 0.3s;
        }
        .cat-bubble.active .cat-img-wrapper { border-color: #06b6d4; transform: scale(1.1); box-shadow: 0 0 15px rgba(6, 182, 212, 0.4); }
        .cat-bubble span { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; text-align: center; }

        /* Estilo Botones Extras */
        .extra-btn { padding: 12px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.03); font-size: 11px; font-weight: 700; text-transform: uppercase; color: #cbd5e1; transition: 0.2s; }
        .extra-btn.selected { background: rgba(6, 182, 212, 0.2); border-color: #06b6d4; color: #22d3ee; }
        .extra-btn.disabled { opacity: 0.3; pointer-events: none; }

        .modal-up { animation: slideUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="pb-32">

    <header class="glass sticky top-0 z-50 px-6 py-5 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <button id="btn-back" onclick="irAHome()" class="hidden p-2 bg-white/10 rounded-xl text-white">←</button>
            <h1 id="header-txt" class="font-black italic text-xl uppercase tracking-tighter text-cyan-400">AGUADULCE <span class="text-white">EXPRESS</span></h1>
        </div>
        <img src="https://i.postimg.cc/C1tDpH9b/LOGO-fondo-blanco.png" class="w-10 h-10 rounded-full border border-white/10">
    </header>

    <div id="cat-nav" class="flex gap-4 p-6 overflow-x-auto hide-scroll bg-[#020617]"></div>

    <main id="app-content" class="p-4 max-w-xl mx-auto grid grid-cols-2 gap-5"></main>

    <div id="modal-detalle" class="fixed inset-0 z-[60] bg-slate-950 hidden overflow-y-auto modal-up">
        <div class="max-w-xl mx-auto pb-40">
            <div id="det-img-cont" class="h-72 w-full relative"></div>
            <div class="p-8 -mt-10 relative bg-slate-950 rounded-t-[3rem] space-y-6">
                <div class="flex justify-between items-start">
                    <h2 id="det-titulo" class="text-2xl font-black italic uppercase text-white leading-tight pr-4"></h2>
                    <span id="det-precio-base" class="text-cyan-400 text-xl font-bold font-mono"></span>
                </div>
                <p id="det-desc" class="text-gray-400 text-sm"></p>
                <div id="section-extras" class="space-y-4 pt-4 border-t border-white/5">
                    <p id="ing-aviso" class="text-[10px] font-black text-cyan-500 uppercase tracking-widest"></p>
                    <div id="extras-grid" class="flex flex-wrap gap-2.5"></div>
                </div>
                <button id="btn-add-det" class="w-full bg-cyan-600 p-6 rounded-3xl font-black uppercase text-white flex justify-between items-center shadow-lg active:scale-95 transition">
                    <span>Añadir pedido</span>
                    <span id="det-precio-final" class="bg-black/20 px-4 py-1 rounded-xl">0.00€</span>
                </button>
                <button onclick="cerrarDetalle()" class="w-full py-4 text-gray-500 font-bold uppercase text-[10px]">Cerrar</button>
            </div>
        </div>
    </div>

    <div id="basket-bar" class="fixed bottom-6 left-6 right-6 z-40 hidden modal-up">
        <div class="bg-cyan-600 rounded-[2.5rem] p-3 flex items-center justify-between shadow-2xl">
            <button onclick="vaciarCarrito()" class="p-4 bg-black/20 rounded-full text-white">🗑️</button>
            <p id="basket-total" class="text-2xl font-black text-white font-mono">0.00 €</p>
            <button onclick="abrirCheckout()" class="bg-slate-950 text-white px-8 py-4 rounded-full text-xs font-black uppercase">Tramitar</button>
        </div>
    </div>

    <div id="modal-checkout" class="fixed inset-0 z-[70] bg-slate-950 hidden overflow-y-auto p-6 modal-up">
        <div class="max-w-md mx-auto space-y-8 pb-20">
            <h2 class="text-3xl font-black italic text-white uppercase pt-10">Resumen del<br><span class="text-cyan-400">Pedido</span></h2>
            <div id="checkout-list" class="space-y-3"></div>
            
            <div class="space-y-4">
                <input type="text" id="order-name" placeholder="Tu Nombre" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-white outline-none focus:border-cyan-500">
                <input type="text" id="order-phone" placeholder="WhatsApp (Ej: 34600111222)" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-white outline-none focus:border-cyan-500">
                <input type="text" id="order-addr" placeholder="Dirección de entrega" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-white outline-none focus:border-cyan-500">
                
                <div class="flex items-start gap-3 p-2 bg-white/5 rounded-2xl border border-white/5">
                    <input type="checkbox" id="order-terms" class="mt-1 w-5 h-5 accent-cyan-500">
                    <label for="order-terms" class="text-[10px] text-gray-400 leading-tight uppercase font-bold">
                        Acepto las condiciones de uso y el manejo de mis datos exclusivamente para la gestión de este pedido.
                    </label>
                </div>
            </div>

            <button onclick="confirmarPedidoFinal()" class="w-full bg-cyan-600 p-7 rounded-3xl font-black uppercase text-white shadow-xl shadow-cyan-900/20 active:scale-95 transition">Confirmar por WhatsApp</button>
            <button onclick="cerrarCheckout()" class="w-full py-2 text-gray-500 font-bold uppercase text-[10px]">Volver</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwn3g8hrZjRe8EjgP9oXGBPP3gjIuM76lHwZCcm_t0vOt54B9gmez6ABUXJralRAZdV/exec";
        let dataCache = null, carrito = [], restActivo = null, platoActual = null, extrasSel = [], maxIng = 99;

        const catIcons = { 
            "TODOS": "https://cdn-icons-png.flaticon.com/512/741/741548.png", 
            "HAMBURGUESA": "https://cdn-icons-png.flaticon.com/512/1046/1046784.png", 
            "PIZZA": "https://cdn-icons-png.flaticon.com/512/3595/3595455.png",
            "MARKET": "https://cdn-icons-png.flaticon.com/512/3081/3081840.png"
        };

        async function init() {
            try {
                const res = await fetch(API_URL);
                dataCache = await res.json();
                renderCategorias();
                renderHome();
                ['name', 'phone', 'addr'].forEach(k => {
                    const val = localStorage.getItem('user_'+k);
                    if(val) document.getElementById('order-'+k).value = val;
                });
            } catch (e) { console.error("Error cargando datos:", e); }
        }

        function renderCategorias() {
            const cats = [...new Set(dataCache.restaurantes.map(r => r.CATEGORIA))].filter(Boolean);
            const nav = document.getElementById('cat-nav');
            nav.innerHTML = createCatBubble("TODOS", "Todos");
            cats.forEach(c => nav.innerHTML += createCatBubble(c, c));
        }

        function createCatBubble(id, name) {
            const img = catIcons[id.toUpperCase()] || "https://cdn-icons-png.flaticon.com/512/706/706164.png";
            return `<div onclick="filtrarRest('${id}', this)" class="cat-bubble ${id==='TODOS'?'active':''}">
                <div class="cat-img-wrapper"><img src="${img}" class="w-full h-full object-contain"></div><span>${name}</span></div>`;
        }

        function renderHome(f = null) {
            document.getElementById('btn-back').classList.add('hidden');
            document.getElementById('header-txt').innerHTML = 'AGUADULCE <span class="text-white">EXPRESS</span>';
            const content = document.getElementById('app-content');
            content.className = "p-4 grid grid-cols-2 gap-5"; 
            content.innerHTML = "";

            const filt = (f && f !== 'TODOS') ? dataCache.restaurantes.filter(r => r.CATEGORIA === f) : dataCache.restaurantes;
            filt.forEach(r => {
                content.innerHTML += `<div onclick="verMenu('${r.ID_RESTAURANTE}')" class="bg-white/5 rounded-[2rem] overflow-hidden border border-white/5 active:scale-95 transition">
                    <img src="${r.FOTO}" class="w-full h-32 object-cover">
                    <div class="p-4 text-center text-[10px] font-black uppercase italic">${r.NOMBRE}</div></div>`;
            });
        }

        function verMenu(id) {
            restActivo = dataCache.restaurantes.find(r => String(r.ID_RESTAURANTE) === String(id));
            const platos = dataCache.menus.filter(m => String(m.ID_RESTAURANTE) === String(id));
            
            document.getElementById('btn-back').classList.remove('hidden');
            document.getElementById('header-txt').innerText = restActivo.NOMBRE;
            
            const content = document.getElementById('app-content');
            content.className = "p-4 flex flex-col gap-4"; 
            content.innerHTML = "";
            
            platos.forEach(p => {
                // CORRECCIÓN CLAVE: Usamos p.PLATO (o p.NOMBRE según tu sheet) explícitamente
                const nombrePlato = p.PLATO || p.NOMBRE; 
                content.innerHTML += `
                    <div onclick='abrirDetalle(${JSON.stringify(p)})' class="bg-white/5 p-4 rounded-[2rem] flex items-center gap-5 border border-white/10 active:scale-95 transition">
                        <img src="${p.FOTO_PLATO || p.FOTO}" class="w-20 h-20 rounded-2xl object-cover shadow-lg">
                        <div class="flex-1 font-black uppercase">
                            <p class="text-[11px] text-white leading-tight mb-1">${nombrePlato}</p>
                            <p class="text-cyan-400 text-lg font-mono">${parseFloat(p.PRECIO).toFixed(2)}€</p>
                        </div>
                    </div>`;
            });
        }

        function abrirDetalle(p) {
            platoActual = p; extrasSel = [];
            const nombre = p.PLATO || p.NOMBRE;
            
            // Lógica de ingredientes gratuitos basada en el nombre (ej: "Pizza 5 ing")
            maxIng = nombre.match(/(\d+)\s*ing/i) ? parseInt(nombre.match(/(\d+)\s*ing/i)[1]) : (p.CATEGORIA?.toUpperCase().includes("PIZZA") ? 5 : 99);
            
            document.getElementById('det-titulo').innerText = nombre;
            document.getElementById('det-precio-base').innerText = parseFloat(p.PRECIO).toFixed(2) + "€";
            document.getElementById('det-img-cont').innerHTML = `<img src="${p.FOTO_PLATO || p.FOTO}" class="w-full h-full object-cover">`;
            document.getElementById('det-desc').innerText = p.DESCRIPCION || "";
            document.getElementById('ing-aviso').innerText = maxIng < 10 ? `Elige máximo ${maxIng} ingredientes:` : "Personaliza tu pedido:";

            const grid = document.getElementById('extras-grid'); 
            grid.innerHTML = "";
            
            if(p.EXTRAS) {
                p.EXTRAS.split(',').forEach(ex => {
                    const parts = ex.split(':');
                    const n = parts[0].trim();
                    const cost = parseFloat(parts[1] || 0);
                    
                    const btn = document.createElement('button');
                    btn.className = "extra-btn";
                    btn.innerText = cost > 0 ? `${n} (+${cost.toFixed(2)}€)` : n;
                    btn.onclick = () => {
                        const idx = extrasSel.findIndex(e => e.n === n);
                        if(idx > -1) { 
                            extrasSel.splice(idx,1); 
                            btn.classList.remove('selected'); 
                        } else {
                            if(cost === 0 && extrasSel.filter(e => e.p === 0).length >= maxIng) return;
                            extrasSel.push({n: n, p: cost}); 
                            btn.classList.add('selected');
                        }
                        actualizarPrecioDetalle();
                    };
                    grid.appendChild(btn);
                });
            }
            actualizarPrecioDetalle();
            document.getElementById('modal-detalle').classList.remove('hidden');
        }

        function actualizarPrecioDetalle() {
            const ingCount = extrasSel.filter(e => e.p === 0).length;
            document.querySelectorAll('.extra-btn').forEach(btn => {
                const isSelected = btn.classList.contains('selected');
                const isFree = !btn.innerText.includes('€)');
                if(isFree) btn.classList.toggle('disabled', !isSelected && ingCount >= maxIng);
            });
            const total = parseFloat(platoActual.PRECIO) + extrasSel.reduce((s, e) => s + e.p, 0);
            document.getElementById('det-precio-final').innerText = total.toFixed(2) + "€";
        }

        function addAlCarrito() {
            const nombrePlato = platoActual.PLATO || platoActual.NOMBRE;
            const exTxt = extrasSel.map(e => e.n).join(', ');
            const total = parseFloat(platoActual.PRECIO) + extrasSel.reduce((s, e) => s + e.p, 0);
            carrito.push({ n: exTxt ? `${nombrePlato} (${exTxt})` : nombrePlato, p: total });
            cerrarDetalle(); 
            actualizarBarra();
        }

        function abrirCheckout() {
            const l = document.getElementById('checkout-list'); 
            l.innerHTML = "";
            carrito.forEach(i => {
                l.innerHTML += `
                    <div class="flex justify-between bg-white/5 p-4 rounded-xl border border-white/5 text-[10px] text-white uppercase font-bold">
                        <span>${i.n}</span>
                        <span class="text-cyan-400 font-mono">${i.p.toFixed(2)}€</span>
                    </div>`;
            });
            document.getElementById('modal-checkout').classList.remove('hidden');
        }

        async function confirmarPedidoFinal() {
            const n = document.getElementById('order-name').value;
            const ph = document.getElementById('order-phone').value;
            const ad = document.getElementById('order-addr').value;
            const terms = document.getElementById('order-terms').checked;

            if(!n || !ph || !ad) return alert("Por favor, completa tus datos de entrega.");
            if(!terms) return alert("Debes aceptar las condiciones de uso para continuar.");

            const total = carrito.reduce((s, i) => s + i.p, 0).toFixed(2);
            const detalle = carrito.map(i => i.n).join(', ');
            
            // Persistencia local para comodidad del usuario
            localStorage.setItem('user_name', n);
            localStorage.setItem('user_phone', ph);
            localStorage.setItem('user_addr', ad);

            // Registro en Base de Datos (opcional)
            fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ restaurante: restActivo.NOMBRE, nombre: n, direccion: ad, telefono: ph, pedido: detalle, total: total }) });
            
            const msg = `*🛍️ NUEVO PEDIDO AGUADULCE EXPRESS*\n*Local:* ${restActivo.NOMBRE}\n*Cliente:* ${n}\n*WhatsApp:* ${ph}\n*Dir:* ${ad}\n\n*Pedido:*\n${carrito.map(i => "• "+i.n).join("\n")}\n\n*TOTAL: ${total}€*`;
            window.open(`https://wa.me/${restActivo.TELEFONO.toString().replace(/\s/g, '')}?text=${encodeURIComponent(msg)}`);
        }

        function filtrarRest(c, el) { 
            document.querySelectorAll('.cat-bubble').forEach(b => b.classList.remove('active'));
            el.classList.add('active'); 
            renderHome(c); 
        }
        function irAHome() { renderHome(); }
        function cerrarDetalle() { document.getElementById('modal-detalle').classList.add('hidden'); }
        function cerrarCheckout() { document.getElementById('modal-checkout').classList.add('hidden'); }
        function vaciarCarrito() { carrito = []; actualizarBarra(); }
        function actualizarBarra() {
            const t = carrito.reduce((s, i) => s + i.p, 0);
            document.getElementById('basket-total').innerText = t.toFixed(2) + " €";
            document.getElementById('basket-bar').classList.toggle('hidden', carrito.length === 0);
        }
        document.getElementById('btn-add-det').onclick = addAlCarrito;
        init();
    </script>
</body>
</html>
