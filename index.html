
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express v60.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,900;1,900&display=swap');
        body { background: #020617; color: #f8fafc; font-family: ui-sans-serif; overflow-x: hidden; }
        .brand-font { font-family: 'Poppins', sans-serif; font-weight: 900; font-style: italic; text-transform: uppercase; letter-spacing: -1.5px; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .cat-bubble { flex: 0 0 75px; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; }
        .cat-img-wrapper { width: 55px; height: 55px; border-radius: 50%; background: #1e293b; padding: 2px; border: 2px solid transparent; transition: 0.3s; }
        .cat-img-wrapper img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .cat-bubble.active .cat-img-wrapper { border-color: #06b6d4; transform: scale(1.1); }
    </style>
</head>
<body class="pb-28">

    <div id="success-screen" class="fixed inset-0 z-[1000] bg-slate-950 hidden flex-col items-center justify-center text-center p-8">
        <div class="w-20 h-20 bg-green-600 rounded-full flex items-center justify-center text-4xl mb-4">✓</div>
        <h2 class="brand-font text-3xl text-white">¡PEDIDO ENVIADO!</h2>
        <button onclick="location.reload()" class="mt-8 bg-white/10 px-8 py-4 rounded-2xl text-xs font-black uppercase text-white border border-white/10">Volver al inicio</button>
    </div>

    <div id="main-app">
        <header class="glass sticky top-0 z-50 px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <button id="btn-back" onclick="irAHome()" class="hidden w-10 h-10 flex items-center justify-center bg-white/10 rounded-xl">←</button>
                <div class="brand-font"><span class="text-3xl text-cyan-400">AGUADULCE</span><br><span class="text-lg text-white tracking-[0.3em] -mt-1">EXPRESS</span></div>
            </div>
            <img src="logo_ae.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/706/706164.png'" class="w-10 h-10 bg-white rounded-full p-1 shadow-lg">
        </header>

        <div id="rest-banner" class="hidden h-40 w-full relative mb-4">
            <div id="banner-img" class="absolute inset-0 bg-cover bg-center"></div>
            <div class="absolute inset-0 bg-black/60 flex items-center justify-center"><h2 id="banner-name" class="text-3xl font-black italic uppercase text-white"></h2></div>
        </div>

        <div id="cat-nav" class="flex gap-4 p-5 overflow-x-auto bg-[#020617] scroll-smooth no-scrollbar"></div>
        <main id="app-content" class="p-4 grid grid-cols-2 gap-6"></main>
    </div>

    <div id="modal-detalle" class="fixed inset-0 z-[60] bg-slate-950 hidden overflow-y-auto">
        <div class="max-w-xl mx-auto min-h-screen pb-48 relative">
            <button onclick="cerrarDetalle()" class="absolute top-6 left-6 z-[70] w-12 h-12 bg-black/60 rounded-full text-white">✕</button>
            <div id="det-img" class="h-64 w-full bg-cover bg-center"></div>
            <div class="px-8 -mt-6 relative space-y-6">
                <h2 id="det-titulo" class="text-2xl font-black text-white italic uppercase"></h2>
                
                <div id="cont-unica" class="hidden space-y-4 pt-4 border-t border-white/5">
                    <p class="text-[10px] font-black text-cyan-500 uppercase italic">Opciones:</p>
                    <div id="grid-unica" class="grid grid-cols-2 gap-3"></div>
                </div>

                <div id="cont-multi" class="pt-2 border-t border-white/5">
                    <p class="text-[10px] font-black text-cyan-500 uppercase italic py-2">¿Extras?</p>
                    <div id="grid-multi" class="space-y-1"></div>
                </div>

                <div class="fixed bottom-0 left-0 right-0 p-6 bg-slate-950/90 backdrop-blur-md border-t border-white/5">
                    <div class="flex items-center justify-between mb-4 bg-slate-900 rounded-full px-8 py-2 border border-white/10">
                        <button onclick="cambiarCant(-1)" class="text-cyan-400 text-2xl font-bold">−</button>
                        <span id="det-cant" class="text-white font-black text-xl">1</span>
                        <button onclick="cambiarCant(1)" class="text-cyan-400 text-2xl font-bold">+</button>
                    </div>
                    <button id="btn-add-carrito" onclick="ejecutarAddCarrito()" class="w-full bg-cyan-600 h-16 rounded-2xl font-black text-white flex justify-between px-8 items-center shadow-xl">
                        <span>AÑADIR</span><span id="det-precio-final" class="font-mono">0.00€</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="basket-bar" class="fixed bottom-6 left-6 right-6 z-40 hidden">
        <button onclick="abrirCheckout()" class="w-full bg-cyan-600 rounded-2xl h-14 px-6 flex items-center justify-between shadow-2xl transition-all">
            <span id="basket-count" class="bg-black/30 px-3 py-1 rounded-lg text-[10px] font-black text-white">0</span>
            <span class="text-[11px] font-black uppercase text-white italic">Ver mi pedido</span>
            <span id="basket-total" class="font-mono font-bold text-white">0.00€</span>
        </button>
    </div>

    <div id="modal-checkout" class="fixed inset-0 z-[75] bg-slate-950 hidden overflow-y-auto p-6">
        <div class="max-w-md mx-auto space-y-6 pt-6 pb-20">
            <h2 class="text-2xl font-black text-white uppercase italic">Confirmar <span class="text-cyan-400">Pedido</span></h2>
            <div id="checkout-list" class="space-y-2"></div>
            
            <div class="bg-white/5 rounded-3xl p-6 border border-white/10 space-y-3">
                <div class="flex justify-between text-xs font-bold uppercase text-slate-400"><span>Subtotal</span><span id="res-subtotal" class="text-white">0.00€</span></div>
                <div class="pt-3 border-t border-white/10 flex justify-between items-center"><span class="text-sm font-black text-white italic uppercase">Total</span><span id="res-total-final" class="text-2xl font-mono font-black text-cyan-400">0.00€</span></div>
            </div>

            <div class="space-y-3">
                <input type="text" id="o-name" placeholder="Tu nombre" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-white outline-none focus:border-cyan-500 transition-all">
                <input type="tel" id="o-phone" placeholder="WhatsApp" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-white outline-none focus:border-cyan-500 transition-all">
                <input type="text" id="o-addr" placeholder="Dirección de entrega" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-white outline-none focus:border-cyan-500 transition-all">
            </div>

            <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                <label class="flex gap-3 cursor-pointer">
                    <input type="checkbox" id="check-legal" class="mt-1 w-5 h-5 accent-cyan-500">
                    <span class="text-[10px] text-slate-400 italic">Acepto la Política de Privacidad conforme a la LOPD. Mis datos se usarán solo para la gestión de este envío.</span>
                </label>
            </div>

            <button id="btn-finalizar" onclick="confirmarPedidoDirecto()" disabled class="w-full bg-cyan-600 p-6 rounded-2xl font-black text-white text-sm shadow-xl disabled:opacity-30">
                🚀 ¡PEDIR AHORA!
            </button>
            <button onclick="cerrarCheckout()" class="w-full text-slate-500 font-bold uppercase text-[10px] text-center tracking-widest">Seguir comprando</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyutzaHTfEwHGnoWVy_ptlNg5vTU1GvwflEwU4-KIRt2q7CvU0tr_SacmnhakPTTJ_l/exec";
        let dataCache = null, carrito = [], restActivo = null, pAct = null, sMulti = {}, sUnica = null, cantAct = 1;
        let idRestCarrito = null; // CONTROL VENTA CRUZADA

        async function init() {
            try {
                const res = await fetch(API_URL);
                dataCache = await res.json();
                renderHome();
            } catch (e) { console.error(e); }
        }

        function renderHome(f = null) {
            restActivo = null;
            document.getElementById('btn-back').classList.add('hidden');
            document.getElementById('rest-banner').classList.add('hidden');
            const content = document.getElementById('app-content');
            content.className = "p-4 grid grid-cols-2 gap-6";
            const filt = (f && f !== 'TODOS') ? dataCache.restaurantes.filter(r => r.CATEGORIA === f) : dataCache.restaurantes;
            content.innerHTML = filt.map(r => `
                <div onclick="verMenu('${r.ID_RESTAURANTE}')" class="space-y-3 active:scale-95 transition-all">
                    <img src="${r.FOTO}" class="w-full h-36 object-cover rounded-[2.2rem] shadow-lg border border-white/5">
                    <p class="text-[10px] font-black uppercase text-center text-slate-400 tracking-widest">${r.NOMBRE_RESTAURANTE || r.NOMBRE}</p>
                </div>`).join('');
            renderCats(dataCache.restaurantes, false);
        }

        function verMenu(id) {
            restActivo = dataCache.restaurantes.find(r => String(r.ID_RESTAURANTE) === String(id));
            const platos = dataCache.menus.filter(m => String(m.ID_RESTAURANTE) === String(id));
            document.getElementById('btn-back').classList.remove('hidden');
            document.getElementById('rest-banner').classList.remove('hidden');
            document.getElementById('banner-img').style.backgroundImage = `url('${restActivo.FOTO}')`;
            document.getElementById('banner-name').innerText = restActivo.NOMBRE_RESTAURANTE || restActivo.NOMBRE;
            const content = document.getElementById('app-content');
            content.className = "p-4 flex flex-col gap-4";
            content.innerHTML = platos.map(p => `
                <div onclick='abrirDetalle(${JSON.stringify(p)})' class="bg-white/5 p-4 rounded-[1.8rem] flex items-center gap-5 border border-white/5 active:bg-white/10 transition-all">
                    <img src="${p.FOTO_PLATO}" class="w-20 h-20 rounded-2xl object-cover">
                    <div class="flex-1">
                        <p class="text-[12px] font-black text-white uppercase italic">${p.PLATO}</p>
                        <p class="text-cyan-400 font-mono font-bold mt-1.5">${Number(p.PRECIO).toFixed(2)}€</p>
                    </div>
                </div>`).join('');
            renderCats(platos, true);
        }

        function abrirDetalle(p) {
            pAct = p; sMulti = {}; sUnica = null; cantAct = 1;
            document.getElementById('det-titulo').innerText = p.PLATO;
            document.getElementById('det-img').style.backgroundImage = `url('${p.FOTO_PLATO}')`;
            
            // UNICA CON PRECIO DEBAJO Y ROJO
            const gU = document.getElementById('grid-unica'); gU.innerHTML = "";
            if(p.SELECCION_UNICA) {
                p.SELECCION_UNICA.split(',').forEach((o, i) => {
                    const [n, pr] = o.split(':');
                    const btn = document.createElement('button');
                    btn.className = "flex flex-col items-center p-4 rounded-xl border border-white/10 bg-white/5 transition-all";
                    btn.innerHTML = `<span class="text-[10px] font-black uppercase text-white">${n}</span>
                                     <span class="text-red-500 font-bold text-xs mt-1">${Number(pr).toFixed(2)}€</span>`;
                    btn.onclick = () => { 
                        gU.querySelectorAll('button').forEach(b => { b.style.borderColor = "rgba(255,255,255,0.1)"; b.style.background = "transparent"; });
                        btn.style.borderColor = "#06b6d4"; btn.style.background = "rgba(6,182,212,0.1)";
                        sUnica = { n: n.trim(), p: Number(pr) }; actualizarCalculo();
                    };
                    gU.appendChild(btn); if(i === 0) btn.click();
                });
                document.getElementById('cont-unica').classList.remove('hidden');
            } else { document.getElementById('cont-unica').classList.add('hidden'); }

            // MULTI CON PRECIO DEBAJO Y ROJO
            const gM = document.getElementById('grid-multi'); gM.innerHTML = "";
            if(p.EXTRAS) {
                p.EXTRAS.split(',').forEach(o => {
                    const [n, pr] = o.split(':'); const nT = n.trim();
                    sMulti[nT] = { p: Number(pr), cant: 0 };
                    gM.innerHTML += `<div class="flex justify-between items-center py-4 border-b border-white/5">
                        <div class="flex flex-col">
                            <span class="text-[11px] font-bold text-slate-300 uppercase italic">${nT}</span>
                            <span class="text-red-500 font-bold text-[10px] mt-0.5">${Number(pr).toFixed(2)}€</span>
                        </div>
                        <div class="flex items-center gap-4">
                            <button onclick="cambiarExtra('${nT}',-1,this)" class="text-cyan-400 font-bold px-2">−</button>
                            <span class="text-white text-xs extra-count">0</span>
                            <button onclick="cambiarExtra('${nT}',1,this)" class="text-cyan-400 font-bold px-2">+</button>
                        </div>
                    </div>`;
                });
                document.getElementById('cont-multi').classList.remove('hidden');
            } else { document.getElementById('cont-multi').classList.add('hidden'); }
            
            actualizarCalculo();
            document.getElementById('modal-detalle').classList.remove('hidden');
        }

        // --- LÓGICA BLOQUEO VENTA CRUZADA ---
        function ejecutarAddCarrito() {
            const idActual = String(pAct.ID_RESTAURANTE);

            if (idRestCarrito && idRestCarrito !== idActual) {
                const conf = confirm("Tienes productos de otro restaurante en la cesta. ¿Vaciar cesta para pedir en este nuevo local?");
                if (conf) {
                    carrito = [];
                    idRestCarrito = idActual;
                } else {
                    return cerrarDetalle();
                }
            } else {
                idRestCarrito = idActual;
            }

            let base = sUnica ? sUnica.p : Number(pAct.PRECIO);
            let exT = []; let exP = 0;
            for(let k in sMulti) if(sMulti[k].cant > 0) { exT.push(`${sMulti[k].cant}x ${k}`); exP += sMulti[k].p * sMulti[k].cant; }
            let nombre = `${cantAct}x ${pAct.PLATO}${sUnica ? ' ('+sUnica.n+')' : ''}`;
            if(exT.length > 0) nombre += ` + ${exT.join(', ')}`;
            carrito.push({ n: nombre, p: (base * cantAct) + exP });
            cerrarDetalle(); actualizarBarraCesta();
        }

        function actualizarBarraCesta() {
            const sub = carrito.reduce((acc, i) => acc + i.p, 0);
            document.getElementById('basket-total').innerText = sub.toFixed(2) + "€";
            document.getElementById('basket-count').innerText = carrito.length;
            document.getElementById('basket-bar').classList.toggle('hidden', carrito.length === 0);
            if(carrito.length === 0) idRestCarrito = null;
            document.getElementById('res-subtotal').innerText = sub.toFixed(2) + "€";
            document.getElementById('res-total-final').innerText = sub.toFixed(2) + "€";
        }

        function actualizarCalculo() {
            let base = sUnica ? sUnica.p : Number(pAct.PRECIO);
            let ex = 0; for(let k in sMulti) ex += sMulti[k].p * sMulti[k].cant;
            document.getElementById('det-precio-final').innerText = ((base * cantAct) + ex).toFixed(2) + "€";
            document.getElementById('det-cant').innerText = cantAct;
        }

        async function confirmarPedidoDirecto() {
            const n = document.getElementById('o-name').value, t = document.getElementById('o-phone').value, a = document.getElementById('o-addr').value;
            if(!n || !t || !a) return alert("Faltan datos de envío");
            const btn = document.getElementById('btn-finalizar');
            btn.disabled = true; btn.innerText = "ENVIANDO...";

            try {
                await fetch(API_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify({
                        id_restaurante: idRestCarrito, cliente: n, telefono: t, direccion: a,
                        detalle: carrito.map(i => i.n).join(' | '),
                        total: carrito.reduce((acc, i) => acc + i.p, 0).toFixed(2),
                        whatsapp_rest: restActivo.TELEFONO
                    }) 
                });
                document.getElementById('main-app').style.display = 'none';
                document.getElementById('modal-checkout').style.display = 'none';
                document.getElementById('success-screen').style.display = 'flex';
            } catch (e) { alert("Error de red."); btn.disabled = false; }
        }

        document.getElementById('check-legal').addEventListener('change', function() {
            document.getElementById('btn-finalizar').disabled = !this.checked;
        });

        function renderCats(datos, esM) {
            const nav = document.getElementById('cat-nav');
            const cats = [...new Set(datos.map(i => i.CATEGORIA))].filter(Boolean);
            nav.innerHTML = `<div onclick="${esM?'filtrarMenu':'filtrarRest'}('TODOS', this)" class="cat-bubble active"><div class="cat-img-wrapper"><img src="https://cdn-icons-png.flaticon.com/512/706/706164.png"></div><span>Todos</span></div>`;
            cats.forEach(c => {
                const icon = dataCache.iconos.find(i => i.CATEGORIA.toUpperCase() === c.toUpperCase());
                nav.innerHTML += `<div onclick="${esM?'filtrarMenu':'filtrarRest'}('${c}', this)" class="cat-bubble"><div class="cat-img-wrapper"><img src="${icon?icon.FOTO:'https://cdn-icons-png.flaticon.com/512/706/706164.png'}"></div><span>${c}</span></div>`;
            });
        }
        function filtrarRest(c, el) { document.querySelectorAll('.cat-bubble').forEach(b => b.classList.remove('active')); el.classList.add('active'); renderHome(c); }
        function filtrarMenu(c, el) {
            document.querySelectorAll('.cat-bubble').forEach(b => b.classList.remove('active')); el.classList.add('active');
            const platos = dataCache.menus.filter(m => String(m.ID_RESTAURANTE) === String(restActivo.ID_RESTAURANTE));
            const filt = c === 'TODOS' ? platos : platos.filter(p => p.CATEGORIA === c);
            document.getElementById('app-content').innerHTML = filt.map(p => `<div onclick='abrirDetalle(${JSON.stringify(p)})' class="bg-white/5 p-4 rounded-[1.8rem] flex items-center gap-5 border border-white/5"><img src="${p.FOTO_PLATO}" class="w-20 h-20 rounded-2xl object-cover"><div class="flex-1"><p class="text-[11px] font-black text-white uppercase italic">${p.PLATO}</p><p class="text-cyan-400 font-mono font-bold mt-1.5">${Number(p.PRECIO).toFixed(2)}€</p></div></div>`).join('');
        }
        function cambiarExtra(n, v, btn) { sMulti[n].cant = Math.max(0, sMulti[n].cant + v); btn.parentElement.querySelector('.extra-count').innerText = sMulti[n].cant; actualizarCalculo(); }
        function cambiarCant(v) { cantAct = Math.max(1, cantAct + v); actualizarCalculo(); }
        function cerrarDetalle() { document.getElementById('modal-detalle').classList.add('hidden'); }
        function cerrarCheckout() { document.getElementById('modal-checkout').classList.add('hidden'); }
        function irAHome() { renderHome(); }
        function abrirCheckout() { 
            const list = document.getElementById('checkout-list');
            list.innerHTML = carrito.map((item, idx) => `
                <div class="flex justify-between items-center bg-white/5 p-4 rounded-2xl border border-white/10">
                    <span class="text-[10px] font-black text-white uppercase italic leading-tight">${item.n}</span>
                    <button onclick="borrarItem(${idx})" class="text-red-500 font-bold px-2">✕</button>
                </div>`).join('');
            document.getElementById('modal-checkout').classList.remove('hidden');
        }
        function borrarItem(idx) { carrito.splice(idx, 1); actualizarBarraCesta(); if(!carrito.length) cerrarCheckout(); else abrirCheckout(); }
        
        init();
    </script>
</body>
</html>
