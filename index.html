<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; background: #F8FAFC; margin: 0; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .carrusel { display: flex; overflow-x: auto; gap: 15px; padding: 10px; }
        .card { flex: 0 0 150px; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .plato { background: white; border-radius: 20px; padding: 15px; display: flex; align-items: center; gap: 15px; margin-bottom: 10px; }
    </style>
</head>
<body class="pb-24">

    <header class="bg-white p-5 sticky top-0 z-50 border-b-2 border-cyan-500 flex items-center gap-4">
        <button id="back" onclick="location.reload()" class="hidden">←</button>
        <h1 id="titulo" class="font-bold italic text-lg uppercase">AGUADULCE EXPRESS</h1>
    </header>

    <main id="app" class="p-4">
        <div id="loading" class="text-center py-20">
            <p class="animate-bounce font-bold text-cyan-500">CARGANDO MENÚS...</p>
        </div>
    </main>

    <div id="bar" onclick="checkout()" class="fixed bottom-5 left-5 right-5 h-16 bg-cyan-500 rounded-2xl hidden flex items-center justify-between px-6 text-white font-bold shadow-xl">
        <span>VER PEDIDO</span>
        <span id="total"></span>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxWc07aZ_Xby6QbTmD5REME00bqlhUUVT70XCLfdJeTQiOxz2vgVsqAVdCpfuBUQpJc/exec";
        let BD = null;
        let carrito = [];
        let restSel = null;

        // ESTA FUNCIÓN RECIBE LOS DATOS SIN BLOQUEOS
        function respuestaServidor(datos) {
            BD = datos;
            renderHome();
        }

        function llamarServidor() {
            const script = document.createElement('script');
            script.src = API + "?callback=respuestaServidor";
            document.body.appendChild(script);
        }

        function renderHome() {
            const app = document.getElementById('app');
            app.innerHTML = "";
            const cats = [...new Set(BD.restaurantes.map(r => r.CATEGORIA))];
            
            cats.forEach(c => {
                const rests = BD.restaurantes.filter(r => r.CATEGORIA === c);
                let html = `<p class="text-xs font-bold text-gray-400 mb-2 uppercase">${c}</p><div class="carrusel hide-scroll">`;
                rests.forEach(r => {
                    html += `<div onclick="verMenu('${r.ID_RESTAURANTE}')" class="card">
                        <img src="${r.FOTO}" class="w-full h-24 object-cover">
                        <p class="p-2 text-[10px] font-bold text-center">${r.NOMBRE_RESTAURANTE}</p>
                    </div>`;
                });
                app.innerHTML += html + `</div>`;
            });
        }

        function verMenu(id) {
            restSel = BD.restaurantes.find(r => String(r.ID_RESTAURANTE) === String(id));
            const platos = BD.menus.filter(p => String(p.ID_RESTAURANTE) === String(id));
            document.getElementById('titulo').innerText = restSel.NOMBRE_RESTAURANTE;
            document.getElementById('back').classList.remove('hidden');
            
            let html = `<div class="fade-in">`;
            platos.forEach(p => {
                html += `<div onclick="add('${p.PLATO}', ${p.PRECIO})" class="plato shadow-sm">
                    <img src="${p.FOTO_PLATO}" class="w-16 h-16 rounded-xl object-cover">
                    <div class="flex-1"><p class="font-bold text-xs uppercase">${p.PLATO}</p><p class="text-cyan-600 font-bold">${p.PRECIO} €</p></div>
                    <div class="text-cyan-500">+</div>
                </div>`;
            });
            document.getElementById('app').innerHTML = html + `</div>`;
        }

        function add(n, p) {
            carrito.push({n, p});
            document.getElementById('bar').classList.remove('hidden');
            const total = carrito.reduce((s, i) => s + i.p, 0) + 3.50;
            document.getElementById('total').innerText = total.toFixed(2) + " €";
        }

        function checkout() {
            const nom = prompt("Tu nombre:");
            const dir = prompt("Dirección:");
            if(!nom || !dir) return;
            
            const total = carrito.reduce((s, i) => s + i.p, 0) + 3.50;
            const prods = carrito.map(i => i.n).join(", ");
            
            // Enviar pedido al Excel
            const img = new Image();
            img.src = `${API}?cliente=${nom}&whatsapp=Móvil&direccion=${dir}&productos=${prods}&total=${total.toFixed(2)}&restaurante=${restSel.ID_RESTAURANTE}`;

            // Enviar a WhatsApp
            const msg = `*NUEVO PEDIDO*\nCliente: ${nom}\nDirección: ${dir}\nProductos: ${prods}\nTotal: ${total.toFixed(2)}€`;
            window.location.href = `https://wa.me/${restSel.TELEFONO}?text=${encodeURIComponent(msg)}`;
        }

        llamarServidor();
    </script>
</body>
</html>
