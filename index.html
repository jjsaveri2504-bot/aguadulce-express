<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aguadulce Express v11</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 pb-20">

    <header class="bg-white p-5 shadow-sm sticky top-0 z-50 flex items-center gap-4 border-b-2 border-cyan-500">
        <button id="btn-back" onclick="location.reload()" class="hidden bg-gray-100 p-2 rounded-lg">←</button>
        <h1 id="header-titulo" class="font-black italic text-lg uppercase">AGUADULCE <span class="text-cyan-500">EXPRESS</span></h1>
    </header>

    <main id="main-container" class="p-4 max-w-lg mx-auto">
        <div id="status" class="text-center py-20 font-bold text-gray-400 text-xs">
            <div class="animate-spin h-8 w-8 border-4 border-cyan-500 border-t-transparent rounded-full mx-auto mb-4"></div>
            CONECTANDO CON EXCEL...
        </div>
    </main>

    <script>
        // Pega aquí tu URL nueva que termina en /exec
        const API_URL = "https://script.google.com/macros/s/AKfycbzroIyJ-sQVRSHsfwlGDYk61lCmC2DLfagbfv14_dz-RecWB4gqn0BvT40sgEVwVJUj/exec"; 

        let dataCache = null;

        async function cargarDatos() {
            try {
                const response = await fetch(API_URL);
                dataCache = await response.json();
                
                if (dataCache.error) throw new Error(dataCache.error);
                renderHome();
            } catch (error) {
                document.getElementById('status').innerHTML = `<p class="text-red-500">ERROR: ${error.message}<br><small>Revisa los permisos de 'Cualquiera' en el Script</small></p>`;
            }
        }

        function renderHome() {
            const container = document.getElementById('main-container');
            container.innerHTML = "";
            
            const categorias = [...new Set(dataCache.restaurantes.map(r => r.CATEGORIA))].filter(Boolean);

            categorias.forEach(cat => {
                const rests = dataCache.restaurantes.filter(r => r.CATEGORIA === cat);
                let html = `<h2 class="text-[10px] font-black text-gray-400 uppercase tracking-widest mt-6 mb-3 italic">${cat}</h2><div class="grid grid-cols-2 gap-4">`;
                
                rests.forEach(r => {
                    html += `
                        <div onclick="verMenu('${r.ID_RESTAURANTE}')" class="bg-white rounded-3xl overflow-hidden shadow-sm border border-gray-100 active:scale-95 transition">
                            <img src="${r.FOTO}" class="w-full h-28 object-cover" onerror="this.src='https://via.placeholder.com/200'">
                            <p class="p-3 text-[10px] font-black uppercase italic">${r.NOMBRE}</p>
                        </div>`;
                });
                container.innerHTML += html + "</div>";
            });
        }

        function verMenu(id) {
            const rest = dataCache.restaurantes.find(r => r.ID_RESTAURANTE == id);
            const platos = dataCache.menus.filter(m => m.ID_RESTAURANTE == id);
            
            document.getElementById('header-titulo').innerText = rest.NOMBRE;
            document.getElementById('btn-back').classList.remove('hidden');
            
            const container = document.getElementById('main-container');
            container.innerHTML = "<div class='flex flex-col gap-3'>";

            platos.forEach(p => {
                container.innerHTML += `
                    <div class="bg-white p-3 rounded-3xl flex items-center gap-4 shadow-sm border border-gray-100">
                        <img src="${p.FOTO}" class="w-20 h-20 rounded-2xl object-cover" onerror="this.src='https://via.placeholder.com/100'">
                        <div class="flex-1">
                            <p class="font-black text-[11px] uppercase italic text-gray-800">${p.PLATO}</p>
                            <p class="text-[9px] text-gray-400 leading-tight my-1">${p.DESCRIPCION || ''}</p>
                            <p class="text-cyan-500 font-bold text-sm">${p.PRECIO} €</p>
                        </div>
                    </div>`;
            });
            container.innerHTML += "</div>";
            window.scrollTo(0,0);
        }

        cargarDatos();
    </script>
</body>
</html>
