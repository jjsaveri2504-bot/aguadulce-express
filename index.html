<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express | Direct Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,900;1,900&display=swap');
        body { background: #020617; color: #f8fafc; font-family: ui-sans-serif, system-ui; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .brand-font { font-family: 'Poppins', sans-serif; font-weight: 900; font-style: italic; text-transform: uppercase; letter-spacing: -1.5px; }
        
        /* Categorías con Iconos (Nuestra mejora estrella) */
        .cat-bubble { flex: 0 0 75px; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; }
        .cat-img-wrapper { width: 55px; height: 55px; border-radius: 50%; background: #1e293b; padding: 2px; border: 2px solid transparent; transition: 0.3s; }
        .cat-img-wrapper img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .cat-bubble.active .cat-img-wrapper { border-color: #06b6d4; transform: scale(1.1); box-shadow: 0 0 15px rgba(6, 182, 212, 0.4); }
        .cat-bubble span { font-size: 9px; font-weight: 800; color: #64748b; text-transform: uppercase; text-align: center; }

        /* Pantalla de Éxito (Nueva Experiencia) */
        #success-screen { position: fixed; inset: 0; z-index: 100; background: #020617; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
        .check-anim { width: 80px; height: 80px; background: #16a34a; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; margin-bottom: 1.5rem; animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
    </style>
</head>
<body class="pb-28">

    <div id="success-screen">
        <div class="check-anim">✓</div>
        <h2 class="brand-font text-3xl text-white mb-2">¡PEDIDO RECIBIDO!</h2>
        <p class="text-slate-400 text-sm mb-8 italic font-medium">Estamos avisando al restaurante.<br>Te contactaremos por WhatsApp en breve.</p>
        <button onclick="location.reload()" class="bg-white/10 px-8 py-3 rounded-xl text-xs font-black uppercase tracking-widest text-white border border-white/10">Hacer otro pedido</button>
    </div>

    <div id="main-app">
        <header class="glass sticky top-0 z-50 px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <button id="btn-back" onclick="irAHome()" class="hidden w-10 h-10 flex items-center justify-center bg-white/10 rounded-xl text-white">←</button>
                <div class="flex flex-col brand-font">
                    <span class="text-3xl text-cyan-400">AGUADULCE</span>
                    <span class="text-lg text-white tracking-[0.3em] -mt-1">EXPRESS</span>
                </div>
            </div>
            <img src="logo_ae.png" class="w-10 h-10 bg-white rounded-full p-1 shadow-lg">
        </header>

        <div id="rest-banner" class="hidden h-40 w-full relative mb-4">
            <div id="banner-img" class="absolute inset-0 bg-cover bg-center"></div>
            <div class="absolute inset-0 bg-black/60 flex items-center justify-center">
                <h2 id="banner-name" class="text-3xl font-black italic uppercase text-white"></h2>
            </div>
        </div>

        <div id="cat-nav" class="flex gap-4 p-5 overflow-x-auto bg-[#020617] scroll-smooth"></div>

        <main id="app-content" class="p-4 grid grid-cols-2 gap-6"></main>
    </div>

    <div id="modal-detalle" class="fixed inset-0 z-[60] bg-slate-950 hidden overflow-y-auto">
        <div class="max-w-xl mx-auto min-h-screen pb-48 relative">
            <button onclick="cerrarDetalle()" class="absolute top-6 left-6 z-[70] w-12 h-12 bg-black/60 rounded-full text-white">✕</button>
            <div id="det-img" class="h-64 w-full bg-cover bg-center"></div>
            <div class="px-8 -mt-6 relative space-y-6">
                <h2 id="det-titulo" class="text-2xl font-black text-white italic uppercase"></h2>
                
                <div id="cont-unica" class="hidden space-y-4 pt-4 border-t border-white/5">
                    <p class="text-[10px] font-black text-cyan-500 uppercase italic">Selección obligatoria:</p>
                    <div id="grid-unica" class="grid grid-cols-2 gap-3"></div>
                </div>

                <div id="cont-multi" class="pt-2 border-t border-white/5">
                    <button onclick="document.getElementById('grid-multi').classList.toggle('hidden')" class="w-full flex justify-between items-center py-4 text-[10px] font-black text-cyan-500 uppercase italic">
                        ¿Añadir extras? <span>↓</span>
                    </button>
                    <div id="grid-multi" class="hidden space-y-1"></div>
                </div>

                <div class="fixed bottom-0 left-0 right-0 p-6 bg-slate-950/90 backdrop-blur-md">
                    <div class="flex items-center justify-between mb-4 bg-slate-900 rounded-full px-8 py-2 border border-white/10">
                        <button onclick="cambiarCant(-1)" class="text-cyan-400 text-2xl font-bold">−</button>
                        <span id="det-cant" class="text-white font-black text-xl">1</span>
                        <button onclick="cambiarCant(1)" class="text-cyan-400 text-2xl font-bold">+</button>
                    </div>
                    <button onclick="ejecutarAddCarrito()" class="w-full bg-cyan-600 h-16 rounded-2xl font-black text-white flex justify-between px-8 items-center">
                        <span>AÑADIR A CESTA</span>
                        <span id="det-precio-final">0.00€</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="basket-bar" class="fixed bottom-6 left-6 right-6 z-40 hidden">
        <button onclick="abrirCheckout()" class="w-full bg-cyan-600 rounded-2xl h-14 px-6 flex items-center justify-between shadow-2xl">
            <span id="basket-count" class="bg-black/30 px-3 py-1 rounded-lg text-[10px] font-black text-white">0</span>
            <span class="text-[11px] font-black uppercase text-white italic">Ver mi pedido</span>
            <span id="basket-total" class="font-mono font-bold text-white">0.00€</span>
        </button>
    </div>

    <div id="modal-checkout" class="fixed inset-0 z-[75] bg-slate-950 hidden overflow-y-auto p-6">
        <div class="max-w-md mx-auto space-y-6 pt-6">
            <h2 class="text-2xl font-black italic text-white uppercase italic">Confirmar <span class="text-cyan-400">Pedido</span></h2>
            <div id="checkout-list" class="space-y-2"></div>
            
            <div class="bg-white/5 rounded-3xl p-6 border border-white/10 space-y-3">
                <div class="flex justify-between text-xs font-bold uppercase text-slate-400"><span>Platos</span><span id="res-subtotal" class="text-white">0.00€</span></div>
                <div class="flex justify-between text-xs font-bold uppercase text-slate-400"><span>Costo de Envío Fijo</span><span class="text-cyan-400">3.50€</span></div>
                <div class="pt-3 border-t border-white/10 flex justify-between items-center"><span class="text-sm font-black text-white uppercase italic">Total</span><span id="res-total-final" class="text-xl font-mono font-black text-cyan-400">0.00€</span></div>
            </div>

            <div class="space-y-3">
                <input type="text" id="o-name" placeholder="Nombre completo" class="w-full bg-white/5 border border-white/10 rounded-xl p-5 text-white outline-none">
                <input type="tel" id="o-phone" placeholder="WhatsApp (Ej: 34600...)" class="w-full bg-white/5 border border-white/10 rounded-xl p-5 text-white outline-none">
                <input type="text" id="o-addr" placeholder="Dirección de entrega" class="w-full bg-white/5 border border-white/10 rounded-xl p-5 text-white outline-none">
            </div>

            <button id="btn-finalizar" onclick="confirmarPedidoDirecto()" class="w-full bg-cyan-600 p-6 rounded-2xl font-black text-white text-sm shadow-xl flex justify-center items-center gap-4">
                <span id="btn-text">¡LISTO, PEDIR AHORA!</span>
                <div id="loader" class="hidden w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
            </button>
            <button onclick="cerrarCheckout()" class="w-full text-gray-500 font-bold uppercase text-[10px] text-center">Volver a la carta</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwBjSyiRZJPMc397Qv3qxW61PtUm0sRjQzKc924XlIBYI7AqzwTK_FPcPyHvRGB1an4/exec"; // Reemplázala después
        const COSTO_ENVIO = 3.50;
        let dataCache = null, carrito = [], restActivo = null, pAct = null, sMulti = {}, sUnica = null, cantAct = 1;

        async function init() {
            try {
                const res = await fetch(API_URL);
                dataCache = await res.json();
                renderHome();
            } catch (e) { console.error("Error cargando datos"); }
        }

        // --- LÓGICA DE ENVÍO DIRECTO (NUEVA) ---
        async function confirmarPedidoDirecto() {
            const n = document.getElementById('o-name').value, 
                  t = document.getElementById('o-phone').value, 
                  a = document.getElementById('o-addr').value;

            if(!n || !t || !a) return alert("Por favor, rellena tus datos de entrega.");

            // Mostrar cargando
            document.getElementById('btn-text').innerText = "ENVIANDO...";
            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('btn-finalizar').disabled = true;

            const sub = carrito.reduce((acc, i) => acc + i.p, 0);
            const tot = (sub + COSTO_ENVIO).toFixed(2);

            const payload = {
                id_restaurante: restActivo.ID_RESTAURANTE,
                cliente: n,
                telefono: t,
                direccion: a,
                detalle: carrito.map(i => i.n).join(' | '),
                total: tot,
                whatsapp_rest: restActivo.TELEFONO
            };

            try {
                // Enviamos al Apps Script (que guardará en Excel y avisará a Telegram)
                await fetch(API_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify(payload) 
                });
                
                // Éxito: Mostramos pantalla verde
                document.getElementById('main-app').style.display = 'none';
                document.getElementById('modal-checkout').style.display = 'none';
                document.getElementById('success-screen').style.display = 'flex';
                
            } catch (e) {
                alert("Hubo un error al enviar. Inténtalo de nuevo.");
                document.getElementById('btn-text').innerText = "¡LISTO, PEDIR AHORA!";
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('btn-finalizar').disabled = false;
            }
        }

        // --- LÓGICA DE TIENDA (LA QUE YA FUNCIONA PERFECTO) ---
        function renderHome(f = null) {
            restActivo = null;
            document.getElementById('btn-back').classList.add('hidden');
            document.getElementById('rest-banner').classList.add('hidden');
            const content = document.getElementById('app-content');
            content.className = "p-4 grid grid-cols-2 gap-6";
            const filt = (f && f !== 'TODOS') ? dataCache.restaurantes.filter(r => r.CATEGORIA === f) : dataCache.restaurantes;
            content.innerHTML = filt.map(r => `
                <div onclick="verMenu('${r.ID_RESTAURANTE}')" class="space-y-3">
                    <img src="${r.FOTO}" class="w-full h-36 object-cover rounded-[2.2rem] shadow-lg border border-white/5">
                    <p class="text-[10px] font-black uppercase text-center text-slate-400 tracking-wider">${r.NOMBRE}</p>
                </div>
            `).join('');
            renderCats(dataCache.restaurantes, false);
        }

        function verMenu(id) {
            restActivo = dataCache.restaurantes.find(r => String(r.ID_RESTAURANTE) === String(id));
            const platos = dataCache.menus.filter(m => String(m.ID_RESTAURANTE) === String(id));
            document.getElementById('btn-back').classList.remove('hidden');
            document.getElementById('rest-banner').classList.remove('hidden');
            document.getElementById('banner-img').style.backgroundImage = `url('${restActivo.FOTO}')`;
            document.getElementById('banner-name').innerText = restActivo.NOMBRE;
            const content = document.getElementById('app-content');
            content.className = "p-4 flex flex-col gap-4";
            content.innerHTML = platos.map(p => `
                <div onclick='abrirDetalle(${JSON.stringify(p)})' class="bg-white/5 p-4 rounded-[1.8rem] flex items-center gap-5 border border-white/5">
                    <img src="${p.FOTO}" class="w-20 h-20 rounded-2xl object-cover">
                    <div class="flex-1">
                        <p class="text-[12px] font-black text-white uppercase">${p.PLATO}</p>
                        <p class="text-cyan-400 font-mono font-bold mt-1.5">${Number(p.PRECIO).toFixed(2)}€</p>
                    </div>
                </div>
            `).join('');
            renderCats(platos, true);
        }

        function renderCats(datos, esM) {
            const nav = document.getElementById('cat-nav');
            const cats = [...new Set(datos.map(i => i.CATEGORIA))].filter(Boolean);
            nav.innerHTML = `<div onclick="${esM?'filtrarMenu':'filtrarRest'}('TODOS', this)" class="cat-bubble active"><div class="cat-img-wrapper"><img src="https://cdn-icons-png.flaticon.com/512/706/706164.png"></div><span>Todos</span></div>`;
            cats.forEach(c => {
                const icon = dataCache.iconos.find(i => i.CATEGORIA.toUpperCase() === c.toUpperCase());
                nav.innerHTML += `<div onclick="${esM?'filtrarMenu':'filtrarRest'}('${c}', this)" class="cat-bubble"><div class="cat-img-wrapper"><img src="${icon?icon.FOTO:'https://cdn-icons-png.flaticon.com/512/706/706164.png'}"></div><span>${c}</span></div>`;
            });
        }

        // (Aquí continúan el resto de funciones: abrirDetalle, actualizarCalculo, cambiarExtra, etc., que son idénticas a la v50 que te pasé)
        // Por brevedad las he resumido pero incluiremos todas en el archivo final.

        function cerrarDetalle() { document.getElementById('modal-detalle').classList.add('hidden'); }
        function cerrarCheckout() { document.getElementById('modal-checkout').classList.add('hidden'); }
        function abrirCheckout() { 
            const list = document.getElementById('checkout-list');
            list.innerHTML = carrito.map((item, idx) => `
                <div class="flex justify-between items-center bg-white/5 p-4 rounded-2xl border border-white/5">
                    <div class="flex flex-col"><span class="text-[10px] font-black text-white uppercase">${item.n}</span><span class="text-cyan-500 font-mono text-[9px]">${item.p.toFixed(2)}€</span></div>
                    <button onclick="borrarItem(${idx})" class="text-red-500 font-bold px-2">✕</button>
                </div>`).join('');
            document.getElementById('modal-checkout').classList.remove('hidden');
            actualizarBarraCesta();
        }
        function borrarItem(idx) { carrito.splice(idx, 1); if(!carrito.length) cerrarCheckout(); else abrirCheckout(); actualizarBarraCesta(); }
        function irAHome() { renderHome(); }
        function actualizarBarraCesta() {
            const sub = carrito.reduce((acc, i) => acc + i.p, 0);
            document.getElementById('basket-total').innerText = (sub + COSTO_ENVIO).toFixed(2) + "€";
            document.getElementById('basket-count').innerText = carrito.length;
            document.getElementById('basket-bar').classList.toggle('hidden', carrito.length === 0);
            document.getElementById('res-subtotal').innerText = sub.toFixed(2) + "€";
            document.getElementById('res-total-final').innerText = (sub + COSTO_ENVIO).toFixed(2) + "€";
        }
        function cambiarCant(v) { cantAct = Math.max(1, cantAct + v); actualizarCalculo(); }
        
        init();
    </script>
</body>
</html>
